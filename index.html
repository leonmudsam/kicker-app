  .hof-pod-av.has-emoji{background:var(--surface3)}
  .hof-pod-av.has-emoji .em{font-size:1em;line-height:1;
    font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .hof-pod-info{flex:1;min-width:0}
  .hof-pod-name{font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:-.02em;line-height:1;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hof-pod-tier-row{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
  .hof-pod-elo{font-family:'Sometype Mono',monospace;font-size:10px;color:var(--ink2);font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hof-pod-elo b{color:var(--acid);font-family:'Archivo Black',sans-serif;font-size:11px;letter-spacing:-.01em}
  .hof-pod .tier-pill{font-size:9.5px;padding:2px 6px}
  .hof-pod .tier-pill svg{width:9px;height:9px}
  .hof-pod-stats{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:9px;
    font-family:'Sometype Mono',monospace;font-size:10.5px;color:var(--ink2);font-weight:600;
    position:relative;z-index:1}
  .hof-pod.silver .hof-pod-stats{border-top:1px solid rgba(200,208,203,.18)}
  .hof-pod.bronze .hof-pod-stats{border-top:1px solid rgba(205,127,50,.18)}
  .hof-pod-stat-sep{color:var(--faint);opacity:.6}
  @media (max-width: 360px){
    .hof-pods{gap:6px}
    .hof-pod{padding:10px 9px 9px;border-radius:14px}
    .hof-pod-row{gap:8px;margin-top:8px}
    .hof-pod-av{width:38px;height:38px;font-size:19px}
    .hof-pod-av:not(.has-emoji){font-size:12px}
    .hof-pod-name{font-size:13.5px}
    .hof-pod-rank{font-size:8px;padding:2px 6px;letter-spacing:.12em}
    .hof-pod-elo{font-size:9.5px}
    .hof-pod-elo b{font-size:10px}
    .hof-pod .tier-pill{font-size:8.5px;padding:2px 5px}
    .hof-pod-stats{font-size:9.5px;gap:5px;margin-top:8px;padding-top:7px}
  }

  /* Tier Pill in Liga-Liste (Gesamt-Ansicht) */
  .tier-pill{display:inline-flex;align-items:center;gap:4px;font-family:'Sometype Mono',monospace;
    font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.02em}
  .tier-pill svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tier-pill.t-legende    {color:var(--gold);background:rgba(247,207,74,.10);border:1px solid rgba(247,207,74,.22)}
  .tier-pill.t-elite      {color:var(--purple);background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.22)}
  .tier-pill.t-stark      {color:var(--acid);background:rgba(190,242,100,.10);border:1px solid rgba(190,242,100,.22)}
  .tier-pill.t-solide     {color:var(--blue);background:rgba(86,180,232,.10);border:1px solid rgba(86,180,232,.22)}
  .tier-pill.t-einsteiger {color:var(--orange);background:rgba(255,120,73,.10);border:1px solid rgba(255,120,73,.22)}

  /* ============ [§C20] SEASON RECAP REDESIGN ============ */
  .rcp-head{text-align:center;margin-bottom:18px}
  .rcp-label{display:inline-flex;align-items:center;gap:6px;font-family:'Sometype Mono',monospace;
    font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);
    padding:5px 12px;background:rgba(247,207,74,.10);border:1px solid rgba(247,207,74,.3);border-radius:99px}
  .rcp-label svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .rcp-month{font-family:'Archivo Black',sans-serif;font-size:32px;letter-spacing:-.03em;margin-top:10px;line-height:1}
  .rcp-meta{font-size:11.5px;color:var(--muted);font-family:'Sometype Mono',monospace;margin-top:6px;letter-spacing:.04em}

  /* Saison-Picker im Recap-Header */
  .rcp-picker{position:relative;display:inline-flex;align-items:center;margin-top:12px;
    background:var(--surface2);border:1px solid var(--line);border-radius:99px;
    padding:4px 4px 4px 14px;transition:.18s}
  .rcp-picker:hover{border-color:var(--line2)}
  .rcp-picker:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(247,207,74,.12)}
  .rcp-picker-select{appearance:none;-webkit-appearance:none;background:transparent;border:none;outline:none;
    font-family:'Sometype Mono',monospace;font-size:11px;font-weight:700;color:var(--ink);
    letter-spacing:.06em;padding:6px 28px 6px 0;cursor:pointer;
    text-transform:uppercase;line-height:1}
  .rcp-picker-select option{background:var(--surface);color:var(--ink);
    font-family:'Sometype Mono',monospace;text-transform:none;letter-spacing:0}
  .rcp-picker-chevron{position:absolute;right:10px;top:50%;transform:translateY(-50%) rotate(0deg);
    pointer-events:none;color:var(--muted);display:grid;place-items:center}
  .rcp-picker-chevron svg{width:14px;height:14px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .rcp-champ{position:relative;
    background:linear-gradient(135deg,rgba(247,207,74,.16),rgba(190,242,100,.04) 60%,var(--surface) 90%);
    border:1px solid rgba(247,207,74,.45);border-radius:22px;padding:20px 18px 16px;margin-bottom:14px;overflow:hidden;text-align:center}
  .rcp-champ::before{content:"";position:absolute;top:-50px;right:-30px;width:180px;height:180px;
    background:radial-gradient(circle,rgba(247,207,74,.18),transparent 65%);pointer-events:none}
  .rcp-champ::after{content:"";position:absolute;bottom:-30px;left:-20px;width:140px;height:140px;
    background:radial-gradient(circle,rgba(190,242,100,.08),transparent 65%);pointer-events:none}
  .rcp-champ-label{font-family:'Sometype Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;color:var(--gold);position:relative;z-index:1}
  .rcp-champ-av-wrap{position:relative;display:inline-block;margin:14px 0 10px}
  .rcp-champ-av{width:88px;height:88px;border-radius:50%;display:grid;place-items:center;font-size:44px;
    background:linear-gradient(155deg,#3a4540,#212824);border:3px solid var(--gold);
    box-shadow:0 0 32px rgba(247,207,74,.5)}
  .rcp-champ-av.has-emoji .em{font-size:1em;line-height:1;
    font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .rcp-champ-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:30px;color:var(--bg)}
  .rcp-champ-crown{position:absolute;top:-18px;left:50%;transform:translateX(-50%);z-index:3;line-height:1}
  .rcp-champ-crown svg{width:26px;height:26px;fill:var(--gold);stroke:none;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .rcp-champ-name{font-family:'Archivo Black',sans-serif;font-size:28px;letter-spacing:-.03em;line-height:1;position:relative;z-index:1}
  .rcp-champ-stats{display:flex;justify-content:center;gap:18px;margin-top:14px;padding-top:14px;
    border-top:1px solid rgba(247,207,74,.18);position:relative;z-index:1}
  .rcp-champ-stats .s{text-align:center}
  .rcp-champ-stats .s .v{font-family:'Archivo Black',sans-serif;font-size:18px;line-height:1}
  .rcp-champ-stats .s .v.acid{color:var(--acid)} .rcp-champ-stats .s .v.red{color:var(--red)}
  .rcp-champ-stats .s .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;
    font-family:'Sometype Mono',monospace;margin-top:4px;font-weight:700}

  .rcp-pod{display:flex;align-items:flex-end;gap:8px;background:var(--bg2);
    border:1px solid var(--line);border-radius:18px;padding:14px 10px 10px;margin-bottom:14px}
  .rcp-pod-col{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;min-width:0}
  .rcp-pod-av{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:24px;
    background:linear-gradient(155deg,#3a4540,#212824);border:2px solid var(--line2);margin-bottom:6px;position:relative}
  .rcp-pod-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:15px;color:var(--bg)}
  .rcp-pod-av.has-emoji .em{font-size:1em;line-height:1;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .rcp-pod-col.first .rcp-pod-av{width:60px;height:60px;font-size:30px;border-color:var(--gold);box-shadow:0 0 14px rgba(247,207,74,.35)}
  .rcp-pod-col.first .rcp-pod-av:not(.has-emoji){font-size:18px}
  .rcp-pod-col.second .rcp-pod-av{border-color:#c8d0cb;box-shadow:0 0 10px rgba(200,208,203,.3)}
  .rcp-pod-col.third .rcp-pod-av{border-color:var(--orange);box-shadow:0 0 10px rgba(255,120,73,.3)}
  .rcp-pod-mini-crown{position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:3}
  .rcp-pod-mini-crown svg{width:18px;height:18px;fill:var(--gold);stroke:none}
  .rcp-pod-name{font-family:'Archivo Black',sans-serif;font-size:13px;line-height:1.1;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .rcp-pod-col.first .rcp-pod-name{font-size:15px}
  .rcp-pod-elo{font-family:'Sometype Mono',monospace;font-size:11px;color:var(--ink2);margin-top:3px;font-weight:600}
  .rcp-pod-col.first .rcp-pod-elo{color:var(--gold)}
  .rcp-pod-col.second .rcp-pod-elo{color:#c8d0cb}
  .rcp-pod-col.third .rcp-pod-elo{color:var(--orange)}
  .rcp-pod-wl{font-size:9.5px;color:var(--muted);margin-top:2px;font-family:'Sometype Mono',monospace}
  .rcp-pod-block{margin-top:8px;width:100%;font-family:'Archivo Black',sans-serif;font-size:14px;
    padding:6px 0;border-radius:6px 6px 0 0;color:var(--bg)}
  .rcp-pod-col.first .rcp-pod-block{background:var(--gold);height:50px;line-height:38px}
  .rcp-pod-col.second .rcp-pod-block{background:#c8d0cb;height:36px;line-height:24px}
  .rcp-pod-col.third .rcp-pod-block{background:var(--orange);height:28px;line-height:16px}

  .rcp-section{font-family:'Sometype Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:4px 2px 10px;
    display:flex;align-items:center;gap:8px}
  .rcp-section::after{content:"";flex:1;height:1px;background:var(--line)}

  /* v9: dezenter, mittiger Mini-Positionsverlauf-Button weit oben im Recap.
     Zeigt eine kompakte Kurven-Vorschau der Saison, öffnet den vollen Verlauf. */
  .rcp-posmini{display:flex;align-items:center;gap:12px;margin:0 auto 16px;max-width:290px;width:100%;
    background:linear-gradient(120deg,rgba(86,180,232,.12),var(--surface) 72%);
    border:1px solid rgba(86,180,232,.34);border-radius:14px;padding:9px 13px;cursor:pointer;
    transition:.16s;text-align:left;color:var(--ink)}
  .rcp-posmini:active{transform:scale(.98);background:var(--surface2)}
  .rcp-posmini-chart{width:78px;height:38px;flex:none;border-radius:8px;overflow:hidden}
  .rcp-posmini-chart svg{width:100%;height:100%;display:block}
  .rcp-posmini-tx{flex:1;min-width:0}
  .rcp-posmini-tt{font-family:'Archivo Black',sans-serif;font-size:12.5px;letter-spacing:-.01em;display:block;line-height:1.1}
  .rcp-posmini-su{font-size:10px;color:var(--muted);font-family:'Sometype Mono',monospace;margin-top:3px;display:block}
  .rcp-posmini-ch{flex:none;color:var(--blue);display:grid;place-items:center}
  .rcp-posmini-ch svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .rcp-awards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .rcp-aw{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:12px;display:flex;gap:11px;align-items:center;position:relative;overflow:hidden;
    cursor:pointer;transition:.16s;min-width:0}
  .rcp-aw:active{transform:scale(.985);background:var(--surface2)}
  .rcp-aw::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px}
  .rcp-aw.orange::before{background:var(--orange)}
  .rcp-aw.purple::before{background:var(--purple)}
  .rcp-aw.acid::before{background:var(--acid)}
  .rcp-aw.blue::before{background:var(--blue)}
  .rcp-aw.red::before{background:var(--red)}
  .rcp-aw.gold::before{background:var(--gold)}
  .rcp-aw-ic{width:32px;height:32px;border-radius:10px;background:var(--surface2);display:grid;place-items:center;flex-shrink:0}
  .rcp-aw-ic svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .rcp-aw.orange .rcp-aw-ic{color:var(--orange)}
  .rcp-aw.purple .rcp-aw-ic{color:var(--purple)}
  .rcp-aw.acid .rcp-aw-ic{color:var(--acid)}
  .rcp-aw.blue .rcp-aw-ic{color:var(--blue)}
  .rcp-aw.red .rcp-aw-ic{color:var(--red)}
  .rcp-aw.gold .rcp-aw-ic{color:var(--gold)}
  /* Recap "Verstanden"-Button am Ende — deutlich sichtbar, klare Aktion */
  .recap-done-btn{display:block;width:100%;margin-top:18px;padding:14px;
    background:linear-gradient(180deg,var(--surface2),var(--surface));
    border:1px solid var(--line2);border-radius:14px;color:var(--ink);
    font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:-.01em;
    cursor:pointer;transition:.16s;text-transform:uppercase}
  .recap-done-btn:active{transform:scale(.985);background:var(--surface3)}
  .rcp-aw-info{flex:1;min-width:0}
  .rcp-aw-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
    font-family:'Sometype Mono',monospace;font-weight:700}
  .rcp-aw-name{font-family:'Archivo Black',sans-serif;font-size:13px;margin-top:3px;
    letter-spacing:-.01em;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rcp-aw-val{font-family:'Sometype Mono',monospace;font-size:10.5px;color:var(--ink2);margin-top:3px;font-weight:600}

  .rcp-tos{background:linear-gradient(135deg,rgba(86,180,232,.10),var(--surface) 70%);
    border:1px solid rgba(86,180,232,.35);border-radius:16px;padding:14px;
    display:flex;align-items:center;gap:14px;margin-bottom:16px;cursor:pointer;transition:.16s}
  .rcp-tos:active{transform:scale(.985)}
  .rcp-tos-pair{display:flex;flex-shrink:0}
  .rcp-tos-pair .rcp-tos-av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(155deg,#3a4540,#212824);border:2px solid var(--surface)}
  .rcp-tos-pair .rcp-tos-av+.rcp-tos-av{margin-left:-10px}
  .rcp-tos-pair .rcp-tos-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:13px;color:var(--bg)}
  .rcp-tos-pair .rcp-tos-av.has-emoji .em{font-size:1em;line-height:1;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif}
  .rcp-tos-info{flex:1;min-width:0}
  .rcp-tos-label{font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:var(--blue);
    font-family:'Sometype Mono',monospace;font-weight:700}
  .rcp-tos-name{font-family:'Archivo Black',sans-serif;font-size:16px;margin-top:4px;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rcp-tos-detail{font-size:10.5px;color:var(--muted);font-family:'Sometype Mono',monospace;margin-top:2px}
  .rcp-tos-arrow{color:var(--muted);flex-shrink:0}
  .rcp-tos-arrow svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Saison-Recap: Rangliste Platz 4+ unter dem Podium */
  .rcp-rest{display:flex;flex-direction:column;border-radius:14px;overflow:hidden;
    background:var(--surface);border:1px solid var(--line);margin-top:4px}
  .rcp-rest-row{display:flex;align-items:center;gap:11px;padding:11px 13px;
    background:var(--surface);cursor:pointer;transition:background .12s;min-width:0}
  .rcp-rest-row:active{background:var(--surface2)}
  .rcp-rest-row + .rcp-rest-row{border-top:1px solid rgba(255,255,255,.04)}
  .rcp-rest-rank{font-family:'Sometype Mono',monospace;font-size:11px;font-weight:700;
    color:var(--muted);min-width:20px;text-align:center;letter-spacing:.04em;flex-shrink:0}
  .rcp-rest-av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;
    font-family:'Archivo Black',sans-serif;font-size:12px;color:var(--bg);flex-shrink:0;
    background:linear-gradient(155deg,#3a4540,#212824)}
  .rcp-rest-av.has-emoji{font-size:18px;background:var(--surface3)}
  .rcp-rest-av.has-emoji .em{font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;line-height:1}
  .rcp-rest-name{flex:1;min-width:0;font-weight:600;font-size:13.5px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
  .rcp-rest-stats{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .rcp-rest-wl{font-family:'Sometype Mono',monospace;font-size:10.5px;color:var(--muted);
    letter-spacing:.02em;font-variant-numeric:tabular-nums}
  .rcp-rest-elo{font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--ink);
    font-variant-numeric:tabular-nums;letter-spacing:-.02em;min-width:34px;text-align:right}

  /* ============ [§C21] AWARD SHEET REDESIGN (Winner Hero + Liste) ============ */
  /* Saubere Award-Liste statt Podium */
  .aw-list-label{font-family:'Sometype Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:18px 4px 8px;
    display:flex;align-items:center;gap:8px}
  .aw-list-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .aw-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .aw-li{display:flex;align-items:center;gap:12px;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;padding:10px 14px;position:relative;overflow:hidden;
    cursor:pointer;transition:.16s}
  .aw-li:active{transform:scale(.99);background:var(--surface2)}
  .aw-li.shame::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);opacity:.45}
  .aw-li .aw-li-rank{font-family:'Archivo Black',sans-serif;font-size:14px;width:22px;
    text-align:center;color:var(--muted);flex-shrink:0}
  .aw-li.shame .aw-li-rank{color:var(--red);opacity:.65}
  .aw-li-av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:18px;
    background:linear-gradient(155deg,#3a4540,#212824);flex-shrink:0}
  .aw-li-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:12px;color:var(--bg)}
  .aw-li-av.has-emoji .em{font-size:1em;line-height:1;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif}
  .aw-li-pair{display:flex;flex-shrink:0}
  .aw-li-pair .aw-li-av+.aw-li-av{margin-left:-10px;border:1.5px solid var(--surface)}
  .aw-li-info{flex:1;min-width:0}
  .aw-li-name{font-family:'Archivo Black',sans-serif;font-size:14px;letter-spacing:-.01em;
    line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .aw-li-detail{font-size:10px;color:var(--muted);margin-top:3px;font-family:'Sometype Mono',monospace}
  .aw-li-val{font-family:'Sometype Mono',monospace;font-size:13px;font-weight:700;color:var(--ink);flex-shrink:0}
  .aw-li.shame .aw-li-val{color:var(--red)}

  /* Tied-Variante: mehrere Spieler in einem Listeneintrag */
  .aw-li.tied{padding:12px 14px;align-items:flex-start}
  .aw-li.tied .aw-li-rank{padding-top:4px}
  .aw-li.tied .aw-li-tied-stack{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
  .aw-li.tied .aw-li-tied-row{display:flex;align-items:center;gap:10px;min-width:0}
  .aw-li.tied .aw-li-tied-row .aw-li-av{width:30px;height:30px;font-size:16px}
  .aw-li.tied .aw-li-tied-row .aw-li-av:not(.has-emoji){font-size:11px}
  .aw-li.tied .aw-li-tied-row .aw-li-name{font-size:13.5px}
  .aw-li-tie-badge{display:inline-flex;align-items:center;font-family:'Sometype Mono',monospace;
    font-size:9px;font-weight:700;color:var(--muted);background:var(--surface3);
    padding:2px 7px;border-radius:6px;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;align-self:flex-start}

  /* Loser-Hero-Icon-Variante */
  .aw-hero-icon-glow.red{
    background:linear-gradient(155deg,rgba(240,86,106,.15),rgba(240,86,106,.04));
    border:1px solid rgba(240,86,106,.35);color:var(--red);
    box-shadow:0 0 24px rgba(240,86,106,.25)}

  /* ═══ AWARD-HERO (Platz 1 als großer Hero, ersetzt Podium) ═══
     Farbe wird per inline-style --c="R,G,B" gesetzt (aus meta.cls). */
  .aw-winner{position:relative;
    background:linear-gradient(135deg,rgba(var(--c,247,207,74),.14),rgba(var(--c,247,207,74),.04) 60%,var(--surface) 90%);
    border:1px solid rgba(var(--c,247,207,74),.4);border-radius:20px;
    padding:20px 18px;margin-top:18px;margin-bottom:8px;
    overflow:hidden;text-align:center;cursor:pointer;transition:.16s}
  .aw-winner:active{transform:scale(.99)}
  .aw-winner::before{content:"";position:absolute;top:-40px;right:-30px;width:150px;height:150px;
    background:radial-gradient(circle,rgba(var(--c,247,207,74),.16),transparent 65%);pointer-events:none}
  .aw-winner.shame::after{content:"";position:absolute;bottom:-30px;left:-20px;width:120px;height:120px;
    background:radial-gradient(circle,rgba(220,38,38,.06),transparent 65%);pointer-events:none}
  .aw-winner-badge{display:inline-flex;align-items:center;gap:5px;
    font-family:'Sometype Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.18em;text-transform:uppercase;color:rgb(var(--c,247,207,74));
    padding:4px 11px;background:rgba(var(--c,247,207,74),.10);
    border:1px solid rgba(var(--c,247,207,74),.3);border-radius:99px;
    position:relative;z-index:1}
  .aw-winner-badge svg{width:11px;height:11px;fill:none;stroke:currentColor;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .aw-winner-av-wrap{position:relative;display:inline-block;margin:14px 0 10px;z-index:1}
  .aw-winner-av{width:82px;height:82px;border-radius:50%;display:grid;place-items:center;
    font-size:40px;background:linear-gradient(155deg,#3a4540,#212824);
    border:3px solid rgb(var(--c,247,207,74));
    box-shadow:0 0 24px rgba(var(--c,247,207,74),.45)}
  .aw-winner-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:26px;color:var(--ink)}
  .aw-winner-av.has-emoji{background:var(--surface3);color:inherit}
  .aw-winner.shame .aw-winner-av{background:linear-gradient(155deg,#3a2528,#231518);filter:saturate(.8)}
  .aw-winner-pair{display:flex;align-items:center;position:relative;z-index:1}
  .aw-winner-pair .aw-winner-av{width:64px;height:64px;font-size:30px}
  .aw-winner-pair .aw-winner-av+.aw-winner-av{margin-left:-16px;border-color:rgb(var(--c,247,207,74))}
  .aw-winner-crown{position:absolute;top:-7px;left:50%;transform:translateX(-50%);
    background:var(--surface);border-radius:50%;padding:2px;line-height:0;z-index:3}
  /* SVG-Krone: kleiner, in den Avatar-Rand integriert, Farbe matcht das Award (--c).
     Doppel-Filter: dunkler Drop-Shadow für Tiefe, plus Award-Color-Glow für Branding. */
  .aw-winner-crown svg{width:20px;height:20px;stroke:rgb(var(--c,247,207,74));fill:none;
    stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.6)) drop-shadow(0 0 6px rgba(var(--c,247,207,74),.7))}
  .aw-winner-marker{position:absolute;top:-10px;right:-6px;width:28px;height:28px;border-radius:50%;
    background:#dc2626;border:2px solid var(--surface);display:grid;place-items:center;
    font-size:14px;line-height:1;box-shadow:0 4px 12px rgba(220,38,38,.4);z-index:3}
  .aw-winner-name{font-family:'Archivo Black',sans-serif;font-size:24px;letter-spacing:-.02em;
    line-height:1.1;position:relative;z-index:1}
  .aw-winner-val{font-family:'Sometype Mono',monospace;font-size:13px;color:rgb(var(--c,247,207,74));
    margin-top:8px;font-weight:700;letter-spacing:.04em;position:relative;z-index:1}
  .aw-winner-val b{font-family:'Archivo Black',sans-serif;font-size:18px;
    letter-spacing:-.01em;font-weight:normal}
  .aw-winner-meta{font-size:11px;color:var(--muted);margin-top:6px;
    font-family:'Sometype Mono',monospace;position:relative;z-index:1}
  .aw-winner-tie-hint{display:inline-block;margin-top:10px;
    font-family:'Sometype Mono',monospace;font-size:9.5px;font-weight:700;color:var(--muted);
    background:var(--surface3);padding:3px 9px;border-radius:6px;
    letter-spacing:.1em;text-transform:uppercase;position:relative;z-index:1}

  /* ─── Shared Hero: mehrere Spieler/Teams teilen sich #1 ─── */
  .aw-winner.shared{cursor:default;padding:18px 14px 16px}
  .aw-winner.shared:active{transform:none}
  .aw-winner-shared-marker{position:relative;display:inline-block;font-size:26px;line-height:1;
    margin:14px 0 4px;z-index:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.35))}
  /* SVG-Krone für Shared Hero: Farbe matcht das Award (--c), kleiner als vorher (24px statt 30px) */
  .aw-winner-shared-marker svg{width:24px;height:24px;stroke:rgb(var(--c,247,207,74));fill:none;
    stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 4px 8px rgba(var(--c,247,207,74),.55))}
  .aw-winner-shared-marker.shame{filter:drop-shadow(0 2px 8px rgba(220,38,38,.5))}
  .aw-winner-shared-grid{display:flex;flex-direction:column;gap:8px;margin:12px 0 10px;position:relative;z-index:1}
  .aw-winner-tied-entry{display:flex;align-items:center;gap:11px;
    background:rgba(var(--c,247,207,74),.06);
    border:1px solid rgba(var(--c,247,207,74),.22);
    border-radius:12px;padding:9px 12px;cursor:pointer;transition:.16s;text-align:left}
  .aw-winner-tied-entry:active{transform:scale(.985);background:rgba(var(--c,247,207,74),.12)}
  .aw-winner-tied-entry .aw-li-av{width:34px;height:34px;font-size:18px;flex-shrink:0;border-radius:50%}
  .aw-winner-tied-entry .aw-li-av:not(.has-emoji){font-size:13px;font-family:'Archivo Black',sans-serif;color:var(--ink);
    display:grid;place-items:center}
  .aw-winner-tied-entry .aw-li-av.has-emoji{display:grid;place-items:center}
  .aw-winner-tied-pair{display:flex;align-items:center;flex-shrink:0}
  .aw-winner-tied-pair .aw-li-av+.aw-li-av{margin-left:-12px;border:2px solid var(--surface);box-sizing:content-box;width:30px;height:30px}
  .aw-winner-tied-pair .aw-li-av:first-child{border:2px solid var(--surface);box-sizing:content-box;width:30px;height:30px}
  .aw-winner-tied-name{font-family:'Archivo Black',sans-serif;font-size:15px;letter-spacing:-.02em;
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.15}
  .aw-winner.shame .aw-winner-tied-entry{background:rgba(220,38,38,.05);border-color:rgba(220,38,38,.2)}
  .aw-winner.shame .aw-winner-tied-entry:active{background:rgba(220,38,38,.10)}

  /* ═══ POTW: Wieder-Öffnen-Button in der Wochenliga ═══ */
  .potw-recap-btn{display:flex;align-items:center;gap:12px;width:100%;
    background:linear-gradient(135deg,rgba(247,207,74,.13),rgba(247,207,74,.03) 60%,var(--surface));
    border:1px solid rgba(247,207,74,.32);border-radius:14px;
    padding:11px 14px;margin-bottom:12px;cursor:pointer;
    font-family:inherit;color:var(--ink);text-align:left;transition:.16s;position:relative;overflow:hidden}
  .potw-recap-btn:active{transform:scale(.99);background:linear-gradient(135deg,rgba(247,207,74,.18),rgba(247,207,74,.05) 60%,var(--surface2))}
  .potw-recap-btn::before{content:"";position:absolute;top:-20px;right:-20px;width:80px;height:80px;
    background:radial-gradient(circle,rgba(247,207,74,.13),transparent 65%);pointer-events:none}
  .potw-recap-ic{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
    background:rgba(247,207,74,.16);color:var(--gold);flex-shrink:0;position:relative;z-index:1}
  .potw-recap-ic svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .potw-recap-text{flex:1;min-width:0;position:relative;z-index:1}
  .potw-recap-label{font-family:'Archivo Black',sans-serif;font-size:13.5px;letter-spacing:-.01em;line-height:1.1}
  .potw-recap-sub{font-size:10px;color:var(--muted);margin-top:3px;font-family:'Sometype Mono',monospace;letter-spacing:.04em}
  .potw-recap-arrow{color:var(--muted);flex-shrink:0;display:grid;place-items:center;position:relative;z-index:1}
  .potw-recap-arrow svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Mini-Highlights innerhalb des POTW-Sheets */
  .potw-hl-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .potw-hl{display:flex;align-items:center;gap:11px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:pointer;transition:.16s}
  .potw-hl:active{transform:scale(.99);background:var(--surface2)}
  .potw-hl-ic{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
  .potw-hl-ic.orange{background:rgba(255,120,73,.12);color:var(--orange)}
  .potw-hl-ic.blue{background:rgba(86,180,232,.12);color:var(--blue)}
  .potw-hl-ic.acid{background:rgba(190,242,100,.12);color:var(--acid)}
  .potw-hl-ic.purple{background:rgba(167,139,250,.12);color:var(--purple)}
  .potw-hl-ic.red{background:rgba(240,86,106,.12);color:var(--red)}
  .potw-hl-ic svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .potw-hl-info{flex:1;min-width:0}
  .potw-hl-label{font-family:'Sometype Mono',monospace;font-size:9px;font-weight:700;
    text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
  .potw-hl-name{font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:-.01em;
    line-height:1.15;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .potw-hl-val{font-family:'Sometype Mono',monospace;font-size:10.5px;color:var(--ink2);margin-top:2px;font-weight:600}

  /* ============ [§C21] SAISON-POSITIONSVERLAUF ============ */
  /* Bottom-Sheet mit Liniendiagramm: Tabellenposition jedes Saison-Spielers
     über die Tage der Saison. Linien-Hervorhebung per Tap, Detail-Karte zeigt
     den selektierten Spieler. SVG-basiert für Performance + scharfe Skalierung. */
  .posv-info-pill{display:flex;align-items:center;gap:10px;padding:11px 13px;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:14px}
  .posv-info-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
    background:var(--acid-deep);color:var(--acid);flex-shrink:0;font-size:16px}
  .posv-info-ic svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .posv-info-text{flex:1;min-width:0}
  .posv-info-title{font-family:'Archivo Black',sans-serif;font-size:13px;line-height:1.1}
  .posv-info-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:'Sometype Mono',monospace;letter-spacing:.04em}

  .posv-chart-host{position:relative;width:100%;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:12px 8px 10px 6px;margin-bottom:10px;overflow:hidden}
  .posv-chart-axislabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;
    font-family:'Sometype Mono',monospace;padding:0 0 4px 10px}

  .posv-svg{display:block;width:100%;height:auto;touch-action:manipulation;user-select:none;-webkit-user-select:none}
  .posv-grid line{stroke:var(--line);stroke-width:1;opacity:.55}
  .posv-x-tick{font-size:10px;fill:var(--muted);font-family:'Sometype Mono',monospace;text-anchor:middle}
  .posv-y-tick{font-size:11px;fill:var(--muted);font-family:'Sometype Mono',monospace;text-anchor:end;dominant-baseline:central}
  .posv-axis-cap{font-size:9px;fill:var(--muted);font-family:'Sometype Mono',monospace;letter-spacing:.14em;text-transform:uppercase}

  /* Lines sind weich. Hit-Area ist ein zweites unsichtbares Pfad mit großer
     stroke-width darunter — sonst sind 2px-Lines auf Touch fast nicht treffbar. */
  .posv-line{fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;
    transition:opacity .15s,stroke-width .15s;pointer-events:none}
  .posv-line-hit{fill:none;stroke:transparent;stroke-width:18;stroke-linecap:round;
    cursor:pointer;pointer-events:stroke}
  .posv-dot{transition:opacity .15s;pointer-events:none}
  .posv-end-av{cursor:pointer;transition:opacity .15s,transform .15s;transform-box:fill-box;transform-origin:center}
  .posv-end-label{font-size:11px;font-family:'Archivo Black',sans-serif;fill:var(--ink);
    transition:opacity .15s,fill .15s,font-size .15s;cursor:pointer;dominant-baseline:central}

  /* Highlight-Zustand: Container kriegt .posv-dim, alle Linien außer .hl werden gedimmt */
  .posv-dim .posv-line:not(.hl){opacity:.14}
  .posv-dim .posv-dot:not(.hl){opacity:.14}
  .posv-dim .posv-end-av:not(.hl){opacity:.32;filter:grayscale(.85)}
  .posv-dim .posv-end-label:not(.hl){opacity:.4;fill:var(--muted)}
  .posv-line.hl{stroke-width:3.4;filter:drop-shadow(0 0 6px currentColor)}
  .posv-dot.hl{opacity:1}
  .posv-end-av.hl{transform:scale(1.15)}
  .posv-end-label.hl{font-size:12.5px}

  .posv-hint{font-size:11px;color:var(--muted);text-align:center;margin:2px 0 12px;
    font-family:'Sometype Mono',monospace;letter-spacing:.04em}

  .posv-detail{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:10px;min-height:96px;
    transition:border-color .15s,opacity .15s}
  .posv-detail.empty{opacity:.55}
  .posv-detail-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .posv-detail-av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;
    font-size:22px;flex-shrink:0;border:2px solid var(--line);background:var(--surface3);
    overflow:hidden;font-family:'Archivo Black',sans-serif;color:#0a0c0b}
  .posv-detail-av .em{font-size:22px;line-height:1;
    font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji','Twemoji Mozilla',sans-serif}
  .posv-detail-name-wrap{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
  .posv-detail-name{font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .posv-detail-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
  .posv-detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .posv-detail-stat{text-align:center;padding:4px 2px}
  .posv-detail-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.1em;margin-bottom:2px;font-family:'Sometype Mono',monospace}
  .posv-detail-stat-val{font-family:'Archivo Black',sans-serif;font-size:14.5px;color:var(--ink);line-height:1.1}
  .posv-detail-stat-val.pos{color:var(--acid)}
  .posv-detail-stat-val.neg{color:var(--red)}
  .posv-detail-empty-text{color:var(--muted);font-size:12px;text-align:center;padding:18px 0;
    font-family:'Sometype Mono',monospace}

  .posv-update{font-size:10px;color:var(--muted);text-align:center;
    font-family:'Sometype Mono',monospace;letter-spacing:.04em;
    display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;padding-bottom:4px}
  .posv-refresh{background:none;border:none;color:var(--muted);cursor:pointer;
    padding:4px;border-radius:50%;transition:transform .35s ease,color .15s;
    display:grid;place-items:center}
  .posv-refresh:active{color:var(--acid)}
  .posv-refresh.spin{transform:rotate(360deg)}
  .posv-refresh svg{width:13px;height:13px;display:block;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .posv-empty{padding:32px 20px;text-align:center;color:var(--muted);
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    font-size:13px;font-family:'Sometype Mono',monospace}
  .posv-empty-title{color:var(--ink);font-family:'Archivo Black',sans-serif;font-size:15px;margin-bottom:6px}

</style>
</head>
<body>

<div class="setup" id="setupGate" style="display:none">
  <div class="card">
    <h2 class="display" style="font-size:24px;margin-bottom:12px">Fast fertig</h2>
    <p style="color:var(--ink2);font-size:13px;line-height:1.6">
      Trage oben im Code bei <span class="code">SUPABASE_URL</span> und
      <span class="code">SUPABASE_KEY</span> deine Werte ein und lade die Seite neu.</p>
  </div>
</div>

<div id="app" style="display:none">
  <div class="appbar">
    <div class="appbar-row">
      <div class="logo" id="logoHome" style="cursor:pointer">
       <div class="logo-mark"><img src="icon.png" alt="Kicker Liga Logo"></div>
        <div class="logo-txt">
          <h1>Kicker Liga</h1>
          <div class="sub">Elo · 2v2</div>
        </div>
      </div>

// ╔═══ §0.2 ─── BUILD-VERSION & UPDATE-CHECK ───────────────────────────╗
//     Bumpe BUILD_VERSION bei jedem Deploy. Banner zeigt sich, wenn ein
//     remote-gefetchtes index.html eine neuere Version trägt.
// ╚═════════════════════════════════════════════════════════════════════════╝
// Bei jedem Deploy diesen String bumpen (Datum + laufender Zähler).
// Der Hintergrund-Check fetched die index.html mit Cache-Bust und vergleicht.
// Bei neuerer Version: Banner oben → Force-Reload bricht iOS-PWA-/Browser-Cache.
const BUILD_VERSION='2026.06.23.12';
function forceReload(){
  const u=new URL(location.href);
  u.searchParams.set('_cb',Date.now());
  // replace statt assign damit der alte Eintrag nicht in der History bleibt
  location.replace(u.toString());
}
async function checkForUpdate(){
  try{
    const url=location.pathname+'?_cb='+Date.now();
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok)return;
    const text=await r.text();
    const m=text.match(/const BUILD_VERSION=['"]([^'"]+)['"]/);
    if(!m||!m[1]||m[1]===BUILD_VERSION)return;
    if(document.getElementById('updateBanner'))return;
    const b=document.createElement('div');
    b.id='updateBanner';
    b.style.cssText='position:fixed;top:calc(var(--safe-top) + 10px);left:50%;transform:translateX(-50%);z-index:9000;background:var(--acid);color:var(--acid-deep);font-family:inherit;font-size:12.5px;font-weight:700;padding:9px 14px;border-radius:12px;box-shadow:var(--shadow-acid);display:flex;gap:10px;align-items:center;cursor:pointer;max-width:92vw;white-space:nowrap';
    b.innerHTML='<span>Neue Version ('+m[1]+')</span><span style="background:rgba(0,0,0,.18);padding:4px 9px;border-radius:8px">Neu laden</span>';
    b.onclick=forceReload;
    document.body.appendChild(b);
  }catch(e){/* offline / CORS — still ignorieren */}
}

// Zentrale Match-Filterung für Awards
function matchesForAwards(){

function awPeriodLabel(){

// Alle verfügbaren Saisons (vergangene + aktuelle), neueste zuerst

// ╔═══ §1.2 ─── SAISON-SYSTEM (monatlich) ──────────────────────────────╗
//     Saisons starten automatisch am Monatsersten. currentSeason() liefert
//     die laufende Saison; archivierte Saisons stehen in `seasons[]`.
// ╚═════════════════════════════════════════════════════════════════════════╝
// Jeder Kalendermonat ist eine eigene Saison mit Elo-Reset.
function currentSeason(){
  const now=new Date();
  const y=now.getFullYear(), m=now.getMonth();
  const mStr=String(m+1).padStart(2,'0');
  return {year:y,month:m,id:y+'-'+mStr,
    label:now.toLocaleDateString('de-DE',{month:'long',year:'numeric'})};
}
function seasonOf(date){
  const d=new Date(date);
  const y=d.getFullYear(), m=d.getMonth();
  return {year:y,month:m,id:y+'-'+String(m+1).padStart(2,'0'),
    label:d.toLocaleDateString('de-DE',{month:'long',year:'numeric'})};
}
function seasonStart(seasonId){
  if(!seasonId) seasonId=currentSeason().id;
  const [y,m]=seasonId.split('-').map(Number);
  return new Date(y,m-1,1);
}
function seasonEnd(seasonId){
  if(!seasonId) seasonId=currentSeason().id;
  const [y,m]=seasonId.split('-').map(Number);
  return new Date(y,m,0,23,59,59); // letzter Tag des Monats
}
function seasonLabel(seasonId){
  if(!seasonId) return '';
  const [y,m]=seasonId.split('-').map(Number);
  return new Date(y,m-1).toLocaleDateString('de-DE',{month:'long',year:'numeric'});
}
function seasonDaysLeft(){
  const end=seasonEnd();const now=new Date();
  return Math.max(0,Math.ceil((end-now)/(1000*60*60*24)));
}
function matchesInSeason(seasonId){
  if(!seasonId) seasonId=currentSeason().id;
  const key='mseason_'+seasonId+'_'+matches.length+'_'+_cache.version;
  if(!_cache._mseason) _cache._mseason={};
  if(_cache._mseason[key]) return _cache._mseason[key];
  const start=seasonStart(seasonId),end=seasonEnd(seasonId);
  const result=matches.filter(m=>{const d=new Date(m.created_at);return d>=start&&d<=end;});
  _cache._mseason[key]=result;
  return result;
}

function allPastSeasons(){
  const key='allPastSeasons_'+matches.length+'_'+seasons.length+'_'+_cache.version; // NEU: seasons.length im Key
  if(_cache._allPastSeasonsKey===key) return _cache._allPastSeasonsData;

  if(!matches.length) {
    _cache._allPastSeasonsKey = key;
    _cache._allPastSeasonsData = [];
    return [];
  }
  const first=new Date(matches[0].created_at);
  const now=new Date(); const cur=currentSeason();
  const ids=[];
  let y=first.getFullYear(), m=first.getMonth();
  while(true){
    const id=y+'-'+String(m+1).padStart(2,'0');
    if(id===cur.id) break;
    if(new Date(y,m,1)>now) break;
    ids.push(id);
    m++; if(m>11){m=0;y++;}
  }
  _cache._allPastSeasonsKey=key;
  _cache._allPastSeasonsData=ids;
  return ids;
}



let seasons=[];  // geladene Saison-Ergebnisse aus DB
let _histPage = 0; // Aktuelle Seite für den Verlaufs-Tab (Lazy Loading)
// ╔═══ §2.1 ─── PERFORMANCE CACHES & INVALIDIERUNG ─────────────────────╗
//     Alle Caches hängen am globalen `_cache`-Objekt und werden per
//     `_cache.version`-Tick oder selektivem `invalidateCache([tags])`
//     ungültig gemacht. Cache-Keys sind ENTITY_LENGTH_VERSION — der
//     Version-Tick ist die universelle Bust-Strategie.
// ╚═════════════════════════════════════════════════════════════════════════╝
// Invalidiert bei: loadAll, Match-Add/Edit/Delete, Recalc, Config-Änderung
let _cache={version:0};

function invalidateCache(keys=null){
  _cache.version++;
  // Nur spezifische Caches löschen, nicht alles
  if(!keys){
    // Kompletter Reset (z.B. nach Recalc)
    _cache={version:_cache.version};
    _lastSimState=null;
    _lastSimIndex=-1;
  } else if(Array.isArray(keys)){
    // Selektiv. Die abgeleiteten Caches (history/snap/rankSnap/matchesBySeason/
    // seasonRankings) sind alle version-gebunden — _cache.version++ oben reicht,
    // beim nächsten Lookup wird der Key-Mismatch erkannt und neu berechnet.
    keys.forEach(k=>{
      if(k==='awards') {
        delete _cache._awards;
        delete _cache._playerAwards;  // playerAwards baut auf awardRankings auf
      }
      if(k==='stats') delete _cache._allStatsKey;
      if(k==='global') { _lastSimState=null; _lastSimIndex=-1; }
      if(k==='teams') delete _cache._teamDetail;
      if(k==='allTeamStats') delete _cache._allTeamStatsKey;
      if(k==='period') delete _cache._periodStatsKey;
      if(k==='badges') delete _cache._badgeEarnedKey;
      if(k==='playerSeasonAwards') delete _cache._playerSeasonAwards;
      if(k==='allPastSeasons') delete _cache._allPastSeasonsKey;
      if(k==='news') {
        // v8.4: News-Generator-Memo (_buildStories) + H2H-Lookup-Map.
        // _cache.version++ oben bricht die Keys ohnehin — dies ist der
        // explizite, selbst-dokumentierende Reset-Pfad.
        delete _cache._buildStoriesKey;
        delete _cache._buildStoriesResult;
        delete _cache._h2hMap;
        delete _cache._h2hKey;
      }
    });
  }
}




// Speichert den letzten Sim-State + Index des letzten verarbeiteten Matches
let _lastSimState = null;
let _lastSimIndex = -1;

function getGlobalSim(){
  const key='global_'+matches.length+'_'+_cache.version;
  if(_cache._globalKey===key) return _cache._globalSim;
  
  // Wenn nur neue Matches hinzugekommen sind: inkrementell weitermachen
  if(_lastSimState && _lastSimIndex < matches.length && _cache.version === _lastSimVersion){
    const newMatches = matches.slice(_lastSimIndex + 1);
    if(newMatches.length > 0 && newMatches.length < 50){
      // Inkrementell: nur neue Matches simulieren auf Basis des alten States
      const sim = simulateElo(newMatches, {
        initialState: _lastSimState,
        initialCurSeason: _lastSimState.curSeason
      });
      _lastSimState = sim;
      _lastSimIndex = matches.length - 1;
      _cache._globalKey = key;
      _cache._globalSim = sim;
      // Abgeleitete Maps invalidieren — werden lazy neu gebaut
      _cache._historyByMatchId = null;
      _cache._snapMap = null;
      _cache._seasonRankings = null;
      _cache._matchesBySeason = null;
      _cache._rankSnapshots = null;
      _cache._streakSnap = null;
      return sim;
    }
  }
  
  // Fallback: komplette Neuberechnung (z.B. nach Recalc oder großem Update)
  const sim = simulateElo(matches);
  _lastSimState = sim;
  _lastSimIndex = matches.length - 1;
  _lastSimVersion = _cache.version;
  _cache._globalKey = key;
  _cache._globalSim = sim;
  _cache._historyByMatchId = null;
  _cache._snapMap = null;
  _cache._seasonRankings = null;
  _cache._matchesBySeason = null;
  _cache._rankSnapshots = null;
  _cache._streakSnap = null;
  return sim;
}

// ─── §2.2 Abgeleitete Sim-Maps (snapMap, historyByMatchId) ───────────
// Vermeidet wiederholte O(n) Loops in showPlayer, vAwards, _awardRankingsUncached etc.
// WICHTIG: Cache-Key bindet an matches.length + _cache.version, damit selektives
// invalidateCache(['global', ...]) korrekt invalidiert. Sonst stale nach Match-Add/Edit.
function getHistoryByMatchId(){
  const sim=getGlobalSim();
  const key='hist_'+matches.length+'_'+_cache.version;
  if(_cache._historyByMatchIdKey===key) return _cache._historyByMatchId;
  const map=new Map();
  for(let i=0; i<sim.history.length; i++){
    map.set(sim.history[i].matchId, sim.history[i]);
  }
  _cache._historyByMatchIdKey = key;
  _cache._historyByMatchId = map;
  return map;
}
// ─── §2.3 Streak-Snapshots (für "Serienbrecher"-Badge) ───────────────
// Für jedes Match: die aktuelle Win-Siegesserie aller 4 beteiligten Spieler
// VOR diesem Match. Berechnet per O(n) Walk durch alle Matches chronologisch;
// pro Match werden die Streaks der 4 Spieler vorher gesnapshottet, dann
// aktualisiert (Sieg → +1, Niederlage → 0).
// Ergebnis: { matchId: { pid: cur_streak_before_match (sparse, nur 4 pids) } }
// Genutzt vom Badge "Serienbrecher" — beendet eine ≥4er Serie eines Gegners
// durch direkten Sieg. Saison-Resets beeinflussen Streaks NICHT (analog zu
// longestPlayerStreak), da Serien semantisch durchgehend laufen.
function getStreakSnapshots(){
  const key='streakSnap_'+matches.length+'_'+_cache.version;
  if(_cache._streakSnapKey===key) return _cache._streakSnap;
  const ordered=[...matches].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const cur={}; // pid → laufende Siegesserie (live)
  const out={}; // matchId → snapshot
  for(let i=0;i<ordered.length;i++){
    const m=ordered[i];
    const ids=[m.a1,m.a2,m.b1,m.b2];
    // Pre-Snapshot: nur die 4 beteiligten Spieler tracken
    const snap={};
    ids.forEach(pid=>{ snap[pid]=cur[pid]||0; });
    out[m.id]=snap;
    // Apply: update cur für die 4 Spieler
    ids.forEach(pid=>{
      const onA=[m.a1,m.a2].includes(pid);
      const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      if(w) cur[pid]=(cur[pid]||0)+1;
      else cur[pid]=0;
    });
  }
  _cache._streakSnapKey=key;
  _cache._streakSnap=out;
  return out;
}

function getSnapMap(){
  const sim=getGlobalSim();
  const key='snap_'+matches.length+'_'+_cache.version;
  if(_cache._snapMapKey===key) return _cache._snapMap;
  const map={};
  for(let i=0; i<sim.history.length; i++){
    map[sim.history[i].matchId] = sim.history[i].eloBefore;
  }
  _cache._snapMapKey = key;
  _cache._snapMap = map;
  return map;
}

// ─── §2.4 Saison-Rank-Snapshots (preRank/postRank pro Match) ─────────
// Für jedes Match: die laufende Saison-Rangliste VOR und NACH dem Match.
// Berechnet wird das per O(n) Walk durch alle Matches; pro Match werden
// die Deltas aus globalSim.history auf einen seasonElo-Akkumulator addiert.
// Ergebnis: { matchId: { preRank: {pid: rank}, postRank: {pid: rank} } }
// wobei rank = 1 für höchstes Saison-Elo zum jeweiligen Zeitpunkt.
// Genutzt von den Badges "Thronfäller" (kingslayer) und "Überholmanöver".
// Tie-Break bei gleichem Elo: alphabetisch nach playerId — deterministisch.
function getRankSnapshots(){
  const key='ranksnap_'+matches.length+'_'+_cache.version;
  if(_cache._rankSnapshotsKey===key) return _cache._rankSnapshots;
  getGlobalSim(); // garantiert Sim ist aktuell
  const histMap = getHistoryByMatchId();
  const out = {};
  const seasonElo = {}; // sid → {pid: elo}
  for(let i=0; i<matches.length; i++){
    const m = matches[i];
    const sid = seasonOf(m.created_at).id;
    if(!seasonElo[sid]) seasonElo[sid] = {};
    const elos = seasonElo[sid];
    // Pre-Rank: aktueller Stand VOR diesem Match
    const preEntries = Object.entries(elos);
    preEntries.sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    const preRank = {};
    preEntries.forEach(([pid], idx) => preRank[pid] = idx + 1);
    // Apply this match's deltas (vom globalSim)
    const histEntry = histMap.get(m.id);
    if(histEntry && histEntry.deltas){
      Object.entries(histEntry.deltas).forEach(([pid, d]) => {
        elos[pid] = (elos[pid] || 0) + d;
      });
    }
    // Post-Rank: Stand NACH diesem Match
    const postEntries = Object.entries(elos);
    postEntries.sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    const postRank = {};
    postEntries.forEach(([pid], idx) => postRank[pid] = idx + 1);
    out[m.id] = {preRank, postRank};
  }
  _cache._rankSnapshotsKey = key;
  _cache._rankSnapshots = out;
  return out;
}

// ─── §2.4b Saison-Positionsverlauf (für §C21 Position-History-Sheet) ──
// Berechnet pro Tag der Saison die Tabellenposition jedes aktiven Saison-
// Spielers, basierend auf saison-isoliertem Elo. Eintritts-Tag eines Spielers
// = Tag des ersten Saison-Matches; vor diesem Tag bleibt der Datenpunkt null
// (→ Linie startet erst am Eintrittstag, wie im Mockup "Neue Spieler ab
// Eintrittsdatum" gefordert).
//
// Tie-Break bei identischem Saison-Elo: alphabetisch nach Spieler-ID —
// deterministisch und konsistent zu getRankSnapshots (Zeile 3060/3072).
//
// Performance: O(Matches × 4) für Delta-Apply, O(Spieler × log Spieler) pro
// Tag für die Sortierung. Bei 12 Spielern × 30 Tagen × 200 Matches ≈ 1500 Ops.
// Cache-Key bindet an matches.length + _cache.version → invalidiert automatisch
// nach jedem Match (doSaveMatch ruft invalidateCache(['global', ...])).
const POSV_COLORS = [
  '#BEF264', '#ff7849', '#56b4e8', '#f7cf4a',
  '#a78bfa', '#4ade80', '#f0566a', '#22d3ee',
  '#fb923c', '#e879f9', '#fde047', '#94a3b8'
];

function getSeasonPositionHistory(seasonId){
  if(!seasonId) seasonId = currentSeason().id;
  const key = 'posHist_'+seasonId+'_'+matches.length+'_'+_cache.version;
  if(_cache._posHistKey===key) return _cache._posHist;

  const sEnd = seasonEnd(seasonId);
  const isCurrent = (seasonId === currentSeason().id);
  const sMatches = matchesInSeason(seasonId);
  const totalDays = sEnd.getDate(); // letzter Tag des Monats

  // Letzter zu rendernder Tag:
  //   laufende Saison → heutiger Tag im Monat (capped auf totalDays)
  //   vergangene Saison → letzter Tag mit ≥1 Match (mind. 1)
  let lastDay;
  if(isCurrent){
    lastDay = Math.min(new Date().getDate(), totalDays);
  } else {
    let mx = 0;
    for(const m of sMatches){ const d=new Date(m.created_at).getDate(); if(d>mx) mx=d; }
    lastDay = Math.max(1, mx);
  }

  // Aktive Spieler in dieser Saison = wer ≥1 Saison-Match hat
  const activeSet = new Set();
  sMatches.forEach(m => [m.a1,m.a2,m.b1,m.b2].forEach(id => activeSet.add(id)));
  const activeIds = [...activeSet];

  // Empty-State: 0 oder 1 aktive Spieler → kein sinnvolles Diagramm
  if(activeIds.length < 1){
    const result = {seasonId, isCurrent, totalDays, lastDay:0, activeIds:[], entryDay:{},
      positionsByDay:{}, finalElo:{}, colorOf:{}, days:[], builtAt:Date.now(), empty:true};
    _cache._posHistKey = key;
    _cache._posHist = result;
    return result;
  }

  // Eintritts-Tag pro Spieler (Tag des ersten Saison-Matches)
  const entryDay = {};
  for(const m of sMatches){
    const d = new Date(m.created_at).getDate();
    [m.a1,m.a2,m.b1,m.b2].forEach(id => {
      if(entryDay[id]===undefined) entryDay[id]=d;
    });
  }

  // Saison-Elo-Akkumulator. Delta-Quelle: globalSim.history via getHistoryByMatchId,
  // damit wir saison-isoliert dieselben Zahlen wie der Rest der App haben.
  const histMap = getHistoryByMatchId();
  const startElo = cfg.start_elo ?? 0;
  const seasonElo = {};
  activeIds.forEach(id => seasonElo[id] = startElo);

  // positionsByDay[pid][dayIdx] = Position (1..N) ODER null wenn vor Eintritt
  const positionsByDay = {};
  activeIds.forEach(id => positionsByDay[id] = new Array(lastDay).fill(null));

  let mIdx = 0;
  for(let day=1; day<=lastDay; day++){
    // Alle Matches dieses Tages anwenden
    while(mIdx < sMatches.length){
      const m = sMatches[mIdx];
      const mDay = new Date(m.created_at).getDate();
      if(mDay > day) break;
      if(mDay === day){
        const histEntry = histMap.get(m.id);
        if(histEntry && histEntry.deltas){
          const ds = histEntry.deltas;
          for(const pid in ds){
            if(seasonElo[pid] !== undefined) seasonElo[pid] += ds[pid];
          }
        }
      }
      mIdx++;
    }
    // Ranking-Snapshot (nur Spieler, die schon eingestiegen sind, werden gezählt;
    // andere bleiben null für diesen Tag — Linie startet erst beim Eintrittstag)
    const ranked = activeIds
      .filter(id => entryDay[id] !== undefined && day >= entryDay[id])
      .map(id => [id, seasonElo[id]])
      .sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0]));
    ranked.forEach(([pid], idx) => {
      positionsByDay[pid][day-1] = idx + 1;
    });
  }

  // Eindeutiges Farb-Mapping: über alphabetisch sortierte ID-Liste → 12 Farben
  // (bei ≤12 Spielern garantiert eindeutig; bei >12 wiederholt sich die Palette).
  const sortedIds = [...activeIds].sort();
  const colorOf = {};
  sortedIds.forEach((id, i) => colorOf[id] = POSV_COLORS[i % POSV_COLORS.length]);

  const result = {
    seasonId, isCurrent, totalDays, lastDay,
    activeIds, entryDay, positionsByDay,
    finalElo: {...seasonElo},
    colorOf,
    days: Array.from({length:lastDay}, (_,i)=>i+1),
    builtAt: Date.now(),
    empty: false
  };
  _cache._posHistKey = key;
  _cache._posHist = result;
  return result;
}

// Saison-Stats pro Spieler (für Detail-Karte im Positionsverlauf-Sheet).
// Liefert Siege/Niederlagen/Quote/Bilanz für eine Saison. Cached.
function getSeasonPlayerStats(seasonId){
  if(!seasonId) seasonId = currentSeason().id;
  const key = 'posStats_'+seasonId+'_'+matches.length+'_'+_cache.version;
  if(_cache._posStatsKey===key) return _cache._posStats;
  const sMatches = matchesInSeason(seasonId);
  const stats = {};
  const ensure = id => { if(!stats[id]) stats[id]={wins:0,losses:0,games:0}; return stats[id]; };
  for(const m of sMatches){
    const aWin = m.winner==='A';
    [m.a1,m.a2].forEach(id => { const s=ensure(id); s.games++; if(aWin) s.wins++; else s.losses++; });
    [m.b1,m.b2].forEach(id => { const s=ensure(id); s.games++; if(aWin) s.losses++; else s.wins++; });
  }
  _cache._posStatsKey = key;
  _cache._posStats = stats;
  return stats;
}

// ─── §2.5 Matches-pro-Saison Cache ───────────────────────────────────
// Gruppiert alle Matches nach ihrer Saison-ID. Wird vom Award-Sammler-Badge
// und potentiell weiteren Saison-aggregierenden Funktionen genutzt.
function getMatchesBySeason(){
  const key='msBySeason_'+matches.length+'_'+_cache.version;
  if(_cache._matchesBySeasonKey===key) return _cache._matchesBySeason;
  const map={};
  for(let i=0; i<matches.length; i++){
    const sid=seasonOf(matches[i].created_at).id;
    if(!map[sid]) map[sid]=[];
    map[sid].push(matches[i]);
  }
  _cache._matchesBySeasonKey=key;
  _cache._matchesBySeason=map;
  return map;
}

// ─── §2.6 Saison-Rangliste Cache (Saison-End-Stand) ──────────────────
// Pro Saison: Top-3 und Bottom-3 Spieler nach Saison-End-Elo.
// Bottom-3 nur definiert wenn mindestens 6 Saison-Teilnehmer (sonst überlappt es mit Top-3).
// Genutzt von Königsklasse + Pflichtaufgabe Badges.
function getSeasonRankingsCache(){
  const _srcKey='seasonRk_'+matches.length+'_'+_cache.version;
  if(_cache._seasonRankingsKey===_srcKey) return _cache._seasonRankings;
  const gSim=getGlobalSim();
  const out={};
  const pm=pmap();
  Object.keys(gSim.seasonEndElos||{}).forEach(sid=>{
    const endElos=gSim.seasonEndElos[sid]||{};
    const playedMap=gSim.seasonPlayed[sid]||{};
    const list=Object.keys(endElos)
      .filter(pid=>{
        const p=pm[pid];
        if(!p||p.hidden) return false;
        return (playedMap[pid]||0)>0;
      })
      .map(pid=>({pid,elo:endElos[pid]}))
      .sort((a,b)=>b.elo-a.elo);
    const top3=new Set(list.slice(0,3).map(x=>x.pid));
    const bottom3 = list.length>=6
      ? new Set(list.slice(-3).map(x=>x.pid))
      : new Set();
    out[sid]={top3,bottom3};
  });
  _cache._seasonRankingsKey=_srcKey;
  _cache._seasonRankings=out;
  return out;
}

// ╔═══ §2.8 ─── ERWEITERTES ELO + AUTO-POSITION ────────────────────────╗
//     K-Faktor + Gewichtung + Score-Spread laut cfg.
// ╚═════════════════════════════════════════════════════════════════════════╝
// Bestehende DB-Felder bleiben gleich. Neu: dynamischer K + Margin-of-Victory,
// rein clientseitig berechnet (kein Schema-Umbau nötig).
function expected(a,b){ return 1/(1+Math.pow(10,(b-a)/400)); }
function posFactor(ps,sw){ return 1+sw*(0.5-ps)*2; }
function riskWeights(hi,lo,rs){ const gap=Math.min(Math.abs(hi-lo)/400,1); const s=rs*gap; return {strong:1-s,weak:1+s}; }

// ─── §2.8a Automatische Position (erwartungsbasiert + Erfahrung) ─────
// Misst NICHT nur rohe Siege, sondern:
//   1) Leistung ÜBER der Erwartung je Position (Performance)
//   2) Wie OFT der Spieler auf der Position spielt (Erfahrung)
// Wer 90% der Spiele in der Abwehr macht, hat dort einen Erfahrungs-Bonus —
// auch wenn die Siegrate schlecht ist. Sonst wird jemand, der 9/10 als Verteidiger
// spielt und dort schlecht abschneidet, fälschlich als "Stürmer" eingestuft.
// ─── Konstanten sind jetzt cfg-getunt (Defaults als Fallback) ───
const POS_MIN_GAMES_DEFAULT = 3;
const EXP_WEIGHT_DEFAULT = 0.5;
const _posMinGames = () => cfg.pos_min_games ?? POS_MIN_GAMES_DEFAULT;
const _expWeight  = () => cfg.exp_weight ?? EXP_WEIGHT_DEFAULT;

function posPerfFrom(id, matchSubset){
  if (!matchSubset || matchSubset === matches) {
    const sim = getGlobalSim();
    const t = sim.posTracker[id];
    if (t) {
      return {
        aG: t.aG, aW: t.aW, dG: t.dG, dW: t.dW,
        aWr: t.aG ? t.aW / t.aG : null,
        dWr: t.dG ? t.dW / t.dG : null,
        aPerfAvg: t.aG ? t.aPerf / t.aG : null,
        dPerfAvg: t.dG ? t.dPerf / t.dG : null
      };
    }
  }
  let aG=0,aW=0,dG=0,dW=0, aPerf=0, dPerf=0;
  for(const m of matchSubset){
    const onA=[m.a1,m.a2].includes(id), onB=[m.b1,m.b2].includes(id);
    if(!onA&&!onB) continue;
    const won=(onA&&m.winner==='A')||(onB&&m.winner==='B');
    const pos=id===m.a1?m.a1_pos:id===m.a2?m.a2_pos:id===m.b1?m.b1_pos:m.b2_pos;
    const myExp = onA ? (m.exp_a!=null?m.exp_a:0.5) : (m.exp_a!=null?1-m.exp_a:0.5);
    const score = won?1:0;
    const perf = score - myExp;  // >0 = über Erwartung, <0 = darunter
    if(pos==='atk'){aG++; if(won)aW++; aPerf+=perf;} else {dG++; if(won)dW++; dPerf+=perf;}
  }
  return {aG,aW,dG,dW,
    aWr:aG?aW/aG:null, dWr:dG?dW/dG:null,
    aPerfAvg:aG?aPerf/aG:null, dPerfAvg:dG?dPerf/dG:null};
}


// Sturm-Anteil 0..1, kombiniert Performance + Erfahrung.
// Performance wird GEWICHTET nach Spielanzahl auf der Position (mehr Spiele = höheres Vertrauen).
// Erfahrung (wie oft auf der Position) fließt als eigener Faktor ein.
function atkStrengthFrom(id, matchSubset){
  const p=posPerfFrom(id,matchSubset);
  const total = p.aG + p.dG;
  const minG = _posMinGames();
  const aOk = p.aG>=minG, dOk = p.dG>=minG;
  if(!aOk && !dOk) return 0.5;

  // ── Faktor 1: Spielanzahl-gewichtete Performance ──
  // Statt perfAtk = aPerfAvg vs dPerfAvg direkt zu vergleichen (was bei ungleicher
  // Spielanzahl verzerrt), gewichten wir jede Performance mit der Spielanzahl.
  // So hat eine Position mit 9 Spielen 3x so viel Einfluss wie eine mit 3.
  let perfAtk;
  if(aOk && dOk){
    // Gewichteter Vergleich: perf*games normalisiert
    const aScore = p.aPerfAvg * p.aG;  // Gesamt-Überperformance im Sturm
    const dScore = p.dPerfAvg * p.dG;  // Gesamt-Überperformance in Abwehr
    // Positiv = Sturm-Spieler, Negativ = Abwehr-Spieler
    // Normalisiert auf [-1,1] durch Division durch total
    const diff = (aScore - dScore) / total;
    perfAtk = 0.5 + diff * 0.5;
  } else if(aOk) {
    perfAtk = 0.5 + p.aPerfAvg * 0.3;  // Nur Sturm-Daten: gedämpft
  } else {
    perfAtk = 0.5 - p.dPerfAvg * 0.3;  // Nur Abwehr-Daten: gedämpft
  }

  // ── Faktor 2: Erfahrung (wie oft auf der Position) ──
  const expAtk = total>0 ? p.aG/total : 0.5;

  // ── Kombination ──
  // exp_weight steuert den Mix. Bei 0.4: 60% gewichtete Performance, 40% Erfahrung.
  const ew = _expWeight();
  const combined = (1-ew)*perfAtk + ew*expAtk;
  return Math.max(0.1, Math.min(0.9, combined));
}
function clampHalf(v){return Math.max(0.1,Math.min(0.9,v));}

function atkStrength(id){ return atkStrengthFrom(id, matches); }

// dynamischer K: neue Spieler (wenige Spiele) bewegen sich schneller
function dynK(pl){
  const g = gamesPlayed(pl.id); // Gesamt für Kompatibilität mit simulateElo
  if(g < 5)  return cfg.k_factor * (cfg.new_player_mult ?? 1.5);
  if(g < 15) return cfg.k_factor * (cfg.new_player_mid_mult ?? 1.2);
  if(pl.elo > cfg.start_elo + 400) return cfg.k_factor * (cfg.veteran_damp ?? 0.85);
  return cfg.k_factor;
}

// Margin-of-Victory Multiplikator (klares Ergebnis zählt mehr, knappes weniger)
function movMult(sa,sb){
  const diff=Math.abs(sa-sb), total=Math.max(sa+sb,1);
  // 1.0 bei knapp, bis ~1+mov_max_boost bei Kantersieg; logarithmisch gedämpft
  const maxBoost = cfg.mov_max_boost ?? 0.4;
  return 1 + maxBoost*(diff/(total)) * (Math.log(diff+1)/Math.log(11));
}

// computeMatch nutzt jetzt DIESELBE Engine wie der Recalc (simulateElo),
// damit die beim Speichern erzeugten Deltas exakt dem entsprechen, was nach
// einer späteren Neuberechnung in der DB steht. Es gibt nur noch EINE Wahrheit.
//
// Vorgehen: Wir bauen ein hypothetisches Match-Objekt, hängen es chronologisch
// an die aktuelle Saison-Matchliste an und lassen simulateElo darüber laufen.
// Die Deltas/exp_a des hypothetischen Matches lesen wir aus dem History-Eintrag.
function computeMatch(teamA, teamB, winner, sa, sb){
  // Optimierung: Wir starten vom End-State des gecachten globalen Sim und simulieren
  // nur das eine hypothetische Match darauf. Bei großen Match-Historien ~100× schneller.
  const HYPO_ID = '__hypo__';
  const hypo = {
    id: HYPO_ID,
    a1: teamA[0].id, a1_pos: teamA[0].pos,
    a2: teamA[1].id, a2_pos: teamA[1].pos,
    b1: teamB[0].id, b1_pos: teamB[0].pos,
    b2: teamB[1].id, b2_pos: teamB[1].pos,
    score_a: sa, score_b: sb, winner,
    created_at: new Date().toISOString()
  };

  const globalSim = getGlobalSim();
  const sim = simulateEloWithSliders([hypo], {
    initialState: globalSim,
    initialCurSeason: globalSim.curSeason
  });
  const entry = sim.history.find(h => h.matchId === HYPO_ID);
  const res = entry ? {...entry.deltas} : {};
  const expA = entry ? entry.expA : 0.5;

  // mov nur für die Anzeige ("Kantersieg ×…") — identische Formel wie in der Engine.
  const rawMov = movMult(sa, sb);
  return {res, expA, mov: rawMov};
}

async function persistNewMatch(newMatchId) {
  // Ein neues Match am Ende ändert nie vorherige Match-Deltas.
  // → Nur schreiben: dieses Match + Spieler-Stats (atk + Saison-Elo)
  // O(Spieler) statt O(alle Matches) DB-Writes.
  const sim = getGlobalSim(); // nutzt bereits das neue Match (cache invalidiert)
  const entry = sim.history.find(h => h.matchId === newMatchId);

  const writes = [];
  if(entry) {
    writes.push(
      sb.from('matches').update({ deltas: entry.deltas, exp_a: entry.expA })
        .eq('id', newMatchId)
    );
  }
  players.forEach(p => {
    const atk = atkStrengthFrom(p.id, matches);
    writes.push(sb.from('players').update({ atk }).eq('id', p.id));
  });

  const BATCH = 25;
  for(let i = 0; i < writes.length; i += BATCH) {
    await Promise.all(writes.slice(i, i + BATCH));
  }
  await syncSeasonEloToDB();
  // NEU: Zusätzliche Caches invalidieren, die durch ein neues Match beeinflusst werden
  invalidateCache(['global', 'stats', 'awards', 'badges', 'allTeamStats', 'allPastSeasons']);
}
// Schreibt eine neu berechnete Historie in die DB (Spieler-Elos + atk + Match-Deltas).
// WICHTIG: invalidiert auch die archivierten Saison-Snapshots (seasons.top_elo),
// damit das Recap-Podium nach Recalc konsistent zu der frischen Berechnung ist.
// Updates laufen in Batches parallel, um Rate-Limits zu respektieren (Supabase ~100 req/s).
async function persistRecalc(matchList){
  const BATCH_SIZE = 25;
  const runBatch = async (promises) => {
    for(let i=0; i<promises.length; i+=BATCH_SIZE){
      await Promise.all(promises.slice(i, i+BATCH_SIZE));
    }
  };
  // Positions-Stärke neu berechnen
  const atkUpdates = players.map(p=>{
    const atk = atkStrengthFrom(p.id, matchList);
    return sb.from('players').update({atk}).eq('id', p.id);
  });
  // Match-Deltas/exp_a aktualisieren (Slider-basiert)
  const{matchPatches} = recalcHistory(matchList);
  const matchUpdates = matchPatches.map(patch =>
    sb.from('matches').update({
      deltas: patch.deltas,
      exp_a: patch.exp_a
    }).eq('id', patch.id)
  );
  await runBatch([...atkUpdates, ...matchUpdates]);
  // Lokale Matches mit neuen Deltas updaten, damit die nachfolgende Archivierung
  // die frischen Werte sieht
  const patchById = {};
  matchPatches.forEach(p => { patchById[p.id] = p; });
  matches.forEach(m => {
    const p = patchById[m.id];
    if(p){ m.deltas = p.deltas; m.exp_a = p.exp_a; }
  });
  invalidateCache();
  // Archivierte Saison-Snapshots invalidieren → autoArchiveSeasons wird sie neu schreiben
  // (mit den frisch berechneten DB-Deltas → konsistent zu Profil/Recap).
  const pastIds = allPastSeasons();
  const wipeArchives = pastIds.map(sid =>
    sb.from('seasons').update({top_elo: JSON.stringify([])}).eq('id', sid)
  );
  await runBatch(wipeArchives);
  // Lokal: top_elo leeren, damit autoArchiveSeasons sie als stale erkennt
  seasons.forEach(s => {
    if(pastIds.includes(s.id)) s.top_elo = JSON.stringify([]);
  });
  // Saison-Elo in DB synchronisieren
  await syncSeasonEloToDB();
  // Saisons neu archivieren mit den frischen Werten
  await autoArchiveSeasons();
}

  // NEU: Alle relevanten Caches invalidieren
