    giantSlayer:'giantSlayer', favoritenschreck:'devilMask', rivalry:'crossedSwords',
    // ── NEUE NEGATIV-AWARDS v6 ──
    cheesePlatter:'cheese', favoriteLoser:'crownFallen'
  };
  const ic = key => `<svg viewBox="0 0 24 24">${ICONS[AW_IC[key]||'trophy']||''}</svg>`;

  // Award-Trophäe für das Sheet: gleiche Optik wie im Awards-Tab.
  // Plakette: bei Team-Awards zeigen wir den Partner-NAMEN als reinen Text
  // (kein Profilbild) — konsistent zum Wunsch des Users und sauber für den
  // 4-Spieler-Award "Erzfeinde" (a.partnerLabel statt a.partner).
  const trophy = (a) => {
    const m = AWARD_META[a.key]; if(!m) return '';
    const valDisplay = a.val ? esc(a.val) : '#1';
    let plaqueContent;
    if(a.partnerLabel){
      // Rivalry / 4-Spieler: keine Partner-Plaque, sondern Beschriftung "vs X & Y"
      plaqueContent = `<span class="aw-trophy-plaque-name" style="font-size:10px">${esc(a.partnerLabel)}</span>`;
    } else if(a.partner){
      // Team-Award (2 Spieler): Partner-Name ohne Avatar/Initial-Bubble
      plaqueContent = `<span class="aw-trophy-plaque-name" style="font-size:10.5px">mit ${esc(pname(a.partner))}</span>`;
    } else {
      plaqueContent = `<span class="aw-trophy-plaque-name" style="color:var(--muted);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase">Top-1</span>`;
    }
    return `<div class="aw-trophy ${m.cls}" data-paward2="${esc(a.key)}">
      <div class="aw-trophy-cup">${ic(a.key)}<div class="aw-trophy-cup-base"></div></div>
      <div class="aw-trophy-lbl">${esc(m.title)}</div>
      <div class="aw-trophy-val">${valDisplay}</div>
      <div class="aw-trophy-plaque">${plaqueContent}</div>
    </div>`;
  };

  const body = awards.length
    ? `<div class="aw-vitrine" style="margin-top:16px">${awards.map(trophy).join('')}</div>`
    : `<div class="empty" style="margin-top:24px;text-align:center;color:var(--muted)">
        <div class="ee svg-ic" style="color:var(--faint);margin-bottom:6px">${svgI('trophy')}</div>
        Noch keine Top-1-Auszeichnungen
       </div>`;

  openSheet(`
    <div style="display:flex;align-items:center;gap:14px">
      ${avHtml(p,"width:48px;height:48px;border-radius:14px;font-size:18px")}
      <div>
        <h3>Awards</h3>
        <div class="sheet-sub">${esc(p.name)} · ${awards.length} Top-1-Auszeichnung${awards.length===1?'':'en'}</div>
      </div>
    </div>
    ${body}
    <button class="btn ghost sm" id="backToPlayer" style="margin-top:14px;width:100%">← Zurück zum Profil</button>
  `);
  document.querySelectorAll('[data-paward2]').forEach(el=>el.onclick=()=>{
    sheetNav(()=>showAward(el.dataset.paward2));
  });
  const back=document.getElementById('backToPlayer');
  if(back) back.onclick=()=>closeSheet();
}

// Badges-Sheet: zeigt alle Badges (freigeschaltet vs. gesperrt)
function showPlayerBadges(playerId){
  const p = pmap()[playerId]; if(!p) return;
  _sheetSetReopen(()=>showPlayerBadges(playerId));
  const earned = getCachedBadges(playerId);
  const earnedIds = new Map(earned.map(b => [b.id, b.count]));
  // ONCE_ONLY: Badges, die man nur einmal erreicht (keine Wiederholung als ×N)
  // — werden in der Sortierung VOR den mehrfach-erreichbaren angezeigt.
  const ONCE_ONLY = new Set(['first_match','games25','games150','allrounder','def50','atk50',
    'climber_100','dominator_400','dynasty_600','allwetter']);

  // ─── Aggregation pro Tier ───
  // Pro Rarity: BADGES-Array in Reihenfolge durchgehen, in Buckets sortieren.
  // Innerhalb des Buckets: ZUERST einmalig erreichbare ("Freigeschaltet"-Style),
  // DANACH mehrfach erreichbare (×N-Counter) — sortiert nur die ANZEIGE, keine
  // neue Kategorie. Stabil: relative Reihenfolge im BADGES-Array bleibt erhalten.
  const buckets = {legendary:[], rare:[], common:[], negative:[]};
  BADGES.forEach(b => {
    const r = rarityOf(b.id);
    if(buckets[r]) buckets[r].push(b);
  });
  Object.keys(buckets).forEach(r => {
    buckets[r].sort((a,b) => {
      const aOnce = ONCE_ONLY.has(a.id) ? 0 : 1;
      const bOnce = ONCE_ONLY.has(b.id) ? 0 : 1;
      return aOnce - bOnce; // stabile Sort: nur Once-vs-Multi neu ordnen
    });
  });
  const have = (r) => buckets[r].filter(b => earnedIds.has(b.id)).length;
  const haveTotal = have('legendary')+have('rare')+have('common')+have('negative');
  const trigCount = earned.reduce((s,b)=>s+b.count,0);

  // ─── Tier-Counter-Bar (oben im Sheet) ───
  const pill = (r) => {
    const meta = RARITY_META[r];
    const h = have(r);
    const dim = h===0 ? 'dim' : '';
    return `<span class="tc-pill ${r} ${dim}"><span class="dot"></span><span class="n">${h} / ${meta.total}</span></span>`;
  };
  const counterHtml = `
    <div class="bsh-counter">
      ${pill('legendary')}
      ${pill('rare')}
      ${pill('common')}
      <span class="tc-sep"></span>
      ${pill('negative')}
    </div>`;

  // ─── Card-Renderer (eine Badge → eine Card) ───
  const renderCard = (b, r) => {
    const cnt = earnedIds.get(b.id) || 0;
    const unlocked = cnt > 0;
    const isRepeatable = !ONCE_ONLY.has(b.id);
    if(!unlocked){
      // Locked: neutral grau, Lock-Icon zentral, winziger Tier-Dot oben links
      return `<div class="bsh-card locked ${r}" data-bid="${esc(b.id)}">
        <span class="tier-dot"></span>
        <div class="bsh-card-ic">${svgI('lock')}</div>
        <div class="bsh-card-name">${esc(b.name)}</div>
        <div class="bsh-card-desc">${esc(b.desc)}</div>
      </div>`;
    }
    // Unlocked: Tier-Farbe + Akzent-Strich oben (per CSS)
    const meta = isRepeatable
      ? `<div class="bsh-card-count">×${cnt}</div>`
      : `<div class="bsh-card-once">Freigeschaltet</div>`;
    return `<div class="bsh-card unlocked ${r}" data-bid="${esc(b.id)}">
      <div class="bsh-card-ic">${badgeIc(b,'30px')}</div>
      <div class="bsh-card-name">${esc(b.name)}</div>
      <div class="bsh-card-desc">${esc(b.desc)}</div>
      ${meta}
    </div>`;
  };

  // Positive Tiers (Legendary → Rare → Common) zusammengefasst in einem Grid
  const positiveCards = ['legendary','rare','common']
    .flatMap(r => buckets[r].map(b => renderCard(b, r)))
    .join('');

  // Negative-Block separat mit Schande-Trennlinie
  const negativeCards = buckets.negative.map(b => renderCard(b, 'negative')).join('');
  const negativeBlock = negativeCards ? `
    <div class="bsh-neg-divider">
      <div class="bsh-neg-divider-line"></div>
      <div class="bsh-neg-divider-label"><span class="dot"></span>Schande</div>
      <div class="bsh-neg-divider-line"></div>
    </div>
    <div class="bsh-grid">${negativeCards}</div>` : '';

  openSheet(`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
      ${avHtml(p,"width:48px;height:48px;border-radius:14px;font-size:18px")}
      <div>
        <h3>Auszeichnungen</h3>
        <div class="sheet-sub">${esc(p.name)} · <b style="color:var(--acid)">${haveTotal}</b> von ${BADGES.length} · ${trigCount}× ausgelöst</div>
      </div>
    </div>
    ${counterHtml}
    <div class="bsh-grid">${positiveCards}</div>
    ${negativeBlock}
    <button class="btn ghost sm" id="backToPlayer2" style="margin-top:18px">← Zurück zum Profil</button>
  `);
  const back = document.getElementById('backToPlayer2');
  if(back) back.onclick = () => closeSheet();
  // Badge-Card-Click → öffnet Detail-Popover ÜBER dem Sheet (Sheet bleibt offen!)
  document.querySelectorAll('.bsh-card[data-bid]').forEach(el => {
    el.onclick = () => showBadgePopover(el.dataset.bid, playerId);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// BADGE-DETAIL-POPOVER
// ═══════════════════════════════════════════════════════════════════════════
// Layer ÜBER dem Auszeichnungen-Sheet (z-index 120+ > Sheet 100/101).
// Zwei Modi:
//   • Erreicht  → zeigt die Matches, in denen das Badge ausgelöst wurde
//                 (aus getBadgeEarnedCache). Jeder Match-Eintrag ist klickbar:
//                 schließt Popover UND Sheet, öffnet das Match-Detail.
//   • Locked    → zeigt Fortschritt für die wichtigsten quantifizierbaren
//                 Badges (Spiele, Streaks, Elo-Schwellen, Positions-Spiele).
//                 Für saison-/karriere-aggregierte Badges (POTD, POTW,
//                 award_collector, untouchable etc.) gibt's einen knappen
//                 "Noch nicht erreicht"-Hinweis statt Balken.
//
// Schließen: Backdrop-Click, ✕ Button, ESC. KEIN closeSheet — das darunter
// liegende Auszeichnungen-Sheet bleibt scrollbar und sucht-fähig.
// ═══════════════════════════════════════════════════════════════════════════

// Helper: Matches, in denen das Badge für DIESEN Spieler gefeuert wurde.
// Nutzt den globalen Badge-Earned-Cache (chronologischer Walk in §7.4).
// Für saison-/karriere-aggregierte Badges (kein fire-Trigger) ist die Liste
// leer — wir zeigen dann den count ohne Match-Liste.
function _badgeFireMatches(playerId, badgeId){
  const map = getBadgeEarnedCache();
  const hits = [];
  for(const mid in map){
    if(map[mid].some(e => e.playerId === playerId && e.badge.id === badgeId)){
      const mObj = matches.find(m => m.id === mid);
      if(mObj) hits.push(mObj);
    }
  }
  return hits.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
}

// Helper: Fortschritt für quantifizierbare Locked-Badges. Returnt
// {cur, tgt, label} oder null wenn kein einfacher Fortschritt definierbar ist.
function _badgeProgress(badgeId, playerId){
  const playerMs = matches.filter(m => matchOf(playerId, m));
  switch(badgeId){
    case 'first_match':
      return {cur: Math.min(playerMs.length, 1), tgt: 1, label: 'Spiele'};
    case 'games25':
      return {cur: Math.min(playerMs.length, 25), tgt: 25, label: 'Spiele'};
    case 'games150':
      return {cur: Math.min(playerMs.length, 150), tgt: 150, label: 'Spiele'};
    case 'def50': {
      const def = playerMs.filter(m => {
        const slot=m.a1===playerId?'a1':m.a2===playerId?'a2':m.b1===playerId?'b1':'b2';
        return m[slot+'_pos']==='def';
      }).length;
      return {cur: Math.min(def, 50), tgt: 50, label: 'Abwehr-Spiele'};
    }
    case 'atk50': {
      const atk = playerMs.filter(m => {
        const slot=m.a1===playerId?'a1':m.a2===playerId?'a2':m.b1===playerId?'b1':'b2';
        return m[slot+'_pos']==='atk';
      }).length;
      return {cur: Math.min(atk, 50), tgt: 50, label: 'Sturm-Spiele'};
    }
    case 'streak5':
    case 'streak10':
    case 'streak15':
    case 'streak20': {
      const best = longestPlayerStreak(playerId, matches);
      const tgts = {streak5:5, streak10:10, streak15:15, streak20:20};
      const tgt = tgts[badgeId];
      return {cur: Math.min(best, tgt), tgt, label: 'längste Serie'};
    }
    case 'climber_100':
    case 'dominator_400':
    case 'dynasty_600': {
      // Peak-Saison-Elo aus globalSim — überlebt Saison-Reset (= jemals erreicht).
      // start_elo abziehen, damit "0/100" intuitiv ist (nicht "1000/1100").
      const sim = getGlobalSim();
      const peakSaisonElo = sim.peakElo && sim.peakElo[playerId] != null
        ? Math.round(sim.peakElo[playerId] - cfg.start_elo)
        : 0;
      const tgts = {climber_100:100, dominator_400:400, dynasty_600:600};
      const tgt = tgts[badgeId];
      return {cur: Math.max(0, Math.min(peakSaisonElo, tgt)), tgt, label: 'Saison-Elo über Start'};
    }
    case 'allrounder': {
      // 20 Siege als Sturm UND 20 als Abwehr — wir zeigen den kleineren Wert
      const stats = playerStats(playerId);
      const atkW = stats.atkW || 0, defW = stats.defW || 0;
      const cur = Math.min(atkW, defW, 20);
      return {cur, tgt: 20, label: 'min. Sturm- & Abwehr-Siege'};
    }
    case 'mr_disaster': {
      // Aktuelle Saison: wie viele 0:10-Niederlagen hat der Spieler bereits?
      // Spiegel zu mr_perfect-Fortschritt (würde gleich aussehen).
      const sid = currentSeason().id;
      const seasonMs = matchesInSeason(sid);
      const disasters = seasonMs.filter(m => matchOf(playerId,m) && !won(playerId,m)
        && goalsFor(playerId,m)===0 && goalsAgainst(playerId,m)===10).length;
      return {cur: Math.min(disasters, 3), tgt: 3, label: '0:10 in aktueller Saison'};
    }
    case 'nemesis': {
      // Höchster AKTUELLER Niederlagen-Streak gegen einen einzelnen Gegner.
      // Lauf chronologisch durch alle Matches, halte vsCounter pro Gegner.
      // Sieg gegen X → vsCounter[X]=0; Niederlage gegen X → +1.
      // Anzeige: max() über alle finalen Counter (= aktueller laufender Streak).
      const mine = matches.filter(m => matchOf(playerId,m))
        .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      const vs = {};
      mine.forEach(m => {
        const onA = [m.a1,m.a2].includes(playerId);
        const w = (onA && m.winner==='A') || (!onA && m.winner==='B');
        const opps = onA ? [m.b1,m.b2] : [m.a1,m.a2];
        if(w) opps.forEach(o => { vs[o] = 0; });
        else  opps.forEach(o => { vs[o] = (vs[o]||0) + 1; });
      });
      const best = Object.values(vs).reduce((a,b) => a>b?a:b, 0);
      return {cur: Math.min(best, 5), tgt: 5, label: 'akt. Niederlagen gg. selben Gegner'};
    }
  }
  return null;
}

function showBadgePopover(badgeId, playerId){
  const b = BADGES.find(x => x.id === badgeId); if(!b) return;
  const r = rarityOf(b.id);
  const rarityLabel = (RARITY_META[r] && RARITY_META[r].label) || '';
  const earned = getCachedBadges(playerId);
  const cnt = (earned.find(e => e.id === badgeId)||{}).count || 0;
  const unlocked = cnt > 0;
  const ONCE_ONLY = new Set(['first_match','games25','games150','allrounder','def50','atk50',
    'climber_100','dominator_400','dynasty_600','allwetter']);
  const isRepeatable = !ONCE_ONLY.has(b.id);

  // ─── Body je nach Modus ───
  let bodyHtml;
  if(unlocked){
    // Match-Liste (für fire-basierte Badges)
    const hits = _badgeFireMatches(playerId, badgeId);
    if(hits.length){
      const maxShow = 8;
      const shown = hits.slice(0, maxShow);
      const rowsHtml = shown.map(m => {
        const date = new Date(m.created_at);
        const dateStr = date.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
        const onA = [m.a1,m.a2].includes(playerId);
        const myGf = onA?m.score_a:m.score_b;
        const myGa = onA?m.score_b:m.score_a;
        const won = (onA&&m.winner==='A')||(!onA&&m.winner==='B');
        const col = won ? 'var(--acid)' : 'var(--red)';
        return `<div class="bp-match" data-mid="${esc(m.id)}">
          <div class="bp-match-date">${dateStr}</div>
          <div class="bp-match-score" style="color:${col}">${myGf} : ${myGa}</div>
          <div class="bp-match-arr">›</div>
        </div>`;
      }).join('');
      const moreHint = hits.length > maxShow
        ? `<div class="bp-more">+ ${hits.length - maxShow} weitere</div>` : '';
      bodyHtml = `
        <div class="bp-section">Ausgelöst in ${hits.length} ${hits.length===1?'Match':'Matches'}</div>
        ${rowsHtml}${moreHint}`;
    } else {
      // Saison-/Karriere-aggregierte Badges ohne fire-Trigger.
      // Wir zeigen einen kurzen Hinweis statt einer Liste.
      bodyHtml = `
        <div class="bp-section">Status</div>
        <div class="bp-locked-hint">
          Diese Auszeichnung wird über Saison-/Karriere-Daten ermittelt und
          ist nicht an ein einzelnes Match gebunden.
          ${isRepeatable
            ? `<br><br><span class="bp-locked-em">${cnt}×</span> bisher erreicht.`
            : `<br><br><span class="bp-locked-em">Freigeschaltet.</span>`}
        </div>`;
    }
  } else {
    // Locked — Fortschritt oder Hinweis
    const prog = _badgeProgress(badgeId, playerId);
    if(prog){
      const pct = Math.round(prog.cur / prog.tgt * 100);
      bodyHtml = `
        <div class="bp-section">Fortschritt</div>
        <div class="bp-prog">
          <div class="bp-prog-bar"><div class="bp-prog-fill ${r}" style="width:${Math.min(pct,100)}%"></div></div>
          <div class="bp-prog-label">
            <span>${prog.cur} / ${prog.tgt} <span class="bp-prog-target">${esc(prog.label)}</span></span>
            <span>${pct}%</span>
          </div>
        </div>`;
    } else {
      // Kein Fortschritt definierbar — knapper Hinweis
      bodyHtml = `
        <div class="bp-section">Status</div>
        <div class="bp-locked-hint">
          Noch <span class="bp-locked-em">nicht erreicht</span>.<br>
          Erfüll die Voraussetzung im nächsten Spiel oder über die Saison hinweg.
        </div>`;
    }
  }

  // Status-Pill rechts oben in der Card (×N oder "Freigeschaltet")
  const statusHtml = unlocked
    ? (isRepeatable
        ? `<div class="bp-status"><div class="bp-status-count" style="color:${{legendary:'var(--gold)',rare:'var(--purple)',common:'var(--acid)',negative:'var(--red)'}[r]||'var(--ink)'}">×${cnt}</div><div class="bp-status-label">erreicht</div></div>`
        : `<div class="bp-status"><div class="bp-status-count" style="color:${{legendary:'var(--gold)',rare:'var(--purple)',common:'var(--acid)',negative:'var(--red)'}[r]||'var(--ink)'}">✓</div><div class="bp-status-label">freigeschaltet</div></div>`)
    : '';

  const bp = document.getElementById('bp');
  const bpBg = document.getElementById('bpBg');
  bp.innerHTML = `
    <div class="bp-head">
      <div class="bp-ic ${unlocked?r:'locked'}">${unlocked ? badgeIc(b, '24px') : svgI('lock')}</div>
      <div style="flex:1;min-width:0">
        <div class="bp-title">${esc(b.name)}</div>
        <div class="bp-desc">${esc(b.desc)}</div>
        <div class="bp-rarity">${esc(rarityLabel)}</div>
      </div>
      ${statusHtml}
    </div>
    ${bodyHtml}
    <button class="bp-close" id="bpCloseBtn">Schließen</button>
  `;
  bpBg.classList.add('show');
  bp.scrollTop = 0;
  // Match-Click: schließt POPOVER und SHEET, öffnet Match-Detail
  bp.querySelectorAll('.bp-match[data-mid]').forEach(el => {
    el.onclick = () => {
      const mid = el.dataset.mid;
      closeBadgePopover();
      sheetNav(() => showMatchDetail(mid)); // Match-Detail über das aktuelle Sheet stapeln
    };
  });
  document.getElementById('bpCloseBtn').onclick = closeBadgePopover;
}

function closeBadgePopover(){
  const bpBg = document.getElementById('bpBg');
  if(bpBg) bpBg.classList.remove('show');
}

// ╔═══ §9.1 ─── BILANZEN-SHEET (Mitspieler-Liste) ──────────────────────╗
//     H2H-Bilanz gegen alle Mitspieler.
// ╚═════════════════════════════════════════════════════════════════════════╝
// Aufgerufen aus dem Profil-Sheet via ppH2HBtn. Zeigt ALLE Mitspieler mit
// ≥3 gemeinsamen Matches, sortiert nach Häufigkeit. Pro Zeile: Avatar,
// Name, T/G-Bilanz, Total. Klick → showH2H (asymmetrisch: Profil-Spieler
// zuerst, damit "asOppForA" aus seiner Sicht aggregiert).
function showPlayerH2HList(playerId){
  const p = pmap()[playerId]; if(!p) return;
  _sheetSetReopen(()=>showPlayerH2HList(playerId));
  const h2hList = playerH2HList(playerId, 3);
  const pmL = pmap();

  const miniAv = (pp) => {
    const em = pp.avatar_id ? avatarEmoji(pp.avatar_id) : null;
    if(em) return `<div style="width:36px;height:36px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:18px;flex-shrink:0">${em}</div>`;
    return `<div style="width:36px;height:36px;border-radius:50%;background:${avColor(pp.id)};display:grid;place-items:center;font-size:13px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;flex-shrink:0">${esc(initials(pp.name))}</div>`;
  };

  const rows = h2hList.map(x => {
    const other = pmL[x.oid]; if(!other) return '';
    const teamChip = x.teamG
      ? `<span style="color:var(--blue);font-weight:700">${x.teamW}-${x.teamG-x.teamW}</span><span style="color:var(--muted);font-size:9px;margin-left:2px">T</span>`
      : '';
    const oppChip = x.oppG
      ? `<span style="color:var(--purple);font-weight:700">${x.oppW}-${x.oppG-x.oppW}</span><span style="color:var(--muted);font-size:9px;margin-left:2px">G</span>`
      : '';
    const sep = (teamChip && oppChip) ? `<span style="color:var(--faint);margin:0 6px">·</span>` : '';
    return `<div class="rrow" data-h2h="${esc(playerId+'|'+x.oid)}" style="padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer">
      ${miniAv(other)}
      <div style="flex:1;min-width:0">
        <div class="rname" style="font-size:13px;line-height:1.15">${esc(other.name)}</div>
        <div class="num" style="font-size:11px;margin-top:3px;font-family:'Sometype Mono',monospace">${teamChip}${sep}${oppChip}</div>
      </div>
      <div class="num" style="font-size:11px;color:var(--muted);flex-shrink:0">${x.total}</div>
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-linecap="round" style="flex-shrink:0;opacity:.7"><path d="M9 18l6-6-6-6"/></svg>
    </div>`;
  }).join('');

// Saison-Auszeichnungen eines Spielers
function playerSeasonAwards(id){
  // Cache-Schlüssel muss auch die Version der 'seasons' berücksichtigen,
  // da sich diese unabhängig von `matches` ändern können.
  const key='playerSeasonAwards_'+id+'_'+seasons.length+'_'+_cache.version;
  if(!_cache._playerSeasonAwards) _cache._playerSeasonAwards={};
  if(_cache._playerSeasonAwards[key]) return _cache._playerSeasonAwards[key];

  const result=seasons.filter(s=>s.player_id===id||s.team_p1===id||s.team_p2===id);
  _cache._playerSeasonAwards[key]=result;
  return result;
}

    // Durchwechseln: 4 gewählte Spieler random in neue Teams mischen
    const shuf=document.getElementById('shuffleBtn');
    if(shuf) shuf.onclick=()=>{
      const ids=[M.A1,M.A2,M.B1,M.B2].filter(Boolean);
      if(ids.length!==4){toast('Erst 4 Spieler auswählen',true);return;}
      // Fisher-Yates Shuffle
      for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
      M.A1=ids[0];M.A2=ids[1];M.B1=ids[2];M.B2=ids[3];
      // Positionen nach Stärke-Profil: höherer atkStrength = Sturm
      const assignPos=(p1,p2)=>{
        const a1=atkStrength(p1), a2=atkStrength(p2);
        // Wahrscheinlichkeit dass p1 stürmt: basierend auf relativem Stärke-Unterschied
        // Bei gleichem Profil (67% vs 70%) → fast 50/50
        // Bei klarem Unterschied (90% vs 30%) → fast sicher der Stärkere
        const diff=a1-a2; // positiv = p1 ist eher Stürmer
        // sigmoid-artige Mapping: diff=0 → 50%, diff=0.5 → ~88%, diff=-0.5 → ~12%
        const prob=1/(1+Math.exp(-diff*6));
        return Math.random()<prob?{s:p1,d:p2}:{s:p2,d:p1};
      };
      const tA=assignPos(M.A1,M.A2);
      M.pA1=M.A1===tA.s?'atk':'def'; M.pA2=M.A2===tA.s?'atk':'def';
      const tB=assignPos(M.B1,M.B2);
      M.pB1=M.B1===tB.s?'atk':'def'; M.pB2=M.B2===tB.s?'atk':'def';
      toast('Teams gemischt','ok');render();

  const recalcBtn=document.getElementById('recalcBtn');
  if(recalcBtn) recalcBtn.onclick=async()=>{
    if(!confirm('Wirklich alle Matches mit aktuellen Slidern rückwirkend neu berechnen?\n\nAlle gespeicherten Match-Deltas werden überschrieben. Vergangene Saison-Ergebnisse und Awards können sich dadurch ändern.\n\nDieser Vorgang kann nicht rückgängig gemacht werden.')) return;

    await sb.from('players').update({hidden:false}).eq('id',btn.dataset.unhide);

// Combobox: Tippen filtert Spieler, Auswahl setzt M[key]
function bindCombo(inp){
  const key=inp.dataset.combo;
  const list=document.querySelector(`[data-combolist="${key}"]`);
  const chosenIds=()=>[M.A1,M.A2,M.B1,M.B2].filter((v,i)=>['A1','A2','B1','B2'][i]!==key&&v);
  const renderList=(q)=>{
    const taken=chosenIds();
    const gSim=getGlobalSim();
    const rankElo=p=>gSim.careerElo[p.id]??p.elo; // Karriere-Elo für Sortierung
    const dispElo=p=>Math.round(gSim.elo[p.id]??cfg.start_elo); // Saison-Elo für Anzeige
    let arr=[...activePlayers()].sort((a,b)=>rankElo(b)-rankElo(a)).filter(p=>!taken.includes(p.id));
    if(q)arr=arr.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    if(!arr.length){list.innerHTML=`<div class="combo-opt empty">Kein Treffer</div>`;list.classList.add('show');return;}
    list.innerHTML=arr.slice(0,8).map(p=>`<div class="combo-opt" data-pick="${p.id}">${esc(p.name)}<span class="ce">${dispElo(p)}</span></div>`).join('');
    list.classList.add('show');
    list.querySelectorAll('[data-pick]').forEach(o=>o.onclick=()=>{
      M[key]=o.dataset.pick; const p=pmap()[M[key]];
      inp.value=p.name; inp.classList.add('filled'); list.classList.remove('show');
      readM(); updatePreview();
    });
  };
  inp.onfocus=()=>renderList(inp.value && pmap()[M[key]] && pmap()[M[key]].name===inp.value ? '' : inp.value);
  inp.oninput=()=>{ M[key]=''; inp.classList.remove('filled'); renderList(inp.value); updatePreview(); };
  inp.onblur=()=>setTimeout(()=>list.classList.remove('show'),180);
  // Enter wählt ersten Treffer
  inp.onkeydown=e=>{ if(e.key==='Enter'){const first=list.querySelector('[data-pick]');if(first)first.click();} };
}

// Score per Klick eintippbar machen, nur 0–10
function makeScoreEditable(span){
  const k=span.dataset.scoreedit;
  const inp=document.createElement('input');
  inp.type='number'; inp.min=0; inp.max=10; inp.value=M[k];
  inp.className='sval-input num'; inp.inputMode='numeric';
  span.replaceWith(inp); inp.focus(); inp.select();
  const commit=()=>{
    let v=parseInt(inp.value,10); if(isNaN(v))v=0; v=Math.max(0,Math.min(10,v));
    M[k]=v;
    const ns=document.createElement('span');
    ns.className='sval num'; ns.id=(k==='sa'?'svA':'svB'); ns.dataset.scoreedit=k; ns.textContent=v;
    inp.replaceWith(ns); ns.onclick=()=>makeScoreEditable(ns);
    updatePreview();
  };
  inp.onblur=commit;
  inp.oninput=()=>{ // hart auf 0–10 begrenzen während des Tippens
    if(inp.value!==''){let v=parseInt(inp.value,10);if(!isNaN(v)){if(v>10)inp.value=10;if(v<0)inp.value=0;}}
  };
  inp.onkeydown=e=>{ if(e.key==='Enter')inp.blur(); };
}
function bindSlider(id,key,toState,toLabel){
  const sl=document.getElementById(id);if(!sl)return;
  sl.oninput=()=>{document.getElementById(id+'v').textContent=toLabel(+sl.value);};
  sl.onchange=async()=>{
    const newVal=toState(+sl.value);
    const o={};o[key]=newVal;
    // Lokales State sofort updaten (synchron) damit die Vorschau & nächster Match-Save den
    // neuen Wert sieht. DB- und localStorage-Persistenz folgt asynchron.
    cfg[key]=newVal;
    invalidateCache();
    // DB-Update versuchen
    let dbOk=false;
    try{
      const {error}=await sb.from('config').update(o).eq('id',1);
      if(!error) dbOk=true;
      else console.warn('Config DB-Update fehlgeschlagen für',key,':',error.message);
    }catch(e){
      console.warn('Config DB-Update Exception:',e);
    }
    // localStorage-Fallback (z.B. neue Spalten die noch nicht in DB existieren)
    // Diese Overrides werden bei loadAll auf das DB-cfg geschmolzen.
    if(!dbOk){
      try{
        const overrides=JSON.parse(localStorage.getItem('cfg_overrides')||'{}');
        overrides[key]=newVal;
        localStorage.setItem('cfg_overrides',JSON.stringify(overrides));
      }catch(e){}
    } else {
      // Wenn DB jetzt klappt: alten localStorage-Override entfernen (sonst überschreibt
      // er bei loadAll den frischen DB-Wert).
      try{
        const overrides=JSON.parse(localStorage.getItem('cfg_overrides')||'{}');
        if(key in overrides){
          delete overrides[key];
          localStorage.setItem('cfg_overrides',JSON.stringify(overrides));
        }
      }catch(e){}
    }
    toast(dbOk?'Gespeichert':'Lokal gespeichert','ok');
  };
}

// ╔═══ §9.2 ─── HEAD-TO-HEAD PROFIL SHEET ──────────────────────────────╗
//     Vergleich zweier Spieler in direkten Begegnungen.
// ╚═════════════════════════════════════════════════════════════════════════╝
// Zwei-Spieler-Bilanz: zusammen (als Teamkollegen) UND gegen (als Gegner).
// Aus Sicht von Spieler A; tauscht man die Reihenfolge der Args, dreht sich
// die Gegner-Perspektive um. Konsistent zum showTeam-Sheet-Design.
function showH2H(idA, idB){
  const pm = pmap();
  const pA = pm[idA], pB = pm[idB];
  if(!pA || !pB) return;
  _sheetSetReopen(()=>showH2H(idA, idB));
  if(idA === idB) return;

  const d = h2hDetail(idA, idB);

  // Avatar-Helper (konsistent mit showTeam)
  const avBig = (p) => {
    const em = p.avatar_id ? avatarEmoji(p.avatar_id) : null;
    if(em) return `<div style="width:60px;height:60px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:28px;border:2px solid var(--line2)">${em}</div>`;
    return `<div style="width:60px;height:60px;border-radius:50%;background:${avColor(p.id)};display:grid;place-items:center;font-size:20px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;border:2px solid var(--line2)">${esc(initials(p.name))}</div>`;
  };

  // Empty state — beide Spieler kennen sich, aber keine gemeinsamen Matches
  if(d.total === 0){
    openSheet(`
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">Head-to-Head</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px">
          <div data-detail="${esc(pA.id)}" style="cursor:pointer">${avBig(pA)}</div>
          <span class="svg-ic" style="color:var(--muted);width:18px;height:18px">${svgI('swords')}</span>
          <div data-detail="${esc(pB.id)}" style="cursor:pointer">${avBig(pB)}</div>
        </div>
        <div style="font-family:'Archivo Black',sans-serif;font-size:18px;letter-spacing:-.02em;line-height:1.1;margin-top:12px">${esc(pA.name)} <span style="color:var(--muted);font-size:14px">vs</span> ${esc(pB.name)}</div>
      </div>
      ${emptyState('swords','Noch keine gemeinsamen Matches')}
    `);
    return;
  }

  const teamWr  = d.asTeam.g ? Math.round(d.asTeam.w / d.asTeam.g * 100) : 0;
  const oppWr   = d.asOppForA.g ? Math.round(d.asOppForA.w / d.asOppForA.g * 100) : 0;
  const teamGdRaw  = d.asTeam.gf - d.asTeam.ga;
  const oppGdRaw   = d.asOppForA.gf - d.asOppForA.ga;
  const teamGd  = (teamGdRaw>=0?'+':'') + teamGdRaw;
  const oppGd   = (oppGdRaw>=0?'+':'') + oppGdRaw;
  const teamElo = Math.round(d.asTeam.eloDelta);
  const oppElo  = Math.round(d.asOppForA.eloDelta);
  const teamEloStr = (teamElo>=0?'+':'') + teamElo;
  const oppEloStr  = (oppElo>=0?'+':'') + oppElo;
  const teamEloCol = teamElo>=0 ? 'var(--acid)' : 'var(--red)';
  const oppEloCol  = oppElo>=0  ? 'var(--acid)' : 'var(--red)';

  // ─── ALS-TEAM BLOCK ───
  const teamBlock = d.asTeam.g ? `
    <div style="background:var(--surface);border:1px solid rgba(86,180,232,.22);border-radius:14px;padding:14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="svg-ic" style="color:var(--blue);width:16px;height:16px">${svgI('handshake')}</span>
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--blue);font-weight:700;font-family:'Sometype Mono',monospace">Als Team</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted);font-family:'Sometype Mono',monospace">${d.asTeam.g} Spiele</span>
      </div>
      <div style="display:flex;height:7px;border-radius:99px;overflow:hidden;background:var(--line);margin-bottom:6px">
        <div style="width:${teamWr}%;background:var(--acid)"></div>
        <div style="width:${100-teamWr}%;background:var(--red);opacity:.85"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;font-family:'Sometype Mono',monospace;margin-bottom:11px">
        <span style="color:var(--acid);font-weight:700">${d.asTeam.w} Siege</span>
        <span style="font-weight:700">${teamWr}%</span>
        <span style="color:var(--red);font-weight:700">${d.asTeam.g-d.asTeam.w} Niederlagen</span>
      </div>
      <div style="display:flex;gap:7px">
        <div style="flex:1;background:var(--bg2);border-radius:9px;padding:8px;text-align:center">
          <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:14px;line-height:1">${teamGd}</div>
          <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px">Tordiff</div>
        </div>
        <div style="flex:1;background:var(--bg2);border-radius:9px;padding:8px;text-align:center">
          <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:14px;line-height:1;color:${teamEloCol}">${teamEloStr}</div>
          <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px">Σ Elo</div>
        </div>
        <button data-team="${esc([idA,idB].sort().join('|'))}" style="flex:1.2;background:rgba(86,180,232,.1);border:1px solid rgba(86,180,232,.3);border-radius:9px;padding:8px;color:var(--blue);font-family:'Sometype Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px">
          Team-Sheet
          <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>` : '';

  // ─── ALS-GEGNER BLOCK (aus Sicht idA) ───
  const oppBlock = d.asOppForA.g ? `
    <div style="background:var(--surface);border:1px solid rgba(167,139,250,.22);border-radius:14px;padding:14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="svg-ic" style="color:var(--purple);width:16px;height:16px">${svgI('swords')}</span>
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--purple);font-weight:700;font-family:'Sometype Mono',monospace">Als Gegner</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted);font-family:'Sometype Mono',monospace">${d.asOppForA.g} Spiele</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'Sometype Mono',monospace">
        <span style="color:var(--ink)">${esc(pA.name)}</span> vs <span style="color:var(--ink)">${esc(pB.name)}</span>
      </div>
      <div style="display:flex;height:7px;border-radius:99px;overflow:hidden;background:var(--line);margin-bottom:6px">
        <div style="width:${oppWr}%;background:var(--acid)"></div>
        <div style="width:${100-oppWr}%;background:var(--red);opacity:.85"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;font-family:'Sometype Mono',monospace;margin-bottom:11px">
        <span style="color:var(--acid);font-weight:700">${d.asOppForA.w}× gewonnen</span>
        <span style="font-weight:700">${oppWr}%</span>
        <span style="color:var(--red);font-weight:700">${d.asOppForA.g-d.asOppForA.w}× verloren</span>
      </div>
      <div style="display:flex;gap:7px">
        <div style="flex:1;background:var(--bg2);border-radius:9px;padding:8px;text-align:center">
          <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:14px;line-height:1">${oppGd}</div>
          <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px">Tordiff</div>
        </div>
        <div style="flex:1;background:var(--bg2);border-radius:9px;padding:8px;text-align:center">
          <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:14px;line-height:1;color:${oppEloCol}">${oppEloStr}</div>
          <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px">Elo (für ${esc(pA.name.split(' ')[0])})</div>
        </div>
      </div>
    </div>` : '';

  // ─── LETZTE BEGEGNUNGEN ───
  const lastRows = d.lastEncounters.map(enc => {
    const m = enc.m;
    const won = enc.wonForA;
    const isTeam = enc.type === 'team';
    const score = m.score_a + ':' + m.score_b;
    const typeChip = isTeam
      ? `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(86,180,232,.12);color:var(--blue);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 6px;border-radius:6px;font-family:'Sometype Mono',monospace">Team</span>`
      : `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(167,139,250,.12);color:var(--purple);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 6px;border-radius:6px;font-family:'Sometype Mono',monospace">Gegner</span>`;
    return `<div class="rrow" data-match="${esc(m.id)}" style="padding:10px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:24px;height:24px;border-radius:50%;background:${won?'rgba(190,242,100,.12)':'rgba(240,86,106,.12)'};color:${won?'var(--acid)':'var(--red)'};display:grid;place-items:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          ${won?'<polyline points="4,12 10,18 20,6"/>':'<path d="M6 6L18 18M6 18L18 6"/>'}
        </svg>
      </div>
      <div style="flex:1;min-width:0;display:flex;align-items:center;gap:7px">
        ${typeChip}
        <span class="num" style="font-size:10px;color:var(--muted)">${dateStr(m.created_at)}</span>
      </div>
      <div class="num" style="font-size:13px;font-weight:600;color:var(--ink);flex-shrink:0">${score}</div>
    </div>`;
  }).join('');

  const lastBlock = d.lastEncounters.length ? `
    <div style="margin-bottom:14px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Letzte Begegnungen</div>
      <div class="rlist">${lastRows}</div>
    </div>` : '';

  openSheet(`
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">Head-to-Head</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px">
        <div data-detail="${esc(pA.id)}" style="cursor:pointer">${avBig(pA)}</div>
        <span class="svg-ic" style="color:var(--muted);width:18px;height:18px">${svgI('swords')}</span>
        <div data-detail="${esc(pB.id)}" style="cursor:pointer">${avBig(pB)}</div>
      </div>
      <div style="font-family:'Archivo Black',sans-serif;font-size:18px;letter-spacing:-.02em;line-height:1.1;margin-top:12px">${esc(pA.name)} <span style="color:var(--muted);font-size:14px">vs</span> ${esc(pB.name)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px;font-family:'Sometype Mono',monospace">${d.total} ${d.total===1?'gemeinsame Begegnung':'gemeinsame Begegnungen'}</div>
    </div>

    ${teamBlock}
    ${oppBlock}
    ${lastBlock}
  `);

  // Sheet-Handler — analog zu showTeam
  const sheetEl = document.getElementById('sheet');
  if(sheetEl){
    sheetEl.querySelectorAll('[data-detail]').forEach(el=>{
      el.onclick=()=>{const pid=el.dataset.detail; sheetNav(()=>showPlayer(pid));};
    });
    sheetEl.querySelectorAll('[data-team]').forEach(el=>{
      el.onclick=()=>{const [a,b]=el.dataset.team.split('|'); if(a&&b){sheetNav(()=>showTeam(a,b));}};
    });
    sheetEl.querySelectorAll('[data-match]').forEach(el=>{
      el.onclick=()=>{const mid=el.dataset.match; sheetNav(()=>showMatchDetail(mid));};
    });
  }
}

// ╔═══ §9.3 ─── TEAM PROFIL SHEET ──────────────────────────────────────╗
//     Statistiken für ein konkretes Duo.
// ╚═════════════════════════════════════════════════════════════════════════╝
function showTeam(p1Id,p2Id){
  const pm=pmap();
  const pA=pm[p1Id], pB=pm[p2Id];
  if(!pA||!pB) return;
  _sheetSetReopen(()=>showTeam(p1Id,p2Id));
  const d=teamDetail(p1Id,p2Id);
  if(!d.games){
    openSheet(`
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">Team</div>
        <h3 style="margin-top:8px">${esc(pA.name)} &amp; ${esc(pB.name)}</h3>
      </div>
      ${emptyState('handshake','Noch keine gemeinsamen Spiele')}
    `);
    return;
  }

  const wr=Math.round(d.wr*100);
  const gdStr=(d.gd>=0?'+':'')+d.gd;
  const eloStr=(d.eloDelta>=0?'+':'')+d.eloDelta;
  const eloColor=d.eloDelta>=0?'var(--acid)':'var(--red)';

  // Großes Avatar je Spieler (64px)
  const avBig=(p)=>{
    const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
    if(em) return `<div style="width:64px;height:64px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:32px;border:2px solid var(--line2)">${em}</div>`;
    return `<div style="width:64px;height:64px;border-radius:50%;background:${avColor(p.id)};display:grid;place-items:center;font-size:22px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;border:2px solid var(--line2)">${esc(initials(p.name))}</div>`;
  };
  // Kleines Avatar (für Gegner-Rows, 30px)
  const avSm=(p,marginLeft)=>{
    if(!p) return '';
    const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
    const ml=marginLeft?'margin-left:-8px;':'';
    if(em) return `<div style="width:30px;height:30px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:14px;border:2px solid var(--surface);${ml}">${em}</div>`;
    return `<div style="width:30px;height:30px;border-radius:50%;background:${avColor(p.id)};display:grid;place-items:center;font-size:11px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;border:2px solid var(--surface);${ml}">${esc(initials(p.name))}</div>`;
  };

  // Gegnerspieler-Karte (einzelner Spieler)
  const oppRow=(opp,label,labelColor)=>{
    const op=pm[opp.oid]; if(!op) return '';
    return `<div style="margin-bottom:14px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">${label}</div>
      <div class="rrow" data-detail="${esc(op.id)}" style="padding:12px 14px">
        ${avSm(op,false)}
        <div class="rmid" style="margin-left:11px">
          <div class="rname" style="font-size:13px">${esc(op.name)}</div>
          <div class="rmeta"><span class="num">${opp.g} Begegnungen</span></div>
        </div>
        <div class="num" style="font-size:13px;font-weight:600;flex-shrink:0">
          <span style="color:var(--acid)">${opp.w}</span><span style="color:var(--faint)"> · </span><span style="color:var(--red)">${opp.g-opp.w}</span>
        </div>
      </div>
    </div>`;
  };

  // Highlight-Karte (höchster Sieg / Upset / schlimmste Niederlage)
  const highlightRow=(entry,kind)=>{
    if(!entry) return '';
    const m=entry.m;
    const onA=(m.a1===d.ids[0]&&m.a2===d.ids[1])||(m.a1===d.ids[1]&&m.a2===d.ids[0]);
    const oppIds=onA?[m.b1,m.b2]:[m.a1,m.a2];
    const o1=pm[oppIds[0]], o2=pm[oppIds[1]];
    const won=kind!=='loss';
    const meta = kind==='upset'
      ? `Erwartung ${Math.round(entry.expected*100)}%`
      : dateStr(m.created_at);
    const labelMap={
      win:    {l:'Höchster Sieg',     ic:'explosion', col:'var(--acid)'},
      upset:  {l:'Größter Upset',     ic:'tornado',   col:'var(--purple)'},
      loss:   {l:'Schlimmste Niederlage', ic:'skull',     col:'var(--red)'}
    };
    const cfg=labelMap[kind];
    return `<div class="rrow" data-match="${esc(m.id)}" style="padding:11px 13px;display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;border-radius:50%;background:var(--bg2);color:${cfg.col};display:grid;place-items:center;flex-shrink:0">
        <span class="ic svg-ic" style="font-size:16px">${svgI(cfg.ic)}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:${cfg.col};font-weight:700;text-transform:uppercase;letter-spacing:.08em;line-height:1">${cfg.l}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px" class="num">vs ${esc((o1?o1.name:'?')+' & '+(o2?o2.name:'?'))} · ${meta}</div>
      </div>
      <div class="num" style="font-size:14px;font-weight:700;color:${won?'var(--acid)':'var(--red)'};flex-shrink:0">${entry.score}</div>
    </div>`;
  };

  // ─── FORM-VERLAUF: Spark der kumulativen Team-Elo über alle Spiele ───
  // Nutzt sim.history.deltas (live Sim, gecached) statt m.deltas (kann stale sein),
  // damit der Endwert exakt zur angezeigten "Elo"-Statistik passt.
  let teamFormHtml = '';
  if(d.games >= 2){
    const histById = getHistoryByMatchId();
    let trace = 0;
    const series = [0];
    for(const mid of d.matchIdsChrono){
      const h = histById.get(mid);
      let dSum = 0;
      if(h && h.deltas){
        dSum = (h.deltas[d.ids[0]] || 0) + (h.deltas[d.ids[1]] || 0);
      } else {
        // Fallback: gespeicherte DB-Deltas, falls kein History-Eintrag
        const m = matches.find(x=>x.id===mid);
        if(m && m.deltas){
          dSum = (m.deltas[d.ids[0]] || 0) + (m.deltas[d.ids[1]] || 0);
        }
      }
      trace += dSum;
      series.push(trace);
    }
    const minE = Math.min(...series), maxE = Math.max(...series);
    const range = Math.max(20, maxE - minE);
    const W = 300, H = 56, pad = 6;
    const usableH = H - 2*pad;
    const points = series.map((e,i) => {
      const x = (i/(series.length-1))*W;
      const y = pad + (1 - (e-minE)/range)*usableH;
      return [x,y];
    });
    const linePath = 'M' + points.map(p => p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
    const fillPath = linePath + ` L${W},${H} L0,${H} Z`;
    const last = points[points.length-1];
    const net = Math.round(series[series.length-1] - series[0]);
    const netCls = net >= 0 ? 'pos' : 'neg';
    const netTxt = (net >= 0 ? '+' : '') + net;
    const lineCol = net >= 0 ? 'var(--acid)' : 'var(--red)';
    const gradId = 'tspark-' + d.ids.join('-');
    teamFormHtml = `
      <div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">Form-Verlauf</div>
          <div style="font-size:10px;color:var(--muted);font-family:'Sometype Mono',monospace;letter-spacing:.04em">${d.games} Spiele · alle Saisons</div>
        </div>
        <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">
          <defs>
            <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${lineCol}" stop-opacity=".35"/>
              <stop offset="100%" stop-color="${lineCol}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${fillPath}" fill="url(#${gradId})"/>
          <path d="${linePath}" fill="none" stroke="${lineCol}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="${lineCol}"/>
        </svg>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px;font-family:'Sometype Mono',monospace">
          <span style="font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase">Team-Elo</span>
          <span style="font-size:13px;font-weight:700;color:${lineCol}">${netTxt}</span>
        </div>
      </div>`;
  }

  // ─── AUFSTELLUNG: TYPISCH + (optional) BESTE ───
  // Wenn beide Aufstellungen je ≥2× vorkamen UND die beste Quote von der
  // typischen abweicht (in teamDetail.bestLineup gesetzt), zeigen wir beide
  // Karten nebeneinander. Sonst nur die typische wie bisher.
  const POS_LABEL = {atk:'Sturm', def:'Abwehr'};
  const POS_ICON  = {atk:svgI('bolt'), def:svgI('shield')};
  const POS_COLOR = {atk:'var(--orange)', def:'var(--blue)'};
  const POS_RING  = {atk:'rgba(255,120,73,.5)', def:'rgba(86,180,232,.5)'};
  const pA_pos = d.posStats[pA.id].dom;
  const pB_pos = d.posStats[pB.id].dom;
  const isSplit = d.games >= 2 && d.dominantCount === d.swapped; // 50/50

  const buildLineupCard = (label, sublabel, p0Pos, ringOverride) => {
    const ring = ringOverride || POS_RING[p0Pos];
    const opos = p0Pos==='atk' ? 'def' : 'atk';
    const buildSide = (player, pos) => {
      const em = player.avatar_id ? avatarEmoji(player.avatar_id) : null;
      const avInner = em
        ? `<div style="width:40px;height:40px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:20px;margin:0 auto 6px;border:2px solid ${ring}">${em}</div>`
        : `<div style="width:40px;height:40px;border-radius:50%;background:${avColor(player.id)};display:grid;place-items:center;font-size:14px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;margin:0 auto 6px;border:2px solid ${ring}">${esc(initials(player.name))}</div>`;
      return `<div style="flex:1;text-align:center;cursor:pointer" data-detail="${esc(player.id)}">
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:6px;color:${POS_COLOR[pos]}">
          <span class="svg-ic" style="width:11px;height:11px;display:inline-flex">${POS_ICON[pos]}</span>
          <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em">${POS_LABEL[pos]}</span>
        </div>
        ${avInner}
        <div style="font-size:11px;font-weight:600">${esc(player.name)}</div>
      </div>`;
    };
    return `<div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">${label}</div>
        <div style="font-size:9px;color:var(--ink2);font-family:'Sometype Mono',monospace;letter-spacing:.04em">${sublabel}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        ${buildSide(pA, p0Pos)}
        <span style="color:var(--muted);font-size:10px">vs</span>
        ${buildSide(pB, opos)}
      </div>
    </div>`;
  };

  let lineupHtml;

  if(d.bestLineup){
    // Zwei Karten nebeneinander: TYPISCH (Mehrheits) + BESTE (höhere Quote)
    // typGames/typWr aus teamDetail.bestLineup ableiten: bestLineup.p0 ist
    // die seltenere (=bessere) Pos, also die typische = die andere.
    const typGames = d.dominantCount;
    const typWr = Math.round(d.bestLineup.typicalWr * 100);
    const bestWr = Math.round(d.bestLineup.wr * 100);
    lineupHtml = `
      <div style="margin-bottom:18px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:10px;font-family:'Sometype Mono',monospace">Aufstellungs-Vergleich</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${buildLineupCard('Typisch', typGames+' Sp · '+typWr+'%', d.posStats[d.ids[0]].dom)}
          ${buildLineupCard('Beste Quote', d.bestLineup.games+' Sp · '+bestWr+'%', d.bestLineup.p0, 'rgba(247,207,74,.55)')}
        </div>
      </div>`;
  } else {
    // Single-Card: bestehende Logik (typische Aufstellung)
    const renderPlayerLineup = (player, pos) => {
      const em = player.avatar_id ? avatarEmoji(player.avatar_id) : null;
      const ring = isSplit ? 'var(--line2)' : POS_RING[pos];
      const avInner = em
        ? `<div style="width:48px;height:48px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:24px;margin:0 auto 8px;border:2px solid ${ring}">${em}</div>`
        : `<div style="width:48px;height:48px;border-radius:50%;background:${avColor(player.id)};display:grid;place-items:center;font-size:16px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;margin:0 auto 8px;border:2px solid ${ring}">${esc(initials(player.name))}</div>`;
      const posLabelStyle = isSplit ? 'color:var(--ink2)' : `color:${POS_COLOR[pos]}`;
      const posLabel = isSplit ? 'Wechselt' : POS_LABEL[pos];
      return `<div style="flex:1;text-align:center;cursor:pointer" data-detail="${esc(player.id)}">
        <div style="display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px;${posLabelStyle}">
          <span class="svg-ic" style="width:13px;height:13px;display:inline-flex">${POS_ICON[pos]}</span>
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em">${posLabel}</span>
        </div>
        ${avInner}
        <div style="font-size:13px;font-weight:600">${esc(player.name)}</div>
      </div>`;
    };
    const lineupFooter = d.games >= 2 ? `
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-family:'Sometype Mono',monospace;font-size:10.5px">
        <span style="color:var(--ink2)">In <span style="color:var(--ink);font-weight:700">${d.dominantCount} / ${d.games}</span> Spielen</span>
        <span style="color:var(--ink2)"><span style="color:var(--muted)">⇄</span> ${d.swapped}× getauscht</span>
      </div>` : '';
    lineupHtml = `
      <div style="margin-bottom:18px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:12px;font-family:'Sometype Mono',monospace">Typische Aufstellung</div>
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 14px 12px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
            ${renderPlayerLineup(pA, d.posStats[pA.id].dom)}
            <div style="display:flex;flex-direction:column;align-items:center;color:var(--muted);font-size:11px">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/><polyline points="12,5 5,12 12,19"/></svg>
            </div>
            ${renderPlayerLineup(pB, d.posStats[pB.id].dom)}
          </div>
          ${lineupFooter}
        </div>
      </div>`;
  }

  // ─── TEAM-AWARDS (Lifetime — alle Saisons) ───
  // Spiegel des Spieler-Awards-Konzepts: zeigt die Top-3-Platzierungen des
  // Duos in der saison-übergreifenden awardRankings('all')-Liste.
  const TEAM_AW_IC = {
    mvt:'handshake', bestDuo:'duo', worstTeam:'crashTeam',
    zirkus:'circus', baustelle:'construction', unstoppable:'unstoppable',
    concreteWall:'concreteWall', cheesePlatter:'cheese', luckyCharm:'clover',
    giantSlayer:'giantSlayer', favoritenschreck:'devilMask', rivalry:'crossedSwords'
  };
  const tAch = teamAchievements(p1Id, p2Id);
  const RANK_LABEL = ['#1','#2','#3'];
  const teamAwardsHtml = tAch.length ? `
    <div style="margin-bottom:18px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Auszeichnungen als Team</div>
      <div class="pp-awards" style="grid-template-columns:repeat(3,1fr)">
        ${tAch.map(a => {
          const meta = AWARD_META[a.key]; if(!meta) return '';
          const icKey = TEAM_AW_IC[a.key] || 'trophy';
          // Farb-Klasse aus AWARD_META, Wertanzeige in Farbe
          const colorMap = {acid:'var(--acid)', blue:'var(--blue)', gold:'var(--gold)', orange:'var(--orange)', purple:'var(--purple)', red:'var(--red)'};
          const col = colorMap[meta.cls] || 'var(--ink)';
          return `<div class="pp-aw" data-team-award="${esc(a.key)}" style="border-top:2px solid ${col}">
            <span class="ic svg-ic" style="color:${col}">${svgI(icKey)}</span>
            <div class="nm">${esc(meta.title)}</div>
            <div class="num" style="color:${col};font-size:11px">${esc(a.val)}</div>
            <div style="font-size:8.5px;color:var(--muted);margin-top:2px;font-family:'Sometype Mono',monospace">${RANK_LABEL[a.rank]||''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // ─── STREAKS (aktuelle + längste) ───
  // Verzichten auf Last-N-Dots wie im Spieler-Profil — hier ist die reine
  // Zahlen-Anzeige übersichtlicher (Form-Spark daneben deckt die Verlaufs-
  // Visualisierung schon ab).
  let streaksHtml = '';
  if(d.games >= 2){
    const curLabel = d.currentStreak === 0 ? '–'
      : d.currentStreak > 0 ? d.currentStreak+' Siege'
      : (-d.currentStreak)+' Niederl.';
    const curColor = d.currentStreak > 0 ? 'var(--acid)' : (d.currentStreak < 0 ? 'var(--red)' : 'var(--muted)');
    streaksHtml = `
      <div style="margin-bottom:18px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Serien</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
            <div style="font-family:'Archivo Black',sans-serif;font-size:16px;color:${curColor};line-height:1">${curLabel}</div>
            <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Aktuell</div>
          </div>
          <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
            <div style="font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--acid);line-height:1">${d.longestWinStreak||'–'}</div>
            <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Längste Sieges</div>
          </div>
          <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
            <div style="font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--red);line-height:1">${d.longestLossStreak||'–'}</div>
            <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Längste Pleiten</div>
          </div>
        </div>
      </div>`;
  }

  // ─── LIGA-TITEL (Team of the Season) ───
  const titlesHtml = d.seasonTitles.length ? `
    <div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">Liga-Titel</div>
        <div style="font-size:10px;color:var(--muted);font-family:'Sometype Mono',monospace">${d.seasonTitles.length} ${d.seasonTitles.length===1?'Titel':'Titel'}</div>
      </div>
      <div class="pp-trophies" style="margin:0 -16px;padding:4px 16px">
        ${d.seasonTitles.map(t => `<div class="pp-tr team">
          <span class="ic svg-ic">${svgI('handshake')}</span>
          <div class="ti">Team of<br>the Season</div>
          <div class="su">${esc(t.label)}</div>
        </div>`).join('')}
      </div>
    </div>` : '';

  // ─── FUN FACTS ───
  // Selektion: Tore/Spiel, Gegentore/Spiel, Zu-Null-Siege, ggf. Lieblings-Score.
  // Bewusst kompakt — vier 1/2-Spalten-Cards (oder 1/3 wenn topScore vorhanden).
  let funFactsHtml = '';
  if(d.games >= 2){
    const avgGf = (d.gf / d.games).toFixed(1);
    const avgGa = (d.ga / d.games).toFixed(1);
    const facts = [
      { label:'Ø Tore', value:avgGf, color:'var(--acid)' },
      { label:'Ø Gegen', value:avgGa, color:'var(--red)' },
    ];
    if(d.shutouts > 0) facts.push({ label:'Zu Null', value:d.shutouts+'×', color:'var(--blue)' });
    if(d.perfectWins > 0) facts.push({ label:'10:0', value:d.perfectWins+'×', color:'var(--gold)' });
    if(d.topScore) facts.push({ label:'Top-Stand', value:d.topScore, color:'var(--purple)', sub:d.topScoreCount+'×' });
    const cols = facts.length >= 4 ? 'repeat(4,1fr)' : 'repeat('+facts.length+',1fr)';
    funFactsHtml = `
      <div style="margin-bottom:18px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Fun Facts</div>
        <div style="display:grid;grid-template-columns:${cols};gap:8px">
          ${facts.map(f => `<div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center">
            <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:15px;color:${f.color};line-height:1">${f.value}</div>
            <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px">${f.label}</div>
            ${f.sub?`<div style="font-size:8px;color:var(--muted);margin-top:2px;font-family:'Sometype Mono',monospace">${f.sub}</div>`:''}
          </div>`).join('')}
        </div>
      </div>`;
  }

  const highlights=[
    highlightRow(d.biggestWin,'win'),
    highlightRow(d.biggestUpset,'upset'),
    highlightRow(d.biggestLoss,'loss')
  ].filter(Boolean).join('');

  // Letzte 10 Matches (vorher 5) — slice in teamDetail bereits auf 10 erweitert
  const recentRows=d.recent.map(r=>{
    const m=r.m;
    const oppIds=r.onA?[m.b1,m.b2]:[m.a1,m.a2];
    const o1=pm[oppIds[0]], o2=pm[oppIds[1]];
    const won=r.won;
    return `<div class="rrow" data-match="${esc(m.id)}" style="padding:10px 13px;display:flex;align-items:center;gap:10px">
      <div style="width:24px;height:24px;border-radius:50%;background:${won?'rgba(190,242,100,.12)':'rgba(240,86,106,.12)'};color:${won?'var(--acid)':'var(--red)'};display:grid;place-items:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          ${won?'<polyline points="4,12 10,18 20,6"/>':'<path d="M6 6L18 18M6 18L18 6"/>'}
        </svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;line-height:1.2">vs <span style="color:var(--ink2)">${esc((o1?o1.name:'?')+' & '+(o2?o2.name:'?'))}</span></div>
        <div class="num" style="font-size:10px;color:var(--muted);margin-top:2px">${dateStr(m.created_at)}</div>
      </div>
      <div class="num" style="font-size:13px;font-weight:600;color:var(--ink);flex-shrink:0">${m.score_a} : ${m.score_b}</div>
    </div>`;
  }).join('');

  openSheet(`
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">Team</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px">
        <div data-detail="${esc(pA.id)}" style="cursor:pointer">${avBig(pA)}</div>
        <div style="font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--muted)">&amp;</div>
        <div data-detail="${esc(pB.id)}" style="cursor:pointer">${avBig(pB)}</div>
      </div>
      <div style="font-family:'Archivo Black',sans-serif;font-size:20px;letter-spacing:-.02em;line-height:1.1;margin-top:14px">${esc(pA.name)} &amp; ${esc(pB.name)}</div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:18px">
      <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
        <div style="font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--ink);line-height:1">${d.games}</div>
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Spiele</div>
      </div>
      <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
        <div style="font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--acid);line-height:1">${wr}%</div>
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Quote</div>
      </div>
      <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
        <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--ink);line-height:1">${gdStr}</div>
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Tordiff</div>
      </div>
      <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
        <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:18px;color:${eloColor};line-height:1">${eloStr}</div>
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Elo</div>
      </div>
    </div>

    <div style="margin-bottom:18px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Bilanz</div>
      <div style="display:flex;height:8px;border-radius:99px;overflow:hidden;background:var(--line)">
        <div style="width:${d.games?(d.wins/d.games*100):0}%;background:var(--acid)"></div>
        <div style="width:${d.games?(d.losses/d.games*100):0}%;background:var(--red)"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px" class="num">
        <span style="color:var(--acid)">${d.wins} Siege</span>
        <span style="color:var(--red)">${d.losses} Niederlagen</span>
      </div>
    </div>

    ${teamAwardsHtml}
    ${streaksHtml}
    ${titlesHtml}
    ${teamFormHtml}
    ${lineupHtml}
    ${funFactsHtml}

    ${d.nemesis?oppRow(d.nemesis,'Erzgegner'):''}
    ${d.favorite?oppRow(d.favorite,'Lieblingsgegner'):''}

    ${highlights?`
    <div style="margin-bottom:18px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Highlights</div>
      <div style="display:flex;flex-direction:column;gap:6px">${highlights}</div>
    </div>`:''}

    ${recentRows?`
    <div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Letzte ${Math.min(10,d.recent.length)} Spiele</div>
      <div style="display:flex;flex-direction:column;gap:6px">${recentRows}</div>
    </div>`:''}
  `);

  // Innerhalb des Sheets klickbar machen
  const sheetEl=document.getElementById('sheet');
  if(sheetEl){
    sheetEl.querySelectorAll('[data-detail]').forEach(el=>{
      el.onclick=()=>{const pid=el.dataset.detail; sheetNav(()=>showPlayer(pid));};
    });
    sheetEl.querySelectorAll('[data-match]').forEach(el=>{
      el.onclick=()=>{const mid=el.dataset.match; sheetNav(()=>showMatchDetail(mid));};
    });
    // Team-Award-Chips: Klick öffnet Award-Detail-Sheet
    sheetEl.querySelectorAll('[data-team-award]').forEach(el=>{
      el.onclick=()=>{const key=el.dataset.teamAward; sheetNav(()=>{ awPeriod='all'; awSeasonId=null; showAward(key); });};
    });
  }
}

function showMatchDetail(mid){
  const m=matches.find(x=>x.id===mid);if(!m)return;
  _sheetSetReopen(()=>showMatchDetail(mid));
  // DB-First: Delta-Anzeige immer aus m.deltas (Wahrheitsquelle).
  // matchBreakdown() bleibt für Slider-Detail-Komponenten verfügbar.
  const line=(id,pos)=>{
    const d=(m.deltas||{})[id]||0;
    return `<div class="delta-row"><span class="dn">${esc(pname(id))} <span class="chip ${pos}">${pos==='atk'?'STU':'ABW'}</span></span><span class="delta-v ${d>=0?'pos':'neg'}">${d>=0?'+':''}${Math.round(d)}</span></div>`;
  };
  // Auszeichnungen durch dieses Match
  const earned=badgesEarnedInMatch(mid);
  const earnedHtml=earned.length?`
    <div class="mini-label" style="margin-top:14px">Auszeichnungen in diesem Match</div>
    <div style="display:flex;flex-direction:column;gap:5px">
      ${earned.map(e=>{
        // Rarity-Farbe pro Badge: legendary=gold, rare=purple, common=acid, negative=red.
        // Bewusst dezent — nur Icon + Border-Akzent + Badge-Name in der Farbe,
        // damit die Liste auseinanderhaltbar bleibt, aber nicht überladen wirkt.
        const rarity = rarityOf(e.badge.id);
        const color = (RARITY_META[rarity]||{}).color || 'var(--ink2)';
