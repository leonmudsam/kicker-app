  luckyCharm:  {title:'Glückspilze',           cls:'acid',  why:'Team mit dem höchsten Anteil knapper Siege (1 Tor Vorsprung) an den gemeinsamen Spielen. Min. 10 Team-Spiele.'},
  giantSlayer: {title:'Giant Slayer',          cls:'orange',why:'Team mit der höchsten Erfolgsquote als Underdog (Quote: Siege gegen stärkeres Team / Spiele gegen ein stärkeres Team). Min. 5 Underdog-Matches.'},
  favoritenschreck:{title:'Favoritenschreck',  cls:'red',   why:'Größter Team-Elo-Unterschied, der durch einen Sieg überwunden wurde.'},
  rivalry:     {title:'Erzfeinde',             cls:'purple',why:'Team-Paar mit dem höchsten Anteil direkter Duelle an der gemeinsamen Match-Aktivität. Min. 3 Duelle, beide Teams min. 5 Spiele.'},
  // ── NEUE NEGATIV-AWARDS v6 ──
  cheesePlatter:{title:'Käseteller',           cls:'red',   why:'Team mit dem höchsten Gegentor-Schnitt pro Spiel. Min. 10 gemeinsame Spiele.'},
  favoriteLoser:{title:'Favoriten-Versager',   cls:'red',   why:'Höchste Niederlagen-Quote in Favoriten-Rollen (Siegerwartung ≥ 65 %). Min. 5 Favoriten-Matches.'}
};
function showAward(key){
  const R=awardRankings(awPeriod); const pl=awPeriodLabel(); const meta=AWARD_META[key]; if(!meta)return;
  _sheetSetReopen(()=>showAward(key));
  const tn=ids=>ids.map(pname).join(' & ');
  // ⚑ HOTSPOT — Spiegel von AW_IC aus §5.3 (vAwards). Bei neuen Awards HIER
  //  und in den anderen 2 AW_IC-Definitionen gleichzeitig erweitern.
  const AW_IC = {
    wins:'trophyStar',     onFire:'flame',       perfect:'star',          streaks:'flameTriple',
    showmaster:'award',    mvt:'handshake',      bestDuo:'duo',           scorer:'ball',
    wall:'shieldCheck',    ice:'snowflake',      endgegner:'skull',       clutch:'target',
    carryKing:'weight',    solo:'lonewolf',      upset:'surprise',        biggest:'explosion',
    grinder:'gamepad',     worstWr:'ghost',      coldStreak:'iceCube',    lossStreaks:'trendCrash',
    formtief:'meltDown',   worstAtk:'blockedShot',worstDef:'hole',        worstTeam:'brokenHeart',
    zirkus:'circus',       baustelle:'cone',     peakElo:'peak',
    weekKing:'weekKing',   dayKing:'dayKing',
    plusMinus:'plusMinus', underdog:'underdog',  pechvogel:'rainCloud',
    // ── NEUE TEAM-AWARDS v4 ──
    unstoppable:'unstoppable', concreteWall:'concreteWall', luckyCharm:'clover',
    giantSlayer:'giantSlayer', favoritenschreck:'devilMask', rivalry:'crossedSwords',
    // ── NEUE NEGATIV-AWARDS v6 ──
    cheesePlatter:'cheese', favoriteLoser:'crownFallen'
  };

  // ── NEUE TEAM-AWARDS v4 ──
  // favoritenschreck verhält sich wie ein Match-Award (zeigt ein konkretes Spiel),
  // gewinner/verlierer sind aber TEAMS — daher haben wir ein eigenes Layout unten.
  // rivalry ist ein 4-Spieler-Award mit Sonderlayout (Team A vs Team B).
  const MATCH_AWARDS = new Set(['upset','biggest']);
  const TEAM_AWARDS = new Set([
    'mvt','bestDuo','endgegner','worstTeam','zirkus','baustelle',
    'unstoppable','concreteWall','luckyCharm','giantSlayer',
    // ── NEUE NEGATIV-AWARDS v6 ──
    'cheesePlatter'
  ]);
  const RIVALRY_AWARDS = new Set(['rivalry']);
  const FAVS_AWARDS = new Set(['favoritenschreck']);
  const NEG_KEYS = new Set(['worstWr','worstAtk','worstDef','worstTeam','formtief','coldStreak','lossStreaks','zirkus','baustelle','pechvogel','favoritenschreck','cheesePlatter','favoriteLoser']);

  let bodyHtml='';

  if(MATCH_AWARDS.has(key)){
    const arr = key==='upset' ? R.upsets : R.biggest;
    if(arr&&arr.length){
      const top = arr[0];
      const m = top.m;
      const winnerSide = m.winner;
      const isUpsetVariant = key==='upset';
      const upsetWinPct = isUpsetVariant ? Math.round((1-top.sp)*100) : null;
      const diffStr = key==='biggest' ? '+'+top.diff+' Tore' : 'Siegchance nur '+upsetWinPct+'%';
      bodyHtml = `
        <div class="aw-match${isUpsetVariant?' upset':''}">
          <div class="aw-match-score">${m.score_a} : ${m.score_b}</div>
          <div class="aw-match-meta">${dateStr(m.created_at)} · ${diffStr}</div>
          <div class="aw-match-teams">
            <div class="aw-match-team">
              ${winnerSide==='A'?'<div class="aw-match-winner">Gewinner</div>':''}
              ${awMiniPair(m.a1,m.a2)}
              <div class="aw-match-team-name">${esc(pname(m.a1)+' & '+pname(m.a2))}</div>
            </div>
            <div class="aw-match-vs">vs</div>
            <div class="aw-match-team">
              ${winnerSide==='B'?'<div class="aw-match-winner">Gewinner</div>':''}
              ${awMiniPair(m.b1,m.b2)}
              <div class="aw-match-team-name">${esc(pname(m.b1)+' & '+pname(m.b2))}</div>
            </div>
          </div>
        </div>`;
    } else {
      bodyHtml = `<div class="empty" style="margin-top:24px">Keine Daten</div>`;
    }
  } else if(FAVS_AWARDS.has(key)){
    // Favoritenschreck: Match-Detail aus dem Top-Eintrag der Liste rendern.
    // Wie biggest/upset zeigen wir das konkrete Spiel mit Score + Teams. Zusätzlich
    // wird die überwundene Team-Elo-Differenz oben prominent dargestellt.
    const arr = R.favoritenschreckList;
    if(arr && arr.length){
      const top = arr[0];
      const m = top.m;
      const winnerSide = m.winner;
      bodyHtml = `
        <div class="aw-match upset">
          <div class="aw-match-score">${m.score_a} : ${m.score_b}</div>
          <div class="aw-match-meta">${dateStr(m.created_at)} · ${top.v} Elo überwunden</div>
          <div class="aw-match-teams">
            <div class="aw-match-team">
              ${winnerSide==='A'?'<div class="aw-match-winner">Sieger</div>':''}
              ${awMiniPair(m.a1,m.a2)}
              <div class="aw-match-team-name">${esc(pname(m.a1)+' & '+pname(m.a2))}</div>
            </div>
            <div class="aw-match-vs">vs</div>
            <div class="aw-match-team">
              ${winnerSide==='B'?'<div class="aw-match-winner">Sieger</div>':''}
              ${awMiniPair(m.b1,m.b2)}
              <div class="aw-match-team-name">${esc(pname(m.b1)+' & '+pname(m.b2))}</div>
            </div>
          </div>
        </div>`;
      // Weitere Plätze als kompakte Liste — andere Teams mit ihren best-Coups
      if(arr.length > 1){
        const rest = arr.slice(1, 7);
        const items = rest.map((e, idx) => {
          const teamName = pname(e.ids[0]) + ' & ' + pname(e.ids[1]);
          return `<div class="aw-li" data-li-team="${esc(e.ids.slice().sort().join('|'))}">
            <div class="aw-li-rank">${idx+2}.</div>
            ${awLiPair(e.ids[0], e.ids[1])}
            <div class="aw-li-info"><div class="aw-li-name">${esc(teamName)}</div></div>
            <div class="aw-li-val">${e.v} Elo</div>
          </div>`;
        }).join('');
        bodyHtml += `<div class="aw-list-label">Weitere Coups</div><div class="aw-list">${items}</div>`;
      }
    } else {
      bodyHtml = `<div class="empty" style="margin-top:24px">Keine Daten</div>`;
    }
  } else if(RIVALRY_AWARDS.has(key)){
    // Erzfeinde: Team-Paar mit zwei Bilanz-Boxen (Team A | Team B) + Torverhältnis.
    const arr = R.rivalryList;
    if(arr && arr.length){
      const top = arr[0];
      const teamAName = pname(top.idsA[0]) + ' & ' + pname(top.idsA[1]);
      const teamBName = pname(top.idsB[0]) + ' & ' + pname(top.idsB[1]);
      const aLeading = top.wA > top.wB;
      const bLeading = top.wB > top.wA;
      bodyHtml = `
        <div class="aw-match">
          <div class="aw-match-score">${Math.round(top.pct*100)}%</div>
          <div class="aw-match-meta">${top.g} direkte Duelle · ${top.gfA}:${top.gfB} Tore gesamt</div>
          <div class="aw-match-teams">
            <div class="aw-match-team" data-li-team="${esc(top.idsA.slice().sort().join('|'))}" style="cursor:pointer">
              ${aLeading?'<div class="aw-match-winner">Führt</div>':''}
              ${awMiniPair(top.idsA[0],top.idsA[1])}
              <div class="aw-match-team-name">${esc(teamAName)}</div>
              <div class="aw-match-team-name" style="margin-top:4px;font-family:'Sometype Mono',monospace;font-size:10px;color:var(--muted)">${top.wA} S · ${top.gA} Sp.</div>
            </div>
            <div class="aw-match-vs">vs</div>
            <div class="aw-match-team" data-li-team="${esc(top.idsB.slice().sort().join('|'))}" style="cursor:pointer">
              ${bLeading?'<div class="aw-match-winner">Führt</div>':''}
              ${awMiniPair(top.idsB[0],top.idsB[1])}
              <div class="aw-match-team-name">${esc(teamBName)}</div>
              <div class="aw-match-team-name" style="margin-top:4px;font-family:'Sometype Mono',monospace;font-size:10px;color:var(--muted)">${top.wB} S · ${top.gB} Sp.</div>
            </div>
          </div>
        </div>`;
      // Weitere Rivalitäten
      if(arr.length > 1){
        const rest = arr.slice(1, 7);
        const items = rest.map((e, idx) => {
          const aN = pname(e.idsA[0]) + ' & ' + pname(e.idsA[1]);
          const bN = pname(e.idsB[0]) + ' & ' + pname(e.idsB[1]);
          return `<div class="aw-li">
            <div class="aw-li-rank">${idx+2}.</div>
            <div class="aw-li-info" style="min-width:0">
              <div class="aw-li-name" style="font-size:12px">${esc(aN)}</div>
              <div class="aw-li-name" style="font-size:9.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px">vs ${esc(bN)}</div>
            </div>
            <div class="aw-li-val">${Math.round(e.pct*100)}% · ${e.g}×</div>
          </div>`;
        }).join('');
        bodyHtml += `<div class="aw-list-label">Weitere Rivalitäten</div><div class="aw-list">${items}</div>`;
      }
    } else {
      bodyHtml = `<div class="empty" style="margin-top:24px">Keine Daten</div>`;
    }
  } else {
    const arr = (() => {
      switch(key){
        case 'wins':       return R.winsList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Siege',sort:x.v}));
        case 'mvt':        return R.mvt.map(x=>({ids:x.ids,name:tn(x.ids),val:(x.v>=0?'+':'')+Math.round(x.v)+' Elo',sort:Math.round(x.v)}));
        case 'streaks':    return R.streaks.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'scorer':     return R.scorer.map(x=>({ids:[x.id],name:pname(x.id),val:'Ø '+x.avg.toFixed(1)+' Tore',sort:Math.round(x.avg*10)}));
        case 'wall':       return R.wall.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' /Sp.',sort:-Math.round(x.v/x.g*10)}));
        case 'perfect':    return R.perfect.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'grinder':    return R.grinder.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Spiele',sort:x.v}));
        case 'worstWr':    return R.worstWr.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:-Math.round(x.wr*100)}));
        case 'worstAtk':   return R.worstAtk.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' Tore/Sp.',sort:-Math.round(x.v/x.g*10)}));
        case 'worstDef':   return R.worstDef.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' Gegen/Sp.',sort:Math.round(x.v/x.g*10)}));
        case 'endgegner':  return R.endgegner.map(x=>({ids:x.ids,name:tn(x.ids),val:Math.round(x.pct*100)+'% ('+x.g+'×)',sort:Math.round(x.pct*1000)}));
        case 'clutch':     return R.clutchList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'ice':        return R.iceList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× Zu-Null',sort:x.v}));
        case 'worstTeam':  return R.worstTeam.map(x=>({ids:x.ids,name:tn(x.ids),val:Math.round(x.w/x.g*100)+'%',sort:-Math.round(x.w/x.g*100)}));
        case 'bestDuo':    return R.bestDuo.map(x=>({ids:x.ids,name:tn(x.ids),val:x.g+' Spiele',sort:x.g}));
        case 'onFire':     return R.onFire.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'coldStreak': return R.coldStreak.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Niederlagen',sort:x.v}));
        case 'lossStreaks':return R.lossStreaks.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'carryKing':  return R.carryList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Carries',sort:x.v}));
        case 'showmaster': return R.showmasterList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× 10:0',sort:x.v}));
        case 'solo':       return R.soloList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'formtief':   return R.formtief.map(x=>({ids:[x.id],name:pname(x.id),val:'-'+Math.round(x.drop)+' Elo',sort:Math.round(x.drop)}));
        case 'zirkus':     return R.zirkusList.map(x=>({ids:x.ids,name:tn(x.ids),val:Math.round(x.pct*100)+'% ('+x.v+'/'+x.g+')',sort:Math.round(x.pct*1000)}));
        case 'baustelle':  return R.baustelleList.map(x=>({ids:x.ids,name:tn(x.ids),val:x.best+'er Serie',sort:x.best}));
        case 'peakElo':    return (R.peakEloList||[]).map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Elo',sort:x.v}));
        case 'weekKing':   return (R.weekKingList||[]).map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× POTW',sort:x.v}));
        case 'dayKing':    return (R.dayKingList||[]).map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× POTD',sort:x.v}));
        // ── NEUE AWARDS v3 ──
        case 'plusMinus':  return R.plusMinusList.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v>=0?'+':'')+x.v.toFixed(1)+' /Sp.',sort:Math.round(x.v*10)}));
        case 'underdog':   return R.underdogList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× Underdog-Sieg',sort:x.v}));
        case 'pechvogel':  return R.pechvogelList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.pct*100)+'% knapp verloren ('+x.v+'/'+x.g+')',sort:Math.round(x.pct*1000)}));
        // ── NEUE TEAM-AWARDS v4 ──
        case 'unstoppable':  return R.unstoppableList.map(x=>({ids:x.ids,name:tn(x.ids),val:x.v+' Siege in Folge',sort:x.v}));
        case 'concreteWall': return R.concreteWallList.map(x=>({ids:x.ids,name:tn(x.ids),val:x.v.toFixed(2)+' Gegentore/Sp.',sort:-Math.round(x.v*100)}));
        case 'luckyCharm':   return R.luckyCharmList.map(x=>({ids:x.ids,name:tn(x.ids),val:Math.round(x.v*100)+'% ('+x.wins+'/'+x.games+')',sort:Math.round(x.v*1000)}));
        case 'giantSlayer':  return R.giantSlayerList.map(x=>({ids:x.ids,name:tn(x.ids),val:Math.round(x.v*100)+'% ('+x.wins+'/'+x.games+')',sort:Math.round(x.v*1000)}));
        // ── NEUE NEGATIV-AWARDS v6 ──
        case 'cheesePlatter': return R.cheesePlatterList.map(x=>({ids:x.ids,name:tn(x.ids),val:x.v.toFixed(2)+' Gegentore/Sp.',sort:Math.round(x.v*100)}));
        case 'favoriteLoser': return R.favoriteLoserList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.v*100)+'% ('+x.losses+'/'+x.games+')',sort:Math.round(x.v*1000)}));
        default: return [];
      }
    })();

    // Hero (#1) + Liste der weiteren Plätze
    if(!arr.length){
      bodyHtml = `<div class="empty" style="margin-top:24px">Keine Daten</div>`;
    } else {
      const isTeamAward = TEAM_AWARDS.has(key);
      const isNeg = NEG_KEYS.has(key);
      // meta.cls → RGB für Hero-Akzentfarbe
      const CLS_RGB = {gold:'247,207,74',acid:'190,242,100',blue:'86,180,232',orange:'255,120,73',purple:'167,139,250',red:'240,86,106'};
      const heroRgb = CLS_RGB[meta.cls] || CLS_RGB.gold;

      // ─── Hero (#1) – alle bei sort=arr[0].sort sind geteilte #1 ───
      const topGroup = arr.filter(x => x.sort === arr[0].sort);
      const isShared = topGroup.length > 1;
      const top = arr[0];
      // Wert (für Hero – alle teilen denselben Wert)
      const heroVal = (() => {
        const v = top.val;
        const m = v.match(/^([+\-]?\d+(?:[.,]\d+)?)/);
        return m ? `<b>${esc(m[1])}</b>${esc(v.slice(m[1].length))}` : esc(v);
      })();

      let heroHtml;
      if(!isShared){
        // ─── Single Hero (#1) ───
        const heroClick = isTeamAward
          ? `data-li-team="${esc(top.ids.slice().sort().join('|'))}"`
          : `data-li-player="${esc(top.ids[0])}"`;
        const heroAv = isTeamAward ? awHeroPair(top.ids[0], top.ids[1]) : awHeroAv(top.ids[0]);
        const heroMarker = isNeg
          ? `<div class="aw-winner-marker"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.skull}</svg></div>`
          : `<div class="aw-winner-crown">${svgI('crown')}</div>`;
        const heroBadge = isNeg
          ? `<span class="aw-winner-badge">Schandfleck · #1</span>`
          : `<span class="aw-winner-badge"><svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0z"/></svg> Best · #1</span>`;

        heroHtml = `
          <div class="aw-winner ${isNeg?'shame':''}" style="--c:${heroRgb}" ${heroClick}>
            ${heroBadge}
            <div class="aw-winner-av-wrap">
              ${heroMarker}
              ${heroAv}
            </div>
            <div class="aw-winner-name">${esc(top.name)}</div>
            <div class="aw-winner-val">${heroVal}</div>
          </div>`;
      } else {
        // ─── Shared Hero: mehrere Spieler/Teams teilen sich #1 ───
        const sharedBadge = isNeg
          ? `<span class="aw-winner-badge">Geteilt · #1 · ${topGroup.length} ${isTeamAward?'Teams':'Sünder'}</span>`
          : `<span class="aw-winner-badge"><svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0z"/></svg> Geteilt · #1 · ${topGroup.length} ${isTeamAward?'Teams':'Spieler'}</span>`;
        const sharedMarker = isNeg
          ? `<div class="aw-winner-shared-marker shame"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.skull}</svg></div>`
          : `<div class="aw-winner-shared-marker">${svgI('crown')}</div>`;
        const entries = topGroup.map(e => {
          const av = isTeamAward
            ? `<div class="aw-winner-tied-pair">${awLiAv(e.ids[0])}${awLiAv(e.ids[1])}</div>`
            : awLiAv(e.ids[0]);
          const click = isTeamAward
            ? `data-li-team="${esc(e.ids.slice().sort().join('|'))}"`
            : `data-li-player="${esc(e.ids[0])}"`;
          return `<div class="aw-winner-tied-entry" ${click}>
            ${av}
            <div class="aw-winner-tied-name">${esc(e.name)}</div>
          </div>`;
        }).join('');

        heroHtml = `
          <div class="aw-winner shared ${isNeg?'shame':''}" style="--c:${heroRgb}">
            ${sharedBadge}
            ${sharedMarker}
            <div class="aw-winner-shared-grid">${entries}</div>
            <div class="aw-winner-val">${heroVal}</div>
          </div>`;
      }

      // ─── Liste (Plätze ab nach allen #1-Geteilten) ───
      // Olympische Ränge: Position des ersten Eintrags mit gleichem sort + 1
      const rankOf = (i) => {
        for(let j=0; j<=i; j++) if(arr[j].sort === arr[i].sort) return j+1;
        return i+1;
      };
      const MAX_LIST = 6;
      const byRank = {};
      const orderRanks = [];
      // Bei geteiltem #1 starten wir die Liste hinter allen geteilten Plätzen
      const listStart = topGroup.length;
      for(let i=listStart; i<arr.length; i++){
        const rk = rankOf(i);
        if(!byRank[rk]){ byRank[rk] = []; orderRanks.push(rk); }
        byRank[rk].push(arr[i]);
        if(Object.values(byRank).reduce((a,b)=>a+b.length,0) >= MAX_LIST) break;
      }

      const listItems = [];
      const shameCls = isNeg ? 'shame' : '';
      for(const rk of orderRanks){
        const entries = byRank[rk];
        if(entries.length === 1){
          const e = entries[0];
          const avHtml = isTeamAward ? awLiPair(e.ids[0],e.ids[1]) : awLiAv(e.ids[0]);
          const clickAttr = isTeamAward
            ? `data-li-team="${esc(e.ids.slice().sort().join('|'))}"`
            : `data-li-player="${esc(e.ids[0])}"`;
          listItems.push(`
            <div class="aw-li ${shameCls}" ${clickAttr}>
              <div class="aw-li-rank">${rk}.</div>
              ${avHtml}
              <div class="aw-li-info">
                <div class="aw-li-name">${esc(e.name)}</div>
              </div>
              <div class="aw-li-val">${esc(e.val)}</div>
            </div>
          `);
        } else {
          const tiedRows = entries.map(e => {
            const avHtml = isTeamAward ? awLiPair(e.ids[0],e.ids[1],true) : awLiAv(e.ids[0],true);
            const clickAttr = isTeamAward
              ? `data-li-team="${esc(e.ids.slice().sort().join('|'))}"`
              : `data-li-player="${esc(e.ids[0])}"`;
            return `
              <div class="aw-li-tied-row" ${clickAttr}>
                ${avHtml}
                <div class="aw-li-info">
                  <div class="aw-li-name">${esc(e.name)}</div>
                </div>
              </div>`;
          }).join('');
          listItems.push(`
            <div class="aw-li tied ${shameCls}">
              <div class="aw-li-rank">${rk}.</div>
              <div class="aw-li-tied-stack">
                ${tiedRows}
                <span class="aw-li-tie-badge">Geteilt · ${entries.length} ${isTeamAward?'Teams':'Spieler'}</span>
              </div>
              <div class="aw-li-val">${esc(entries[0].val)}</div>
            </div>`);
        }
      }

      const listLabel = isNeg ? 'Weitere Sünder' : 'Weitere Plätze';
      bodyHtml = heroHtml + (listItems.length
        ? `<div class="aw-list-label">${listLabel}</div><div class="aw-list">${listItems.join('')}</div>`
        : '');
    }
  }

  const heroCls = meta.cls || 'gold';

  openSheet(`
    <div class="aw-hero-icon">
      <div class="aw-hero-icon-glow ${heroCls}">
        <svg viewBox="0 0 24 24">${ICONS[AW_IC[key]||'trophy']||''}</svg>
      </div>
      <div class="aw-hero-title">${meta.title}</div>
      <div class="aw-hero-sub">${pl}</div>
    </div>
    ${bodyHtml}
    <div class="aw-why">
      <div class="aw-why-ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16v.5"/></svg></div>
      <div class="aw-why-content">
        <div class="aw-why-label">So wird gewertet</div>
        <div class="aw-why-body">${meta.why}</div>
      </div>
    </div>`);

  // Match-Card klickbar
  if(MATCH_AWARDS.has(key)){
    const arr = key==='upset' ? R.upsets : R.biggest;
    if(arr&&arr.length){
      const el = document.querySelector('.aw-match');
      if(el){ el.style.cursor='pointer'; el.onclick=()=>{ sheetNav(()=>showMatchDetail(arr[0].m.id)); }; }
    }
  }
  // Favoritenschreck: Hauptkarte führt zum Match-Detail
  if(FAVS_AWARDS.has(key)){
    const arr = R.favoritenschreckList;
    if(arr && arr.length){
      const el = document.querySelector('.aw-match');
      if(el){ el.style.cursor='pointer'; el.onclick=()=>{ sheetNav(()=>showMatchDetail(arr[0].m.id)); }; }
    }
  }
  // Erzfeinde: die zwei Team-Boxen tragen data-li-team und werden durch den
  // generischen Team-Handler unten (querySelectorAll[data-li-team]) klickbar.

  // Listen-Einträge klickbar
  document.querySelectorAll('.aw-li[data-li-player], .aw-li-tied-row[data-li-player], .aw-winner[data-li-player], .aw-winner-tied-entry[data-li-player]').forEach(el=>{
    el.style.cursor='pointer';
    el.onclick=()=>{ const pid=el.dataset.liPlayer; sheetNav(()=>showPlayer(pid)); };
  });
  document.querySelectorAll('.aw-li[data-li-team], .aw-li-tied-row[data-li-team], .aw-winner[data-li-team], .aw-winner-tied-entry[data-li-team], .aw-match-team[data-li-team]').forEach(el=>{
    el.style.cursor='pointer';
    el.onclick=(ev)=>{ ev.stopPropagation(); const [a,b]=el.dataset.liTeam.split('|'); sheetNav(()=>showTeam(a,b)); };
  });
}


function dedupeBy(arr,keyFn){const seen=new Set(),out=[];for(const x of arr){const k=keyFn(x);if(seen.has(k))continue;seen.add(k);out.push(x);}return out;}
function mscoreLabel(m){return m.score_a+':'+m.score_b;}

// ╔═══ §5.4 ─── VIEW: TEAMS ────────────────────────────────────────────╗
//     Team-Tab mit Team-Statistiken und Top-Teams.
// ╚═════════════════════════════════════════════════════════════════════════╝
function vTeams(){
  const T=teamStats().filter(t=>t.g>=4);
  if(!T.length)return `<div class="view-head"><h2>Teams</h2><p>Min. 4 gemeinsame Spiele</p></div>${emptyState('handshake','Noch nicht genug Daten')}`;
  const showBest=teamView!=='worst';
  
  // ═══ SORTIERUNG BASIEREND AUF teamSort VARIABLE ═══
  let sorted;
  if(teamSort==='wr'){
    // Standard: Nach Winrate
    sorted=[...T].sort((a,b)=>(b.w/b.g)-(a.w/a.g)||(b.gf-b.ga)-(a.gf-a.ga)||b.g-a.g);
  } else if(teamSort==='gd'){
    // Nach Tordifferenz
    sorted=[...T].sort((a,b)=>(b.gf-b.ga)-(a.gf-a.ga)||(b.w/b.g)-(a.w/a.g)||b.g-a.g);
  } else if(teamSort==='elo'){
    // Nach gesamtem Elo-Zuwachs (über alle Saisons hinweg)
    const gSim=getGlobalSim();
    sorted=[...T].sort((a,b)=>{
      const keyA=[a.ids[0],a.ids[1]].sort().join('|');
      const keyB=[b.ids[0],b.ids[1]].sort().join('|');
      const eloA=gSim.teamElo[keyA]||0;
      const eloB=gSim.teamElo[keyB]||0;
      return eloB-eloA || (b.w/b.g)-(a.w/a.g) || (b.gf-b.ga)-(a.gf-a.ga);
    });
  }
 else {
    // Fallback
    sorted=[...T].sort((a,b)=>(b.w/b.g)-(a.w/a.g)||(b.gf-b.ga)-(a.gf-a.ga)||b.g-a.g);
  }
  
  const arr=showBest?sorted:[...sorted].reverse();


  // Top-3 Akzente (Gold/Silber/Bronze) — Border + Rang-Kachel-Hintergrund
  const TOP=[
    {border:'rgba(247,207,74,.45)', bg:'#f7cf4a', fg:'#1d1700'},
    {border:'rgba(200,208,203,.35)',bg:'#c8d0cb', fg:'#1a1f1c'},
    {border:'rgba(255,120,73,.3)',  bg:'#ff7849', fg:'#2a1108'}
  ];

  const pm=pmap();
  const avPair=(idA,idB)=>{
    const a=pm[idA], b=pm[idB];
    const one=(p,offset)=>{
      if(!p) return `<div style="width:32px;height:32px;border-radius:50%;background:var(--surface3);border:2px solid var(--surface);${offset?'margin-left:-9px':''}"></div>`;
      const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
      if(em) return `<div style="width:32px;height:32px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:15px;border:2px solid var(--surface);${offset?'margin-left:-9px':''}">${em}</div>`;
      return `<div style="width:32px;height:32px;border-radius:50%;background:${avColor(p.id)};display:grid;place-items:center;font-size:11px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;border:2px solid var(--surface);${offset?'margin-left:-9px':''}">${esc(initials(p.name))}</div>`;
    };
    return `<div style="display:flex;align-items:center;flex-shrink:0">${one(a,false)}${one(b,true)}</div>`;
  };

  const gSim=getGlobalSim();
  const seasonTeamMap=gSim.seasonTeamElo[currentSeason().id]||{};

  // Dezente Team-/Spieler-Suche: filtert das aktuelle (sortierte) Feld nach
  // Spielername ODER kombiniertem Team-Namen. Beim Suchen keine Top-3-Medaillen.
  const _tq = (teamSearch||'').trim().toLowerCase();
  const arrF = _tq
    ? arr.filter(t => t.ids.some(id => ((pm[id]&&pm[id].name)||'').toLowerCase().includes(_tq))
        || t.ids.map(pname).join(' & ').toLowerCase().includes(_tq))
    : arr;

  const rows=arrF.map((t,i)=>{
    const wr=Math.round(t.w/t.g*100);
    const gd=t.gf-t.ga;
    const keyTeam=[t.ids[0],t.ids[1]].sort().join('|');
    const eloGain=Math.round(seasonTeamMap[keyTeam]||0);
    
    // ═══ DYNAMISCHE HAUPTMETRIK BASIEREND AUF teamSort ═══
    let mainValue, mainLabel, mainColor;
    if(teamSort==='wr'){
      mainValue=wr+'%';
      mainLabel='WR';
      mainColor='var(--acid)';
    } else if(teamSort==='gd'){
      mainValue=(gd>=0?'+':'')+gd;
      mainLabel='TD';
      mainColor=gd>=0?'var(--acid)':'var(--red)';
    } else if(teamSort==='elo'){
      const eloGainTotal=Math.round(gSim.teamElo[keyTeam]||0);
      mainValue=(eloGainTotal>=0?'+':'')+eloGainTotal;
      mainLabel='Elo';
      mainColor=eloGainTotal>=0?'var(--acid)':'var(--red)';
    }

    
    const isTop=showBest&&i<3&&!_tq;
    const top=isTop?TOP[i]:null;
    const borderColor=top?top.border:'var(--line)';
    const rankBlock=top
      ? `<div style="width:24px;height:24px;border-radius:8px;background:${top.bg};color:${top.fg};display:grid;place-items:center;font-family:'Archivo Black',sans-serif;font-size:12px;flex-shrink:0">${i+1}</div>`
      : `<div style="width:24px;text-align:center;font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--faint);flex-shrink:0">${i+1}</div>`;
    
    return `<div class="rrow" data-team="${esc(t.ids.join('|'))}" style="background:var(--surface);border:1px solid ${borderColor};border-radius:18px;padding:13px 15px;display:block">
      <div style="display:flex;align-items:center;gap:12px">
        ${rankBlock}
        ${avPair(t.ids[0],t.ids[1])}
        <div style="flex:1;min-width:0">
          <div style="font-family:'Archivo Black',sans-serif;font-size:14px;letter-spacing:-.01em;line-height:1.1">${esc(t.ids.map(pname).join(' & '))}</div>
          <div class="num" style="margin-top:4px;font-size:10.5px;color:var(--muted)">${t.w}–${t.g-t.w} · TD ${gd>=0?'+':''}${gd}</div>
        </div>
        <div style="font-family:'Archivo Black',sans-serif;font-size:20px;color:${mainColor};line-height:1;flex-shrink:0">${mainValue}</div>
      </div>
    </div>`;
  }).join('');


  return `
    <div class="view-head"><h2>Teams</h2><p>${arrF.length} Duo${arrF.length===1?'':'s'}${_tq?' gefunden':' mit min. 4 gemeinsamen Spielen'}</p></div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>
      </svg>
      <input type="text" id="teamSearch" placeholder="Spieler oder Team suchen…" value="${esc(teamSearch)}">
    </div>
    <div class="seg accent">
      <button data-teamtoggle="best" class="${showBest?'on':''}">▲ Beste</button>
      <button data-teamtoggle="worst" class="${!showBest?'on':''}">▼ Schlechteste</button>
    </div>
    <div class="seg" style="margin-bottom:14px">
      <button data-teamsort="wr" class="${teamSort==='wr'?'on':''}">Winrate</button>
      <button data-teamsort="gd" class="${teamSort==='gd'?'on':''}">Tordiff</button>
      <button data-teamsort="elo" class="${teamSort==='elo'?'on':''}">Elo-Zuwachs</button>
    </div>
    ${arrF.length ? `<div class="rlist">${rows}</div>` : emptyState('search','Keine Teams gefunden')}`;
}


// ╔═══ §5.5 ─── VIEW: HISTORY (Match-Liste mit Filter) ─────────────────╗
//     Filterbar nach Spieler. Zeigt Badge-Chips pro Match.
// ╚═════════════════════════════════════════════════════════════════════════╝
function vHistory(){
  if(!matches.length)return `<div class="view-head"><h2>Verlauf</h2></div>${emptyState('scroll','Noch keine Matches')}`;
  let list=[...matches].reverse();
  if(histFilter!=='all')
    list=list.filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(histFilter));
  
  // ═══ PAGINIERUNGSLOGIK ═══
  const ITEMS_PER_PAGE = 20; // Anzahl der Matches pro Seite
  const currentPage = _histPage; // Nutze die globale Variable
  const totalPages = Math.ceil(list.length / ITEMS_PER_PAGE);
  const paginatedList = list.slice(currentPage * ITEMS_PER_PAGE, (currentPage + 1) * ITEMS_PER_PAGE);
  
  const opts=`<option value="all">Alle Spieler</option>`+
    [...players].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${p.id}" ${histFilter===p.id?'selected':''}>${esc(p.name)}</option>`).join('');
  
  const rows=paginatedList.map(m=>{
    const aWon=m.winner==='A';
    const tA=`${pname(m.a1)} & ${pname(m.a2)}`, tB=`${pname(m.b1)} & ${pname(m.b2)}`;
    const dl=ids=>ids.map(id=>{const d=(m.deltas||{})[id]||0;
      return `<span><b>${esc(pname(id))}</b> <span class="${d>=0?'delta-v pos':'delta-v neg'}" style="font-size:11px">${d>=0?'+':''}${Math.round(d)}</span></span>`;}).join('');
    // Kompakte Badge-Icons für errungene Auszeichnungen
    const earned=badgesEarnedInMatch(m.id);
    const badgeChips=earned.length?`<div style="display:flex;gap:3px;align-items:center;margin-top:4px;flex-wrap:wrap">${earned.map(e=>
      `<span style="font-size:11px;background:var(--surface3);padding:2px 6px;border-radius:7px;display:inline-flex;align-items:center;gap:4px;color:var(--ink2)">${badgeIc(e.badge,'12px')}<span style="font-size:10px">${esc(pname(e.playerId).split(' ')[0])}</span></span>`
    ).join('')}</div>`:'';
    return `<div class="mrow" data-match="${m.id}">
      <div class="mrow-top">
        <div class="mteam ${aWon?'won':'lost'}">${esc(tA)}</div>
        <div class="mscore num">${m.score_a}:${m.score_b}</div>
        <div class="mteam r ${!aWon?'won':'lost'}">${esc(tB)}</div>
      </div>
      <div class="mrow-bot"><div class="mdeltas">${dl([m.a1,m.a2,m.b1,m.b2])}</div></div>
      ${badgeChips}
      <div class="mrow-bot" style="margin-top:6px"><span>${dateStr(m.created_at)}</span>
        <span data-delmatch="${m.id}" style="color:var(--acid2);display:inline-flex;align-items:center;gap:5px">${svgI('edit')} bearbeiten</span></div>
    </div>`;
  }).join('');

  // ═══ PAGINIERUNGS-CONTROLS ═══
  const paginationControls = totalPages > 1 ? `
    <div style="display:flex;align-items:center;gap:8px;margin-top:16px;padding-bottom:20px;width:100%">
      <button class="btn ghost sm" id="prevPageBtn" style="flex:1;min-width:0;padding:10px 8px;white-space:nowrap" ${currentPage===0?'disabled':''}>← Vorher</button>
      <div style="flex-shrink:0;color:var(--muted);font-size:11px;font-family:'Sometype Mono',monospace;text-align:center;padding:0 2px;white-space:nowrap">
        <b style="color:var(--ink)">${currentPage+1}</b> / <b style="color:var(--ink)">${totalPages}</b>
      </div>
      <button class="btn ghost sm" id="nextPageBtn" style="flex:1;min-width:0;padding:10px 8px;white-space:nowrap" ${currentPage>=(totalPages-1)?'disabled':''}>Weiter →</button>
    </div>
  ` : '';

  return `
    <div class="view-head"><h2>Verlauf</h2><p>${list.length} Matches</p></div>
    <div class="search" style="margin-bottom:14px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 3H2l8 9.5V19l4 2v-8.5L22 3z"/></svg>
      <select id="histSel" style="padding-left:40px">${opts}</select>
    </div>
    ${list.length?`<div class="mlist">${rows}</div>${paginationControls}`:emptyState('search','Keine Matches für diesen Filter')}`;
}


// ╔═══ §5.6 ─── VIEW: MATCH-EINGABE ────────────────────────────────────╗
//     Spieler-Auswahl + Score-Eingabe für neues Match.
// ╚═════════════════════════════════════════════════════════════════════════╝
let M={A1:'',A2:'',B1:'',B2:'',pA1:'atk',pA2:'def',pB1:'atk',pB2:'def',sa:0,sb:0};
function vMatch(){
  const pos=k=>`<select data-pos="${k}"><option value="atk" ${M['p'+k]==='atk'?'selected':''}>↑ Sturm</option><option value="def" ${M['p'+k]==='def'?'selected':''}>↓ Abwehr</option></select>`;
  const slot=(t,n)=>{
    const key=t+n;
    const sel=M[key]?pmap()[M[key]]:null;
    return `<div class="slot"><div class="psel"><div class="combo">
      <input type="text" data-combo="${key}" placeholder="Spieler tippen…" autocomplete="off"
        value="${sel?esc(sel.name):''}" class="${sel?'filled':''}">
      <div class="combo-list" data-combolist="${key}"></div>
    </div></div><div class="possel">${pos(key)}</div></div>`;
  };
  return `
    <div class="view-head"><h2>Match</h2><p>Aufstellen, Tore eintragen, speichern</p></div>
    <div class="builder">
      <div class="team-block A"><div class="team-label">Team A <span class="tag" id="avgA"></span></div>${slot('A',1)}${slot('A',2)}</div>
      <div class="vs-mid"><span class="line"></span><span class="vs">VS</span><span class="line"></span></div>
      <div class="team-block B"><div class="team-label">Team B <span class="tag" id="avgB"></span></div>${slot('B',1)}${slot('B',2)}</div>
    </div>
    <div class="score-board" style="margin-top:12px">
      <div class="score-col A"><div class="cl">Team A</div>
        <div class="stepper"><button data-step="sa,-1">−</button><span class="sval num" id="svA" data-scoreedit="sa">${M.sa}</span><button data-step="sa,1">+</button></div></div>
      <div class="score-sep">:</div>
      <div class="score-col B"><div class="cl">Team B</div>
        <div class="stepper"><button data-step="sb,-1">−</button><span class="sval num" id="svB" data-scoreedit="sb">${M.sb}</span><button data-step="sb,1">+</button></div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:-4px 0 10px">
      <span style="font-size:10.5px;color:var(--muted)">Tipp: auf die Zahl tippen (0–10)</span>
      <button class="btn ghost" id="shuffleBtn" style="padding:8px 14px;font-size:11px;border-radius:10px">Mischen</button>
    </div>
    <div id="previewSlot"></div>
    <div class="btn-row" style="margin-top:4px">
      <button class="btn ghost sm" id="clearM" style="flex:0 0 38%">Reset</button>
      <button class="btn" id="saveM" disabled>Speichern</button>
    </div>`;
}

// ╔═══ §5.7 ─── VIEW: SETTINGS ─────────────────────────────────────────╗
//     Spieler verwalten, Saison-Recap, App-Reset (hinter Passwort-Lock).
// ╚═════════════════════════════════════════════════════════════════════════╝
function vSettings(){
  const sl=(id,name,val,min,max,suf)=>`<div class="slider-wrap">
    <div class="sh"><span class="sn">${name}</span><span class="sv"><span id="${id}v">${val}</span>${suf||''}</span></div>
    <input type="range" id="${id}" min="${min}" max="${max}" value="${val}"></div>`;
  // Aktuelle Werte für Erklärungen (mit Fallbacks)
  const c = {
    k:          Math.round(cfg.k_factor),
    risk:       Math.round((cfg.risk_split ?? 0.6)*100),
    pos:        Math.round((cfg.pos_swing ?? 0.45)*100),
    winBoost:   Math.round((cfg.win_boost ?? 1.12)*100),
    movDamp:    Math.round((cfg.mov_loss_damp ?? 0.5)*100),
    bonus:      ((cfg.match_bonus ?? 1.5)).toFixed(1),
    startElo:   Math.round(cfg.start_elo ?? 0),
    posMin:     Math.round(cfg.pos_min_games ?? 3),
    expW:       Math.round((cfg.exp_weight ?? 0.5)*100),
    npMult:     Math.round((cfg.new_player_mult ?? 1.5)*100),
    npMidMult:  Math.round((cfg.new_player_mid_mult ?? 1.2)*100),
    vetDamp:    Math.round((cfg.veteran_damp ?? 0.85)*100),
    movMax:     Math.round((cfg.mov_max_boost ?? 0.4)*100),
    expProt:    Math.round((cfg.exp_protect_max ?? 0.1)*100),
    udElo:      Math.round((cfg.underdog_elo_max ?? 0.15)*100),
    udGames:    Math.round((cfg.underdog_games_max ?? 0.05)*100),
    lowDamp:    Math.round((cfg.low_elo_loss_damp ?? 0)*100),
  };
  return `
    <div class="view-head"><h2>Formel</h2><p>Feintuning der Elo-Berechnung</p></div>

    <div class="cfg-section-title">Grundparameter</div>
    <div class="card">
      ${sl('cfgK','K-Faktor (Tempo)',c.k,8,64,'')}
      ${sl('cfgStartElo','Start-Elo pro Saison',c.startElo,0,1000,'')}
    </div>

    <div class="cfg-section-title">Spielerlast & Position</div>
    <div class="card">
      ${sl('cfgRisk','Risiko-Split (schwacher Mate)',c.risk,0,100,'%')}
      ${sl('cfgPos','Positions-Swing',c.pos,0,100,'%')}
      ${sl('cfgExpW','Positions-Erfahrungs-Gewicht',c.expW,0,100,'%')}
      ${sl('cfgPosMin','Min. Spiele für Positions-Wertung',c.posMin,1,10,'')}
    </div>

    <div class="cfg-section-title">Sieg & Niederlage</div>
    <div class="card">
      ${sl('cfgWinBoost','Sieg-Boost',c.winBoost,100,140,'%')}
      ${sl('cfgMovDamp','MoV-Dämpfung Niederlage',c.movDamp,0,100,'%')}
      ${sl('cfgMovMax','MoV-Max-Boost (Kantersieg)',c.movMax,0,100,'%')}
      ${sl('cfgLowEloLossDamp','Low-Elo Verlustschutz',c.lowDamp,0,100,'%')}
    </div>

    <div class="cfg-section-title">Bonus-System</div>
    <div class="card">

    <div class="card">
      <div class="mini-label">Mechaniken</div>
      <div style="font-size:12px;color:var(--ink2);line-height:1.8">
        <b style="color:var(--acid)">K-Faktor</b> — Wie stark einzelne Matches die Elo verändern. Hoch = schnelle Änderungen, niedrig = stabile Elo.<br>
        <b style="color:var(--acid)">Start-Elo</b> — Der Wert auf den jeder Spieler zu Saisonbeginn zurückgesetzt wird. Höhere Werte machen Verluste in den ersten Matches "weniger schmerzhaft".<br>
        <b style="color:var(--acid)">Risiko-Split</b> — Wie viel Last der schwächere Mitspieler trägt. Bei ${c.risk}% verlierst du weniger Elo wenn dein Mate deutlich schlechter ist.<br>
        <b style="color:var(--acid)">Positions-Swing</b> — Bonus für Siege auf der schwachen Position. Ein Abwehr-Spieler der im Sturm gewinnt bekommt extra Elo.<br>
        <b style="color:var(--acid)">Positions-Erfahrungs-Gewicht</b> — Mischverhältnis bei der automatischen Positions-Erkennung. ${c.expW}% bedeutet: ${c.expW}% Häufigkeit der Position, ${100-c.expW}% Performance. Hoch = wer oft Abwehr spielt gilt als Verteidiger, egal wie gut. Niedrig = nur Über-Erwartungs-Performance zählt.<br>
        <b style="color:var(--acid)">Min. Spiele Position</b> — Erst ab ${c.posMin} Spielen auf einer Position fließt sie in die Positions-Wertung ein. Schützt vor Zufalls-Einstufung nach 1 Spiel.<br>
        <b style="color:var(--acid)">Sieg-Boost</b> — Siege bringen ${c.winBoost-100}% mehr als Niederlagen kosten. Sorgt für langfristigen Aufwärtstrend.<br>
        <b style="color:var(--acid)">MoV-Dämpfung</b> — Tordifferenz bei Niederlagen nur ${c.movDamp}% so stark wie bei Siegen. Eine 0:10 Niederlage bestraft so nicht 3× so hart wie 5:10.<br>
        <b style="color:var(--acid)">MoV-Max-Boost</b> — Maximaler Multiplikator durch Tordifferenz bei einem Kantersieg. ${c.movMax}% heißt: ein 10:0 zählt bis zu ${(100+c.movMax)}% des normalen Werts.<br>
        <b style="color:var(--acid)">Low-Elo Verlustschutz</b> — Spieler unter dem Match-Durchschnitts-Elo verlieren bei Niederlagen bis zu ${c.lowDamp}% weniger Elo (tanh-skaliert nach 200 Elo Abstand zum Match-Durchschnitt). Symmetrisch zum Underdog-Boost — schützt schwache Spieler vor Elo-Absturz, aber nur wenn sie tatsächlich schwächer als der Schnitt im Match sind.<br>
        <b style="color:var(--acid)">Spielbonus</b> — +${c.bonus} Elo pro Match, egal ob Sieg oder Niederlage. Belohnt aktive Spieler.<br>
        <b style="color:var(--acid)">Erfahrungs-Schutz Max</b> — Erfahrene Spieler verlieren bei Niederlagen bis zu ${c.expProt}% weniger Elo (linear ab 5 bis 30 Saison-Matches). Schützt vor Absturz durch Pech-Serien.<br>
        <b style="color:var(--acid)">Underdog-Boost (Elo-Gap)</b> — Schwächere Spieler bekommen bis zu ${c.udElo}% Bonus bei Siegen gegen stärkere Gegner (tanh-skaliert nach 400 Elo-Differenz). Wirkt nur als Belohnung, nie als Bestrafung.<br>
        <b style="color:var(--acid)">Underdog-Boost (Spiele-Gap)</b> — Spieler mit weniger Matches bekommen bis zu ${c.udGames}% zusätzlichen Boost (tanh-skaliert nach 30 Spiele-Differenz). Hilft Neueinsteigern beim Aufholen. Veteranen werden nicht bestraft — beide Komponenten wirken unabhängig.<br>
        <b style="color:var(--acid)">Neuling-Multi</b> — In den ersten 5 Saison-Spielen wirkt K-Faktor um ${c.npMult}% verstärkt. Neue Spieler finden so schnell ihr Niveau.<br>
        <b style="color:var(--acid)">Anfänger-Multi</b> — Zwischen 5–14 Saison-Spielen wirkt K-Faktor um ${c.npMidMult}% verstärkt. Sanfter Übergang zur Normal-Bewertung.<br>
        <b style="color:var(--acid)">Veteran-Dämpfung</b> — Sehr starke Spieler (&gt; Start+400 Elo) bewegen sich um ${c.vetDamp}% des K-Faktors. Verhindert dass Top-Spieler durch Pflicht-Siege ewig weiter wachsen.<br>
        <b style="color:var(--acid)">Saison-Reset</b> — Jeden Monatswechsel werden alle Elo-Werte auf den Start-Wert zurückgesetzt. Karriere-Elo = gewichteter Durchschnitt der Saison-End-Elos.
      </div>

// ╔═══ §5.8 ─── MATCH PREVIEW & SAVE-LOGIK ─────────────────────────────╗
//     Live-Preview der Elo-Deltas + doSaveMatch() schreibt Match und zeigt
//     Achievement-Toasts (Badge-Trigger via getBadgeEarnedCache).
// ╚═════════════════════════════════════════════════════════════════════════╝
function readM(){
  document.querySelectorAll('[data-p]').forEach(s=>M[s.dataset.p]=s.value);
  document.querySelectorAll('[data-pos]').forEach(s=>M['p'+s.dataset.pos]=s.value);
}
function validM(){const ids=[M.A1,M.A2,M.B1,M.B2];
  return !ids.some(x=>!x)&&new Set(ids).size===4&&M.sa!==M.sb
    &&M.pA1!==M.pA2&&M.pB1!==M.pB2;}
function teamsFromM(){return{teamA:[{id:M.A1,pos:M.pA1},{id:M.A2,pos:M.pA2}],teamB:[{id:M.B1,pos:M.pB1},{id:M.B2,pos:M.pB2}]};}
function updatePreview(){
  const slot = document.getElementById('previewSlot');
  const save = document.getElementById('saveM');
  if(!slot) return;
  const P = pmap();
  const gSim = getGlobalSim();
  const seasonElo = id => gSim.elo[id] ?? cfg.start_elo;

  const setAvg = (el,a,b) => {
    const e = document.getElementById(el);
    if(e && P[a] && P[b]) e.textContent = 'Ø '+Math.round((seasonElo(a)+seasonElo(b))/2)+' (Saison)';
    else if(e) e.textContent = '';
  };
  setAvg('avgA', M.A1, M.A2); setAvg('avgB', M.B1, M.B2);

  const ids = [M.A1,M.A2,M.B1,M.B2].filter(Boolean);
  if(new Set(ids).size !== ids.length){
    slot.innerHTML = `<div class="preview" style="color:var(--red);font-size:12px;text-align:center">Ein Spieler steht doppelt.</div>`;
    save.disabled = true; return;
  }
  // Beide Spieler eines Teams müssen unterschiedliche Positionen haben
  const allFour = ids.length === 4;
  if(allFour && (M.pA1===M.pA2 || M.pB1===M.pB2)){
    slot.innerHTML = `<div class="preview" style="color:var(--red);font-size:12px;text-align:center">Jedes Team braucht Sturm + Abwehr.</div>`;
    save.disabled = true; return;
  }
  if(!validM()){slot.innerHTML=''; save.disabled=true; return;}

  const winner = M.sa > M.sb ? 'A' : 'B';
  const{teamA, teamB} = teamsFromM();
  const c = computeMatch(teamA, teamB, winner, M.sa, M.sb);
  const pA = Math.round(c.expA*100), pB = 100-pA;
  const line = s => {
    const d = c.res[s.id];
    return `<div class="delta-row">
      <span class="dn">${esc(P[s.id].name)}
        <span class="chip ${s.pos}">${s.pos==='atk'?'STU':'ABW'}</span>
      </span>
      <span class="delta-v ${d>=0?'pos':'neg'}">${d>=0?'+':''}${Math.round(d)}</span>
    </div>`;
  };
  slot.innerHTML = `<div class="preview">
    <div class="prob">
      <div class="pa" style="width:${pA}%">${pA}%</div>
      <div class="pb" style="width:${pB}%">${pB}%</div>
    </div>
    <div class="prob-cap">Siegchance (Saison-Elo) · Team ${winner} gewinnt ${M.sa}:${M.sb}
      ${c.mov>1.08?' · Kantersieg ×'+c.mov.toFixed(2):''}
    </div>
    <div class="delta-list">
      ${line(teamA[0])}${line(teamA[1])}
      <div class="delta-div"></div>
      ${line(teamB[0])}${line(teamB[1])}
    </div>
  </div>`;
  save.disabled = false;
}

async function doSaveMatch(){
  readM(); if(!validM()){toast('Match unvollständig',true);return;}
  const winner = M.sa > M.sb ? 'A' : 'B';
  const{teamA, teamB} = teamsFromM();

  // players.elo = Saison-Elo → direkt nutzen
  const c = computeMatch(teamA, teamB, winner, M.sa, M.sb);

  const row = {
    a1:M.A1, a1_pos:M.pA1, a2:M.A2, a2_pos:M.pA2,
    b1:M.B1, b1_pos:M.pB1, b2:M.B2, b2_pos:M.pB2,
    score_a:M.sa, score_b:M.sb, winner, deltas:c.res, exp_a:c.expA
  };
  // insert(...).select() gibt die erzeugte Zeile inkl. id + created_at zurück,
  // damit die lokale Kopie exakt der DB entspricht (created_at wird für die
  // Saison-Filterung in matchesInSeason zwingend gebraucht).
  const{data:inserted, error} = await sb.from('matches').insert(row).select().single();
  if(error){toast('Fehler: '+error.message,true);return;}

  // Fallback: falls select() nicht greift, created_at lokal setzen,
  // sonst fiele das frische Match aus matchesInSeason heraus.
  const savedRow = inserted || {...row, created_at:new Date().toISOString()};

  // Lokal updaten, dann über die EINE kanonische Engine neu berechnen.
  // persistRecalc schreibt atk, Match-Deltas und Saison-Elos konsistent.
  matches = [...matches, savedRow];
  invalidateCache(['global', 'stats', 'awards', 'badges']);
  await persistNewMatch(savedRow.id);

  // ─── ACHIEVEMENT-TOASTS ───────────────────────────────────────────
  // Nach dem persist+invalidate liefert badgesEarnedInMatch genau die in
  // DIESEM Match neu erreichten Badges (Pre-State-Vergleich → echte Neu-
  // erreichungen, keine Wiederholungen). Sequenzielle Queue zeigt sie der
  // Reihe nach, jeder Toast 2.6s. Spielername aus pname() konsistent zur
  // gesamten App.
  //
  // ⚠ Common-Badges (grün) werden NICHT als Toast gezeigt, weil sie zu
  // häufig feuern und sonst eine Toast-Kaskade von 5+ PopUps entsteht.
  // Sie bleiben im Match-Review sichtbar und zählen im Profil weiter.
  const newBadges = badgesEarnedInMatch(savedRow.id);
  const toastWorthy = newBadges.filter(e => rarityOf(e.badge.id) !== 'common');
  if(toastWorthy.length){
    toastWorthy.forEach(e => showAchievementToast(pname(e.playerId), e.badge));
  } else {
    toast('Match gespeichert', 'ok');
  }
  M = {A1:'',A2:'',B1:'',B2:'',pA1:'atk',pA2:'def',pB1:'atk',pB2:'def',sa:0,sb:0};
  tab = 'ranking'; await loadAll();
}

// ╔═══ §6.1 ─── DETAIL-SHEET-INFRASTRUKTUR ─────────────────────────────╗
//     Bottom-Sheet-System mit Swipe-to-close. openSheet()/closeSheet().
// ╚═════════════════════════════════════════════════════════════════════════╝
// ── Sheet-Navigations-Stack (v9.2) ──────────────────────────────────
// Ermöglicht ÜBERLAPPENDE Sheets: ein Kind-Sheet (z.B. Spielerprofil aus dem
// Recap) legt sich „über" das aktuelle. closeSheet() — egal ob Button, Swipe
// oder Backdrop — geht dann Schritt für Schritt EINE Ebene zurück, statt alles
// zu schließen. Kein zweites DOM-Sheet nötig: pro Ebene merken wir uns eine
// reopen-Funktion und bauen das Eltern-Sheet frisch auf (Handler werden korrekt
// neu gebunden). Das einzelne #sheet + die Swipe-Geste bleiben unverändert.
let _sheetStack = [];      // {fn, scroll} der darunterliegenden Sheets (unten→oben)
let _sheetReopen = null;   // wie das AKTUELL sichtbare Sheet neu gebaut wird
let _sheetPopping = false; // true, während closeSheet ein Eltern-Sheet wiederherstellt
// Jeder stapelbare Sheet-Builder meldet zu Beginn, wie er sich neu öffnen lässt.
function _sheetSetReopen(fn){ _sheetReopen = (typeof fn === 'function') ? fn : null; }
// Aktuelles Sheet (samt Scroll-Position) auf den Stack legen.
function _pushCurrentSheet(){
  if(!_sheetReopen) return;
  const sheet = document.getElementById('sheet');
  _sheetStack.push({ fn: _sheetReopen, scroll: sheet ? sheet.scrollTop : 0 });
}
// Vorwärts-Navigation: aktuelles Sheet stapeln, dann Kind öffnen (OHNE close).
// Ersetzt das frühere Schließen-und-neu-öffnen-Muster bei Navigationen.
function sheetNav(openChild){
  const sheet = document.getElementById('sheet');
  if(sheet && sheet.classList.contains('show') && _sheetReopen && !_sheetPopping){
    _pushCurrentSheet();
  }
  try { openChild(); } catch(e){ _sheetStack.pop(); }
}
window.sheetNav = sheetNav;

function openSheet(html, opts){
  opts = opts || {};
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  // Frischer Root-Open (kein Sheet war offen, kein Pop läuft) → Stack leeren.
  // Bei Navigation/Pop bleibt das Sheet sichtbar → Stack unangetastet.
  if(!bg.classList.contains('show') && !_sheetPopping){ _sheetStack.length = 0; }
  // Falls bereits ein Sheet offen war (openSheet direkt nach openSheet, ohne
  // closeSheet dazwischen), zuerst dessen Swipe-Listener aufräumen — sonst
  // stapeln sich window-mousemove/mouseup-Listener und lecken.
  if(sheet._swipeCleanup){ sheet._swipeCleanup(); sheet._swipeCleanup=null; }
  sheet.innerHTML=`<div class="sheet-grab" id="sheetGrab"></div>${html}`;
  // Scroll-Position zurücksetzen — sonst landet man im neuen Sheet dort, wo
  // im vorigen Sheet (oder bei vorigem Öffnen desselben Sheets) gescrollt war.
  // Muss nach innerHTML kommen, damit das Layout schon steht.
  sheet.scrollTop = 0;
  bg.classList.add('show');
  sheet.classList.add('show');
  // ⚠ Schutz-Phase: für auto-getriggerte Pop-Ups (Saison-/POTW-/POTD-Recap)
  // wird der Backdrop-Click für protectMs ms unterdrückt — verhindert
  // versehentliches Schließen bei direkt-nach-App-Start-Scroll-Aktionen.
  // Swipe-down und der "Verstanden"-Button bleiben jederzeit aktiv.
  if(opts.protectMs && opts.protectMs > 0){
    sheet._protectedUntil = Date.now() + opts.protectMs;
  } else {
    sheet._protectedUntil = 0;
  }
  bindSheetSwipe();
}

// closeSheet(force):
//   • Standard: EINE Ebene zurück, falls der Stack noch Eltern-Sheets enthält
//     (Button/Swipe/Backdrop wirken so als „Zurück").
//   • force=true: hart komplett schließen + Stack leeren (für terminale Aktionen
//     wie Löschen/Anlegen/Neuberechnen/Home, nach denen render() ohnehin greift).
function closeSheet(force){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  if(!force && _sheetStack.length){
    // Zurück zum Eltern-Sheet: Swipe/Transform zurücksetzen, Eltern neu bauen.
    if(sheet._swipeCleanup){ sheet._swipeCleanup(); sheet._swipeCleanup=null; }
    sheet.classList.remove('is-dragging');
    sheet.style.transition=''; sheet.style.transform='';
    bg.style.transition=''; bg.style.opacity='';
    const entry = _sheetStack.pop();
    _sheetPopping = true;
    try {
      entry.fn();
      // Scroll-Position des Eltern-Sheets wiederherstellen (openSheet setzt 0).
      try { if(entry.scroll) sheet.scrollTop = entry.scroll; } catch(e){}
    }
    catch(e){ _sheetForceClose(sheet,bg); }
    _sheetPopping = false;
    return;
  }
  _sheetForceClose(sheet,bg);
}
function _sheetForceClose(sheet,bg){
  _sheetStack.length = 0; _sheetReopen = null;
  // Swipe-Listener aufräumen
  if(sheet._swipeCleanup){ sheet._swipeCleanup(); sheet._swipeCleanup=null; }
  sheet.classList.remove('show','is-dragging');
  sheet.style.transform='';
  bg.style.opacity='';
  bg.classList.remove('show');
  // Falls Badge-Popover noch offen war (Navigation aus Popover heraus zu
  // Match-Detail → Sheet schließt mit), Popover auch schließen.
  const bpBg = document.getElementById('bpBg');
  if(bpBg && bpBg.classList.contains('show')) bpBg.classList.remove('show');
  // v8.2: gequeuten News-Toast nachholen, falls beim Boot ein Recap
  // ihn blockiert hat. Verzögerung kommt aus _processDeferredNewsToast.
  try { if(window._processDeferredNewsToast) window._processDeferredNewsToast(); } catch(e){}
}

function bindSheetSwipe(){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  let startY=0, startScrollTop=0, dragging=false;
  let lastY=0, lastT=0;
  // Sheet-Close-Schwellen (kalibriert für versehentliche Touches vs echte Geste):
  // - CLOSE_THRESHOLD: lange, langsame Geste schließt erst nach 200 px Wegstrecke
  // - VELOCITY_THRESHOLD: 1.2 px/ms = echter Wisch (≈1200 px/s)
  // - MIN_DY_FOR_VEL_CLOSE: ein schneller Wisch braucht zusätzlich min. 60 px Strecke,
  //   damit kurze Flicks nicht ungewollt schließen
  // - DRAG_INTENT_THRESHOLD: ab dieser Strecke wird das Sheet visuell mitgezogen
  const CLOSE_THRESHOLD=200;
  const VELOCITY_THRESHOLD=1.2;
  const MIN_DY_FOR_VEL_CLOSE=60;
  const DRAG_INTENT_THRESHOLD=12;

  // ── TOUCH (Smartphone) ──
  const onTouchStart=(e)=>{
    const touch=e.touches[0];
    startY=touch.clientY;
    // ── Inner-Scroll-Tracking (Bugfix v8.1) ──────────────────────────
    // Häufige UX-Falle: Sheet enthält INNERE Scroll-Container (z.B.
    // .nv-list mit max-height:60vh + overflow-y:auto). Wenn der User
    // dort scrollt, bleibt sheet.scrollTop=0, und ein Hochziehen aus
    // einer Liste, die unten gescrollt war, wird fälschlich als Sheet-
    // Schließen interpretiert.
    //
    // Lösung: beim touchstart innersten scrollbaren Vorfahr finden und
    // dessen scrollTop tracken. Der Sheet-Swipe darf NUR greifen, wenn
    // sowohl Sheet als auch innerer Container am Top sind.
    let scrollEl = e.target;
    while(scrollEl && scrollEl !== sheet && scrollEl !== document.body){
      const cs = window.getComputedStyle(scrollEl);
      if((cs.overflowY === 'auto' || cs.overflowY === 'scroll')
         && scrollEl.scrollHeight > scrollEl.clientHeight){
        break;
      }
      scrollEl = scrollEl.parentElement;
    }
    if(!scrollEl || scrollEl === document.body) scrollEl = sheet;
    sheet._innerScrollEl = scrollEl;
    sheet._innerScrollTopStart = scrollEl.scrollTop;
    startScrollTop = sheet.scrollTop;
    lastY=startY; lastT=Date.now();
    dragging=false;
  };

  const onTouchMove=(e)=>{
    const touch=e.touches[0];
    const dy=touch.clientY-startY;
    lastY=touch.clientY; lastT=Date.now();
    // (1) Wenn das äußere Sheet bereits gescrollt war → kein Swipe
    if(startScrollTop>0) return;
    // (2) Wenn ein INNERER Scroll-Container bereits gescrollt war → kein Swipe
    if(sheet._innerScrollTopStart > 0) return;
    // (3) Wenn der innere Container WÄHREND der Geste runterscrollt (= User
    //     hat innen hochgezogen, Browser scrollt die Liste runter) → auch
    //     kein Sheet-Swipe. Verhindert "Scroll-Ende → Sheet zieht mit".
    if(sheet._innerScrollEl && sheet._innerScrollEl !== sheet
       && sheet._innerScrollEl.scrollTop > 0) return;
    if(dy<0) return;
    if(dy<DRAG_INTENT_THRESHOLD) return;
    if(!dragging){ dragging=true; sheet.classList.add('is-dragging'); }
    e.preventDefault();
    sheet.style.transform=`translateY(${dy*0.88}px)`;
    bg.style.opacity=1-Math.min(dy*0.88/300,1)*0.6;
  };

  const onTouchEnd=(e)=>{
    if(!dragging){ sheet.classList.remove('is-dragging'); return; }
    dragging=false;
    sheet.classList.remove('is-dragging');
    const touch=e.changedTouches[0];
    const dy=touch.clientY-startY;
    const velocity=Math.abs(dy)/(Date.now()-lastT+1);
    snapOrClose(dy,velocity);
  };

  // ── MOUSE (Desktop) ──
  const onMouseDown=(e)=>{
    // Nur auf dem Grab-Handle reagieren, nicht auf das gesamte Sheet
    const grab=document.getElementById('sheetGrab');
    if(!grab||!grab.contains(e.target)) return;
    startY=e.clientY;
    startScrollTop=sheet.scrollTop;
    lastY=startY; lastT=Date.now();
    dragging=true;
    sheet.classList.add('is-dragging');
    e.preventDefault();
  };

  const onMouseMove=(e)=>{
    if(!dragging) return;
    const dy=e.clientY-startY;
    lastY=e.clientY; lastT=Date.now();
    if(dy<0){ sheet.style.transform='translateY(0)'; return; }
    sheet.style.transform=`translateY(${dy*0.88}px)`;
    bg.style.opacity=1-Math.min(dy*0.88/300,1)*0.6;
  };

  const onMouseUp=(e)=>{
    if(!dragging) return;
    dragging=false;
    sheet.classList.remove('is-dragging');
    const dy=e.clientY-startY;
    const velocity=Math.abs(dy)/(Date.now()-lastT+1);
    snapOrClose(dy,velocity);
  };

  // ── GEMEINSAME SNAP/CLOSE LOGIK ──
  function snapOrClose(dy,velocity){
    if(dy>CLOSE_THRESHOLD || (velocity>VELOCITY_THRESHOLD && dy>=MIN_DY_FOR_VEL_CLOSE)){
      sheet.style.transition='transform .28s cubic-bezier(.4,0,1,1)';
      sheet.style.transform='translateY(100%)';
      bg.style.transition='opacity .28s';
      bg.style.opacity='0';
      setTimeout(()=>{
        closeSheet();
        sheet.style.transition='';
        bg.style.transition='';
      },280);
    } else {
      sheet.style.transition='transform .32s cubic-bezier(.2,.8,.2,1)';
      sheet.style.transform='translateY(0)';
      bg.style.transition='opacity .32s';
      bg.style.opacity='1';
      setTimeout(()=>{
        sheet.style.transition='';
        bg.style.transition='';
      },320);
    }
  }

  // Events registrieren
  sheet.addEventListener('touchstart',onTouchStart,{passive:true});
  sheet.addEventListener('touchmove',onTouchMove,{passive:false});
  sheet.addEventListener('touchend',onTouchEnd,{passive:true});

  // Mouse nur auf dem Grab-Handle
  sheet.addEventListener('mousedown',onMouseDown);
  window.addEventListener('mousemove',onMouseMove);
  window.addEventListener('mouseup',onMouseUp);

  // Cleanup wenn Sheet geschlossen wird
  const cleanup=()=>{
    sheet.removeEventListener('touchstart',onTouchStart);
    sheet.removeEventListener('touchmove',onTouchMove);
    sheet.removeEventListener('touchend',onTouchEnd);
    sheet.removeEventListener('mousedown',onMouseDown);
    window.removeEventListener('mousemove',onMouseMove);
    window.removeEventListener('mouseup',onMouseUp);
  };
  sheet._swipeCleanup=cleanup;
}

// Hintergrund-Klick schließt Sheet
document.getElementById('sheetBg').onclick=()=>{
  // Schutz-Phase respektieren (auto-getriggerte Recap-Pop-Ups).
  // Während der Schutz-Phase gibt es leichtes haptisches Feedback via
  // CSS-Klassen-Toggle, damit der User merkt: "hier passiert was, aber
  // ich muss bewusst schließen".
  const sheet=document.getElementById('sheet');
  if(sheet && sheet._protectedUntil && Date.now() < sheet._protectedUntil){
    // Optisches Mini-Bounce-Feedback statt schließen
    sheet.classList.remove('sheet-nudge');
    void sheet.offsetWidth; // Re-trigger Animation
    sheet.classList.add('sheet-nudge');
    return;
  }
  closeSheet();
};

// Badge-Popover: Backdrop-Click (außerhalb der Karte) schließt Popover.
// ESC schließt ebenfalls. Sheet darunter bleibt offen.
document.getElementById('bpBg').addEventListener('click', (e) => {
  // Nur schließen, wenn direkt der Backdrop geklickt wurde — nicht die Karte
  if(e.target.id === 'bpBg') closeBadgePopover();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    // Reihenfolge: News-Detail > News-Popover > Badge-Popover (innerster zuerst)
    const ndBg = document.getElementById('ndBg');
    if(ndBg && ndBg.classList.contains('show')){
      if(typeof closeNewsDetail === 'function') closeNewsDetail();
      return;
    }
    const nvBg = document.getElementById('nvBg');
    if(nvBg && nvBg.classList.contains('show')){
      if(typeof closeNewsPopover === 'function') closeNewsPopover();
      return;
    }
    const bpBg = document.getElementById('bpBg');
    if(bpBg && bpBg.classList.contains('show')) closeBadgePopover();
  }
});
