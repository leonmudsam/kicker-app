  .pp-pos-combined{position:relative;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:14px;overflow:hidden}
  .pp-pos-combined .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
  .pp-pos-combined .head .t{font-size:9.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace}
  .pp-pos-combined .head .vol{font-family:'Sometype Mono',monospace;font-size:10.5px;color:var(--muted)}
  .pp-pos-combined .head .vol b{color:var(--ink);font-weight:600}
  .pp-pos-split{display:flex;height:54px;border-radius:12px;overflow:hidden;background:var(--bg2);min-width:0}
  .pp-pos-side{display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Archivo Black',sans-serif;position:relative;min-width:0;padding:0 4px;transition:flex .3s ease;flex:1}
  .pp-pos-side.atk{background:linear-gradient(135deg,rgba(255,120,73,.18),rgba(255,120,73,.04));color:var(--orange);border-right:1px solid var(--line)}
  .pp-pos-side.def{background:linear-gradient(135deg,rgba(86,180,232,.04),rgba(86,180,232,.18));color:var(--blue)}
  .pp-pos-side.empty{color:var(--muted);background:var(--bg2)}
  .pp-pos-side .ic{position:absolute;top:5px;opacity:.55}
  .pp-pos-side.atk .ic{left:8px}
  .pp-pos-side.def .ic{right:8px}
  .pp-pos-side .ic svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2}
  .pp-pos-side .v{font-size:18px;line-height:1}
  .pp-pos-side .v small{font-size:11px;font-weight:400;opacity:.7}
  .pp-pos-side .lbl{font-size:8px;letter-spacing:.16em;text-transform:uppercase;font-family:'Sometype Mono',monospace;font-weight:700;margin-top:3px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

  /* Cleaner Rollen-Performance: vertikale Liste mit Progress-Bars */
  .pp-roles{display:flex;flex-direction:column;gap:13px}
  .pp-role{display:flex;flex-direction:column;gap:7px}
  .pp-role-head{display:flex;align-items:center;gap:9px;min-width:0}
  .pp-role-head .ic{display:inline-flex;align-items:center;flex-shrink:0;width:14px;height:14px}
  .pp-role-head .ic svg{width:14px;height:14px;stroke-width:2.2;fill:none;stroke:currentColor}
  .pp-role-head .lbl{font-family:'Sometype Mono',monospace;font-size:10.5px;font-weight:700;
    text-transform:uppercase;letter-spacing:.12em;flex-shrink:0}
  .pp-role-head .games{font-family:'Sometype Mono',monospace;font-size:10px;color:var(--muted);
    letter-spacing:.04em;margin-left:auto;font-variant-numeric:tabular-nums}
  .pp-role-head .wr{font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:-.02em;
    line-height:1;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
  .pp-role-head .wr small{font-size:10px;opacity:.6;font-weight:400;margin-left:1px}
  .pp-role.atk .ic,.pp-role.atk .lbl,.pp-role.atk .wr{color:var(--orange)}
  .pp-role.def .ic,.pp-role.def .lbl,.pp-role.def .wr{color:var(--blue)}
  .pp-role-bar{height:5px;border-radius:3px;background:var(--bg2);overflow:hidden;position:relative}
  .pp-role-fill{height:100%;border-radius:3px;transform-origin:left center;
    animation:roleSlide .9s cubic-bezier(.2,.8,.2,1) .15s both}
  @keyframes roleSlide{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .pp-role.atk .pp-role-fill{background:linear-gradient(90deg,var(--orange),#ffa078);
    box-shadow:0 0 8px rgba(255,120,73,.35)}
  .pp-role.def .pp-role-fill{background:linear-gradient(90deg,var(--blue),#8fcef0);
    box-shadow:0 0 8px rgba(86,180,232,.3)}
  .pp-roles-empty{text-align:center;color:var(--muted);padding:18px 0;
    font-family:'Sometype Mono',monospace;font-size:11px;letter-spacing:.08em}

  /* Relationship-Cards mit Mate/Gegner-Avatar */
  .pp-r-rich{padding:11px 12px;background:var(--surface);border:1px solid rgba(255,255,255,.05);
    border-radius:12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:transform .12s,background .12s;border-left-width:2px;border-left-style:solid}
  .pp-r-rich:active{transform:scale(.985);background:var(--surface2)}
  .pp-r-rich.good{border-left-color:var(--acid);background:linear-gradient(135deg,rgba(190,242,100,.04),var(--surface) 70%)}
  .pp-r-rich.bad {border-left-color:var(--red); background:linear-gradient(135deg,rgba(240,86,106,.03),var(--surface) 70%)}
  .pp-r-rich.fav {border-left-color:var(--blue);background:linear-gradient(135deg,rgba(86,180,232,.04),var(--surface) 70%)}
  .pp-r-rich.nem {border-left-color:var(--orange);background:linear-gradient(135deg,rgba(255,120,73,.04),var(--surface) 70%)}
  .pp-r-rich .av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:16px;flex-shrink:0;border:1.5px solid var(--surface);font-family:'Archivo Black',sans-serif;color:#0a0c0b}
  .pp-r-rich .av.empty{background:var(--surface3);color:var(--muted);font-size:14px}
  .pp-r-rich .info{flex:1;min-width:0}
  .pp-r-rich .l{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:'Sometype Mono',monospace;display:flex;align-items:center;gap:4px;line-height:1}
  .pp-r-rich .l svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2}
  .pp-r-rich .name{font-family:'Archivo Black',sans-serif;font-size:12.5px;letter-spacing:-.01em;margin-top:4px;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pp-r-rich .stat{font-family:'Sometype Mono',monospace;font-size:10.5px;margin-top:3px;font-weight:600}
  .pp-r-rich.good .stat .v{color:var(--acid)}
  .pp-r-rich.bad  .stat .v{color:var(--red)}
  .pp-r-rich.fav  .stat .v{color:var(--blue)}
  .pp-r-rich.nem  .stat .v{color:var(--orange)}
  .pp-r-rich .stat .g{color:var(--muted);font-weight:400;margin-left:3px}

  /* Karriere-Rang Journey-Bar */
  .pp-ranks-journey{position:relative;height:58px;padding:0 16px;margin-top:4px}
  .pp-rj-track{position:absolute;left:24px;right:24px;top:18px;height:3px;background:var(--surface3);border-radius:99px}
  /* Strahl: links verankert, fließt nach rechts bis zum aktiven Tier (Einsteiger→Legende).
     Erbt --pp-tier-1 / --pp-tier-glow vom Parent (.pp-ranks-journey.pp-tier-…) */
  .pp-rj-fill-track{position:absolute;left:24px;right:24px;top:18px;height:3px;pointer-events:none;overflow:visible}
  .pp-rj-fill{position:absolute;top:0;left:0;height:100%;
    background:linear-gradient(to right,var(--pp-tier-2,var(--pp-tier-1,var(--acid))),var(--pp-tier-1,var(--acid)));
    border-radius:99px;
    box-shadow:0 0 10px var(--pp-tier-glow,rgba(190,242,100,.35));
    transition:width .45s cubic-bezier(.22,.61,.36,1)}
  .pp-rj-tiers{display:flex;justify-content:space-between;position:relative}
  .pp-rj-tier{display:flex;flex-direction:column;align-items:center;width:48px}
  .pp-rj-dot{width:14px;height:14px;border-radius:50%;background:var(--bg2);border:2px solid var(--line);position:relative;z-index:2;margin-top:11px;transition:.2s}
  /* "done" = bereits durchlaufene Tiers (unterhalb des Spielers); werden vom Strahl beleuchtet */
  .pp-rj-tier.done .pp-rj-dot{background:var(--pp-tier-1,var(--surface3));border-color:var(--pp-tier-1,var(--surface3));opacity:.7;box-shadow:0 0 6px var(--pp-tier-glow,transparent)}
  .pp-rj-tier.active .pp-rj-dot{transform:scale(1.4);background:var(--pp-tier-1);border-color:var(--pp-tier-1);box-shadow:0 0 12px var(--pp-tier-glow);z-index:3}
  .pp-rj-lbl{font-family:'Archivo Black',sans-serif;font-size:8.5px;letter-spacing:.04em;color:var(--faint);margin-top:7px;transition:.2s;white-space:nowrap}
  .pp-rj-tier.done .pp-rj-lbl{color:var(--pp-tier-1,var(--muted));opacity:.75}
  .pp-rj-tier.active .pp-rj-lbl{color:var(--pp-tier-1);font-size:9.5px}

  /* Section-Title mit Trend (Saisons-Rail) */
  .pp-sec-title .trend{font-family:'Sometype Mono',monospace;font-size:10.5px;color:var(--acid);font-weight:600;letter-spacing:.04em}
  .pp-sec-title .trend.neg{color:var(--red)}
  .pp-sec-title .trend.neutral{color:var(--muted)}
  /* Erstplatz-Marker im Rail */
  .pp-sn.gold{position:relative}
  .pp-sn.gold::before{content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:6px;height:6px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px rgba(247,207,74,.6);z-index:2}

  .pp-del{margin-top:18px;text-align:center}
  .pp-del button{background:transparent;border:1px solid rgba(240,86,106,.2);color:var(--red);
    font-family:'Space Grotesk';font-size:11px;font-weight:600;padding:8px 16px;border-radius:10px;
    letter-spacing:.04em;cursor:pointer}

  /* Avatar-Picker im Edit-Sheet */
  .av-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
  .av-opt{aspect-ratio:1;border-radius:50%;background:linear-gradient(155deg,#3a4540,#212824);
    border:2px solid transparent;display:grid;place-items:center;cursor:pointer;
    transition:transform .15s, border-color .2s;position:relative;overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05)}
  .av-opt::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(160deg,rgba(255,255,255,.12) 0%,transparent 50%)}
  .av-opt .em{font-size:26px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));position:relative;z-index:1;
    font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji','Twemoji Mozilla',sans-serif;
    line-height:1;color:#fff}
  .av-opt:active{transform:scale(.92)}
  .av-opt.selected{border-color:var(--acid);
    box-shadow:0 0 0 3px rgba(190,242,100,.18),0 4px 14px rgba(190,242,100,.25),inset 0 1px 0 rgba(255,255,255,.05)}
  .av-opt.selected::before{content:"✓";position:absolute;top:-2px;right:-2px;width:18px;height:18px;
    background:var(--acid);color:var(--acid-deep);border-radius:50%;font-size:11px;font-weight:900;
    display:grid;place-items:center;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .av-opt.initials{background:linear-gradient(155deg,#4a5550,#2a322d)}
  .av-opt.initials .em{font-family:'Archivo Black',sans-serif;font-size:18px;color:rgba(255,255,255,.7)}

  .field-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;
    color:var(--muted);font-weight:700;margin:18px 0 8px}

  @keyframes ppFadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ppFadeScale{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
  @keyframes ppPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
  @keyframes ppRankPulse{0%,100%{box-shadow:0 0 24px -8px var(--pp-tier-glow),inset 0 1px 0 rgba(255,255,255,.05)}
    50%{box-shadow:0 0 32px -6px var(--pp-tier-glow),inset 0 1px 0 rgba(255,255,255,.05)}}
  @keyframes ppFloat{0%,100%{transform:translateX(-50%) translateY(0) rotate(-2deg)}
    50%{transform:translateX(-50%) translateY(-3px) rotate(-2deg)}}
  @keyframes ppBarIn{from{width:0 !important}}
  @keyframes ppSlideIn{from{width:0 !important}}
  @keyframes ppSlideThumb{from{left:0 !important}}

  .text-in{width:100%;font-family:inherit;font-size:15px;background:var(--bg2);border:1px solid var(--line);
    color:var(--ink);padding:14px;border-radius:13px;outline:none;transition:.18s}
  .text-in:focus{border-color:var(--acid2)}

  /* ============ ICON SYSTEM ============ */
  .ic{display:inline-grid;place-items:center;vertical-align:middle;line-height:1}
  .ic svg{display:block;width:1em;height:1em;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .ic-sm{font-size:14px} .ic-md{font-size:18px} .ic-lg{font-size:22px} .ic-xl{font-size:28px}

  /* Medaillen-Badge (Top-3) – ersetzt 🥇🥈🥉 */
  .medal-b{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:6px;
    font-family:'Archivo Black',sans-serif;font-size:10px;line-height:1;
    background:var(--surface3);color:var(--ink2);letter-spacing:0}
  .medal-b.m1{background:rgba(247,207,74,.18);color:var(--gold);box-shadow:inset 0 0 0 1px rgba(247,207,74,.3)}
  .medal-b.m2{background:rgba(200,208,203,.12);color:#c8d0cb;box-shadow:inset 0 0 0 1px rgba(200,208,203,.25)}
  .medal-b.m3{background:rgba(255,120,73,.14);color:var(--orange);box-shadow:inset 0 0 0 1px rgba(255,120,73,.3)}

  /* Streak-Badge – Icon-only (1/2/3 Flammen bzw. Tropfen) */
  .streak-badge{display:inline-flex;align-items:center;
    color:var(--acid);
    padding:0;margin-left:5px;line-height:1;vertical-align:middle}
  .streak-badge .ic{font-size:14px}
  .streak-badge.hot{color:var(--orange)}
  .streak-badge.fire{color:#ff5050}

  /* Position-Chip mit Icon */
  .pos-chip{display:inline-flex;align-items:center;gap:5px}
  .pos-chip .ic{font-size:12px}
  .pos-chip.atk{color:var(--orange)}
  .pos-chip.def{color:var(--blue)}

  /* Rang-Tier Icon-Container (👑🥇🥈🥉 -> SVG) */
  .tier-ic{display:inline-grid;place-items:center;width:18px;height:18px;color:inherit}
  .tier-ic svg{width:16px;height:16px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Lock/Settings-Button – Inhalt jetzt SVG */
  .lock-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Award-Empty-State Icon-Wrapper */
  .ee.svg-ic{display:grid;place-items:center;color:var(--faint)}
  .ee.svg-ic svg{width:48px;height:48px;stroke:currentColor;fill:none;
    stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

  /* pp-crown (Krone für Legende) als SVG */
  .pp-crown svg{width:24px;height:24px;stroke:var(--gold);fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 4px 8px rgba(247,207,74,.4))}

  /* Award-Card mit SVG-Icon (override emoji font-size) */
  .award .emoji.svg-ic{color:inherit}
  .award .emoji.svg-ic svg{width:22px;height:22px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Trophäen-Karten im Profil – kleinere SVGs statt 34px Emoji */
  .pp-tr .ic.svg-ic{display:grid;place-items:center;width:38px;height:38px;margin:0 auto 7px;
    color:var(--gold);filter:drop-shadow(0 4px 9px rgba(247,207,74,.35))}
  .pp-tr.team .ic.svg-ic{color:var(--blue);filter:drop-shadow(0 4px 9px rgba(86,180,232,.35))}
  .pp-tr .ic.svg-ic svg{width:30px;height:30px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Award-Slots im Profil */
  .pp-aw .ic.svg-ic{display:grid;place-items:center;width:24px;height:24px;margin:0 auto 3px;color:var(--ink2)}
  .pp-aw .ic.svg-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pp-aw.empty .ic.svg-ic{color:var(--faint);opacity:.5}

  /* Rang-Steps */
  .pp-rk .ic.svg-ic{display:grid;place-items:center;width:22px;height:22px;margin:0 auto 4px;color:var(--ink2)}
  .pp-rk .ic.svg-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pp-rk.active .ic.svg-ic{color:var(--pp-tier-1);filter:drop-shadow(0 0 7px var(--pp-tier-glow))}

  /* Position-Header im Profil (Sturm/Abwehr) */
  .pp-pos-c .h .ic.svg-ic{display:inline-grid;place-items:center;width:14px;height:14px}
  .pp-pos-c .h .ic.svg-ic svg{width:13px;height:13px;stroke:currentColor;fill:none;
    stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  /* Inline-Icon im Profil-Header Section-Title */
  .pp-sec-title .l .ic.svg-ic{display:inline-grid;place-items:center;width:14px;height:14px;color:var(--ink2)}
  .pp-sec-title .l .ic.svg-ic svg{width:14px;height:14px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Mate/Fav-Row Icons */
  .pp-r .l .ic.svg-ic{display:inline-grid;place-items:center;width:13px;height:13px;color:var(--ink2);margin-right:4px;vertical-align:-2px}
  .pp-r .l .ic.svg-ic svg{width:13px;height:13px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Inline-Position-Tag */
  .lf .ic.svg-ic, .rt .ic.svg-ic{display:inline-grid;place-items:center;width:11px;height:11px;vertical-align:-1px}
  .lf .ic.svg-ic svg, .rt .ic.svg-ic svg{width:11px;height:11px;stroke:currentColor;fill:none;
    stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  /* Match-Highlight im Verlauf */
  .match-trophy.svg-ic{display:inline-grid;place-items:center;width:22px;height:22px;color:var(--gold)}
  .match-trophy.svg-ic svg{width:22px;height:22px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .match-small.svg-ic{display:inline-grid;place-items:center;width:14px;height:14px;vertical-align:-2px}
  .match-small.svg-ic.win{color:var(--gold)}
  .match-small.svg-ic.tie{color:var(--ink2)}
  .match-small.svg-ic svg{width:14px;height:14px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ════════════════════════════════════════════════════════════
     ─── PLAYER PROFILE — V3 OVERHAUL ───
     Trinity-Box, Spark-Row, Streaks-Splitter. Bestehende Klassen
     bleiben unangetastet (Tier, Journey, Roles, Beziehungen, Rail).
     ════════════════════════════════════════════════════════════ */

  /* Pill-Set unterhalb des Namens — Tier + Position uniform */
  .pp-pills{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
  .pp-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;
    background:var(--surface);border:1px solid var(--line);
    font-size:11px;color:var(--ink2);font-weight:500;line-height:1}
  .pp-pill svg{width:12px;height:12px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pp-tier-legende    .pp-pill.tier{background:linear-gradient(180deg,rgba(247,207,74,.16),rgba(247,207,74,.06));border-color:rgba(247,207,74,.4);color:var(--gold)}
  .pp-tier-elite      .pp-pill.tier{background:linear-gradient(180deg,rgba(167,139,250,.16),rgba(167,139,250,.06));border-color:rgba(167,139,250,.4);color:var(--purple)}
  .pp-tier-stark      .pp-pill.tier{background:linear-gradient(180deg,rgba(190,242,100,.16),rgba(190,242,100,.06));border-color:rgba(190,242,100,.4);color:var(--acid)}
  .pp-tier-solide     .pp-pill.tier{background:linear-gradient(180deg,rgba(86,180,232,.16),rgba(86,180,232,.06));border-color:rgba(86,180,232,.4);color:var(--blue)}
  .pp-tier-einsteiger .pp-pill.tier{background:linear-gradient(180deg,rgba(255,120,73,.16),rgba(255,120,73,.06));border-color:rgba(255,120,73,.4);color:var(--orange)}

  /* ─── SIGNATURE: Peak-Elo-Trinity ─── */
  /* Drei zusammenhängende Spalten mit Hairline-Trennern. Linke Spalte = Aktuell (Acid),
     mittlere = Peak diese Saison, rechte = Peak Allzeit (Gold/Tier-getönt). */
  .pp-elo-trinity{
    margin:22px 0 0;
    display:grid;grid-template-columns:1fr 1fr 1fr;
    gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:14px;overflow:hidden;
  }
  .pp-et-col{background:var(--surface);padding:14px 8px 12px;text-align:center;position:relative;min-width:0}
  .pp-et-col.now{background:linear-gradient(180deg,rgba(190,242,100,.06),transparent 70%)}
  .pp-et-col .label{
    font-family:'Sometype Mono',monospace;font-size:8.5px;
    text-transform:uppercase;letter-spacing:.16em;color:var(--muted);
    display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:6px;line-height:1;
  }
  .pp-et-col .label svg{width:10px;height:10px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pp-et-col .val{font-family:'Archivo Black',sans-serif;font-size:24px;
    letter-spacing:-.02em;line-height:1;color:var(--ink)}
  .pp-et-col.now .val{color:var(--acid)}
  .pp-et-col .sub{margin-top:5px;font-family:'Sometype Mono',monospace;font-size:9.5px;color:var(--muted);
    line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Allzeit-Spalte trägt die Tier-Farbe (Gold bei Legende) — fällt zurück auf Acid */
  .pp-et-col.alltime .label{color:var(--pp-tier-1,var(--acid))}
  .pp-et-col.alltime .label svg{color:var(--pp-tier-1,var(--acid))}
  .pp-et-col.alltime .val{color:var(--pp-tier-1,var(--ink))}

  /* ─── Spark-Row: Sparkline + Form-Dots in EINEM Container ─── */
  .pp-spark-row{
    margin-top:14px;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px 11px;
  }
  .pp-spark-row .pp-spark{margin:0 0 4px;max-width:none;height:38px}
  .pp-spark-row .pp-spark-foot{margin-top:2px;padding-top:0;border-top:none}
  .pp-spark-row .pp-form{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}

  /* ─── Streaks: kompakter Zwei-Spalter ─── */
  .pp-streaks{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pp-st{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .pp-st .l{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);
    font-family:'Sometype Mono',monospace;margin-bottom:5px;line-height:1}
  .pp-st .v{font-family:'Archivo Black',sans-serif;font-size:17px;letter-spacing:-.01em;color:var(--ink);line-height:1}
  .pp-st .v.empty{color:var(--muted);font-size:14px}
  .pp-st .dots{display:flex;gap:3px;margin-top:7px}
  .pp-st .dots i{width:5px;height:5px;border-radius:50%;background:var(--acid);
    box-shadow:0 0 6px rgba(190,242,100,.5)}
  .pp-st .dots.loss i{background:var(--red);box-shadow:0 0 6px rgba(240,86,106,.4)}

  /* Beziehungen — 2×2 Grid (Wrapper für die bestehenden .pp-r-rich Karten) */
  .pp-rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pp-rel-grid > .pp-r-rich{display:flex;align-items:center;gap:10px;border-radius:14px;border-left-width:1px;border-left-style:solid}

  /* Auszeichnungs-Strip (Übersicht im Profil) — vereinfacht */
  .pp-badges-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
  .pp-badges-card:active{transform:scale(.985)}
  .pp-badges-strip{display:flex;gap:7px;flex-wrap:wrap;color:var(--ink2);flex:1;min-width:0}
  .pp-badges-strip svg{width:20px;height:20px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pp-badges-card .chev{color:var(--muted);flex-shrink:0;display:grid;place-items:center}
  .pp-badges-card .chev svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;
    stroke-linecap:round;stroke-linejoin:round}

  /* ════════════════════════════════════════════════════════════════
     AUSZEICHNUNGS-CARD im Profil (Variante 4: Strip + dünne Tier-Bar)
     ════════════════════════════════════════════════════════════════ */
  .pp-bcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;cursor:pointer;transition:.15s}
  .pp-bcard:active{transform:scale(.985)}
  .pp-bcard-row{display:flex;align-items:center;gap:10px}
  .pp-bcard-strip{flex:1;min-width:0;display:flex;gap:6px;align-items:center}
  .pp-bmini{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;
    border:1px solid var(--line2);background:var(--bg2);flex-shrink:0;color:var(--ink2)}
  .pp-bmini svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
  .pp-bmini.legendary{color:var(--gold);border-color:rgba(247,207,74,.4)}
  .pp-bmini.rare{color:var(--purple);border-color:rgba(167,139,250,.38)}
  .pp-bmini.common{color:var(--acid);border-color:rgba(190,242,100,.25)}
  .pp-bmini.negative{color:var(--red);border-color:rgba(240,86,106,.38)}
  .pp-bcard-rest{font-size:10px;color:var(--muted);font-family:'Sometype Mono',monospace;
    font-weight:700;margin-left:3px}
  .pp-bcard-chev{color:var(--muted);flex-shrink:0;display:grid;place-items:center}
  .pp-bcard-chev svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;
    stroke-linecap:round}
  .pp-bcard-bar{height:3px;background:var(--bg2);border-radius:99px;display:flex;
    overflow:hidden;gap:2px;margin-top:10px}
  .pp-bcard-bar .seg{height:100%}
  .pp-bcard-bar .seg.legendary{background:var(--gold)}
  .pp-bcard-bar .seg.rare{background:var(--purple)}
  .pp-bcard-bar .seg.common{background:var(--acid);opacity:.85}
  .pp-bcard-bar .seg.negative{background:var(--red)}

  /* ════════════════════════════════════════════════════════════════
     AUSZEICHNUNGS-SHEET (Tier-Counter + gruppierte Cards + Schande-Block)
     ════════════════════════════════════════════════════════════════ */
  .bsh-counter{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:9px 11px;margin-bottom:16px;display:flex;justify-content:space-between;
    align-items:center;gap:6px}
  .bsh-counter .tc-pill{display:inline-flex;align-items:center;gap:5px;
    font-family:'Sometype Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.04em}
  .bsh-counter .tc-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .bsh-counter .tc-pill.dim{opacity:.4}
  .bsh-counter .tc-pill.dim .dot{background:var(--faint)}
  .bsh-counter .tc-pill .n{color:var(--ink);font-family:'Archivo Black',sans-serif;font-size:11.5px}
  .bsh-counter .tc-pill.legendary{color:var(--gold)}
  .bsh-counter .tc-pill.rare{color:var(--purple)}
  .bsh-counter .tc-pill.common{color:var(--acid)}
  .bsh-counter .tc-pill.negative{color:var(--red)}
  .bsh-counter .tc-sep{width:1px;height:14px;background:var(--line2);opacity:.6}

  .bsh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bsh-neg-divider{display:flex;align-items:center;gap:10px;margin:20px 4px 12px}
  .bsh-neg-divider-line{flex:1;height:1px;
    background:linear-gradient(90deg,transparent,var(--line2),transparent)}
  .bsh-neg-divider-label{font-family:'Sometype Mono',monospace;font-size:10px;
    text-transform:uppercase;letter-spacing:.2em;color:var(--red);font-weight:700;
    display:flex;align-items:center;gap:5px;opacity:.75}
  .bsh-neg-divider-label .dot{width:5px;height:5px;border-radius:50%;background:var(--red)}

  .bsh-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px;padding-top:18px;text-align:center;position:relative;overflow:hidden;transition:.15s}
  .bsh-card-ic{font-size:30px;margin-bottom:10px;display:flex;justify-content:center;
    align-items:center;min-height:32px}
  .bsh-card-ic svg{width:30px;height:30px;stroke:currentColor;fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
  .bsh-card-name{font-weight:700;font-size:13px;margin-bottom:4px;letter-spacing:-.005em}
  .bsh-card-desc{font-size:10.5px;color:var(--muted);line-height:1.4;margin-bottom:8px}
  .bsh-card-count{font-family:'Archivo Black',sans-serif;font-size:16px}
  .bsh-card-once{font-size:9.5px;font-weight:700;text-transform:uppercase;
    letter-spacing:.12em;font-family:'Sometype Mono',monospace}

  /* Locked: alles farbneutral, winziger Tier-Dot oben links */
  .bsh-card.locked{opacity:.4;border-color:var(--line)}
  .bsh-card.locked .bsh-card-ic{color:var(--faint)}
  .bsh-card.locked .bsh-card-name{color:var(--ink2)}
  .bsh-card.locked .tier-dot{position:absolute;top:8px;left:9px;width:5px;height:5px;
    border-radius:50%;background:currentColor;opacity:.55}
  .bsh-card.locked.legendary{color:var(--gold)}
  .bsh-card.locked.rare{color:var(--purple)}
  .bsh-card.locked.common{color:var(--acid)}
  .bsh-card.locked.negative{color:var(--red)}

  /* Unlocked: Tier-Farbe sichtbar */
  .bsh-card.unlocked.legendary{color:var(--gold)}
  .bsh-card.unlocked.rare{color:var(--purple)}
  .bsh-card.unlocked.common{color:var(--acid)}
  .bsh-card.unlocked.negative{color:var(--red)}
  .bsh-card.unlocked .bsh-card-ic,
  .bsh-card.unlocked .bsh-card-count,
  .bsh-card.unlocked .bsh-card-once{color:currentColor}

  /* Akzent-Strich oben (nur unlocked) */
  .bsh-card.unlocked::before{content:"";position:absolute;top:0;left:14px;right:14px;height:2px;
    background:currentColor;border-radius:0 0 99px 99px;opacity:.65}
  .bsh-card.unlocked.legendary{border-color:rgba(247,207,74,.55);
    background:radial-gradient(circle at 50% 0%,rgba(247,207,74,.16),var(--surface) 65%);
    box-shadow:0 0 20px rgba(247,207,74,.14)}
  .bsh-card.unlocked.legendary::before{height:3px;box-shadow:0 0 12px var(--gold);opacity:1}
  .bsh-card.unlocked.legendary .bsh-card-ic{filter:drop-shadow(0 0 6px rgba(247,207,74,.4))}
  .bsh-card.unlocked.rare{border-color:rgba(167,139,250,.4)}
  .bsh-card.unlocked.rare .bsh-card-ic{filter:drop-shadow(0 0 4px rgba(167,139,250,.25))}
  .bsh-card.unlocked.common{border-color:rgba(190,242,100,.28)}
  .bsh-card.unlocked.common::before{opacity:.35}
  .bsh-card.unlocked.negative{border-color:rgba(240,86,106,.4);
    background:radial-gradient(circle at 50% 0%,rgba(240,86,106,.08),var(--surface) 75%)}
  .bsh-card.unlocked.negative .bsh-card-ic{filter:drop-shadow(0 0 4px rgba(240,86,106,.25))}

  /* Trophäen-Rail — feiner als das alte mit Goldener/Blauer Akzent-Fläche */
  .pp-trophies{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;margin:0;scrollbar-width:none}
  .pp-trophies::-webkit-scrollbar{display:none}
  .pp-tr{flex-shrink:0;width:130px;border-radius:14px;padding:12px;cursor:pointer;
    background:linear-gradient(180deg,rgba(247,207,74,.1),rgba(247,207,74,.02));
    border:1px solid rgba(247,207,74,.3);transition:.2s}
  .pp-tr:active{transform:scale(.985)}
  .pp-tr.team{background:linear-gradient(180deg,rgba(86,180,232,.1),rgba(86,180,232,.02));
    border-color:rgba(86,180,232,.3)}
  .pp-tr .ic.svg-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
    margin:0 0 10px;background:rgba(247,207,74,.15);color:var(--gold);filter:none}
  .pp-tr.team .ic.svg-ic{background:rgba(86,180,232,.15);color:var(--blue);filter:none}
  .pp-tr .ic.svg-ic svg{width:16px;height:16px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pp-tr .ti{font-size:11px;font-weight:700;line-height:1.25;margin-bottom:4px;color:var(--ink)}
  .pp-tr .su{font-size:10px;color:var(--muted);font-family:'Sometype Mono',monospace}

  /* Awards-Grid — Stern/Schild/Smiley als SVG (Emojis raus) */
  .pp-awards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .pp-aw{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px 8px;text-align:center;position:relative}
  .pp-aw.empty{opacity:.45}
  .pp-aw .ic.svg-ic{width:32px;height:32px;border-radius:10px;background:var(--surface3);
    color:var(--ink2);display:grid;place-items:center;margin:0 auto 8px}
  .pp-aw .ic.svg-ic svg{width:16px;height:16px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pp-aw .nm{font-size:9.5px;line-height:1.25;color:var(--ink2);margin-bottom:6px}
  .pp-aw .num{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--acid);line-height:1}
  .pp-aw.empty .num{color:var(--muted)}

  /* Saison-Rail-Karten — größere Platzziffer als Anker */
  .pp-seasons{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;margin:0;scrollbar-width:none}
  .pp-seasons::-webkit-scrollbar{display:none}
  .pp-sn{flex-shrink:0;width:74px;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:10px 8px;text-align:center}
  .pp-sn.silver{border-color:rgba(185,196,189,.3)}
  .pp-sn.bronze{border-color:rgba(180,120,73,.3)}
  .pp-sn .mo{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;
    font-family:'Sometype Mono',monospace}
  .pp-sn .pl{margin:6px 0;font-family:'Archivo Black',sans-serif;font-size:22px;
    letter-spacing:-.02em;color:var(--ink);line-height:1}
  .pp-sn.gold .pl{color:var(--gold)}
  .pp-sn .pl .n{display:inline-block}
  .pp-sn .el{font-family:'Sometype Mono',monospace;font-size:10px;font-weight:700}
  .pp-sn .el.pos{color:var(--acid)}
  .pp-sn .el.neg{color:var(--red)}
  .pp-sn .rc{font-family:'Sometype Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px}

  /* Positions-Profil-Slider — kompakter */
  .pp-posprof{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .pp-posprof .pph{display:flex;justify-content:space-between;align-items:center;
    font-size:10px;color:var(--muted);margin-bottom:10px;font-family:'Sometype Mono',monospace}
  .pp-posprof .pph .lf,.pp-posprof .pph .rt{display:inline-flex;align-items:center;gap:4px}
  .pp-posprof .pph svg{width:11px;height:11px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pp-posprof .pph .pct{color:var(--ink);font-weight:700}
  .pp-posprof .pp-slider{position:relative;height:6px;background:var(--surface3);border-radius:3px}
  .pp-posprof .pp-fill{height:100%;background:linear-gradient(90deg,var(--acid2),var(--acid));border-radius:3px}
  .pp-posprof .pp-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);
    width:14px;height:14px;border-radius:50%;background:var(--ink);border:2px solid var(--bg);
    box-shadow:0 2px 8px rgba(0,0,0,.5)}
  .pp-posprof .ppf{margin-top:10px;font-size:11px;color:var(--ink2);text-align:center}
  .pp-posprof .ppf .lab{font-weight:700;color:var(--ink)}

  /* Delete-Button — etwas warmer ohne aggressiv zu sein */
  .pp-del{margin-top:24px;padding-top:8px}
  .pp-del button{width:100%;background:transparent;border:1px solid rgba(240,86,106,.3);
    color:var(--red);padding:12px;border-radius:13px;font-family:inherit;font-size:12px;
    font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .pp-del button svg{width:13px;height:13px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  /* ─── ENDE PLAYER PROFILE V3 OVERHAUL ─── */


  /* ============ V2 ZUSATZ-STYLES ============ */
  /* SVG-Crown im sh-crown / aw-pod-crown (ersetzt 👑) */
  .sh-crown svg, .aw-pod-crown svg{width:22px;height:22px;fill:var(--gold);stroke:none;display:block;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .aw-pod-crown svg{width:18px;height:18px}

  /* ============ WOCHEN-HIGHLIGHTS (Woche-Ansicht) ============ */
  .wk-highlights{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .wk-hl{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:10px 11px;min-width:0;position:relative;overflow:hidden;cursor:pointer;transition:.16s}
  .wk-hl:active{transform:scale(.985);background:var(--surface2)}
  .wk-hl-ic{position:absolute;top:8px;right:8px;color:var(--faint);opacity:.55}
  .wk-hl-ic svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .wk-hl-label{font-size:8.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
    font-family:'Sometype Mono',monospace;font-weight:700}
  .wk-hl-val{font-family:'Archivo Black',sans-serif;font-size:14px;margin-top:6px;
    letter-spacing:-.01em;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wk-hl-detail{font-size:10px;color:var(--muted);font-family:'Sometype Mono',monospace;margin-top:3px}
  .wk-hl.scorer{background:linear-gradient(135deg,rgba(255,120,73,.06),var(--surface) 70%);border-color:rgba(255,120,73,.2)}
  .wk-hl.scorer .wk-hl-label{color:var(--orange)}
  .wk-hl.team{background:linear-gradient(135deg,rgba(86,180,232,.06),var(--surface) 70%);border-color:rgba(86,180,232,.2)}
  .wk-hl.team .wk-hl-label{color:var(--blue)}
  .wk-hl.streak{background:linear-gradient(135deg,rgba(190,242,100,.06),var(--surface) 70%);border-color:rgba(190,242,100,.2)}
  .wk-hl.streak .wk-hl-label{color:var(--acid)}
  .wk-hl.upset{background:linear-gradient(135deg,rgba(167,139,250,.06),var(--surface) 70%);border-color:rgba(167,139,250,.2)}
  .wk-hl.upset .wk-hl-label{color:var(--purple)}
  .wk-hl.king{background:linear-gradient(135deg,rgba(247,207,74,.07),var(--surface) 70%);border-color:rgba(247,207,74,.22)}
  .wk-hl.king .wk-hl-label{color:var(--gold)}
  .wk-hl.empty{opacity:.55}
  .wk-hl.empty .wk-hl-val{color:var(--muted);font-size:13px}

  /* ============ HALL OF FAME (Gesamt-Ansicht) ============ */
  .hof-hero{position:relative;
    background:linear-gradient(135deg,rgba(247,207,74,.14),rgba(167,139,250,.06) 50%,var(--surface) 90%);
    border:1px solid rgba(247,207,74,.45);border-radius:22px;padding:20px 18px 18px;margin-bottom:10px;overflow:hidden;cursor:pointer}
  .hof-hero:active{transform:scale(.99)}
  .hof-hero::before{content:"";position:absolute;top:-40px;right:-40px;width:180px;height:180px;
    background:radial-gradient(circle,rgba(247,207,74,.16),transparent 65%);pointer-events:none}
  .hof-hero::after{content:"";position:absolute;bottom:-30px;left:-20px;width:140px;height:140px;
    background:radial-gradient(circle,rgba(167,139,250,.10),transparent 65%);pointer-events:none}
  .hof-ribbon{display:inline-flex;align-items:center;gap:6px;font-family:'Sometype Mono',monospace;
    font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
    padding:5px 10px;background:rgba(247,207,74,.10);border:1px solid rgba(247,207,74,.3);border-radius:99px;position:relative;z-index:1}
  .hof-ribbon svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .hof-main{display:flex;align-items:flex-end;gap:16px;margin-top:14px;position:relative;z-index:1}
  .hof-av-wrap{position:relative;flex-shrink:0}
  .hof-av{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;font-size:42px;
    background:linear-gradient(155deg,#3a4540,#212824);border:3px solid var(--gold);box-shadow:0 0 24px rgba(247,207,74,.45)}
  .hof-av.has-emoji .em{font-size:1em;line-height:1;
    font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .hof-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:28px;color:var(--bg)}
  .hof-crown{position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:3;line-height:1}
  .hof-crown svg{width:22px;height:22px;fill:var(--gold);stroke:none;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .hof-info{flex:1;min-width:0;padding-bottom:4px}
  .hof-name{font-family:'Archivo Black',sans-serif;font-size:28px;line-height:1;letter-spacing:-.03em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hof-tier-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .hof-tier{display:inline-flex;align-items:center;gap:5px;font-family:'Sometype Mono',monospace;
    font-size:12px;font-weight:700;letter-spacing:.06em;
    padding:4px 11px;border-radius:8px;border:1px solid currentColor}
  .hof-tier svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}
  .hof-tier.t-legende    {color:var(--gold);background:rgba(247,207,74,.12)}
  .hof-tier.t-elite      {color:var(--purple);background:rgba(167,139,250,.12)}
  .hof-tier.t-stark      {color:var(--acid);background:rgba(190,242,100,.12)}
  .hof-tier.t-solide     {color:var(--blue);background:rgba(86,180,232,.12)}
  .hof-tier.t-einsteiger {color:var(--orange);background:rgba(255,120,73,.12)}
  .hof-elo{font-family:'Sometype Mono',monospace;font-size:12px;color:var(--ink2);font-weight:600}
  .hof-elo b{color:var(--acid);font-family:'Archivo Black',sans-serif;font-size:14px;letter-spacing:-.01em}
  .hof-stats{display:flex;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(247,207,74,.18);position:relative;z-index:1}
  .hof-stat{flex:1;min-width:0}
  .hof-stat .v{font-family:'Archivo Black',sans-serif;font-size:17px;line-height:1}
  .hof-stat .v.acid{color:var(--acid)} .hof-stat .v.red{color:var(--red)}
  .hof-stat .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;
    font-family:'Sometype Mono',monospace;font-weight:600;margin-top:4px}

  /* All-Time Records Strip */
  .records-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .rec{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 10px;
    position:relative;overflow:hidden;min-width:0;cursor:pointer;transition:.16s}
  .rec:active{transform:scale(.985);background:var(--surface2)}
  .rec-ic{position:absolute;top:8px;right:8px;color:var(--faint);opacity:.55}
  .rec-ic svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .rec-label{font-size:8.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
    font-family:'Sometype Mono',monospace;font-weight:700}
  .rec-val{font-family:'Archivo Black',sans-serif;font-size:18px;margin-top:6px;line-height:1;letter-spacing:-.02em}
  .rec-name{font-size:11px;color:var(--ink2);margin-top:4px;font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rec.peak{background:linear-gradient(135deg,rgba(247,207,74,.06),var(--surface) 70%);border-color:rgba(247,207,74,.22)}
  .rec.peak .rec-val{color:var(--gold)}
  .rec.wins{background:linear-gradient(135deg,rgba(190,242,100,.05),var(--surface) 70%);border-color:rgba(190,242,100,.20)}
  .rec.wins .rec-val{color:var(--acid)}
  .rec.wr{background:linear-gradient(135deg,rgba(86,180,232,.05),var(--surface) 70%);border-color:rgba(86,180,232,.20)}
  .rec.wr .rec-val{color:var(--blue)}

  /* HoF Podium #2 / #3 — kleiner als #1, aber weiterhin eindrucksvoll */
  .hof-pods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .hof-pod{position:relative;border-radius:16px;padding:12px 12px 11px;
    cursor:pointer;transition:.16s;overflow:hidden;min-width:0}
  .hof-pod:active{transform:scale(.99)}
  .hof-pod.silver{background:linear-gradient(135deg,rgba(200,208,203,.10),rgba(200,208,203,.02) 60%,var(--surface) 92%);
    border:1px solid rgba(200,208,203,.30)}
  .hof-pod.bronze{background:linear-gradient(135deg,rgba(205,127,50,.10),rgba(205,127,50,.02) 60%,var(--surface) 92%);
    border:1px solid rgba(205,127,50,.30)}
  .hof-pod::before{content:"";position:absolute;top:-30px;right:-25px;width:110px;height:110px;
    pointer-events:none}
  .hof-pod.silver::before{background:radial-gradient(circle,rgba(200,208,203,.14),transparent 65%)}
  .hof-pod.bronze::before{background:radial-gradient(circle,rgba(205,127,50,.14),transparent 65%)}
  .hof-pod-rank{display:inline-flex;align-items:center;gap:5px;
    font-family:'Sometype Mono',monospace;font-size:9px;font-weight:700;
    letter-spacing:.15em;text-transform:uppercase;
    padding:3px 8px;border-radius:99px;position:relative;z-index:1}
  .hof-pod-rank svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .hof-pod.silver .hof-pod-rank{color:#cdd5d0;background:rgba(200,208,203,.10);border:1px solid rgba(200,208,203,.28)}
  .hof-pod.bronze .hof-pod-rank{color:#d49158;background:rgba(205,127,50,.12);border:1px solid rgba(205,127,50,.30)}
  .hof-pod-row{display:flex;align-items:center;gap:10px;margin-top:10px;position:relative;z-index:1;min-width:0}
  .hof-pod-av-wrap{flex-shrink:0;position:relative}
  .hof-pod-av{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;
    background:linear-gradient(155deg,#3a4540,#212824);font-size:22px}
  .hof-pod.silver .hof-pod-av{border:2px solid rgba(200,208,203,.55);
    box-shadow:0 0 10px rgba(200,208,203,.20)}
  .hof-pod.bronze .hof-pod-av{border:2px solid rgba(205,127,50,.55);
    box-shadow:0 0 10px rgba(205,127,50,.20)}
  .hof-pod-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--bg)}
  .hof-pod-av.has-emoji{background:var(--surface3)}
  .hof-pod-av.has-emoji .em{font-size:1em;line-height:1;
    font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .hof-pod-info{flex:1;min-width:0}
  .hof-pod-name{font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:-.02em;line-height:1;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hof-pod-tier-row{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
  .hof-pod-elo{font-family:'Sometype Mono',monospace;font-size:10px;color:var(--ink2);font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hof-pod-elo b{color:var(--acid);font-family:'Archivo Black',sans-serif;font-size:11px;letter-spacing:-.01em}
  .hof-pod .tier-pill{font-size:9.5px;padding:2px 6px}
  .hof-pod .tier-pill svg{width:9px;height:9px}
  .hof-pod-stats{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:9px;
    font-family:'Sometype Mono',monospace;font-size:10.5px;color:var(--ink2);font-weight:600;
    position:relative;z-index:1}
  .hof-pod.silver .hof-pod-stats{border-top:1px solid rgba(200,208,203,.18)}
  .hof-pod.bronze .hof-pod-stats{border-top:1px solid rgba(205,127,50,.18)}
  .hof-pod-stat-sep{color:var(--faint);opacity:.6}
  @media (max-width: 360px){
    .hof-pods{gap:6px}
    .hof-pod{padding:10px 9px 9px;border-radius:14px}
    .hof-pod-row{gap:8px;margin-top:8px}
    .hof-pod-av{width:38px;height:38px;font-size:19px}
    .hof-pod-av:not(.has-emoji){font-size:12px}
    .hof-pod-name{font-size:13.5px}
    .hof-pod-rank{font-size:8px;padding:2px 6px;letter-spacing:.12em}
    .hof-pod-elo{font-size:9.5px}
    .hof-pod-elo b{font-size:10px}
    .hof-pod .tier-pill{font-size:8.5px;padding:2px 5px}
    .hof-pod-stats{font-size:9.5px;gap:5px;margin-top:8px;padding-top:7px}
  }

  /* Tier Pill in Liga-Liste (Gesamt-Ansicht) */
  .tier-pill{display:inline-flex;align-items:center;gap:4px;font-family:'Sometype Mono',monospace;
    font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.02em}
  .tier-pill svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tier-pill.t-legende    {color:var(--gold);background:rgba(247,207,74,.10);border:1px solid rgba(247,207,74,.22)}
  .tier-pill.t-elite      {color:var(--purple);background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.22)}
  .tier-pill.t-stark      {color:var(--acid);background:rgba(190,242,100,.10);border:1px solid rgba(190,242,100,.22)}
  .tier-pill.t-solide     {color:var(--blue);background:rgba(86,180,232,.10);border:1px solid rgba(86,180,232,.22)}
  .tier-pill.t-einsteiger {color:var(--orange);background:rgba(255,120,73,.10);border:1px solid rgba(255,120,73,.22)}

  /* ============ SEASON RECAP REDESIGN ============ */
  .rcp-head{text-align:center;margin-bottom:18px}
  .rcp-label{display:inline-flex;align-items:center;gap:6px;font-family:'Sometype Mono',monospace;
    font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);
    padding:5px 12px;background:rgba(247,207,74,.10);border:1px solid rgba(247,207,74,.3);border-radius:99px}
  .rcp-label svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .rcp-month{font-family:'Archivo Black',sans-serif;font-size:32px;letter-spacing:-.03em;margin-top:10px;line-height:1}
  .rcp-meta{font-size:11.5px;color:var(--muted);font-family:'Sometype Mono',monospace;margin-top:6px;letter-spacing:.04em}

  /* Saison-Picker im Recap-Header */
  .rcp-picker{position:relative;display:inline-flex;align-items:center;margin-top:12px;
    background:var(--surface2);border:1px solid var(--line);border-radius:99px;
    padding:4px 4px 4px 14px;transition:.18s}
  .rcp-picker:hover{border-color:var(--line2)}
  .rcp-picker:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(247,207,74,.12)}
  .rcp-picker-select{appearance:none;-webkit-appearance:none;background:transparent;border:none;outline:none;
    font-family:'Sometype Mono',monospace;font-size:11px;font-weight:700;color:var(--ink);
    letter-spacing:.06em;padding:6px 28px 6px 0;cursor:pointer;
    text-transform:uppercase;line-height:1}
  .rcp-picker-select option{background:var(--surface);color:var(--ink);
    font-family:'Sometype Mono',monospace;text-transform:none;letter-spacing:0}
  .rcp-picker-chevron{position:absolute;right:10px;top:50%;transform:translateY(-50%) rotate(0deg);
    pointer-events:none;color:var(--muted);display:grid;place-items:center}
  .rcp-picker-chevron svg{width:14px;height:14px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .rcp-champ{position:relative;
    background:linear-gradient(135deg,rgba(247,207,74,.16),rgba(190,242,100,.04) 60%,var(--surface) 90%);
    border:1px solid rgba(247,207,74,.45);border-radius:22px;padding:20px 18px 16px;margin-bottom:14px;overflow:hidden;text-align:center}
  .rcp-champ::before{content:"";position:absolute;top:-50px;right:-30px;width:180px;height:180px;
    background:radial-gradient(circle,rgba(247,207,74,.18),transparent 65%);pointer-events:none}
  .rcp-champ::after{content:"";position:absolute;bottom:-30px;left:-20px;width:140px;height:140px;
    background:radial-gradient(circle,rgba(190,242,100,.08),transparent 65%);pointer-events:none}
  .rcp-champ-label{font-family:'Sometype Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;color:var(--gold);position:relative;z-index:1}
  .rcp-champ-av-wrap{position:relative;display:inline-block;margin:14px 0 10px}
  .rcp-champ-av{width:88px;height:88px;border-radius:50%;display:grid;place-items:center;font-size:44px;
    background:linear-gradient(155deg,#3a4540,#212824);border:3px solid var(--gold);
    box-shadow:0 0 32px rgba(247,207,74,.5)}
  .rcp-champ-av.has-emoji .em{font-size:1em;line-height:1;
    font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .rcp-champ-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:30px;color:var(--bg)}
  .rcp-champ-crown{position:absolute;top:-18px;left:50%;transform:translateX(-50%);z-index:3;line-height:1}
  .rcp-champ-crown svg{width:26px;height:26px;fill:var(--gold);stroke:none;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .rcp-champ-name{font-family:'Archivo Black',sans-serif;font-size:28px;letter-spacing:-.03em;line-height:1;position:relative;z-index:1}
  .rcp-champ-stats{display:flex;justify-content:center;gap:18px;margin-top:14px;padding-top:14px;
    border-top:1px solid rgba(247,207,74,.18);position:relative;z-index:1}
  .rcp-champ-stats .s{text-align:center}
  .rcp-champ-stats .s .v{font-family:'Archivo Black',sans-serif;font-size:18px;line-height:1}
  .rcp-champ-stats .s .v.acid{color:var(--acid)} .rcp-champ-stats .s .v.red{color:var(--red)}
  .rcp-champ-stats .s .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;
    font-family:'Sometype Mono',monospace;margin-top:4px;font-weight:700}

  .rcp-pod{display:flex;align-items:flex-end;gap:8px;background:var(--bg2);
    border:1px solid var(--line);border-radius:18px;padding:14px 10px 10px;margin-bottom:14px}
  .rcp-pod-col{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;min-width:0}
  .rcp-pod-av{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:24px;
    background:linear-gradient(155deg,#3a4540,#212824);border:2px solid var(--line2);margin-bottom:6px;position:relative}
  .rcp-pod-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:15px;color:var(--bg)}
  .rcp-pod-av.has-emoji .em{font-size:1em;line-height:1;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .rcp-pod-col.first .rcp-pod-av{width:60px;height:60px;font-size:30px;border-color:var(--gold);box-shadow:0 0 14px rgba(247,207,74,.35)}
  .rcp-pod-col.first .rcp-pod-av:not(.has-emoji){font-size:18px}
  .rcp-pod-col.second .rcp-pod-av{border-color:#c8d0cb;box-shadow:0 0 10px rgba(200,208,203,.3)}
  .rcp-pod-col.third .rcp-pod-av{border-color:var(--orange);box-shadow:0 0 10px rgba(255,120,73,.3)}
  .rcp-pod-mini-crown{position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:3}
  .rcp-pod-mini-crown svg{width:18px;height:18px;fill:var(--gold);stroke:none}
  .rcp-pod-name{font-family:'Archivo Black',sans-serif;font-size:13px;line-height:1.1;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .rcp-pod-col.first .rcp-pod-name{font-size:15px}
  .rcp-pod-elo{font-family:'Sometype Mono',monospace;font-size:11px;color:var(--ink2);margin-top:3px;font-weight:600}
  .rcp-pod-col.first .rcp-pod-elo{color:var(--gold)}
  .rcp-pod-col.second .rcp-pod-elo{color:#c8d0cb}
  .rcp-pod-col.third .rcp-pod-elo{color:var(--orange)}
  .rcp-pod-wl{font-size:9.5px;color:var(--muted);margin-top:2px;font-family:'Sometype Mono',monospace}
  .rcp-pod-block{margin-top:8px;width:100%;font-family:'Archivo Black',sans-serif;font-size:14px;
    padding:6px 0;border-radius:6px 6px 0 0;color:var(--bg)}
  .rcp-pod-col.first .rcp-pod-block{background:var(--gold);height:50px;line-height:38px}
  .rcp-pod-col.second .rcp-pod-block{background:#c8d0cb;height:36px;line-height:24px}
  .rcp-pod-col.third .rcp-pod-block{background:var(--orange);height:28px;line-height:16px}

  .rcp-section{font-family:'Sometype Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:4px 2px 10px;
    display:flex;align-items:center;gap:8px}
  .rcp-section::after{content:"";flex:1;height:1px;background:var(--line)}

  .rcp-awards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .rcp-aw{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:12px;display:flex;gap:11px;align-items:center;position:relative;overflow:hidden;
    cursor:pointer;transition:.16s;min-width:0}
  .rcp-aw:active{transform:scale(.985);background:var(--surface2)}
  .rcp-aw::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px}
  .rcp-aw.orange::before{background:var(--orange)}
  .rcp-aw.purple::before{background:var(--purple)}
  .rcp-aw.acid::before{background:var(--acid)}
  .rcp-aw.blue::before{background:var(--blue)}
  .rcp-aw-ic{width:32px;height:32px;border-radius:10px;background:var(--surface2);display:grid;place-items:center;flex-shrink:0}
  .rcp-aw-ic svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .rcp-aw.orange .rcp-aw-ic{color:var(--orange)}
  .rcp-aw.purple .rcp-aw-ic{color:var(--purple)}
  .rcp-aw.acid .rcp-aw-ic{color:var(--acid)}
  .rcp-aw.blue .rcp-aw-ic{color:var(--blue)}
  .rcp-aw-info{flex:1;min-width:0}
  .rcp-aw-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
    font-family:'Sometype Mono',monospace;font-weight:700}
  .rcp-aw-name{font-family:'Archivo Black',sans-serif;font-size:13px;margin-top:3px;
    letter-spacing:-.01em;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rcp-aw-val{font-family:'Sometype Mono',monospace;font-size:10.5px;color:var(--ink2);margin-top:3px;font-weight:600}

  .rcp-tos{background:linear-gradient(135deg,rgba(86,180,232,.10),var(--surface) 70%);
    border:1px solid rgba(86,180,232,.35);border-radius:16px;padding:14px;
    display:flex;align-items:center;gap:14px;margin-bottom:16px;cursor:pointer;transition:.16s}
  .rcp-tos:active{transform:scale(.985)}
  .rcp-tos-pair{display:flex;flex-shrink:0}
  .rcp-tos-pair .rcp-tos-av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(155deg,#3a4540,#212824);border:2px solid var(--surface)}
  .rcp-tos-pair .rcp-tos-av+.rcp-tos-av{margin-left:-10px}
  .rcp-tos-pair .rcp-tos-av:not(.has-emoji){font-family:'Archivo Black',sans-serif;font-size:13px;color:var(--bg)}
  .rcp-tos-pair .rcp-tos-av.has-emoji .em{font-size:1em;line-height:1;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif}
  .rcp-tos-info{flex:1;min-width:0}
  .rcp-tos-label{font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:var(--blue);
    font-family:'Sometype Mono',monospace;font-weight:700}
  .rcp-tos-name{font-family:'Archivo Black',sans-serif;font-size:16px;margin-top:4px;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .potw-hl-ic svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

<script>

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyYXZwc3luY2tnenJhZHNlcnhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU1NzMsImV4cCI6MjA5NDk2MTU3M30.HKylQnVlSimk1sCFBlw4vRqfzRnLH7r7kqWd4h-lmR8";

(function(){
"use strict";
if(SUPABASE_URL.startsWith("HIER")||SUPABASE_KEY.startsWith("HIER")){
  document.getElementById('setupGate').style.display='block'; return;
}
document.getElementById('app').style.display='block';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ════════ BUILD-VERSION & UPDATE-CHECK ════════
// Bei jedem Deploy diesen String bumpen (Datum + laufender Zähler).
// Der Hintergrund-Check fetched die index.html mit Cache-Bust und vergleicht.
// Bei neuerer Version: Banner oben → Force-Reload bricht iOS-PWA-/Browser-Cache.
const BUILD_VERSION='2026.06.20.15';
function forceReload(){
  const u=new URL(location.href);
  u.searchParams.set('_cb',Date.now());
  // replace statt assign damit der alte Eintrag nicht in der History bleibt
  location.replace(u.toString());
}
async function checkForUpdate(){
  try{
    const url=location.pathname+'?_cb='+Date.now();
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok)return;
    const text=await r.text();
    const m=text.match(/const BUILD_VERSION=['"]([^'"]+)['"]/);
    if(!m||!m[1]||m[1]===BUILD_VERSION)return;
    if(document.getElementById('updateBanner'))return;
    const b=document.createElement('div');
    b.id='updateBanner';

  }catch(e){/* offline / CORS — still ignorieren */}
}

function svgI(name, opts){
  const o = opts || {};
  const cls = o.cls ? ' '+o.cls : '';
  const path = ICONS[name] || '';
  return `<span class="ic svg-ic${cls}"><svg viewBox="0 0 24 24" aria-hidden="true">${path}</svg></span>`;
}
// Medaillen-Badge (1/2/3) statt 🥇🥈🥉
function medalB(i){
  if(i<0||i>2) return '';
  return `<span class="medal-b m${i+1}">${i+1}</span>`;
}
// Streak-Badge: 1/2/3 Flammen je nach Stärke (ab 3 / 5 / 7) — alle in Standard-Farbe
function streakBadge(cs){
  if(cs<3) return '';
  if(cs<=-3) return ''; // Niederlagen über streakInline
  const flames = cs>=7 ? 'flameTriple' : cs>=5 ? 'flameDouble' : 'flame';
  return `<span class="streak-badge" title="${cs}er Siegesserie">${svgI(flames)}</span>`;
}
// Inline-Variante neben Namen: dasselbe Schema, plus Niederlagen-Variante mit Tropfen
function streakInline(cs){
  if(cs>=3){
    const flames = cs>=7 ? 'flameTriple' : cs>=5 ? 'flameDouble' : 'flame';
    return `<span class="streak-badge" title="${cs}er Siegesserie">${svgI(flames)}</span>`;
  }
  if(cs<=-3){
    const drops = cs<=-7 ? 'dropTriple' : cs<=-5 ? 'dropDouble' : 'drop';

// ════════ SAISON-SYSTEM (monatlich) ════════
// Jeder Kalendermonat ist eine eigene Saison mit Elo-Reset.
function currentSeason(){
  const now=new Date();
  const y=now.getFullYear(), m=now.getMonth();
  const mStr=String(m+1).padStart(2,'0');
  return {year:y,month:m,id:y+'-'+mStr,
    label:now.toLocaleDateString('de-DE',{month:'long',year:'numeric'})};
}
function seasonOf(date){
  const d=new Date(date);
  const y=d.getFullYear(), m=d.getMonth();
  return {year:y,month:m,id:y+'-'+String(m+1).padStart(2,'0'),
    label:d.toLocaleDateString('de-DE',{month:'long',year:'numeric'})};
}
function seasonStart(seasonId){
  if(!seasonId) seasonId=currentSeason().id;
  const [y,m]=seasonId.split('-').map(Number);
  return new Date(y,m-1,1);
}
function seasonEnd(seasonId){
  if(!seasonId) seasonId=currentSeason().id;
  const [y,m]=seasonId.split('-').map(Number);
  return new Date(y,m,0,23,59,59); // letzter Tag des Monats
}
function seasonLabel(seasonId){
  if(!seasonId) return '';
  const [y,m]=seasonId.split('-').map(Number);
  return new Date(y,m-1).toLocaleDateString('de-DE',{month:'long',year:'numeric'});
}
function seasonDaysLeft(){
  const end=seasonEnd();const now=new Date();
  return Math.max(0,Math.ceil((end-now)/(1000*60*60*24)));
}
function matchesInSeason(seasonId){
  if(!seasonId) seasonId=currentSeason().id;
  const key='mseason_'+seasonId+'_'+matches.length+'_'+_cache.version;
  if(!_cache._mseason) _cache._mseason={};
  if(_cache._mseason[key]) return _cache._mseason[key];
  const start=seasonStart(seasonId),end=seasonEnd(seasonId);
  const result=matches.filter(m=>{const d=new Date(m.created_at);return d>=start&&d<=end;});
  _cache._mseason[key]=result;
  return result;
}

function allPastSeasons(){
  const key='allPastSeasons_'+matches.length+'_'+seasons.length+'_'+_cache.version; // NEU: seasons.length im Key
  if(_cache._allPastSeasonsKey===key) return _cache._allPastSeasonsData;

  if(!matches.length) {
    _cache._allPastSeasonsKey = key;
    _cache._allPastSeasonsData = [];
    return [];
  }
  const first=new Date(matches[0].created_at);
  const now=new Date(); const cur=currentSeason();
  const ids=[];
  let y=first.getFullYear(), m=first.getMonth();
  while(true){
    const id=y+'-'+String(m+1).padStart(2,'0');
    if(id===cur.id) break;
    if(new Date(y,m,1)>now) break;
    ids.push(id);
    m++; if(m>11){m=0;y++;}
  }
  _cache._allPastSeasonsKey=key;
  _cache._allPastSeasonsData=ids;
  return ids;
}

// Invalidiert bei: loadAll, Match-Add/Edit/Delete, Recalc, Config-Änderung
let _cache={version:0};

function invalidateCache(keys=null){
  _cache.version++;
  // Nur spezifische Caches löschen, nicht alles
  if(!keys){
    // Kompletter Reset (z.B. nach Recalc)
    _cache={version:_cache.version};
    _lastSimState=null;
    _lastSimIndex=-1;
  } else if(Array.isArray(keys)){
    // Selektiv
    keys.forEach(k=>{
      if(k==='awards') delete _cache._awards;
      if(k==='stats') delete _cache._allStatsKey;
      if(k==='global') { _lastSimState=null; _lastSimIndex=-1; }
      if(k==='teams') delete _cache._teamDetail;
      if(k==='allTeamStats') delete _cache._allTeamStatsKey; // NEU: Cache für teamStats()
      if(k==='period') delete _cache._periodStatsKey;
      if(k==='badges') delete _cache._badgeEarnedKey;
      if(k==='playerSeasonAwards') delete _cache._playerSeasonAwards; // NEU: Cache für playerSeasonAwards(id)
      if(k==='allPastSeasons') delete _cache._allPastSeasonsKey; // NEU: Cache für allPastSeasons()
    });
  }
}




// Speichert den letzten Sim-State + Index des letzten verarbeiteten Matches
let _lastSimState = null;
let _lastSimIndex = -1;

function getGlobalSim(){
  const key='global_'+matches.length+'_'+_cache.version;
  if(_cache._globalKey===key) return _cache._globalSim;
  
  // Wenn nur neue Matches hinzugekommen sind: inkrementell weitermachen
  if(_lastSimState && _lastSimIndex < matches.length && _cache.version === _lastSimVersion){
    const newMatches = matches.slice(_lastSimIndex + 1);
    if(newMatches.length > 0 && newMatches.length < 50){
      // Inkrementell: nur neue Matches simulieren auf Basis des alten States
      const sim = simulateElo(newMatches, {
        initialState: _lastSimState,
        initialCurSeason: _lastSimState.curSeason
      });
      _lastSimState = sim;
      _lastSimIndex = matches.length - 1;
      _cache._globalKey = key;
      _cache._globalSim = sim;
      // Abgeleitete Maps invalidieren — werden lazy neu gebaut
      _cache._historyByMatchId = null;
      _cache._snapMap = null;
      _cache._seasonRankings = null;
      _cache._matchesBySeason = null;
      return sim;
    }
  }
  
  // Fallback: komplette Neuberechnung (z.B. nach Recalc oder großem Update)
  const sim = simulateElo(matches);
  _lastSimState = sim;
  _lastSimIndex = matches.length - 1;
  _lastSimVersion = _cache.version;
  _cache._globalKey = key;
  _cache._globalSim = sim;
  _cache._historyByMatchId = null;
  _cache._snapMap = null;
  _cache._seasonRankings = null;
  _cache._matchesBySeason = null;
  return sim;
}

// ─── Abgeleitete Sim-Maps (gecached pro Global-Sim) ───
// Vermeidet wiederholte O(n) Loops in showPlayer, vAwards, _awardRankingsUncached etc.
function getHistoryByMatchId(){
  // Garantiert frische Sim
  const sim=getGlobalSim();
  if(_cache._historyByMatchId) return _cache._historyByMatchId;
  const map=new Map();
  for(let i=0; i<sim.history.length; i++){
    map.set(sim.history[i].matchId, sim.history[i]);
  }
  _cache._historyByMatchId = map;
  return map;
}
function getSnapMap(){
  const sim=getGlobalSim();
  if(_cache._snapMap) return _cache._snapMap;
  const map={};
  for(let i=0; i<sim.history.length; i++){
    map[sim.history[i].matchId] = sim.history[i].eloBefore;
  }
  _cache._snapMap = map;
  return map;
}

// ─── Matches-pro-Saison Cache (lazy, einmalig pro Sim) ───
// Gruppiert alle Matches nach ihrer Saison-ID. Wird vom Award-Sammler-Badge
// und potentiell weiteren Saison-aggregierenden Funktionen genutzt.
function getMatchesBySeason(){
  if(_cache._matchesBySeason) return _cache._matchesBySeason;
  const map={};
  for(let i=0; i<matches.length; i++){
    const sid=seasonOf(matches[i].created_at).id;
    if(!map[sid]) map[sid]=[];
    map[sid].push(matches[i]);
  }
  _cache._matchesBySeason=map;
  return map;
}

// ─── Saison-Rangliste Cache (lazy, einmalig pro Sim) ───
// Pro Saison: Top-3 und Bottom-3 Spieler nach Saison-End-Elo.
// Bottom-3 nur definiert wenn mindestens 6 Saison-Teilnehmer (sonst überlappt es mit Top-3).
// Genutzt von Königsklasse + Pflichtaufgabe Badges.
function getSeasonRankingsCache(){
  if(_cache._seasonRankings) return _cache._seasonRankings;
  const gSim=getGlobalSim();
  const out={};
  const pm=pmap();
  Object.keys(gSim.seasonEndElos||{}).forEach(sid=>{
    const endElos=gSim.seasonEndElos[sid]||{};
    const playedMap=gSim.seasonPlayed[sid]||{};
    const list=Object.keys(endElos)
      .filter(pid=>{
        const p=pm[pid];
        if(!p||p.hidden) return false;
        return (playedMap[pid]||0)>0;
      })
      .map(pid=>({pid,elo:endElos[pid]}))
      .sort((a,b)=>b.elo-a.elo);
    const top3=new Set(list.slice(0,3).map(x=>x.pid));
    const bottom3 = list.length>=6
      ? new Set(list.slice(-3).map(x=>x.pid))
      : new Set();
    out[sid]={top3,bottom3};
  });
  _cache._seasonRankings=out;
  return out;
}

const METRICS=[['elo','Elo'],['winrate','Siegrate'],['goaldiff','Tordiff'],['streak','Serie'],['games','Spiele']];

// ════════ ERWEITERTES ELO ════════
// Bestehende DB-Felder bleiben gleich. Neu: dynamischer K + Margin-of-Victory,
// rein clientseitig berechnet (kein Schema-Umbau nötig).
function expected(a,b){ return 1/(1+Math.pow(10,(b-a)/400)); }
function posFactor(ps,sw){ return 1+sw*(0.5-ps)*2; }
function riskWeights(hi,lo,rs){ const gap=Math.min(Math.abs(hi-lo)/400,1); const s=rs*gap; return {strong:1-s,weak:1+s}; }

// ════════ AUTOMATISCHE POSITION (erwartungsbasiert + Erfahrung) ════════
// Misst NICHT nur rohe Siege, sondern:
//   1) Leistung ÜBER der Erwartung je Position (Performance)
//   2) Wie OFT der Spieler auf der Position spielt (Erfahrung)
// Wer 90% der Spiele in der Abwehr macht, hat dort einen Erfahrungs-Bonus —
// auch wenn die Siegrate schlecht ist. Sonst wird jemand, der 9/10 als Verteidiger
// spielt und dort schlecht abschneidet, fälschlich als "Stürmer" eingestuft.
// ─── Konstanten sind jetzt cfg-getunt (Defaults als Fallback) ───
const POS_MIN_GAMES_DEFAULT = 3;
const EXP_WEIGHT_DEFAULT = 0.5;
const _posMinGames = () => cfg.pos_min_games ?? POS_MIN_GAMES_DEFAULT;
const _expWeight  = () => cfg.exp_weight ?? EXP_WEIGHT_DEFAULT;

function posPerfFrom(id, matchSubset){
  if (!matchSubset || matchSubset === matches) {
    const sim = getGlobalSim();
    const t = sim.posTracker[id];
    if (t) {
      return {
        aG: t.aG, aW: t.aW, dG: t.dG, dW: t.dW,
        aWr: t.aG ? t.aW / t.aG : null,
        dWr: t.dG ? t.dW / t.dG : null,
        aPerfAvg: t.aG ? t.aPerf / t.aG : null,
        dPerfAvg: t.dG ? t.dPerf / t.dG : null
      };
    }
  }
  let aG=0,aW=0,dG=0,dW=0, aPerf=0, dPerf=0;
  for(const m of matchSubset){
    const onA=[m.a1,m.a2].includes(id), onB=[m.b1,m.b2].includes(id);
    if(!onA&&!onB) continue;
    const won=(onA&&m.winner==='A')||(onB&&m.winner==='B');
    const pos=id===m.a1?m.a1_pos:id===m.a2?m.a2_pos:id===m.b1?m.b1_pos:m.b2_pos;
    const myExp = onA ? (m.exp_a!=null?m.exp_a:0.5) : (m.exp_a!=null?1-m.exp_a:0.5);
    const score = won?1:0;
    const perf = score - myExp;  // >0 = über Erwartung, <0 = darunter
    if(pos==='atk'){aG++; if(won)aW++; aPerf+=perf;} else {dG++; if(won)dW++; dPerf+=perf;}
  }
  return {aG,aW,dG,dW,
    aWr:aG?aW/aG:null, dWr:dG?dW/dG:null,
    aPerfAvg:aG?aPerf/aG:null, dPerfAvg:dG?dPerf/dG:null};
}


// Sturm-Anteil 0..1, kombiniert Performance + Erfahrung.
// Performance wird GEWICHTET nach Spielanzahl auf der Position (mehr Spiele = höheres Vertrauen).
// Erfahrung (wie oft auf der Position) fließt als eigener Faktor ein.
function atkStrengthFrom(id, matchSubset){
  const p=posPerfFrom(id,matchSubset);
  const total = p.aG + p.dG;
  const minG = _posMinGames();
  const aOk = p.aG>=minG, dOk = p.dG>=minG;
  if(!aOk && !dOk) return 0.5;

  // ── Faktor 1: Spielanzahl-gewichtete Performance ──
  // Statt perfAtk = aPerfAvg vs dPerfAvg direkt zu vergleichen (was bei ungleicher
  // Spielanzahl verzerrt), gewichten wir jede Performance mit der Spielanzahl.
  // So hat eine Position mit 9 Spielen 3x so viel Einfluss wie eine mit 3.
  let perfAtk;
  if(aOk && dOk){
    // Gewichteter Vergleich: perf*games normalisiert
    const aScore = p.aPerfAvg * p.aG;  // Gesamt-Überperformance im Sturm
    const dScore = p.dPerfAvg * p.dG;  // Gesamt-Überperformance in Abwehr
    // Positiv = Sturm-Spieler, Negativ = Abwehr-Spieler
    // Normalisiert auf [-1,1] durch Division durch total
    const diff = (aScore - dScore) / total;
    perfAtk = 0.5 + diff * 0.5;
  } else if(aOk) {
    perfAtk = 0.5 + p.aPerfAvg * 0.3;  // Nur Sturm-Daten: gedämpft
  } else {
    perfAtk = 0.5 - p.dPerfAvg * 0.3;  // Nur Abwehr-Daten: gedämpft
  }

  // ── Faktor 2: Erfahrung (wie oft auf der Position) ──
  const expAtk = total>0 ? p.aG/total : 0.5;

  // ── Kombination ──
  // exp_weight steuert den Mix. Bei 0.4: 60% gewichtete Performance, 40% Erfahrung.
  const ew = _expWeight();
  const combined = (1-ew)*perfAtk + ew*expAtk;
  return Math.max(0.1, Math.min(0.9, combined));
}
function clampHalf(v){return Math.max(0.1,Math.min(0.9,v));}

// dynamischer K: neue Spieler (wenige Spiele) bewegen sich schneller
function dynK(pl){
  const g = gamesPlayed(pl.id); // Gesamt für Kompatibilität mit simulateElo
  if(g < 5)  return cfg.k_factor * (cfg.new_player_mult ?? 1.5);
  if(g < 15) return cfg.k_factor * (cfg.new_player_mid_mult ?? 1.2);
  if(pl.elo > cfg.start_elo + 400) return cfg.k_factor * (cfg.veteran_damp ?? 0.85);
  return cfg.k_factor;
}

// Margin-of-Victory Multiplikator (klares Ergebnis zählt mehr, knappes weniger)
function movMult(sa,sb){
  const diff=Math.abs(sa-sb), total=Math.max(sa+sb,1);
  // 1.0 bei knapp, bis ~1+mov_max_boost bei Kantersieg; logarithmisch gedämpft
  const maxBoost = cfg.mov_max_boost ?? 0.4;
  return 1 + maxBoost*(diff/(total)) * (Math.log(diff+1)/Math.log(11));
}

// computeMatch nutzt jetzt DIESELBE Engine wie der Recalc (simulateElo),
// damit die beim Speichern erzeugten Deltas exakt dem entsprechen, was nach
// einer späteren Neuberechnung in der DB steht. Es gibt nur noch EINE Wahrheit.
//
// Vorgehen: Wir bauen ein hypothetisches Match-Objekt, hängen es chronologisch
// an die aktuelle Saison-Matchliste an und lassen simulateElo darüber laufen.
// Die Deltas/exp_a des hypothetischen Matches lesen wir aus dem History-Eintrag.
function computeMatch(teamA, teamB, winner, sa, sb){
  // Optimierung: Wir starten vom End-State des gecachten globalen Sim und simulieren
  // nur das eine hypothetische Match darauf. Bei großen Match-Historien ~100× schneller.
  const HYPO_ID = '__hypo__';
  const hypo = {
    id: HYPO_ID,
    a1: teamA[0].id, a1_pos: teamA[0].pos,
    a2: teamA[1].id, a2_pos: teamA[1].pos,
    b1: teamB[0].id, b1_pos: teamB[0].pos,
    b2: teamB[1].id, b2_pos: teamB[1].pos,
    score_a: sa, score_b: sb, winner,
    created_at: new Date().toISOString()
  };

  const globalSim = getGlobalSim();
  const sim = simulateEloWithSliders([hypo], {
    initialState: globalSim,
    initialCurSeason: globalSim.curSeason
  });
  const entry = sim.history.find(h => h.matchId === HYPO_ID);
  const res = entry ? {...entry.deltas} : {};
  const expA = entry ? entry.expA : 0.5;

  // mov nur für die Anzeige ("Kantersieg ×…") — identische Formel wie in der Engine.
  const rawMov = movMult(sa, sb);
  return {res, expA, mov: rawMov};
}

async function persistNewMatch(newMatchId) {
  // Ein neues Match am Ende ändert nie vorherige Match-Deltas.
  // → Nur schreiben: dieses Match + Spieler-Stats (atk + Saison-Elo)
  // O(Spieler) statt O(alle Matches) DB-Writes.
  const sim = getGlobalSim(); // nutzt bereits das neue Match (cache invalidiert)
  const entry = sim.history.find(h => h.matchId === newMatchId);

  const writes = [];
  if(entry) {
    writes.push(
      sb.from('matches').update({ deltas: entry.deltas, exp_a: entry.expA })
        .eq('id', newMatchId)
    );
  }
  players.forEach(p => {
    const atk = atkStrengthFrom(p.id, matches);
    writes.push(sb.from('players').update({ atk }).eq('id', p.id));
  });

  const BATCH = 25;
  for(let i = 0; i < writes.length; i += BATCH) {
    await Promise.all(writes.slice(i, i + BATCH));
  }
  await syncSeasonEloToDB();
  // NEU: Zusätzliche Caches invalidieren, die durch ein neues Match beeinflusst werden
  invalidateCache(['global', 'stats', 'awards', 'badges', 'allTeamStats', 'allPastSeasons']);
}
// Schreibt eine neu berechnete Historie in die DB (Spieler-Elos + atk + Match-Deltas).
// WICHTIG: invalidiert auch die archivierten Saison-Snapshots (seasons.top_elo),
// damit das Recap-Podium nach Recalc konsistent zu der frischen Berechnung ist.
// Updates laufen in Batches parallel, um Rate-Limits zu respektieren (Supabase ~100 req/s).
async function persistRecalc(matchList){
  const BATCH_SIZE = 25;
  const runBatch = async (promises) => {
    for(let i=0; i<promises.length; i+=BATCH_SIZE){
      await Promise.all(promises.slice(i, i+BATCH_SIZE));
    }
  };
  // Positions-Stärke neu berechnen
  const atkUpdates = players.map(p=>{
    const atk = atkStrengthFrom(p.id, matchList);
    return sb.from('players').update({atk}).eq('id', p.id);
  });
  // Match-Deltas/exp_a aktualisieren (Slider-basiert)
  const{matchPatches} = recalcHistory(matchList);
  const matchUpdates = matchPatches.map(patch =>
    sb.from('matches').update({
      deltas: patch.deltas,
      exp_a: patch.exp_a
    }).eq('id', patch.id)
  );
  await runBatch([...atkUpdates, ...matchUpdates]);
  // Lokale Matches mit neuen Deltas updaten, damit die nachfolgende Archivierung
  // die frischen Werte sieht
  const patchById = {};
  matchPatches.forEach(p => { patchById[p.id] = p; });
  matches.forEach(m => {
    const p = patchById[m.id];
    if(p){ m.deltas = p.deltas; m.exp_a = p.exp_a; }
  });
  invalidateCache();
  // Archivierte Saison-Snapshots invalidieren → autoArchiveSeasons wird sie neu schreiben
  // (mit den frisch berechneten DB-Deltas → konsistent zu Profil/Recap).
  const pastIds = allPastSeasons();
  const wipeArchives = pastIds.map(sid =>
    sb.from('seasons').update({top_elo: JSON.stringify([])}).eq('id', sid)
  );
  await runBatch(wipeArchives);
  // Lokal: top_elo leeren, damit autoArchiveSeasons sie als stale erkennt
  seasons.forEach(s => {
    if(pastIds.includes(s.id)) s.top_elo = JSON.stringify([]);
  });
  // Saison-Elo in DB synchronisieren
  await syncSeasonEloToDB();
  // Saisons neu archivieren mit den frischen Werten
  await autoArchiveSeasons();
}

function pmap(){
  const key='pmap_'+players.length+'_'+_cache.version;
  if(_cache._pmapKey===key) return _cache._pmapData;
  const m={};
  players.forEach(p=>m[p.id]=p);
  _cache._pmapKey=key;
  _cache._pmapData=m;
  return m;
}

    try{

      Object.keys(overrides).forEach(k=>{

      });
      // Auto-Migration: wenn die DB inzwischen die Spalten kennt, Overrides synchronisieren
      // und localStorage aufräumen. Läuft fire-and-forget im Hintergrund — blockt loadAll nicht.
      const overrideKeys=Object.keys(overrides);
      if(overrideKeys.length){
        (async()=>{
          // Pro Key einzeln updaten: andere bleiben heile wenn einer fehlschlägt
          const remaining={};
          for(const k of overrideKeys){
            try{
              const o={};o[k]=overrides[k];
              const {error}=await sb.from('config').update(o).eq('id',1);
              if(error) remaining[k]=overrides[k];
              // Bei !error: Spalte existiert nun → Override darf raus
            }catch(e){ remaining[k]=overrides[k]; }
          }
          try{
            if(Object.keys(remaining).length) localStorage.setItem('cfg_overrides',JSON.stringify(remaining));
            else localStorage.removeItem('cfg_overrides');
          }catch(e){}
        })();
      }
    }catch(e){}
    seasons=se.data||[];
  // NEU: Alle relevanten Caches invalidieren
  invalidateCache(['global', 'stats', 'awards', 'teams', 'allTeamStats', 'period', 'badges', 'playerSeasonAwards', 'allPastSeasons']);
    // Nur aktive Spieler zählen für Anzeige
