          <span class="ic svg-ic" style="font-size:18px;width:32px;text-align:center;color:${color}">${badgeIc(e.badge,'18px')}</span>
          <div class="rmid"><div class="rname" style="font-size:13px">${esc(pname(e.playerId))}</div>
            <div class="rmeta"><span style="color:${color};opacity:.85">${e.badge.name}</span></div></div>
        </div>`;
      }).join('')}
    </div>`:''
  ;
  openSheet(`<h3>${m.score_a} : ${m.score_b}</h3><div class="sheet-sub">${dateStr(m.created_at)} · Team ${m.winner} gewinnt</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <div data-team="${esc([m.a1,m.a2].sort().join('|'))}" style="flex:1;background:var(--surface);border:1px solid ${m.winner==='A'?'var(--acid2)':'var(--line)'};border-radius:10px;padding:8px 10px;cursor:pointer;text-align:center">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-family:'Sometype Mono',monospace">Team A</div>
        <div style="font-size:12px;margin-top:2px;line-height:1.2">${esc(pname(m.a1)+' & '+pname(m.a2))}</div>
      </div>
      <div data-team="${esc([m.b1,m.b2].sort().join('|'))}" style="flex:1;background:var(--surface);border:1px solid ${m.winner==='B'?'var(--acid2)':'var(--line)'};border-radius:10px;padding:8px 10px;cursor:pointer;text-align:center">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-family:'Sometype Mono',monospace">Team B</div>
        <div style="font-size:12px;margin-top:2px;line-height:1.2">${esc(pname(m.b1)+' & '+pname(m.b2))}</div>
      </div>
    </div>
    <div class="preview" style="margin-top:16px"><div class="delta-list">
      ${line(m.a1,m.a1_pos)}${line(m.a2,m.a2_pos)}<div class="delta-div"></div>${line(m.b1,m.b1_pos)}${line(m.b2,m.b2_pos)}
    </div></div>
    <button class="btn ghost sm" id="showBreakdownBtn" style="margin-top:10px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:6px">${svgI('chartBar')} Elo-Analyse anzeigen</button>
    <div id="breakdownSlot"></div>
    ${earnedHtml}
    <div class="btn-row" style="margin-top:14px">
      <button class="btn ghost sm" id="editThisMatch" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px">${svgI('edit')} Bearbeiten</button>
      <button class="btn ghost sm" id="delThisMatch" style="flex:0 0 38%;color:var(--red)">Löschen</button>
    </div>`);
  // Breakdown-Button
    document.getElementById('showBreakdownBtn').onclick=()=>{
    const bd=matchBreakdown(mid);
    const slot=document.getElementById('breakdownSlot');
    if(!bd||!Object.keys(bd).length){slot.innerHTML='<p style="font-size:12px;color:var(--muted);text-align:center">Keine Daten verfügbar</p>';return;}
    // DB-First-Werte (was tatsächlich in der DB steht & oben angezeigt wird).
    // Die Aufschlüsselungs-Faktoren stammen aus simulateEloWithSliders und können
    // abweichen, wenn Slider oder Code-Logik seit dem Match geändert wurden.
    const histById=getHistoryByMatchId();
    const hist=histById.get(mid);
    const dbDeltas=(hist&&hist.deltas)||{};
    const dbBefore=(hist&&hist.eloBefore)||{};
    const dbAfter=(hist&&hist.eloAfter)||{};
    const ids=[m.a1,m.a2,m.b1,m.b2];
    // Divergenz erkennen: weicht die Slider-Summe relevant von der DB ab?
    const anyDiverged=ids.some(id=>{
      const b=bd[id]; if(!b||dbDeltas[id]===undefined)return false;
      return Math.abs(dbDeltas[id]-b.finalDelta)>=1;
    });
    const rows=ids.map(id=>{
      const b=bd[id]; if(!b)return '';
      // Elo-Analyse zeigt exakte Werte mit 2 Nachkommastellen — keine Rundung wie überall sonst.
      const sign=v=>v>=0 ? '+'+v.toFixed(2) : v.toFixed(2);
      // Der Detail-Header zeigt IMMER den präzisen Sim-Wert, damit die große Zahl
      // exakt der Summe der Faktoren-Liste darunter entspricht. Der gerundete DB-Wert
      // bleibt nur oben in der Match-Übersicht sichtbar (eigener Render-Pfad).
      const hasDb=dbDeltas[id]!==undefined;
      const headerDelta=b.finalDelta;
      // Saison-Elo: bei DB-Werten sind das gespeicherte Integer (deshalb keine zusätzliche
      // Präzision möglich). Bei Sim-Fallback geben wir 1 Nachkommastelle aus.
      const fmtElo=v=>Number.isInteger(v)?String(v):v.toFixed(1);
      const seasonBefore=fmtElo(hasDb?dbBefore[id]:b.startElo);
      const seasonAfter=fmtElo(hasDb?dbAfter[id]:b.endElo);
      const simDelta=b.finalDelta;
      const rowDiverged=hasDb&&Math.abs(dbDeltas[id]-simDelta)>=1;
      const factors=[];
      factors.push({label:'Basis (Erwartung)',val:b.rawBase,desc:b.won?'Sieg'+(b.expected<0.5?' gegen stärkeres Team':''):'Niederlage'+(b.expected>0.5?' gegen schwächeres Team':'')});
      if(Math.abs(b.movEffect)>0.1) factors.push({label:'Tordifferenz',val:b.movEffect,desc:b.won?'Klarer Sieg':'Hohe Niederlage'+(b.movMult<1.2?' (gedämpft)':'')});
      if(Math.abs(b.winBoostEffect)>0.1) factors.push({label:'Sieg-Boost',val:b.winBoostEffect,desc:'+'+((b.winBoost-1)*100).toFixed(1)+'% für Siege'});
      if(b.expProtect<1) factors.push({label:'Erfahrungs-Schutz',val:b.expProtectEffect,desc:((1-b.expProtect)*100).toFixed(1)+'% Schutz'});
      if(b.lowEloDamp!==undefined && b.lowEloDamp<0.995){
        factors.push({label:'Low-Elo Schutz',val:b.lowEloEffect,desc:((1-b.lowEloDamp)*100).toFixed(1)+'% Schutz (schwacher Spieler)'});
      }
      if(b.underdogMult>1.005){
        // Underdog-Boost setzt sich aus zwei unabhängig clampten Komponenten zusammen
        // (Elo-Gap + Spiele-Gap). Wir zeigen nur die wirksamen (positiven) Anteile,
        // weil negative Differenzen keinen Effekt mehr haben.
        const eloPart   = b.underdogEloDiff>0   ? b.underdogEloDiff+' Elo schwächer'   : null;
        const gamesPart = b.underdogGamesDiff>0 ? b.underdogGamesDiff+' Spiele weniger' : null;
        const desc = [eloPart, gamesPart].filter(Boolean).join(' · ') || 'Underdog';
        // Effekt ohne lowElo-Anteil: rawBase*mov*boost*expProtect*(underdogMult-1)
        const undEffect = b.rawBase*b.movMult*b.winBoost*b.expProtect*(b.underdogMult-1);
        factors.push({label:'Underdog-Boost',val:undEffect, desc});
      }
      if(Math.abs(b.riskEffect)>0.1) factors.push({label:b.riskShare<1?'Risiko-Split (stark)':'Risiko-Split (schwach)',val:b.riskEffect,desc:'Mate-Stärke-Verteilung'});
      if(Math.abs(b.posEffect)>0.1) factors.push({label:'Positions-Bonus',val:b.posEffect,desc:(b.posMult>1?'Schwache':'Starke')+' Position'});
      factors.push({label:'Spielbonus',val:b.matchBonus,desc:'Flat +'+b.matchBonus.toFixed(2)+' pro Match'});
      const factorRows=factors.map(f=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px">
        <div><span style="color:var(--ink)">${f.label}</span> <span style="color:var(--muted);font-size:10px">${f.desc}</span></div>
        <span style="font-family:'Sometype Mono',monospace;font-weight:700;color:${f.val>=0?'var(--acid)':'var(--red)'}">${sign(f.val)}</span>
      </div>`).join('');
      const divergeNote=rowDiverged?`<div style="font-size:10px;color:var(--gold);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);font-family:'Sometype Mono',monospace">↻ Aktuelle Regler: ${sign(simDelta)} (Σ Faktoren)</div>`:'';
      return `<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;margin-top:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-weight:700;font-size:13px">${esc(pname(id))}</span>
          <span style="font-family:'Archivo Black',sans-serif;font-size:15px;color:${headerDelta>=0?'var(--acid)':'var(--red)'}">${sign(headerDelta)}</span>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--line)">
          <div style="display:flex;justify-content:space-between">
            <span>${seasonBefore} → ${seasonAfter}</span>
            <span>K=${b.kFactor.toFixed(1)} · Erw. ${(b.expected*100).toFixed(1)}%</span>
          </div>
        </div>
        ${factorRows}
        ${divergeNote}
      </div>`;
    }).join('');
    const banner=anyDiverged?`<div style="background:rgba(247,207,74,.08);border:1px solid rgba(247,207,74,.3);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:11.5px;color:var(--gold);line-height:1.5">
      <b>Hinweis:</b> Die Faktoren unten werden mit den <i>aktuellen</i> Reglern berechnet. Die gespeicherten Deltas (oben) stammen aus der Berechnung zum Zeitpunkt des Matches. <b>Settings → Neu berechnen</b> bringt beides in Deckung.
    </div>`:'';
    slot.innerHTML=`<div class="mini-label" style="margin-top:14px">Elo-Analyse</div>${banner}${rows}`;
    document.getElementById('showBreakdownBtn').style.display='none';
  };

  document.getElementById('editThisMatch').onclick=()=>showEditMatch(mid);
  document.getElementById('delThisMatch').onclick=async()=>{
        if(!confirm('Match wirklich löschen? Die gesamte Rangliste wird danach automatisch neu berechnet.'))return;
    closeSheet(true); toast('Lösche & berechne neu…');
    await sb.from('matches').delete().eq('id',mid);
    const rest=matches.filter(x=>x.id!==mid);
    invalidateCache(['global', 'stats', 'awards', 'teams', 'period', 'badges']); // <-- HIER INVALIDIEREN
    await persistRecalc(rest);
    toast('Gelöscht & neu berechnet','ok'); await loadAll();


  };
  // Team-Chips → Team-Profil
  document.querySelectorAll('[data-team]').forEach(el=>{
    el.onclick=()=>{
      const [a,b]=el.dataset.team.split('|');
      if(!a||!b) return;
      sheetNav(()=>showTeam(a,b));
    };
  });
}

// ╔═══ §9.4 ─── MATCH BEARBEITEN ───────────────────────────────────────╗
//     Edit-Sheet für nachträgliche Korrektur eines Matches.
// ╚═════════════════════════════════════════════════════════════════════════╝
let E={};  // Edit-Zustand
function showEditMatch(mid){
  const m=matches.find(x=>x.id===mid);if(!m)return;
  E={id:m.id,A1:m.a1,A2:m.a2,B1:m.b1,B2:m.b2,pA1:m.a1_pos,pA2:m.a2_pos,pB1:m.b1_pos,pB2:m.b2_pos,sa:m.score_a,sb:m.score_b};
  const gSim=getGlobalSim();
  const sortElo=p=>gSim.careerElo[p.id]??p.elo;
  const showElo=p=>Math.round(gSim.elo[p.id]??cfg.start_elo);
  const opts=sel=>`<option value="">Spieler…</option>`+
    [...players].sort((a,b)=>sortElo(b)-sortElo(a)).map(p=>`<option value="${p.id}" ${E[sel]===p.id?'selected':''}>${esc(p.name)} · ${showElo(p)}</option>`).join('');
  const pos=k=>`<select data-epos="${k}"><option value="atk" ${E['p'+k]==='atk'?'selected':''}>↑ Sturm</option><option value="def" ${E['p'+k]==='def'?'selected':''}>↓ Abwehr</option></select>`;
  const slot=(t,n)=>`<div class="slot">
    <div class="psel"><select data-ep="${t}${n}">${opts(t+n)}</select></div>
    <div class="possel">${pos(t+n)}</div></div>`;
  openSheet(`<h3>Match bearbeiten</h3><div class="sheet-sub">Änderungen lösen eine Neuberechnung aus</div>
    <div class="builder" style="margin-top:16px">
      <div class="team-block A"><div class="team-label">Team A</div>${slot('A',1)}${slot('A',2)}</div>
      <div class="vs-mid"><span class="line"></span><span class="vs">VS</span><span class="line"></span></div>
      <div class="team-block B"><div class="team-label">Team B</div>${slot('B',1)}${slot('B',2)}</div>
    </div>
    <div class="score-board" style="margin-top:12px">
      <div class="score-col A"><div class="cl">Team A</div>
        <div class="stepper"><button data-estep="sa,-1">−</button><span class="sval num" id="esvA">${E.sa}</span><button data-estep="sa,1">+</button></div></div>
      <div class="score-sep">:</div>
      <div class="score-col B"><div class="cl">Team B</div>
        <div class="stepper"><button data-estep="sb,-1">−</button><span class="sval num" id="esvB">${E.sb}</span><button data-estep="sb,1">+</button></div></div>
    </div>
    <div id="editWarn" style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px"></div>
    <div class="btn-row">
      <button class="btn ghost sm" id="cancelEdit" style="flex:0 0 38%">Abbrechen</button>
      <button class="btn" id="saveEdit">Speichern</button>
    </div>`);
  const readE=()=>{document.querySelectorAll('[data-ep]').forEach(s=>E[s.dataset.ep]=s.value);
    document.querySelectorAll('[data-epos]').forEach(s=>E['p'+s.dataset.epos]=s.value);};
  const checkE=()=>{const ids=[E.A1,E.A2,E.B1,E.B2];const warn=document.getElementById('editWarn');
    const dup=new Set(ids).size!==ids.filter(Boolean).length;
    const tie=E.sa===E.sb; const incomplete=ids.some(x=>!x);
    const samePosA=E.pA1===E.pA2, samePosB=E.pB1===E.pB2;
    let ok=true,msg='';
    if(incomplete){ok=false;}
    else if(dup){ok=false;msg='Ein Spieler steht doppelt.';}
    else if(tie){ok=false;msg='Unentschieden ist nicht möglich.';}
    else if(samePosA||samePosB){ok=false;msg='Jedes Team braucht Sturm + Abwehr.';}
    if(warn)warn.textContent=msg; document.getElementById('saveEdit').disabled=!ok;};
  document.querySelectorAll('[data-ep],[data-epos]').forEach(s=>s.onchange=()=>{readE();checkE();});
  document.querySelectorAll('[data-estep]').forEach(b=>b.onclick=()=>{const[k,d]=b.dataset.estep.split(',');
    E[k]=Math.max(0,E[k]+(+d));document.getElementById(k==='sa'?'esvA':'esvB').textContent=E[k];checkE();});
  document.getElementById('cancelEdit').onclick=()=>showMatchDetail(mid);
  document.getElementById('saveEdit').onclick=async()=>{
    readE(); const ids=[E.A1,E.A2,E.B1,E.B2];
    if(ids.some(x=>!x)||new Set(ids).size!==4||E.sa===E.sb){toast('Eingabe unvollständig',true);return;}
    closeSheet(true); toast('Speichere & berechne neu…');
    const winner=E.sa>E.sb?'A':'B';
    // Match-Zeile aktualisieren (Deltas folgen aus der Neuberechnung)
    await sb.from('matches').update({
      a1:E.A1,a1_pos:E.pA1,a2:E.A2,a2_pos:E.pA2,b1:E.B1,b1_pos:E.pB1,b2:E.B2,b2_pos:E.pB2,
      score_a:E.sa,score_b:E.sb,winner
    }).eq('id',E.id);
    // lokale Kopie für die Neuberechnung anpassen
    const updated=matches.map(x=>x.id===E.id
      ?{...x,a1:E.A1,a1_pos:E.pA1,a2:E.A2,a2_pos:E.pA2,b1:E.B1,b1_pos:E.pB1,b2:E.B2,b2_pos:E.pB2,score_a:E.sa,score_b:E.sb,winner}
      :x);

    invalidateCache(['global', 'stats', 'awards', 'teams', 'period', 'badges']);
    await persistRecalc(updated);
    toast('Gespeichert & neu berechnet','ok'); await loadAll();
  };
  checkE();
}

// ╔═══ §10.2 ─── LOCK-SYSTEM (Settings-Passwort) ───────────────────────╗
//     SHA-256-Hash, Hash gespeichert in config.
// ╚═════════════════════════════════════════════════════════════════════════╝
const SETTINGS_HASH='03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';
let settingsUnlocked=false;

async function openSettingsLock(){
  if(settingsUnlocked){tab='settings';render();window.scrollTo(0,0);return;}
  // Create overlay
  const ov=document.createElement('div');
  ov.id='settingsLockOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px';
  ov.innerHTML=`
    <div style="background:var(--surface2);border:1px solid var(--line);border-radius:18px;padding:28px 24px;width:100%;max-width:320px;text-align:center">
      <div style="display:flex;justify-content:center;margin-bottom:16px">
        <span style="width:52px;height:52px;border-radius:14px;background:var(--surface3);display:grid;place-items:center;color:var(--ink2)">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS['lock']}</svg>
        </span>
      </div>
      <h3 style="margin:0 0 6px;font-size:17px">Feintuning</h3>
      <p style="font-size:13px;color:var(--muted);margin:0 0 20px;line-height:1.5">Passwort eingeben um fortzufahren.</p>
      <input id="settingsPwInput" type="password" placeholder="Passwort"
        style="width:100%;box-sizing:border-box;background:var(--surface3);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--ink);outline:none;margin-bottom:8px"/>
      <div id="settingsPwError" style="font-size:12px;color:var(--red);min-height:18px;margin-bottom:12px"></div>
      <div style="display:flex;gap:10px">
        <button onclick="document.getElementById('settingsLockOverlay').remove()"
          style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--surface3);color:var(--ink2);font-family:inherit;font-weight:600;font-size:14px;cursor:pointer">Abbrechen</button>
        <button id="settingsPwBtn"
          style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--acid);color:#000;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer">Entsperren</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const inp=document.getElementById('settingsPwInput');
  const err=document.getElementById('settingsPwError');
  const btn=document.getElementById('settingsPwBtn');
  inp.focus();
  async function tryUnlock(){
    const pw=inp.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===SETTINGS_HASH){
      settingsUnlocked=true;
      ov.remove();
      tab='settings';render();window.scrollTo(0,0);
    } else {
      err.textContent='Falsches Passwort';
      inp.value='';
      inp.focus();
      setTimeout(()=>{err.textContent='';},2000);
    }
  }
  btn.onclick=tryUnlock;
  inp.onkeydown=e=>{if(e.key==='Enter')tryUnlock();};
}

document.getElementById('settingsBtn').onclick=openSettingsLock;

// ╔═══ §10.3 ─── HELPERS (Achievement-Toasts, Utils) ───────────────────╗
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function dateStr(ts){return new Date(ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function mlabel(m){return pname(m.a1)+'&'+pname(m.a2)+' vs '+pname(m.b1)+'&'+pname(m.b2);}
function emptyState(e,t){
  // Wenn 'e' ein Icon-Name aus ICONS ist → SVG rendern; sonst als Text/Emoji belassen
  const inner = ICONS[e] ? `<div class="ee svg-ic">${svgI(e)}</div>` : `<div class="ee">${e}</div>`;
  return `<div class="empty">${inner}${t}</div>`;
}
let tt;
function toast(msg,kind){let t=document.querySelector('.toast');
  if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.className='toast '+(kind===true?'err':kind||'');void t.offsetWidth;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}

// ─── Achievement-Toast: gestapelte Anzeige für neue Badges nach Match-Eingabe ───
// Sequenzielle Queue verhindert, dass mehrere Achievements einander überschreiben.
// Jeder Toast 2.6s sichtbar + 0.4s Pause zwischen den Slides.
let _achToastQueue=[], _achToastBusy=false, _achToastTimer=null;
function showAchievementToast(playerName, badge){
  _achToastQueue.push({playerName, badge});
  _processAchToastQueue();
}
function _processAchToastQueue(){
  if(_achToastBusy || !_achToastQueue.length) return;
  _achToastBusy=true;
  const {playerName, badge}=_achToastQueue.shift();
  let el=document.querySelector('.ach-toast');
  if(!el){el=document.createElement('div');el.className='ach-toast';document.body.appendChild(el);}
  // Badge-Icon: zentrale badgeIc()-Logik nutzen (SVG zuerst, Emoji als Fallback)
  // — konsistent mit Profil, Awards-Sheet und Match-Detail. Mein CSS-Selektor
  // .ach-toast-ic svg übernimmt Größe/Stroke; das umliegende <span> ist neutral.
  const icHtml = badgeIc(badge, '22px');
  const subParts=[esc(playerName)];
  if(badge.count && badge.count>1) subParts.push(badge.count+'×');
  el.innerHTML=`
    <div class="ach-toast-ic">${icHtml}</div>
    <div class="ach-toast-text">
      <div class="ach-toast-cat">Neue Auszeichnung</div>
      <div class="ach-toast-name">${esc(badge.name)}</div>
      <div class="ach-toast-sub">${subParts.join(' · ')}</div>
    </div>`;
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(_achToastTimer);
  _achToastTimer=setTimeout(()=>{
    el.classList.remove('show');
    setTimeout(()=>{ _achToastBusy=false; _processAchToastQueue(); }, 400);
  }, 2600);
}

// ╔═══════════════════════════════════════════════════════════════════════╗
// ║  §11  LIGA NEWS / STORY-SYSTEM                                        ║
// ║  ───────────────────────────────────────────────────────────────────  ║
// ║  Erzeugt redaktionelle "Schlagzeilen" aus bestehenden Liga-Daten.     ║
// ║  KEINE neuen Berechnungen — nur Interpretation existierender Caches.  ║
// ║                                                                       ║
// ║   §11.1  Story-Generator (alle Typen)                                 ║
// ║   §11.2  Cache (versionsgebunden an matches.length + _cache.version)  ║
// ║   §11.3  LocalStorage (Read-State, Ring-Buffer max 200)               ║
// ║   §11.4  Header-Badge-Refresh                                         ║
// ║   §11.5  Mini-Popup (newsPopover)                                     ║
// ║   §11.6  Voller Feed mit Filter (newsFeedFull)                        ║
// ║   §11.7  Story-Detail (newsDetail) — dynamisch je Typ                 ║
// ╚═══════════════════════════════════════════════════════════════════════╝

// ─── §11.0 — Konstanten ──────────────────────────────────────────────
// News-Debug-Flag (v8.4): hält console-Logs des News-Systems aus der
// Produktiv-Konsole heraus. Standard: aus. Zur Laufzeit aktivierbar über
// DevTools — KEIN Reload nötig:  window.NEWS_DEBUG = true
// Alle News-Logs laufen über `if(NEWS_DEBUG || window.NEWS_DEBUG) console…`.
const NEWS_DEBUG = false;

// Kategorien (Filter-Pills + CSS-Klassen über `nv-cat-${cat}`).
// label = Anzeige im Filter; descLabel = im Detail- und Story-Header.
const NEWS_CATEGORIES = {
  // v9: „Breaking" ist KEIN eigener Generator-Typ, sondern eine ANZEIGE-Kategorie.
  // _isBreaking() promotet die ultra-seltenen, liga-relevanten Ereignisse
  // (neuer Spitzenreiter, Platz-1-Duell, legendäres Badge, Saison-Klimax)
  // display-seitig hierher — wirkt auf bestehende UND neue persistierte Rows.
  breaking:   {label:'Breaking',    descLabel:'Breaking News',    ic:'bolt'},
  highlight:  {label:'Highlights',  descLabel:'Highlight',        ic:'crown'},
  season:     {label:'Saison',      descLabel:'Saison',           ic:'rocket'},
  badge:      {label:'Awards',      descLabel:'Badge & Awards',   ic:'medalTrio'},
  fun:        {label:'Fun Facts',   descLabel:'Fun Fact',         ic:'thriller'},
  rivalry:    {label:'Rivalität',   descLabel:'Rivalität',        ic:'crossedSwords'},
  team:       {label:'Teams',       descLabel:'Team',             ic:'users'},
  comeback:   {label:'Comebacks',   descLabel:'Comeback',         ic:'comeback'},
  personal:   {label:'Persönlich',  descLabel:'Persönlich',       ic:'trendUp'},
  history:    {label:'Historie',    descLabel:'Historie',         ic:'calendar'},
  misfortune: {label:'Pechvogel',   descLabel:'Pechvogel',        ic:'dramaTear'},
};

// LocalStorage-Keys (versioniert für künftige Migrations)
const NEWS_LS_SEEN  = 'eso_news_seen_v1';
const NEWS_LS_TOAST = 'eso_news_toast_v1';  // v8.1: zeitstempel + count des letzten Toasts
const NEWS_LS_MAX_SEEN = 200; // Ring-Buffer-Limit
const NEWS_TOAST_COOLDOWN_MS = 6 * 60 * 60 * 1000; // 6h zwischen identischen Toast-Counts

// Generator-Limits — Schutz gegen zu viele Stories pro Typ
const NEWS_LIMITS = {
  topForm: 3,       // max 3 Spieler "in Top-Form" gleichzeitig
  lossStreak: 3,
  jubilee: 5,
  badgeUnlocked: 8, // letzte N freigeschalteten Badges (v8.7: 5→8, da jetzt alle gold/lila zählen)
  rivalry: 3,
  total: 50,        // harte Obergrenze des Feeds (nach Prio-Filter)
};

// Ambiente Tages-Stories (v8.5) — Fun Facts / persönliche Nuggets, die ÜBER DEN
// TAG VERTEILT erscheinen, damit der Feed auch ohne neue Matches lebt.
//   AMBIENT_SLOTS  = lokale Stunden, je Slot genau 1 Story; erscheint erst ab
//                    dieser Uhrzeit. 2/Tag (8 Uhr früh + 13 Uhr mittags) =
//                    lebendig, aber spamarm. Auf [8,13,19] erweitern für 3/Tag.
//   Anti-Spam:     IDs sind tages-deterministisch (`ambient_<datum>_<stunde>`)
//                  → ON CONFLICT DO NOTHING → keine Doppel über Geräte/Syncs.
//                  Der Pool wird tages-seeded gezogen (Pseudo-Zufall, überall
//                  identisch). Pro Tag werden keine zwei gleichen Typen gewählt.
const AMBIENT_SLOTS = [8, 13];
// Auto-Sync-Intervall, damit neue Slots ohne Reload auftauchen (ms).
const NEWS_AUTOSYNC_MS = 10 * 60 * 1000;

// ─── §11.0b — Badge-Whitelist (v8.1) ─────────────────────────────────
// Nur seltene & besondere Badges erzeugen News. Common-Badges sind in der
// Liga zu häufig und würden den Feed verstopfen ("Achievement-Spam").
// Negative: nur die wirklich krassen (perfect_loss, mr_disaster, nemesis),
// nicht die alltäglichen wie bitter_loss/krimi_loser.
//
// PFLEGEHINWEIS: bei neuen Badges (§7.1) hier ergänzen, wenn sie als News
// auftauchen sollen. Default: nicht-newsworthy (bewusste Entscheidung).
const NEWS_BADGE_WHITELIST = new Set([
  // Legendary — alle 10 sind News-würdig
  'dynasty_600','dominator_400','award_collector','perfect_win','streak15','streak20',
  'untouchable','mr_perfect','allwetter','godly_streak',
  // Rare — kuratierte Auswahl: nur die mit besonderer Story
  'wall_badge','upset_king','unbeatable','streak10','vice_champion','potw','krimi',
  'games150', // "Legende" (150 Matches) — Karriere-Meilenstein, v8.6 ergänzt
  // Negative — nur die seltenen, "krassen" Niederlagen
  'mr_disaster','nemesis','perfect_loss',
]);

// ─── §11.1 — Story-Generator ─────────────────────────────────────────
// Iteriert genau einmal über bestehende Caches. Gibt ein Array von
// Story-Objekten {id, cat, ic, title, desc, when, prio, dataRef} zurück.
// Performance: O(N_matches) — dominante Kosten durch top-form-Filterung,
// die aber auf die letzten 10 Matches pro Spieler eingeschränkt ist.
function _buildStories(){
  const stories = [];
  const now = new Date();
  const pm = pmap();
  const nameOf = pid => (pm[pid] && pm[pid].name) || '?';
  const sortedMatches = [...matches].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)); // neueste zuerst

  // ── ISO-Wochen-Helper (v8.3) ──
  // Liefert "2026-W26" als stabile Pro-Woche-Kennung. Vermeidet, dass
  // "Ruhige Woche"-Stories täglich neu erzeugt werden. ISO-Wochen starten
  // Montag → eine Woche ergibt EINE Story, nicht sieben.
  const isoWeek = (d) => {
    const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = t.getUTCDay() || 7;
    t.setUTCDate(t.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
    const weekNum = Math.ceil((((t - yearStart) / 86400000) + 1) / 7);
    return t.getUTCFullYear() + '-W' + String(weekNum).padStart(2, '0');
  };
  const todayKey = now.toISOString().slice(0,10);
  const weekKey  = isoWeek(now);

  // ── Memoization (v8.4) ──
  // _buildStories ist teuer (~67ms @1k×12 Spieler, ~244ms @10k×20). Solange
  // sich weder Match-Zahl noch _cache.version noch ISO-Woche noch Tag ändern,
  // liefert der Generator dasselbe Ergebnis → Cache zurückgeben, Generator
  // KOMPLETT überspringen. Bei Match-Insert ändert sich matches.length, bei
  // Recalc/Config _cache.version → Key bricht automatisch.
  // Explizite Invalidierung zusätzlich über invalidateCache(['news']) in §3.
  // Slot-Signatur (v8.5): wie viele Ambient-Slots heute schon "offen" sind.
  // Steigt über den Tag (z.B. 0→1 um 12:00, 1→2 um 19:00) und bricht so den
  // Memo-Key, sobald ein neuer Slot fällig wird — auch ohne neues Match.
  const _ambientSlotSig = AMBIENT_SLOTS.filter(h => now.getHours() >= h).length;
  const _buildStoriesKey = matches.length + '_' + _cache.version + '_' + weekKey + '_' + todayKey + '_' + _ambientSlotSig;
  if(_cache._buildStoriesKey === _buildStoriesKey && Array.isArray(_cache._buildStoriesResult)){
    return _cache._buildStoriesResult;
  }

  // ── Helper-Refs einmalig (v8.4) ──
  // getHistoryByMatchId() und getRankSnapshots() sind bereits gecached, aber
  // jeder Aufruf prüft den Cache-Key neu. Einmal pro Generator-Lauf
  // referenzieren spart wiederholten Lookup-Overhead — mehrere Story-Typen
  // (elo_swing_week, elo_swing_day, upset_match, Führungswechsel) brauchen sie.
  const histMap = getHistoryByMatchId();
  const snaps   = getRankSnapshots();

  // ── Pre-Group: matches pro Spieler ──
  // O(N) statt O(N × N_players) für jeden späteren filter()-Aufruf.
  // matches ist asc-sortiert (loadAll) → byPlayer[pid] ist ebenfalls asc.
  // Bei 100k Matches × 50 Spielern: ~400k push-ops vs ~50M filter-ops.
  const byPlayer = {};
  matches.forEach(m => {
    const ids = [m.a1, m.a2, m.b1, m.b2];
    for(let i=0; i<4; i++){
      const pid = ids[i];
      if(!byPlayer[pid]) byPlayer[pid] = [];
      byPlayer[pid].push(m);
    }
  });

  // ── 1. Saison-Endspurt ──
  // Letzte 7 Tage einer Saison + min. 2 Spieler im Saison-Top mit kleinem Abstand.
  try {
    const daysLeft = seasonDaysLeft();
    if(daysLeft > 0 && daysLeft <= 7){
      const sid = currentSeason().id;
      const sim = getGlobalSim();
      const endElos = sim.elo || {};
      const playedMap = (sim.seasonPlayed && sim.seasonPlayed[sid]) || {};
      const rankList = Object.keys(endElos)
        .filter(pid => pm[pid] && !pm[pid].hidden && (playedMap[pid]||0) > 0)
        .map(pid => ({pid, elo: Math.round(endElos[pid])}))
        .sort((a,b)=>b.elo-a.elo);
      if(rankList.length >= 2){
        const gap = rankList[0].elo - rankList[1].elo;
        stories.push({
          id: 'season_endspurt_'+sid,
          cat: 'highlight',
          ic: 'rocket',
          title: `Noch ${daysLeft} ${daysLeft===1?'Tag':'Tage'}!`,
          desc: gap <= 50
            ? `Die Top 2 trennen nur ${gap} Elo. Das wird knapp.`
            : `Saison-Endspurt: ${nameOf(rankList[0].pid)} führt mit ${gap} Elo Vorsprung.`,
          when: now,
          prio: gap <= 15 ? 10 : (gap <= 50 ? 9 : 7),
          dataRef: {type:'season_endgame', sid, leader:rankList[0], second:rankList[1], daysLeft, gap}
        });
      }
    }
  } catch(e){ /* defensiv */ }

  // ── 2. Saisonstart ──
  // Aktuelle Saison startete in den letzten 3 Tagen.
  try {
    const sStart = seasonStart();
    const ageDays = Math.floor((now - sStart) / 86400000);
    if(ageDays >= 0 && ageDays <= 3){
      stories.push({
        id: 'season_start_'+currentSeason().id,
        cat: 'season',
        ic: 'rocket',
        title: ageDays === 0 ? 'Neue Saison ist gestartet!' : `Saison läuft seit ${ageDays} ${ageDays===1?'Tag':'Tagen'}`,
        desc: `${currentSeason().label} — alle Elo-Stände wurden zurückgesetzt. Die Jagd beginnt von vorn.`,
        when: sStart,
        prio: ageDays === 0 ? 8 : 5,
        dataRef: {type:'season_start', sid: currentSeason().id}
      });
    }
  } catch(e){}

  // ── 3. Führungswechsel ──
  // Vergleicht aktuellen Top-1 der Saison mit dem Top-1 vor 10 Matches.
  try {
    const sid = currentSeason().id;
    const seasonMs = matchesInSeason(sid);
    if(seasonMs.length >= 4){
      // Aktueller Top-1
      const sim = getGlobalSim();
      const endElos = sim.elo || {};
      const playedMap = (sim.seasonPlayed && sim.seasonPlayed[sid]) || {};
      const cur = Object.keys(endElos)
        .filter(pid => pm[pid] && !pm[pid].hidden && (playedMap[pid]||0) > 0)
        .map(pid => ({pid, elo: Math.round(endElos[pid])}))
        .sort((a,b)=>b.elo-a.elo);
      // Letztes Match → preRank des letzten Matches (= "Stand vor dem letzten Spiel")
      // Top-1 davor: aus preRank des letzten Matches der Saison
      const lastSeasonMatch = [...seasonMs].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
      const snap = lastSeasonMatch && snaps[lastSeasonMatch.id];
      if(cur.length && snap && snap.preRank){
        let prevTop = null;
        for(const pid in snap.preRank){
          if(snap.preRank[pid] === 1){ prevTop = pid; break; }
        }
        if(prevTop && prevTop !== cur[0].pid && pm[prevTop] && pm[cur[0].pid]){
          stories.push({
            id: 'lead_change_'+sid+'_'+lastSeasonMatch.id,
            cat: 'highlight',
            ic: 'kingClass',
            title: `Neuer Spitzenreiter: ${nameOf(cur[0].pid)}`,
            desc: `Nach dem letzten Spiel ist ${nameOf(cur[0].pid)} neuer Spitzenreiter — vor ${nameOf(prevTop)}.`,
            when: new Date(lastSeasonMatch.created_at),
            prio: 10,
            dataRef: {type:'lead_change', newLeader: cur[0].pid, prevLeader: prevTop, matchId: lastSeasonMatch.id}
          });
        }
      }
    }
  } catch(e){}

  // ── 3b. Team-News: gemeinsame Siegesserie eines Duos (v9.1) ──
  // Match-getriggert (when = Match-Zeit) → erscheint direkt „nach Spielen".
  // Nur bei Meilenstein-Serienlängen, damit es nicht nach jedem Sieg spammt.
  // Ein Pass über alle Matches (matches ist asc-sortiert) → O(N).
  try {
    const TEAM_STREAK_MS = new Set([3,5,7,10,15,20]);
    const tstate = {}; // teamKey → {cur, ids, lastT}
    for(const m of matches){
      const sides = [[m.a1,m.a2,m.winner==='A'],[m.b1,m.b2,m.winner==='B']];
      for(const [x,y,won] of sides){
        if(!x || !y) continue;
        const ids = [x,y].sort(), k = ids.join('|');
        if(!tstate[k]) tstate[k] = {cur:0, ids};
        tstate[k].cur = won ? tstate[k].cur + 1 : 0;
        tstate[k].lastT = new Date(m.created_at);
      }
    }
    const teamCands = Object.values(tstate).filter(t =>
      TEAM_STREAK_MS.has(t.cur) &&
      pm[t.ids[0]] && pm[t.ids[1]] && !pm[t.ids[0]].hidden && !pm[t.ids[1]].hidden);
    teamCands.sort((a,b) => b.cur - a.cur || b.lastT - a.lastT);
    teamCands.slice(0, 3).forEach(t => {
      stories.push({
        id: 'team_streak_'+t.ids.join('_')+'_'+t.cur,
        cat: 'team',
        ic: 'unstoppable',
        title: `${nameOf(t.ids[0])} & ${nameOf(t.ids[1])} sind als Team nicht zu stoppen`,
        desc: `${t.cur} gemeinsame Siege in Folge — dieses Duo harmoniert gerade perfekt.`,
        when: t.lastT,
        prio: t.cur >= 7 ? 9 : 8,
        dataRef: {type:'team_streak', a:t.ids[0], b:t.ids[1], streak:t.cur}
      });
    });
  } catch(e){}

  // ── 4. Top-Form (≥8/10 letzte Spiele) ──
  // Iteriert über aktive Spieler, schaut letzte 10 Matches → Win-Rate.
  // O(N_players × min(10, matches_per_player)) — sehr günstig.
  try {
    const candidates = [];
    activePlayers().forEach(p => {
      // byPlayer ist asc-sortiert (=ältestes first). Letzte 10 = slice(-10), für Recency desc reversen.
      const arr = byPlayer[p.id] || [];
      if(arr.length < 10) return;
      const last10 = arr.slice(-10);
      const wins = last10.filter(m => won(p.id, m)).length;
      if(wins >= 9){ // v8.8: 8→9 — nur noch echte Top-Form (9-10/10) ist News
        candidates.push({pid: p.id, wins, when: new Date(last10[last10.length-1].created_at)});
      }
    });
    candidates.sort((a,b) => b.wins - a.wins || b.when - a.when);
    candidates.slice(0, NEWS_LIMITS.topForm).forEach(c => {
      stories.push({
        id: 'top_form_'+c.pid+'_'+c.when.toISOString().slice(0,10),
        cat: 'highlight',
        ic: 'flame',
        title: `${nameOf(c.pid)} in Top-Form`,
        desc: `${c.wins} Siege aus den letzten 10 Spielen. Aktuell kaum zu stoppen.`,
        when: c.when,
        prio: c.wins === 10 ? 8 : (c.wins === 9 ? 7 : 6),
        dataRef: {type:'top_form', pid: c.pid, wins: c.wins}
      });
    });
  } catch(e){}

  // ── 5. Niederlagenserie (≥5 in Folge, aktuell laufend) ──
  // Nur Spieler, deren JÜNGSTES Match Niederlage war + Serie ≥ 5.
  try {
    const candidates = [];
    activePlayers().forEach(p => {
      // byPlayer asc → von hinten iterieren = neueste zuerst. Frühzeitig brechen.
      const arr = byPlayer[p.id] || [];
      if(!arr.length) return;
      let streak = 0;
      for(let i = arr.length - 1; i >= 0; i--){
        if(won(p.id, arr[i])) break;
        streak++;
        if(streak > 12) break; // Schutz
      }
      if(streak >= 5){
        candidates.push({pid: p.id, streak, when: new Date(arr[arr.length-1].created_at)});
      }
    });
    candidates.sort((a,b) => b.streak - a.streak);
    candidates.slice(0, NEWS_LIMITS.lossStreak).forEach(c => {
      stories.push({
        id: 'loss_streak_'+c.pid+'_'+c.when.toISOString().slice(0,10),
        cat: 'misfortune',
        ic: c.streak >= 7 ? 'dropTriple' : 'dropDouble',
        title: `${nameOf(c.pid)} im Pleiten-Modus`,
        desc: `${c.streak} Niederlagen in Folge. Der Knoten muss platzen.`,
        when: c.when,
        prio: c.streak >= 8 ? 6 : 4,
        dataRef: {type:'loss_streak', pid: c.pid, streak: c.streak}
      });
    });
  } catch(e){}

  // ── 6. Badge freigeschaltet (letzte 7 Tage) ──
  // Tap-Quelle: getBadgeEarnedCache. Wir zeigen die NEUSTEN N freigeschalteten,
  // Dubletten pro Spieler+Badge dedupliziert.
  try {
    const cutoff = now.getTime() - 7*86400000;
    const bMap = getBadgeEarnedCache();
    const events = [];
    for(const mid in bMap){
      const arr = bMap[mid];
      if(!arr || !arr.length) continue;
      const matchObj = matches.find(m => m.id === mid);
      if(!matchObj) continue;
      const t = new Date(matchObj.created_at).getTime();
      if(t < cutoff) continue;
      arr.forEach(e => events.push({...e, when: new Date(matchObj.created_at), matchId: mid}));
    }
    // Pro (Spieler, Badge-ID): nur das jüngste Event
    const dedupe = {};
    events.forEach(ev => {
      const k = ev.playerId+'|'+ev.badge.id;
      if(!dedupe[k] || dedupe[k].when < ev.when) dedupe[k] = ev;
    });
    const list = Object.values(dedupe).sort((a,b) => b.when - a.when).slice(0, NEWS_LIMITS.badgeUnlocked);
    list.forEach(ev => {
      if(!pm[ev.playerId]) return;
      // v8.1: Whitelist-Filter — nur seltene/besondere Badges erzeugen News.
      // Common-Badges (Stammgast, Frühschicht, Comeback-Tag …) sind zu häufig
      // und würden den Feed mit "Achievement-Spam" füllen.
      const rar = (typeof rarityOf === 'function') ? rarityOf(ev.badge.id) : 'common';
      // v8.7: ALLE goldenen (legendary) und lilanen (rare) Badges sind
      // News-würdig; zusätzlich die explizit gewhitelisteten Specials
      // (z.B. seltene negative Badges wie mr_disaster/nemesis/perfect_loss).
      if(rar !== 'legendary' && rar !== 'rare' && !NEWS_BADGE_WHITELIST.has(ev.badge.id)) return;
      // Legendary erzwingt Top-Prio (Bucket >=9 im Final-Sort), damit echte
      // Achievements zuverlässig ganz oben im Feed landen.
      // v9.1: Badges bewusst niedriger priorisiert (außer legendär), damit bei
      // gleichem Zeitstempel Team-News/Fun Facts nach Spielen auch mal oben stehen.
      const rarPrio = {legendary:10, rare:5, common:3, negative:4}[rar] || 3;
      stories.push({
        id: 'badge_'+ev.playerId+'_'+ev.badge.id+'_'+ev.matchId,
        cat: 'badge',
        ic: ev.badge.ic || 'trophy',
        title: `${nameOf(ev.playerId)}: ${ev.badge.name}`,
        desc: ev.badge.desc || 'Neues Badge freigeschaltet.',
        when: ev.when,
        prio: rarPrio,
        dataRef: {type:'badge_unlocked', playerId: ev.playerId, badgeId: ev.badge.id, badgeName: ev.badge.name, matchId: ev.matchId, rarity: rar}
      });
    });
  } catch(e){}

  // ── 7. Rivalität (≥50 H2H-Duelle) ──
  // H2H = wie oft 2 Spieler in irgendeinem Match GEGENEINANDER waren (egal welcher Mate).
  // Iteriere matches 1×, baue Counter-Map auf.
  try {
    const pairCnt = {}; // "minId|maxId" → {n, lastDate}
    matches.forEach(m => {
      const A = [m.a1, m.a2], B = [m.b1, m.b2];
      A.forEach(a => B.forEach(b => {
        if(a === b) return;
        const k = a < b ? a+'|'+b : b+'|'+a;
        if(!pairCnt[k]) pairCnt[k] = {n:0, last:m.created_at};
        pairCnt[k].n++;
        if(m.created_at > pairCnt[k].last) pairCnt[k].last = m.created_at;
      }));
    });
    const ranked = Object.entries(pairCnt)
      .filter(([k,v]) => v.n >= 50)
      .map(([k,v]) => {
        const [a,b] = k.split('|');
        return {a, b, n: v.n, when: new Date(v.last)};
      })
      .filter(r => pm[r.a] && pm[r.b] && !pm[r.a].hidden && !pm[r.b].hidden)
      .sort((a,b) => b.n - a.n)
      .slice(0, NEWS_LIMITS.rivalry);
    ranked.forEach(r => {
      const tier = r.n >= 200 ? 'legendäre' : r.n >= 100 ? 'große' : 'wachsende';
      stories.push({
        id: 'rivalry_'+r.a+'_'+r.b,
        cat: 'rivalry',
        ic: 'crossedSwords',
        title: `${r.n} Duelle: ${nameOf(r.a)} vs ${nameOf(r.b)}`,
        desc: `Eine ${tier} Rivalität — die Liga liebt's.`,
        when: r.when,
        prio: r.n >= 200 ? 7 : r.n >= 100 ? 5 : 3,
        dataRef: {type:'rivalry', a: r.a, b: r.b, n: r.n}
      });
    });
  } catch(e){}

  // ── 8. Jubiläum (50/100/200/500 Spiele) ──
  // Trigger NUR wenn das jüngste Match dieses Spielers genau die Schwelle reißt.
  // → keine Wiederholung in späteren Generator-Läufen (ID enthält Match-ID).
  try {
    const thresholds = [50, 100, 200, 500, 1000];
    const candidates = [];
    activePlayers().forEach(p => {
      // byPlayer ist bereits asc-sortiert (matches asc → push behält Reihenfolge).
      // Keine zusätzliche Filterung/Sortierung nötig.
      const arr = byPlayer[p.id] || [];
      const total = arr.length;
      if(!total) return;
      for(const t of thresholds){
        if(total === t){
          const last = arr[arr.length-1];
          candidates.push({pid: p.id, total: t, when: new Date(last.created_at), matchId: last.id});
          break;
        }
      }
    });
    candidates.sort((a,b) => b.when - a.when).slice(0, NEWS_LIMITS.jubilee).forEach(c => {
      stories.push({
        id: 'jubilee_'+c.pid+'_'+c.total,
        cat: 'history',
        ic: 'calendar',
        title: `${nameOf(c.pid)} feiert ${c.total}. Spiel`,
        desc: `Ein Karriere-Meilenstein. Glückwunsch.`,
        when: c.when,
        prio: c.total >= 500 ? 8 : c.total >= 200 ? 6 : 4,
        dataRef: {type:'jubilee', pid: c.pid, total: c.total, matchId: c.matchId}
      });
    });
  } catch(e){}

  // ── 9. Stille Woche (Aktivitäts-Fun-Fact) ──
  // Vergleicht Spielzahl letzte 7 Tage mit Schnitt der vorangegangenen 4 Wochen.
  try {
    const wk = 7 * 86400000;
    const tsNow = now.getTime();
    const lastWeek = matches.filter(m => {
      const t = new Date(m.created_at).getTime();
      return t > tsNow - wk && t <= tsNow;
    }).length;
    const prev4w = matches.filter(m => {
      const t = new Date(m.created_at).getTime();
      return t > tsNow - 5*wk && t <= tsNow - wk;
    }).length;
    const avg = prev4w / 4;
    if(avg >= 20 && lastWeek <= avg * 0.5){
      stories.push({
        id: 'quiet_week_'+weekKey,
        cat: 'fun',
        ic: 'clock',
        title: 'Ruhige Woche',
        desc: `Nur ${lastWeek} Spiele in den letzten 7 Tagen. Normal wären ${Math.round(avg)}.`,
        when: now,
        prio: 2,
        dataRef: {type:'quiet_week', lastWeek, avg: Math.round(avg)}
      });
    }
  } catch(e){}

  // ── 10. Saisonende-Recap (Saison gerade zu Ende) ──
  // Wenn aktuelle Saison weniger als 2 Tage alt ist UND es eine archivierte
  // Vorgängersaison gibt → kurzer Verweis auf den Champion.
  try {
    const sStart = seasonStart();
    const ageDays = (now - sStart) / 86400000;
    if(ageDays <= 2 && seasons && seasons.length){
      // v9-Fix: NUR die unmittelbar vorige Saison (Vormonat der aktuellen)
      // recap'en. Vorher wurde blind „die höchste vorhandene id" genommen —
      // war das seasons-Array noch nicht voll synchronisiert (die gerade
      // beendete Saison fehlte), wählte das die VORLETZTE Saison und
      // persistierte eine dauerhaft falsche „Saison-Champion"-Story mit
      // when = aktueller Saisonstart, die als Breaking-Hero konkurrierte.
      // Jetzt matchen wir exakt den erwarteten Vormonat; fehlt er → nichts.
      const _prevSeasonId = (curId) => {
        const mm = /^(\d{4})-(\d{2})$/.exec(String(curId||''));
        if(!mm) return null;
        let yy = +mm[1], mo = +mm[2] - 1;
        if(mo < 1){ mo = 12; yy--; }
        return yy + '-' + String(mo).padStart(2,'0');
      };
      const prevId = _prevSeasonId(currentSeason().id);
      const lastArchived = prevId ? seasons.find(s => s.id === prevId) : null;
      if(lastArchived){
        const topElo = (typeof lastArchived.top_elo === 'string')
          ? JSON.parse(lastArchived.top_elo || '[]')
          : (lastArchived.top_elo || []);
        if(topElo.length && topElo[0] && topElo[0].id && pm[topElo[0].id]){
          stories.push({
            id: 'season_recap_'+lastArchived.id,
            cat: 'season',
            ic: 'crown',
            title: `${nameOf(topElo[0].id)} ist Saison-Champion`,
            desc: `Die Saison ${lastArchived.id} ist abgeschlossen — ${nameOf(topElo[0].id)} mit ${topElo[0].elo} Elo an der Spitze.`,
            when: sStart,
            prio: 9,
            dataRef: {type:'season_recap', sid: lastArchived.id, championId: topElo[0].id, championElo: topElo[0].elo, topElo}
          });
        }
      }
    }
  } catch(e){}

  // ── 11. Persönliche Sieg-Milestones (100/250/500/1000) ──
  // Nutzt byPlayer + bestehendes won(). Trigger nur, wenn die Gesamt-Siege
  // GENAU eine Schwelle treffen → die Story ist stabil und erscheint einmalig.
  try {
    const winThresholds = [100, 250, 500, 1000];
    activePlayers().forEach(p => {
      const arr = byPlayer[p.id] || [];
      if(!arr.length) return;
      let wins = 0;
      for(let i = 0; i < arr.length; i++) if(won(p.id, arr[i])) wins++;
      for(const t of winThresholds){
        if(wins === t){
          // Trigger-Match = letzter Sieg
          let trigger = null;
          for(let i = arr.length - 1; i >= 0; i--){
            if(won(p.id, arr[i])){ trigger = arr[i]; break; }
          }
          if(!trigger) break;
          stories.push({
            id: 'milestone_wins_'+p.id+'_'+t,
            cat: 'personal',
            ic: 'trophy',
            title: `${nameOf(p.id)}: ${t}. Sieg!`,
            desc: `Karriere-Meilenstein — ${t} Siege stehen jetzt zu Buche.`,
            when: new Date(trigger.created_at),
            prio: t >= 500 ? 9 : t >= 250 ? 7 : 5,
            dataRef: {type:'milestone_wins', pid: p.id, milestone: t+'. Sieg', matchId: trigger.id}
          });
          break;
        }
      }
    });
  } catch(e){}

  // ── 12. Elo-Anstieg der Woche (größter Aufsteiger 7d) ──
  // Aggregiert sim.deltas pro Spieler über die letzten 7 Tage. O(N_recent) total.
  try {
    const wk = 7 * 86400000;
    const tsNow = now.getTime();
    const gains = {};
    for(let i = 0; i < matches.length; i++){
      const m = matches[i];
      const t = new Date(m.created_at).getTime();
      if(t < tsNow - wk || t > tsNow) continue;
      const hist = histMap.get(m.id);
      if(!hist || !hist.deltas) continue;
      for(const pid in hist.deltas){
        gains[pid] = (gains[pid] || 0) + hist.deltas[pid];
      }
    }
    let topPid = null, topGain = 0;
    for(const pid in gains){
      if(!pm[pid] || pm[pid].hidden) continue;
      if(gains[pid] > topGain){ topGain = gains[pid]; topPid = pid; }
    }
    if(topPid && topGain >= 50){
      const delta = Math.round(topGain);
      stories.push({
        id: 'elo_swing_week_'+topPid+'_'+weekKey,
        cat: 'personal',
        ic: 'trendUp',
        title: `${nameOf(topPid)} im Aufwind`,
        desc: `+${delta} Elo in den letzten 7 Tagen — größter Anstieg der Woche.`,
        when: now,
        prio: 7,
        dataRef: {type:'elo_swing', pid: topPid, delta, period: 'Letzte 7 Tage'}
      });
    }
  } catch(e){}

  // ── 13. Härtester Elo-Verlust des Tages (Pechvogel) ──
  try {
    const day = 86400000;
    const tsNow = now.getTime();
    const losses = {};
    for(let i = 0; i < matches.length; i++){
      const m = matches[i];
      const t = new Date(m.created_at).getTime();
      if(t < tsNow - day || t > tsNow) continue;
      const hist = histMap.get(m.id);
      if(!hist || !hist.deltas) continue;
      for(const pid in hist.deltas){
        losses[pid] = (losses[pid] || 0) + hist.deltas[pid];
      }
    }
    let worstPid = null, worstDelta = 0;
    for(const pid in losses){
      if(!pm[pid] || pm[pid].hidden) continue;
      if(losses[pid] < worstDelta){ worstDelta = losses[pid]; worstPid = pid; }
    }
    if(worstPid && worstDelta <= -25){ // v8.8: -20→-25 — nur echte Pech-Tage
      const delta = Math.round(worstDelta);
      stories.push({
        id: 'elo_swing_day_'+worstPid+'_'+todayKey,
        cat: 'misfortune',
        ic: 'dropDouble',
        title: `${nameOf(worstPid)} mit hartem Tag`,
        desc: `${delta} Elo — der größte Verlust der letzten 24 Stunden.`,
        when: now,
        prio: 5,
        dataRef: {type:'elo_swing', pid: worstPid, delta, period: 'Letzte 24 Stunden'}
      });
    }
  } catch(e){}

  // ── 14. Größter Kantersieg der Woche ──
  // Tordifferenz ≥ 8 in den letzten 7 Tagen. Story bezieht sich auf das Match.
  try {
    const wk = 7 * 86400000;
    const tsNow = now.getTime();
    let biggest = null;
    for(let i = 0; i < matches.length; i++){
      const m = matches[i];
      const t = new Date(m.created_at).getTime();
      if(t < tsNow - wk || t > tsNow) continue;
      const diff = Math.abs((m.score_a||0) - (m.score_b||0));
      if(!biggest || diff > biggest.diff){
        biggest = {m, diff, t};
      }
    }
    if(biggest && biggest.diff >= 8){
      stories.push({
        id: 'biggest_blowout_'+biggest.m.id,
        cat: 'highlight',
        ic: 'thriller',
        title: `Kantersieg: ${biggest.m.score_a}:${biggest.m.score_b}`,
        desc: `${biggest.diff} Tore Unterschied — der höchste Sieg der Woche.`,
        when: new Date(biggest.t),
        prio: biggest.diff >= 10 ? 8 : 6,
        dataRef: {type:'biggest_blowout', matchId: biggest.m.id, diff: biggest.diff}
      });
    }
  } catch(e){}

  // ── 15. Vor genau einem Jahr (Anniversary) ──
  // Match suchen, dessen created_at ±1 Tag um (now - 365d) liegt.
  // Nimm das Match mit der geringsten Abweichung.
  try {
    const year = 365 * 86400000;
    const tsNow = now.getTime();
    const targetTs = tsNow - year;
    const tolerance = 86400000;
    let ann = null;
    for(let i = 0; i < matches.length; i++){
      const m = matches[i];
      const t = new Date(m.created_at).getTime();
      const diff = Math.abs(t - targetTs);
      if(diff <= tolerance){
        if(!ann || diff < ann.diff) ann = {m, diff};
      }
    }
    if(ann){
      const m = ann.m;
      const dt = new Date(m.created_at);
      const dStr = dt.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
      stories.push({
        id: 'anniversary_'+m.id,
        cat: 'history',
        ic: 'calendar',
        title: 'Vor genau einem Jahr',
        desc: `Erinnerst du dich? ${m.score_a}:${m.score_b} am ${dStr}.`,
        when: now,
        prio: 4,
        dataRef: {type:'anniversary', matchId: m.id, dateLabel: dStr}
      });
    }
  } catch(e){}

  // ── 16. Upset des Tages (Underdog schlägt Top-Spieler) ──
  // Sucht in den letzten 7 Tagen das Match mit dem größten preRank-Vorteil
  // des Verlierers (= Sieger war schwächer rangiert). Nutzt getRankSnapshots.
  try {
    const wk = 7 * 86400000;
    const tsNow = now.getTime();
    let bestUpset = null;
    for(let i = 0; i < matches.length; i++){
      const m = matches[i];
      const t = new Date(m.created_at).getTime();
      if(t < tsNow - wk || t > tsNow) continue;
      const snap = snaps[m.id];
      if(!snap || !snap.preRank) continue;
      const winners = m.winner === 'A' ? [m.a1, m.a2] : [m.b1, m.b2];
      const losers  = m.winner === 'A' ? [m.b1, m.b2] : [m.a1, m.a2];
      // beste preRank der Sieger (niedrigste Zahl = besser)
      // beste preRank der Verlierer
      const winnerBest = Math.min(...winners.map(p => snap.preRank[p] || 99));
      const loserBest  = Math.min(...losers.map(p  => snap.preRank[p] || 99));
      // Upset: Sieger waren SCHLECHTER (höhere Zahl) als Verlierer
      const gap = winnerBest - loserBest;
      if(gap >= 3 && (!bestUpset || gap > bestUpset.gap)){
        bestUpset = {m, gap, t, winners, losers, winnerBest, loserBest};
      }
    }
    if(bestUpset){
      const m = bestUpset.m;
      stories.push({
        id: 'upset_match_'+m.id,
        cat: 'highlight',
        ic: 'thriller',
        title: 'Upset der Woche!',
        desc: `${bestUpset.winners.map(nameOf).join(' & ')} als Außenseiter: Platz ${bestUpset.winnerBest} schlägt Platz ${bestUpset.loserBest}.`,
        when: new Date(bestUpset.t),
        prio: bestUpset.gap >= 5 ? 8 : 6,
        dataRef: {type:'upset_match', matchId: m.id, gap: bestUpset.gap,
                  winnerRank: bestUpset.winnerBest, loserRank: bestUpset.loserBest}
      });
    }
  } catch(e){}

  // ── 16b. Gipfeltreffen: Platz 1 schlägt Platz 2 (v8.8) ──
  // Sucht in den letzten 7 Tagen das JÜNGSTE Match, in dem der Pre-Rank-#1
  // gegen den #2 antrat und der #1 gewann ("zieht weiter davon").
  try {
    const wk = 7 * 86400000;
    const tsNow = now.getTime();
    let best = null;
    for(let i = matches.length - 1; i >= 0; i--){
      const m = matches[i];
      const t = new Date(m.created_at).getTime();
      if(t > tsNow) continue;
      if(t < tsNow - wk) break; // matches asc → ab hier nur noch älter
      const snap = snaps[m.id];
      if(!snap || !snap.preRank) continue;
      const winners = m.winner === 'A' ? [m.a1, m.a2] : [m.b1, m.b2];
      const losers  = m.winner === 'A' ? [m.b1, m.b2] : [m.a1, m.a2];
      const winnerBest = Math.min(...winners.map(p => snap.preRank[p] || 99));
      const loserBest  = Math.min(...losers.map(p  => snap.preRank[p] || 99));
      if(winnerBest === 1 && loserBest === 2){ best = {m, t, winners, losers}; break; }
    }
    if(best){
      const m = best.m;
      const wNames = best.winners.filter(p => pm[p] && !pm[p].hidden).map(nameOf);
      stories.push({
        id: 'top_clash_'+m.id,
        cat: 'highlight',
        ic: 'kingClass',
        title: 'Gipfeltreffen: Platz 1 schlägt Platz 2',
        desc: `${wNames.join(' & ')} setzt sich im Spitzenspiel durch und zieht weiter davon.`,
        when: new Date(best.t),
        prio: 9,
        dataRef: {type:'top_clash', matchId: m.id, winners: best.winners, losers: best.losers}
      });
    }
  } catch(e){}

  // ── 17. Serienkiller (Match beendete ≥6er Sieges-Streak des Gegners) ──
  // Nutzt getStreakSnapshots — pro Match {pid: streak_VOR_match}.
  try {
    const wk = 14 * 86400000;
    const tsNow = now.getTime();
    const streakSnaps = (typeof getStreakSnapshots === 'function') ? getStreakSnapshots() : {};
    let bestKill = null;
    for(let i = 0; i < matches.length; i++){
      const m = matches[i];
      const t = new Date(m.created_at).getTime();
      if(t < tsNow - wk || t > tsNow) continue;
      const snap = streakSnaps[m.id];
      if(!snap) continue;
      const losers = m.winner === 'A' ? [m.b1, m.b2] : [m.a1, m.a2];
      // Höchste laufende Streak unter den Verlierern VOR diesem Match
      let maxLoserStreak = 0, victimPid = null;
      losers.forEach(pid => {
        const s = snap[pid] || 0;
        if(s > maxLoserStreak){ maxLoserStreak = s; victimPid = pid; }
      });
      if(maxLoserStreak >= 6 && (!bestKill || maxLoserStreak > bestKill.streak)){
        bestKill = {m, streak: maxLoserStreak, victimPid, t};
      }
    }
    if(bestKill){
      const m = bestKill.m;
      stories.push({
        id: 'streak_killer_'+m.id,
        cat: 'highlight',
        ic: 'crossedSwords',
        title: 'Siegesserie beendet!',
        desc: `${nameOf(bestKill.victimPid)}'s ${bestKill.streak}er-Serie ist gerissen.`,
        when: new Date(bestKill.t),
        prio: bestKill.streak >= 10 ? 9 : 7,
        dataRef: {type:'streak_killer', matchId: m.id, streak: bestKill.streak, victimPid: bestKill.victimPid}
      });
    }
  } catch(e){}

  // ── 18. Krimi der Woche (knappstes Match, Tordifferenz = 1) ──
  try {
    const wk = 7 * 86400000;
    const tsNow = now.getTime();
    let thriller = null;
    for(let i = 0; i < matches.length; i++){
      const m = matches[i];
      const t = new Date(m.created_at).getTime();
      if(t < tsNow - wk || t > tsNow) continue;
      const diff = Math.abs((m.score_a||0) - (m.score_b||0));
      // Nur 1-Tor-Krimis ab Score ≥ 8 (anders sind 1:0 oder 2:1 wenig spannend)
      if(diff !== 1) continue;
      const totalScore = (m.score_a||0) + (m.score_b||0);
      if(totalScore < 17) continue;
      if(!thriller || totalScore > thriller.totalScore){
        thriller = {m, totalScore, t};
      }
    }
    if(thriller){
      const m = thriller.m;
      stories.push({
        id: 'thriller_'+m.id,
        cat: 'highlight',
        ic: 'thriller',
        title: `Krimi: ${m.score_a}:${m.score_b}`,
        desc: `Entscheidung erst im letzten Tor — knappster Sieg der Woche.`,
        when: new Date(thriller.t),
        prio: 7,
        dataRef: {type:'thriller_match', matchId: m.id, diff: 1, total: thriller.totalScore}
      });
    }
  } catch(e){}

  // ── 19. Rivalitäts-Meilenstein (50/100/200/500 H2H-Duelle ERREICHT) ──
  // Im Gegensatz zu Story 7 (Rivalry) triggert das nur, wenn das jüngste
  // Match der Paarung gerade eine Schwelle riss → "100. Aufeinandertreffen!".
  try {
    const pairThresholds = [50, 100, 200, 500];
    const pairCnt = {};
    matches.forEach(m => {
      const A = [m.a1, m.a2], B = [m.b1, m.b2];
      A.forEach(a => B.forEach(b => {
        if(a === b) return;
        const k = a < b ? a+'|'+b : b+'|'+a;
        if(!pairCnt[k]) pairCnt[k] = {n:0, lastId:null, lastTs:0};
        pairCnt[k].n++;
        const ts = new Date(m.created_at).getTime();
        if(ts > pairCnt[k].lastTs){ pairCnt[k].lastTs = ts; pairCnt[k].lastId = m.id; }
      }));
    });
    Object.entries(pairCnt).forEach(([k, v]) => {
      if(!pairThresholds.includes(v.n)) return;
      const [a, b] = k.split('|');
      if(!pm[a] || !pm[b] || pm[a].hidden || pm[b].hidden) return;
      stories.push({
        id: 'rivalry_milestone_'+k+'_'+v.n,
        cat: 'rivalry',
        ic: 'crossedSwords',
        title: `${v.n}. Duell: ${nameOf(a)} vs ${nameOf(b)}`,
        desc: `Historisches ${v.n}. Aufeinandertreffen — die Rivalität wächst.`,
        when: new Date(v.lastTs),
        prio: v.n >= 200 ? 9 : v.n >= 100 ? 8 : 6,
        dataRef: {type:'rivalry_milestone', a, b, n: v.n, matchId: v.lastId}
      });
    });
  } catch(e){}

  // ── 20. Tor-Meilensteine (500/1000/2500 Karriere-Tore) ──
  try {
    const goalThresholds = [500, 1000, 2500];
    activePlayers().forEach(p => {
      const arr = byPlayer[p.id] || [];
      if(!arr.length) return;
      let goals = 0;
      for(let i = 0; i < arr.length; i++){
        const m = arr[i];
        const onA = [m.a1, m.a2].includes(p.id);
        goals += onA ? (m.score_a||0) : (m.score_b||0);
      }
      for(const t of goalThresholds){
        if(goals >= t && goals < t + 10){
          // letzte Schwelle gerade erst gerissen (innerhalb 10 Tore Toleranz)
          const last = arr[arr.length-1];
          stories.push({
            id: 'milestone_goals_'+p.id+'_'+t,
            cat: 'personal',
            ic: 'target',
            title: `${nameOf(p.id)}: ${t}. Tor`,
            desc: `Karriere-Meilenstein — ${goals} Tore stehen jetzt zu Buche.`,
            when: new Date(last.created_at),
            prio: t >= 1000 ? 8 : 6,
            dataRef: {type:'milestone_goals', pid: p.id, milestone: t+'. Tor', matchId: last.id}
          });
          break;
        }
      }
    });
  } catch(e){}

  // ── 21. Aktive Sieges-Streak (≥5 in Folge, läuft noch) ──
  // Pendant zu loss_streak. Spieler dessen jüngstes Match Sieg war und
  // davor noch ≥4 weitere Siege.
  try {
    const candidates = [];
    activePlayers().forEach(p => {
      const arr = byPlayer[p.id] || [];
      if(!arr.length) return;
      let streak = 0;
      for(let i = arr.length - 1; i >= 0; i--){
        if(!won(p.id, arr[i])) break;
        streak++;
        if(streak > 20) break;
      }
      if(streak >= 5){
        candidates.push({pid: p.id, streak, when: new Date(arr[arr.length-1].created_at)});
      }
    });
    candidates.sort((a,b) => b.streak - a.streak);
    candidates.slice(0, 3).forEach(c => {
      stories.push({
        id: 'win_streak_'+c.pid+'_'+c.when.toISOString().slice(0,10),
        cat: 'highlight',
        ic: 'flame',
        title: `${nameOf(c.pid)} ungeschlagen`,
        desc: `${c.streak} Siege in Folge — aktuelle heißeste Form der Liga.`,
        when: c.when,
        prio: c.streak >= 10 ? 9 : c.streak >= 7 ? 7 : 6,
        dataRef: {type:'win_streak', pid: c.pid, streak: c.streak}
      });
    });
  } catch(e){}

  // ── 22. Längste Pause (kein Spielbetrieb in den letzten X Tagen) ──
  // Story zeigt sich erst, wenn die aktuelle "Stille" ≥3 Tage andauert.
  try {
    if(matches.length){
      const lastMatchTs = new Date(matches[matches.length-1].created_at).getTime();
      const sinceLastDays = Math.floor((now.getTime() - lastMatchTs) / 86400000);
      if(sinceLastDays >= 3){
        stories.push({
          // Pro Pause genau 1 Story (lastMatchId bleibt stabil bis zum
          // nächsten Match) — kein täglicher Spam mehr.
          id: 'dry_spell_'+matches[matches.length-1].id,
          cat: 'fun',
          ic: 'clock',
          title: `${sinceLastDays} Tage ohne Spiel`,
          desc: `Längste Pause seit Langem — Zeit für ein Match?`,
          when: now,
          prio: 3,
          dataRef: {type:'dry_spell', daysSince: sinceLastDays, lastMatchId: matches[matches.length-1].id}
        });
      }
    }
  } catch(e){}

  // ── Spieler der Woche (POTW) der Vorwoche (v8.7) ──
  // Persistente News zu Wochenbeginn (Mo früh), analog zum POTW-Recap-Sheet.
  // Deterministische ID pro Woche → kein Doppel, Cross-Device-stabil.
  try {
    if(typeof _potwLastWeekRange === 'function' && typeof _potwKeyOf === 'function'){
      const range = _potwLastWeekRange();
      const wm = matches.filter(m => { const d = new Date(m.created_at); return d >= range.start && d <= range.end; });
      const res = _newsPeriodWinner(wm, 5);
      if(res){
        const wk = _potwKeyOf(range.start);
        const rep = new Date(range.start); rep.setDate(rep.getDate() + 7); rep.setHours(7, 0, 0, 0);
        const names = res.winners.map(w => nameOf(w.id));
        const titleNames = names.length > 1 ? names.slice(0, -1).join(', ') + ' & ' + names[names.length-1] : names[0];
        const main = res.main;
        stories.push({
          id: 'potw_' + wk,
          cat: 'season',
          ic: 'weekKing',
          title: names.length > 1 ? `${titleNames}: Spieler der Woche` : `${titleNames} ist Spieler der Woche`,
          desc: `Beste Bilanz der Vorwoche: ${main.wins} Siege bei ${Math.round(main.wr*100)}% Siegquote.`,
          when: rep,
          prio: 8,
          dataRef: {type:'potw', weekKey: wk, playerId: main.id, playerIds: res.winners.map(w => w.id), wins: main.wins, wr: main.wr}
        });
      }
    }
  } catch(e){}

  // ── Spieler des Tages (POTD) des letzten Spieltags (v8.7) ──
  // Persistente News am Folgetag (früh), analog zum POTD-Recap-Sheet.
  try {
    if(typeof _potdLastDayData === 'function'){
      const data = _potdLastDayData(); // {dayKey, dayMatches} | null
      if(data){
        const res = _newsPeriodWinner(data.dayMatches, 3);
        if(res){
          const rep = new Date(data.dayKey + 'T00:00:00'); rep.setDate(rep.getDate() + 1); rep.setHours(7, 0, 0, 0);
          const main = res.main;
          const names = res.winners.map(w => nameOf(w.id));
          const titleNames = names.length > 1 ? names.slice(0, -1).join(', ') + ' & ' + names[names.length-1] : names[0];
          const p = data.dayKey.split('-');
          const dLabel = p[2] + '.' + p[1] + '.';
          stories.push({
            id: 'potd_' + data.dayKey,
            cat: 'highlight',
            ic: 'dayKing',
            title: names.length > 1 ? `${titleNames}: Spieler des Tages` : `${titleNames} ist Spieler des Tages`,
            desc: `Bester Spieler am ${dLabel}: ${main.wins} Siege bei ${Math.round(main.wr*100)}% Siegquote.`,
            when: rep,
            prio: 7,
            dataRef: {type:'potd', dayKey: data.dayKey, playerId: main.id, playerIds: res.winners.map(w => w.id), wins: main.wins, wr: main.wr}
          });
        }
      }
    }
  } catch(e){}

  // Hinweis (v8.6): Die Konsolidierung gegen Match-Event-Spam (mehrere fast
  // identische Karten pro Match) passiert bewusst NICHT hier im Generator,
  // sondern beim Anzeigen (_consolidateStories, §11.2) — siehe Begründung dort.

  // ── Ambiente Tages-Stories (v8.5) ──
  // Zeitlich verteilte Fun Facts / Nuggets, damit der Feed auch ohne neue
  // Matches lebt. Tages-deterministisch → kein Cross-Device-Spam.
  try {
    const amb = _buildAmbientStories(now, pm, nameOf);
    for(const a of amb) stories.push(a);
  } catch(e){ if(NEWS_DEBUG || window.NEWS_DEBUG) console.warn('[news] ambient build failed', e); }

  // ── Final-Sort + Limit ──
  // v8.2: PURE Chronologie (User-Wunsch). Neueste Story zuerst, älteste
  // zuletzt — in ALLEN Views (Mini-Popup, Feed, Filter) konsistent.
  // Wichtige Stories landen ohnehin oben, weil ihre `when`-Werte meist
  // "jetzt" sind (saison_endspurt, anniversary, elo_swing*). Bei gleichem
  // Timestamp dient Prio als deterministischer Tiebreaker.
  stories.sort((a,b) => {
    const dt = b.when - a.when;
    if(dt !== 0) return dt;
    return b.prio - a.prio;
  });

  // ── Anti-Spam: Per-Player-Limit (v8.1) ──
  // Verhindert, dass ein einzelner Spieler den Feed dominiert. Nach dem
  // Sort sind die wichtigsten Stories pro Spieler bereits zuerst — wir nehmen
  // also die ersten N und kappen den Rest. Stories ohne Spieler-Bezug
  // (saison_endgame, season_recap, quiet_week, biggest_blowout, anniversary)
  // sind nicht limitiert.
  const PER_PLAYER_LIMIT = 3;
  const perPlayer = {};
  const deduped = [];
  for(const s of stories){
    const d = s.dataRef || {};
    const pid = d.pid || d.playerId || d.newLeader || null;
    if(!pid){
      deduped.push(s);
      continue;
    }
    if(!perPlayer[pid]) perPlayer[pid] = 0;
    if(perPlayer[pid] >= PER_PLAYER_LIMIT) continue;
    perPlayer[pid]++;
    deduped.push(s);
  }
  // Ergebnis memoisieren (v8.4) — siehe Memoization-Guard oben.
  const _result = deduped.slice(0, NEWS_LIMITS.total);
  _cache._buildStoriesKey = _buildStoriesKey;
  _cache._buildStoriesResult = _result;
  return _result;
}

// Gewinner einer Periode (POTW/POTD) — gleiche Regel wie die Recap-Sheets
// (showPotwRecap/showPotdRecap): min. N Siege, höchste Siegquote, Tiebreak
// mehr Siege → mehr Elo-Delta. Geteilter Sieg bei identischer Siegquote.
// Liefert {winners:[…], main} oder null. (v8.7)
function _newsPeriodWinner(rangeMatches, minWins){
  if(!Array.isArray(rangeMatches) || !rangeMatches.length) return null;
  const ps = {};
  for(const m of rangeMatches){
    const aWon = m.winner === 'A';
    [m.a1, m.a2, m.b1, m.b2].forEach(id => {
      if(!ps[id]) ps[id] = {wins:0, losses:0, eloDelta:0};
      const onA = (m.a1 === id || m.a2 === id);
      const won = (onA && aWon) || (!onA && !aWon);
      ps[id].eloDelta += (m.deltas && m.deltas[id]) || 0;
      if(won) ps[id].wins++; else ps[id].losses++;
    });
  }
  const pm = pmap();
  const cand = Object.entries(ps)
    .filter(([id, s]) => s.wins >= minWins && pm[id] && !pm[id].hidden)
    .map(([id, s]) => { const g = s.wins + s.losses; return {id, wins: s.wins, losses: s.losses, eloDelta: s.eloDelta, wr: g ? s.wins/g : 0}; })
    .sort((a, b) => { if(b.wr !== a.wr) return b.wr - a.wr; if(b.wins !== a.wins) return b.wins - a.wins; return b.eloDelta - a.eloDelta; });
  if(!cand.length) return null;
  const topWr = cand[0].wr;
  return { winners: cand.filter(c => Math.abs(c.wr - topWr) < 0.001), main: cand[0] };
}

// ─── §11.1b — Ambiente Tages-Stories (v8.5) ──────────────────────────
// Erzeugt über den Tag verteilte Fun Facts / persönliche Nuggets / Rivalitäten
// / Historie, damit der Feed auch OHNE neue Matches lebendig wirkt.
//
// KERNPRINZIP (kein Spam, Cross-Device-konsistent):
//   - Pro Tag gibt es feste Zeit-Slots (AMBIENT_SLOTS). Je Slot genau 1 Story,
//     die erst ab der Slot-Stunde erscheint (gating über _ambientSlotSig im
//     Memo-Key von _buildStories).
//   - Story-IDs sind tages-deterministisch: `ambient_<datum>_<stunde>`.
//     → ON CONFLICT DO NOTHING beim Upload: der erste Insert gewinnt den
//       Timestamp, alle Geräte sehen exakt dieselbe Story.
//   - Welche Story ein Slot zeigt, entscheidet ein aus Datum+Slot geseedeter
//     Pseudo-Zufall (mulberry32). "Random" fürs Gefühl, aber überall identisch.
//   - Pro Tag werden keine zwei gleichen Typen gewählt (usedKeys).
//   - Die Inhalte stammen aus echten Daten (allPlayerStats, H2H-Map, Scores) —
//     nichts wird erfunden. Liefert ein Template kein Ergebnis (zu wenig
//     Daten), wird deterministisch das nächste genommen.
function _buildAmbientStories(now, pm, nameOf){
  const out = [];
  if(!Array.isArray(AMBIENT_SLOTS) || !AMBIENT_SLOTS.length) return out;
  const dateKey = now.toISOString().slice(0,10);
  const curHour = now.getHours();
  const activeSlots = AMBIENT_SLOTS.filter(h => curHour >= h);
  if(!activeSlots.length) return out;

  const templates = _ambientTemplatePool(now, pm, nameOf);
  if(!templates.length) return out;

  const usedKeys = new Set();
  const usedCats = new Set();

  // v8.9: Bereits für HEUTE in der DB persistierte Ambient-Stories vorab als
  // „benutzt" markieren — und ihre Slots NICHT neu ableiten.
  // Hintergrund des Bugs: Die Slots entstehen an verschiedenen Tageszeiten und
  // damit in GETRENNTEN Builds (Slot 8 wird morgens eingefroren — ON CONFLICT —,
  // Slot 13 erst mittags erzeugt). Der Mittags-Build leitete den Vormittags-Slot
  // bisher nur aus den AKTUELLEN Daten neu ab; hat sich die Datenlage über den
  // Tag geändert, weicht diese Ableitung vom eingefrorenen Slot 8 ab, und der
  // In-Build-Dedup schützt dann gegen das FALSCHE Template → Slot 13 durfte
  // dasselbe Template wie der bereits gespeicherte Slot 8 ziehen (zwei
  // identische News). Fix: aus dem seeden, was WIRKLICH in der DB steht.
  const knownToday = (Array.isArray(_cache._stories) ? _cache._stories : [])
    .filter(s => s && typeof s.id === 'string' && s.id.indexOf('ambient_' + dateKey + '_') === 0);
  const persistedSlots = new Set();
  for(const s of knownToday){
    const slot = parseInt(s.id.slice(s.id.lastIndexOf('_') + 1), 10);
    if(!isNaN(slot)) persistedSlots.add(slot);
    const sub = s.dataRef && s.dataRef.sub;
    if(sub){ usedKeys.add(sub); usedCats.add(String(sub).split('_')[0]); }
  }

  for(const slotHour of activeSlots){
    // Schon in der DB → nicht neu ableiten. Die Story kommt ohnehin aus dem
    // DB-Cache in den Feed; ein Neu-Erzeugen brächte nur Daten-Drift-Risiko.
    if(persistedSlots.has(slotHour)) continue;
    const rng = _ambientRng(_ambientHash(dateKey + '_' + slotHour));
    // Templates in geseedeter Reihenfolge prüfen, erstes nicht-genutztes mit
    // Ergebnis gewinnt → variiert pro Tag/Slot, bleibt aber deterministisch.
    const order = _ambientShuffle(templates.map((_, i) => i), rng);
    let chosen = null, chosenKey = null;
    // 2 Durchläufe: erst eine NOCH NICHT genutzte Kategorie bevorzugen
    // (mehr Abwechslung pro Tag), sonst ohne Kategorie-Constraint.
    for(let pass = 0; pass < 2 && !chosen; pass++){
      for(const idx of order){
        const t = templates[idx];
        if(usedKeys.has(t.key)) continue;
        if(pass === 0 && usedCats.has(t.key.split('_')[0])) continue;
        let res = null;
        try { res = t.make(rng); } catch(e){ res = null; }
        if(res){ chosen = res; chosenKey = t.key; break; }
      }
    }
    if(!chosen) continue;
    usedKeys.add(chosenKey);
    // Kategorie-Avoidance konsistent am Key-Präfix führen (deckt sich mit dem
    // Check oben; chosen.cat konnte bei v8.8-Templates abweichen, z.B.
    // fun_leader → cat 'personal').
    usedCats.add(chosenKey.split('_')[0]);
    const when = new Date(now.getFullYear(), now.getMonth(), now.getDate(), slotHour, 0, 0, 0);
    out.push({
      id:    'ambient_' + dateKey + '_' + slotHour,
      cat:   chosen.cat,
      ic:    chosen.ic,
      title: chosen.title,
      desc:  chosen.desc,
      when,
      // Niedrige Prio + KEIN limitierender dataRef.pid (nur ambientPid/-Pids),
      // damit ambiente Stories nicht vom Per-Player-Limit geschluckt werden.
      prio:  chosen.prio || 4,
      dataRef: Object.assign({type:'ambient', sub: chosenKey}, chosen.dataRef || {})
    });
  }
  return out;
}

// FNV-1a-Hash → 32-bit Seed (deterministisch, schnell).
function _ambientHash(str){
  let h = 2166136261 >>> 0;
  for(let i = 0; i < str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
// mulberry32 PRNG → reproduzierbare Pseudo-Zufallszahlen [0,1).
function _ambientRng(seed){
  let a = seed >>> 0;
  return function(){
    a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// Fisher-Yates mit geseedetem rng (verändert das Original nicht).
function _ambientShuffle(arr, rng){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rng() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// Template-Pool: jede make()-Funktion liefert {cat, ic, title, desc, prio?,
// dataRef?} aus ECHTEN Daten — oder null, wenn die Datenlage nicht reicht.
// Icons sind bewusst auf die in NEWS_CATEGORIES bekannten beschränkt.
function _ambientTemplatePool(now, pm, nameOf){
  const stats = (typeof allPlayerStats === 'function') ? (allPlayerStats() || {}) : {};
  const activePids = Object.keys(pm).filter(pid => pm[pid] && !pm[pid].hidden);
  const withStats = activePids.filter(pid => stats[pid] && stats[pid].games > 0);
  const T = [];

  // ── Fun Fact: Tore insgesamt ──
  T.push({ key:'fun_goals', make: () => {
    if(matches.length < 5) return null;
    let g = 0; for(const m of matches) g += (m.score_a||0) + (m.score_b||0);
    return { cat:'fun', ic:'thriller', prio:3,
      title:'Tor-Bilanz der Liga',
      desc:`Insgesamt fielen ${g} Tore in ${matches.length} Spielen — Ø ${(g/matches.length).toFixed(1)} pro Match.` };
  }});

  // ── Fun Fact: aktivster Wochentag ──
  T.push({ key:'fun_weekday', make: () => {
    if(matches.length < 8) return null;
    const wd = [0,0,0,0,0,0,0];
    for(const m of matches){ wd[new Date(m.created_at).getDay()]++; }
    let bi = 0; for(let i = 1; i < 7; i++) if(wd[i] > wd[bi]) bi = i;
    if(!wd[bi]) return null;
    const names = ['sonntags','montags','dienstags','mittwochs','donnerstags','freitags','samstags'];
    return { cat:'fun', ic:'calendar', prio:3,
      title:'Kicker-Tag der Liga',
      desc:`Am häufigsten wird ${names[bi]} gekickt — ${wd[bi]} Spiele bisher.` };
  }});

  // ── Fun Fact: Liga in Zahlen ──
  T.push({ key:'fun_numbers', make: () => {
    if(matches.length < 3) return null;
    return { cat:'fun', ic:'users', prio:2,
      title:'Liga in Zahlen',
      desc:`${matches.length} Duelle, ${activePids.length} aktive Spieler — und es werden mehr.` };
  }});

  // ── Persönlich: Siegquoten-Führer (min. 5 Spiele) ──
  T.push({ key:'personal_wr', make: () => {
    const elig = withStats.filter(pid => stats[pid].games >= 5);
    if(!elig.length) return null;
    elig.sort((a,b) => stats[b].wr - stats[a].wr);
    const pid = elig[0], st = stats[pid];
    return { cat:'personal', ic:'crown', prio:4,
      title:`${nameOf(pid)} an der Spitze`,
      desc:`Beste Siegquote der Liga: ${Math.round(st.wr*100)}% aus ${st.games} Spielen.`,
      dataRef:{ ambientPid: pid } };
  }});

  // ── Persönlich: Vielspieler ──
  T.push({ key:'personal_grinder', make: () => {
    if(!withStats.length) return null;
    const pid = withStats.slice().sort((a,b) => stats[b].games - stats[a].games)[0];
    if(stats[pid].games < 10) return null;
    return { cat:'personal', ic:'medalTrio', prio:3,
      title:`${nameOf(pid)} ist Dauergast`,
      desc:`Niemand spielt mehr: ${stats[pid].games} Partien auf dem Konto.`,
      dataRef:{ ambientPid: pid } };
  }});

  // ── Persönlich: heißeste aktuelle Serie ──
  T.push({ key:'personal_streak', make: () => {
    if(!withStats.length) return null;
    const pid = withStats.slice().sort((a,b) => (stats[b].curStreak||0) - (stats[a].curStreak||0))[0];
    const cs = stats[pid].curStreak || 0;
    if(cs < 3) return null;
    return { cat:'personal', ic:'trendUp', prio:5,
      title:`${nameOf(pid)} läuft heiß`,
      desc:`${cs} Siege in Folge — aktuell die heißeste Serie der Liga.`,
      dataRef:{ ambientPid: pid } };
  }});

  // ── Persönlich: Torjäger (Ø Tore/Spiel, min. 5) ──
  T.push({ key:'personal_scorer', make: () => {
    const elig = withStats.filter(pid => stats[pid].games >= 5);
    if(!elig.length) return null;
    elig.sort((a,b) => (stats[b].gf/stats[b].games) - (stats[a].gf/stats[a].games));
    const pid = elig[0], avg = stats[pid].gf / stats[pid].games;
    if(avg <= 0) return null;
    return { cat:'personal', ic:'thriller', prio:3,
      title:`${nameOf(pid)} trifft am laufenden Band`,
      desc:`Ø ${avg.toFixed(1)} Tore pro Spiel — Bestwert der Liga.`,
      dataRef:{ ambientPid: pid } };
  }});

  // ── Rivalität: meistgespieltes Duell ──
  T.push({ key:'rivalry_most', make: () => {
    const map = (typeof _ensureH2HMap === 'function') ? _ensureH2HMap() : null;
    if(!map || !map.size) return null;
    let best = null;
    for(const [k, e] of map){
      const [pa, pb] = k.split('|');
      if(!pm[pa] || !pm[pb] || pm[pa].hidden || pm[pb].hidden) continue;
      const wa = e.wins[pa]||0, wb = e.wins[pb]||0, total = wa + wb;
      if(total < 3) continue;
      if(!best || total > best.total) best = { pa, pb, total, wa, wb };
    }
    if(!best) return null;
    return { cat:'rivalry', ic:'crossedSwords', prio:4,
      title:`Duell der Liga: ${nameOf(best.pa)} vs ${nameOf(best.pb)}`,
      desc:`${best.total} direkte Duelle — Siege: ${nameOf(best.pa)} ${best.wa}, ${nameOf(best.pb)} ${best.wb}.`,
      dataRef:{ ambientPids:[best.pa, best.pb] } };
  }});

  // ── Rivalität: engste Bilanz (min. 4) ──
  T.push({ key:'rivalry_close', make: () => {
    const map = (typeof _ensureH2HMap === 'function') ? _ensureH2HMap() : null;
    if(!map || !map.size) return null;
    let best = null;
    for(const [k, e] of map){
      const [pa, pb] = k.split('|');
      if(!pm[pa] || !pm[pb] || pm[pa].hidden || pm[pb].hidden) continue;
      const wa = e.wins[pa]||0, wb = e.wins[pb]||0, total = wa + wb;
      if(total < 4) continue;
      const diff = Math.abs(wa - wb);
      if(!best || diff < best.diff || (diff === best.diff && total > best.total)) best = { pa, pb, wa, wb, total, diff };
    }
    if(!best) return null;
    return { cat:'rivalry', ic:'crossedSwords', prio:4,
      title:`Kopf-an-Kopf: ${nameOf(best.pa)} & ${nameOf(best.pb)}`,
      desc:`${best.total} direkte Duelle, ${best.diff === 0 ? 'absolut ausgeglichen' : 'nur ' + best.diff + ' Sieg' + (best.diff === 1 ? '' : 'e') + ' Unterschied'}: ${nameOf(best.pa)} ${best.wa} – ${best.wb} ${nameOf(best.pb)}.`,
      dataRef:{ ambientPids:[best.pa, best.pb] } };
  }});

  // ── Historie: Liga-Alter ──
