// Automatischer Saison-Abschluss: archiviert vergangene Monate
async function autoArchiveSeasons(){
  const past=allPastSeasons(); // alle vergangenen Saison-IDs
  // gSim einmal pro Aufruf für isStale + Archive nutzen → konsistent
  const gSim=getGlobalSim();
  // Erkennt veraltete Archive in drei Fällen:
  //   1. Alle top_elo-Werte == 0 (alter Bug)
  //   2. Archivierte Top-Elo weicht von DB-aggregierter Sim ab → vor Slider-Recalc geschrieben
  //   3. Bestes Team weicht von DB-aggregierter Sim ab
  // → re-archivieren mit aktuellen DB-Werten (= gSim, da DB-First).
  const isStale=(s)=>{
    try{
      const t=typeof s.top_elo==='string'?JSON.parse(s.top_elo):(s.top_elo||[]);
      if(!t.length) return true; // noch nie archiviert
      if(t.every(x=>!x.elo)) return true; // alter Bug
      // Konsistenz-Check: archivierte Top-Elo vs aggregierte gSim
      const snap=gSim.seasonEndElos[s.id]||{};
      for(const entry of t){
        const live=Math.round(snap[entry.id] ?? cfg.start_elo);
        if(live !== entry.elo) return true; // Inkonsistenz → re-archive
      }
      return false;
    }catch{return false;}
  };
  const validStored=new Set(seasons.filter(s=>!isStale(s)).map(s=>s.id));
  for(const sid of past){
    if(validStored.has(sid))continue; // schon (korrekt) archiviert
    const ms=matchesInSeason(sid);
    if(!ms.length)continue; // keine Matches → nichts zu archivieren
    const snap=gSim.seasonEndElos[sid]||{};
    const seasonPlayedMap=gSim.seasonPlayed[sid]||{};
    // Wins/Losses pro Spieler in dieser Saison zählen (saison-isoliert)
    const sw={}, sl={};
    ms.forEach(m=>{
      [[m.a1,m.a2,m.winner==='A'],[m.b1,m.b2,m.winner==='B']].forEach(([x,y,won])=>{
        [x,y].forEach(id=>{
          if(won){ sw[id]=(sw[id]||0)+1; }
          else { sl[id]=(sl[id]||0)+1; }
        });
      });
    });
    const top=Object.keys(seasonPlayedMap).filter(id=>seasonPlayedMap[id]>0)
      .map(id=>({id,elo:Math.round(snap[id] ?? cfg.start_elo),wins:sw[id]||0,losses:sl[id]||0}))
      .sort((a,b)=>b.elo-a.elo);
    if(!top.length)continue;
    // Bestes Team: höchster gemeinsamer Elo-Zuwachs, mind. 2 gemeinsame Spiele
    // Spielanzahl pro Duo zählen
    if(!top.length)continue;
    // Bestes Team: höchster gemeinsamer Elo-Zuwachs, mind. 2 gemeinsame Spiele
    // Spielanzahl pro Duo zählen
    const teamGames={};
    ms.forEach(m=>{
      [[m.a1,m.a2],[m.b1,m.b2]].forEach(([x,y])=>{
        const k=[x,y].sort().join('|');
        teamGames[k]=(teamGames[k]||0)+1;
      });
    });
    const seasonTeamMap = gSim.seasonTeamElo[sid] || {};
    const teamEntries=Object.entries(seasonTeamMap)
      .filter(([k,v])=>v>0 && (teamGames[k]||0)>=2)
      .sort((a,b)=>b[1]-a[1]);
    const bestTeam=teamEntries[0]?teamEntries[0][0].split('|'):null;
    const entry={
      id:sid,
      label:seasonLabel(sid),
      start_date:seasonStart(sid).toISOString().slice(0,10),
      end_date:seasonEnd(sid).toISOString().slice(0,10),
      player_id:top[0].id,
      team_p1:bestTeam?bestTeam[0]:null,
      team_p2:bestTeam?bestTeam[1]:null,
      top_elo:JSON.stringify(top.slice(0,3))
    };
    const{error}=await sb.from('seasons').upsert(entry,{onConflict:'id'});
    if(!error){
      const existIdx=seasons.findIndex(s=>s.id===sid);
      if(existIdx>=0) seasons[existIdx]=entry; else seasons.unshift(entry);
      console.log('Saison archiviert:',sid);
      // NEU: playerSeasonAwards und allPastSeasons invalidieren
      invalidateCache(['playerSeasonAwards', 'allPastSeasons']);
    }
    else console.error('Saison archivieren fehlgeschlagen:',sid,error);
  }
  // Recap-Popup: in den ersten 3 Tagen des neuen Monats anzeigen
      if(seasons.length&&new Date().getDate()<=3){
    const last=seasons[0];
// FIX
if(last && last.id !== currentSeason().id
   && !localStorage.getItem('recap_shown_'+last.id)){
  setTimeout(()=>showSeasonRecap(last, {auto:true}),600);
}

  }

}


// v9: Kompakte Kurven-Vorschau des Saison-Positionsverlaufs für den Recap.
// Baut ein kleines Multi-Line-SVG (Rang 1 oben) aus getSeasonPositionHistory.
// Gecacht per Saison + matches.length + _cache.version → einmal pro Saison
// gebaut, danach reiner String-Return. Leerer String, wenn zu wenig Daten.
function _recapPosMiniSVG(ph){
  if(!ph || ph.empty) return '';
  const key = 'recapPosMini_'+ph.seasonId+'_'+matches.length+'_'+_cache.version;
  if(_cache._recapPosMiniKey === key) return _cache._recapPosMini;
  const W=78, H=38, padX=3, padY=4;
  const N = ph.activeIds.length, days = ph.lastDay;
  let svg = '';
  if(days >= 2 && N >= 1){
    const xOf = d => padX + (d/(days-1))*(W-2*padX);
    const yOf = rank => padY + ((rank-1)/Math.max(1,N-1))*(H-2*padY); // Rang 1 = oben
    let lines = '';
    for(const pid of ph.activeIds){
      const arr = ph.positionsByDay[pid] || [];
      const pts = [];
      for(let d=0; d<arr.length; d++){ if(arr[d]!=null) pts.push(xOf(d).toFixed(1)+','+yOf(arr[d]).toFixed(1)); }
      if(pts.length < 2) continue;
      const col = (ph.colorOf && ph.colorOf[pid]) || '#94a3b8';
      lines += `<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>`;
      const last = pts[pts.length-1].split(',');
      lines += `<circle cx="${last[0]}" cy="${last[1]}" r="1.7" fill="${col}"/>`;
    }
    if(lines) svg = `<svg viewBox="0 0 ${W} ${H}" aria-hidden="true">${lines}</svg>`;
  }
  _cache._recapPosMiniKey = key;
  _cache._recapPosMini = svg;
  return svg;
}

// Saison-Recap-Popup
// opts.auto=true  → Schutz-Phase (protectMs) gegen versehentliches Schließen aktiv,
//                   wird nur beim automatischen Auto-Trigger (Monatsanfang) gesetzt.
// Beim manuellen Öffnen (Header-Recap-Button, Saison-Picker) bleibt opts.auto leer
// → keine Schutz-Phase, Sheet lässt sich sofort per Backdrop-Klick schließen.
function showSeasonRecap(season, opts){
  opts = opts || {};
  _sheetSetReopen(()=>showSeasonRecap(season));
  const top=typeof season.top_elo==='string'?JSON.parse(season.top_elo):season.top_elo||[];
  const ms=matchesInSeason(season.id);
  const playerIdsInSeason=new Set();
  ms.forEach(m=>[m.a1,m.a2,m.b1,m.b2].forEach(id=>playerIdsInSeason.add(id)));
  const totalGoals=ms.reduce((s,m)=>s+(m.score_a||0)+(m.score_b||0),0);

  // ─── Awards der Saison berechnen ───
  const prevAw=awSeasonId;
  awSeasonId=season.id;
  const R=awardRankings('season');
  awSeasonId=prevAw;

  // Avatar-Helper für das Recap-Sheet
  const recapAv=(pid,cls)=>{
    const p=pmap()[pid];
    if(!p) return `<div class="${cls}" style="background:var(--surface3);color:var(--muted)">?</div>`;
    const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
    if(em) return `<div class="${cls} has-emoji"><span class="em">${em}</span></div>`;
    return `<div class="${cls}" style="background:${avColor(p.id)}">${esc(initials(p.name))}</div>`;
  };

  // ─── Champion Hero ───
  let championHtml='';
  if(top[0]){
    const t=top[0];
    const p=pmap()[t.id];
    if(p){
      const wTot=t.wins+t.losses;
      const wr=wTot>0?Math.round(t.wins/wTot*100):0;
      const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
      const champAv=em
        ? `<div class="rcp-champ-av has-emoji" style="background:var(--surface3)"><span class="em">${em}</span></div>`
        : `<div class="rcp-champ-av" style="background:${avColor(p.id)}">${esc(initials(p.name))}</div>`;
      championHtml=`
        <div class="rcp-champ" data-detail="${esc(t.id)}">
          <div class="rcp-champ-label">Saison-Sieger</div>
          <div class="rcp-champ-av-wrap">
            <div class="rcp-champ-crown">${svgI('crown')}</div>
            ${champAv}
          </div>
          <div class="rcp-champ-name">${esc(p.name)}</div>
          <div class="rcp-champ-stats">
            <div class="s"><div class="v acid">${t.elo}</div><div class="l">Elo</div></div>
            <div class="s"><div class="v">${t.wins}–${t.losses}</div><div class="l">Bilanz</div></div>
            <div class="s"><div class="v">${wr}%</div><div class="l">Siegrate</div></div>
          </div>
        </div>`;
    }
  }

  // ─── Podium Top 3 ───
  let podiumHtml='';
  const podiumOrder=[{e:top[1],cls:'second',n:2},{e:top[0],cls:'first',n:1},{e:top[2],cls:'third',n:3}];
  if(top.length>0){
    const podCols=podiumOrder.map(({e,cls,n})=>{
      if(!e){
        return `<div class="rcp-pod-col ${cls}">
          <div class="rcp-pod-av" style="border-color:var(--line);color:var(--muted);background:var(--surface3);font-size:18px">?</div>
          <div class="rcp-pod-name" style="color:var(--muted)">–</div>
          <div class="rcp-pod-elo">–</div>
          <div class="rcp-pod-wl"></div>
          <div class="rcp-pod-block">${n}</div>
        </div>`;
      }
      const p=pmap()[e.id];
      const em=p&&p.avatar_id?avatarEmoji(p.avatar_id):null;
      const avInner=em
        ? `<div class="rcp-pod-av has-emoji" style="background:var(--surface3)">${cls==='first'?`<div class="rcp-pod-mini-crown">${svgI('crown')}</div>`:''}<span class="em">${em}</span></div>`
        : `<div class="rcp-pod-av" style="background:${avColor(e.id)}">${cls==='first'?`<div class="rcp-pod-mini-crown">${svgI('crown')}</div>`:''}${esc(initials(p?p.name:'?'))}</div>`;
      return `<div class="rcp-pod-col ${cls}" data-detail="${esc(e.id)}" style="cursor:pointer">
        ${avInner}
        <div class="rcp-pod-name">${esc(pname(e.id))}</div>
        <div class="rcp-pod-elo">${e.elo} Elo</div>
        <div class="rcp-pod-wl">${e.wins}W · ${e.losses}L</div>
        <div class="rcp-pod-block">${n}</div>
      </div>`;
    }).join('');
    podiumHtml=`
      <div class="rcp-section">Saison-Podium</div>
      <div class="rcp-pod">${podCols}</div>`;
  }

  // ─── Rangliste Platz 4+ (basierend auf Saison-End-Elo, gleiche Quelle wie Podium) ───
  let restListHtml='';
  {
    const gSim=getGlobalSim();
    const snap=gSim.seasonEndElos[season.id]||{};
    const playedMap=gSim.seasonPlayed[season.id]||{};
    // Saison-isolierte Wins/Losses
    const sw={}, sl={};
    ms.forEach(m=>{
      [[m.a1,m.a2,m.winner==='A'],[m.b1,m.b2,m.winner==='B']].forEach(([x,y,won])=>{
        [x,y].forEach(id=>{
          if(won) sw[id]=(sw[id]||0)+1;
          else sl[id]=(sl[id]||0)+1;
        });
      });
    });
    // Vollständige Saison-Rangliste (alle Spieler mit Saison-Spielen), nach End-Elo
    const fullRank=Object.keys(playedMap)
      .filter(id=>playedMap[id]>0)
      .map(id=>({
        id,
        elo:Math.round(snap[id] ?? cfg.start_elo),
        wins:sw[id]||0,
        losses:sl[id]||0
      }))
      .sort((a,b)=>b.elo-a.elo);
    // Platz 4+: alle ohne Podium (filtert die archivierten Top-3-IDs heraus,
    // falls die Live-Reihenfolge minimal von der archivierten abweicht)
    const podiumIds=new Set((top||[]).filter(t=>t&&t.id).map(t=>t.id));
    const restRank=fullRank.filter(e=>!podiumIds.has(e.id));
    if(restRank.length){
      const rows=restRank.map((e,i)=>{
        const p=pmap()[e.id];
        if(!p) return '';
        const rank=podiumIds.size+i+1;
        const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
        const av=em
          ? `<div class="rcp-rest-av has-emoji"><span class="em">${em}</span></div>`
          : `<div class="rcp-rest-av" style="background:${avColor(p.id)}">${esc(initials(p.name))}</div>`;
        return `<div class="rcp-rest-row" data-detail="${esc(e.id)}">
          <div class="rcp-rest-rank">${rank}</div>
          ${av}
          <div class="rcp-rest-name">${esc(p.name)}</div>
          <div class="rcp-rest-stats">
            <div class="rcp-rest-wl">${e.wins}–${e.losses}</div>
            <div class="rcp-rest-elo">${e.elo}</div>
          </div>
        </div>`;
      }).filter(Boolean).join('');
      if(rows){
        restListHtml=`<div class="rcp-section">Rangliste</div>
          <div class="rcp-rest">${rows}</div>`;
      }
    }
  }

  // ─── Awards Grid (Saison-Awards, sortiert: erst positive, dann Schande) ───
  const scorer    = R.scorer && R.scorer[0];
  const wall      = R.wall && R.wall[0];
  const streak    = R.streaks && R.streaks[0];
  const upset     = R.upsets && R.upsets[0];
  // Erweiterte Auswahl
  const grinder   = R.grinder && R.grinder[0];
  const perfect   = R.perfect && R.perfect[0];
  const weekKing  = R.weekKingList && R.weekKingList[0];
  const dayKing   = R.dayKingList && R.dayKingList[0];
  const worstWr   = R.worstWr && R.worstWr[0];
  const pechvogel = R.pechvogelList && R.pechvogelList[0];

  const awItem=(cls,iconKey,label,name,val,awKey)=>{
    return `<div class="rcp-aw ${cls}" data-award="${awKey}">
      <div class="rcp-aw-ic">${svgI(iconKey)}</div>
      <div class="rcp-aw-info">
        <div class="rcp-aw-label">${label}</div>
        <div class="rcp-aw-name">${esc(name)}</div>
        <div class="rcp-aw-val">${esc(val)}</div>
      </div>
    </div>`;
  };
  let awardsHtml='';
  const awCards=[];
  // POSITIVE Saison-Highlights
  if(scorer)  awCards.push(awItem('orange','ball','Torjäger',pname(scorer.id),'Ø '+scorer.avg.toFixed(1)+' Tore','scorer'));
  if(wall)    awCards.push(awItem('purple','shieldCheck','Eiserne Abwehr',pname(wall.id),(wall.v/wall.g).toFixed(1)+' Gegen/Sp.','wall'));
  if(streak)  awCards.push(awItem('acid','flame','Heißeste Serie',pname(streak.id),streak.v+' in Folge','streaks'));
  if(perfect) awCards.push(awItem('gold','star','Beste Bilanz',pname(perfect.id),Math.round(perfect.wr*100)+'% Siegrate','perfect'));
  if(weekKing)awCards.push(awItem('gold','crown','Wochenkönig',pname(weekKing.id),weekKing.v+'× POTW','weekKing'));
  if(dayKing) awCards.push(awItem('gold','crown','Tageskönig',pname(dayKing.id),dayKing.v+'× POTD','dayKing'));
  if(grinder) awCards.push(awItem('blue','gamepad','Vielspieler',pname(grinder.id),grinder.v+' Spiele','grinder'));
  if(upset){
    const winners=upset.m.winner==='A'?[upset.m.a1,upset.m.a2]:[upset.m.b1,upset.m.b2];
    const winPct=Math.round((1-upset.sp)*100);
    awCards.push(awItem('blue','bolt','Größter Upset',pname(winners[0])+' & '+pname(winners[1]),winPct+'% Chance','upset'));
  }
  // SCHANDE-Tafel der Saison
  if(worstWr)  awCards.push(awItem('red','ghost','Schlechtester',pname(worstWr.id),Math.round(worstWr.wr*100)+'% Siegrate','worstWr'));
  if(pechvogel)awCards.push(awItem('red','ghost','Pechvogel',pname(pechvogel.id),Math.round(pechvogel.pct*100)+'% knapp verloren','pechvogel'));
  // v9: „Baustelle" (Team-Niederlagenserie) bewusst aus dem Saison-Recap entfernt.
  if(awCards.length){
    awardsHtml=`<div class="rcp-section">Awards der Saison</div><div class="rcp-awards">${awCards.join('')}</div>`;
  }

  // ─── Team of the Season ───
  let teamHtml='';
  if(season.team_p1 && season.team_p2){
    const a=season.team_p1, b=season.team_p2;
    const pa=pmap()[a], pb=pmap()[b];
    const avForChip=(pid)=>{
      const p=pmap()[pid];
      if(!p) return `<div class="rcp-tos-av" style="background:var(--surface3);color:var(--muted)">?</div>`;
      const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
      if(em) return `<div class="rcp-tos-av has-emoji" style="background:var(--surface3)"><span class="em">${em}</span></div>`;
      return `<div class="rcp-tos-av" style="background:${avColor(p.id)}">${esc(initials(p.name))}</div>`;
    };
    // Gemeinsame Siege berechnen
    let teamW=0, teamG=0;
    ms.forEach(m=>{
      const onA=(m.a1===a||m.a2===a)&&(m.a1===b||m.a2===b);
      const onB=(m.b1===a||m.b2===a)&&(m.b1===b||m.b2===b);
      if(onA){ teamG++; if(m.winner==='A')teamW++; }
      else if(onB){ teamG++; if(m.winner==='B')teamW++; }
    });
    const teamWr=teamG>0?Math.round(teamW/teamG*100):0;
    teamHtml=`
      <div class="rcp-tos" data-team="${esc([a,b].sort().join('|'))}">
        <div class="rcp-tos-pair">${avForChip(a)}${avForChip(b)}</div>
        <div class="rcp-tos-info">
          <div class="rcp-tos-label">Team of the Season</div>
          <div class="rcp-tos-name">${esc((pa?pa.name:'?')+' & '+(pb?pb.name:'?'))}</div>
          <div class="rcp-tos-detail">${teamG>0?teamG+' Spiele · '+teamWr+'% WR':'–'}</div>
        </div>
        <div class="rcp-tos-arrow">${svgI('chartUp')||'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>'}</div>
      </div>`;
  }

  // Verfügbare vergangene Saisons (für den Recap-Picker) — neueste zuerst
  const pastSeasons = seasons
    .filter(s => s.id !== currentSeason().id)
    .slice()
    .sort((a,b) => (a.id < b.id ? 1 : a.id > b.id ? -1 : 0));
  const showPicker = pastSeasons.length > 1;
  const pickerHtml = showPicker ? `
    <div class="rcp-picker">
      <select id="rcpSeasonPicker" class="rcp-picker-select">
        ${pastSeasons.map(s => `<option value="${esc(s.id)}" ${s.id===season.id?'selected':''}>${esc(s.label)}</option>`).join('')}
      </select>
      <span class="rcp-picker-chevron">${svgI('chartDown')}</span>
    </div>` : '';

  // v9: Mini-Positionsverlauf (dezent, mittig, weit oben) — nur bei genug Daten.
  // getSeasonPositionHistory & _recapPosMiniSVG sind beide gecacht.
  let posMiniHtml = '';
  try {
    const mini = _recapPosMiniSVG(getSeasonPositionHistory(season.id));
    if(mini){
      posMiniHtml = `<button type="button" class="rcp-posmini" data-poshist="${esc(season.id)}">
        <span class="rcp-posmini-chart">${mini}</span>
        <span class="rcp-posmini-tx"><span class="rcp-posmini-tt">Positionsverlauf</span><span class="rcp-posmini-su">Saison-Entwicklung ansehen</span></span>
        <span class="rcp-posmini-ch">${svgI('chartUp')}</span>
      </button>`;
    }
  } catch(e){}

  openSheet(`
    <div class="rcp-head">
      <span class="rcp-label">${svgI('trophy')}Saison beendet</span>
      <div class="rcp-month">${esc(season.label)}</div>
      <div class="rcp-meta">${ms.length} Matches · ${playerIdsInSeason.size} Spieler${totalGoals?' · '+totalGoals+' Tore':''}</div>
      ${pickerHtml}
    </div>
    ${championHtml}
    ${teamHtml}
    ${podiumHtml}
    ${restListHtml}
    ${posMiniHtml}
    ${awardsHtml}
    <button class="recap-done-btn" id="closeRecapBtn">Verstanden</button>
  `, {protectMs: opts.auto ? 2500 : 0});
  // Grab-Hint: kurz pulsieren, signalisiert "wegziehen geht auch"
  const _grab = document.getElementById('sheetGrab');
  if(_grab) _grab.classList.add('grab-pulse');
  // Saison-Picker: bei Auswahl Recap neu rendern (ohne `recap_shown_…` zu markieren)
  const rcpPicker = document.getElementById('rcpSeasonPicker');
  if(rcpPicker){
    rcpPicker.onchange = () => {
      const sid = rcpPicker.value;
      const sel = seasons.find(s => s.id === sid);
      if(sel) showSeasonRecap(sel);
    };
  }
  document.getElementById('closeRecapBtn').onclick=()=>{
    localStorage.setItem('recap_shown_'+season.id,'1');
    closeSheet();
  };
  // Spieler-Karten klickbar → Spielerprofil
  document.querySelectorAll('.rcp-champ[data-detail], .rcp-pod-col[data-detail], .rcp-rest-row[data-detail]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.detail; if(!id) return;
      localStorage.setItem('recap_shown_'+season.id,'1');
      sheetNav(()=>showPlayer(id));
    };
  });
  // Team-Card klickbar → Team-Profil
  document.querySelectorAll('.rcp-tos[data-team]').forEach(el=>{
    el.onclick=()=>{
      const [a,b]=el.dataset.team.split('|');
      if(!a||!b) return;
      localStorage.setItem('recap_shown_'+season.id,'1');
      sheetNav(()=>showTeam(a,b));
    };
  });
  // Award-Karten klickbar → Award-Detail (mit ausgewählter Saison)
  document.querySelectorAll('.rcp-aw[data-award]').forEach(el=>{
    el.onclick=()=>{
      const k=el.dataset.award; if(!k) return;
      localStorage.setItem('recap_shown_'+season.id,'1');
      awPeriod='season'; awSeasonId=season.id;
      sheetNav(()=>showAward(k));
    };
  });
  // v9: Mini-Positionsverlauf-Button → voller Positionsverlauf dieser Saison
  document.querySelectorAll('.rcp-posmini[data-poshist]').forEach(el=>{
    el.onclick=()=>{
      const sid=el.dataset.poshist; if(!sid) return;
      localStorage.setItem('recap_shown_'+season.id,'1');
      sheetNav(()=>showPositionHistory(sid));
    };
  });
}

// Player-of-the-Day Recap: zeigt einmal pro Tag pro Gerät den Sieger des letzten Spieltags.
// ─── §3.3 Player-of-the-Week / Player-of-the-Day Recap ───────────────
// Helfer: Bereich der zuletzt abgeschlossenen Woche (Mo 00:00 – So 23:59:59.999)
function _potwLastWeekRange(){
  const now=new Date();
  const monday=new Date(now); monday.setHours(0,0,0,0);
  const wd=(monday.getDay()+6)%7;       // 0=Mo
  monday.setDate(monday.getDate()-wd-7); // Montag der Vorwoche
  const end=new Date(monday); end.setDate(end.getDate()+7); end.setMilliseconds(-1);
  return {start:monday, end};
}
function _potwKeyOf(monday){
  return monday.getFullYear()+'-'+String(monday.getMonth()+1).padStart(2,'0')+'-'+String(monday.getDate()).padStart(2,'0');
}
function _potwMatchesInRange(start,end){
  return matches.filter(m=>{const d=new Date(m.created_at); return d>=start && d<=end;});
}
// True wenn die Vorwoche mindestens 1 Match hatte (für Button-Sichtbarkeit)
function potwHasData(){
  const {start,end}=_potwLastWeekRange();
  return _potwMatchesInRange(start,end).length>0;
}

//     Bottom-Sheet mit Liniendiagramm der Tabellenpositionen über die
//     Tage der aktuellen Saison. Hervorhebung per Tap auf Linie/Endpunkt-
//     Avatar — Detail-Karte zeigt selektierten Spieler. CSS-Toggle für

// ╚═════════════════════════════════════════════════════════════════════════╝

// Avatar-Helper für SVG: liefert ein <g>-Element mit Emoji ODER Initialen-Kreis.
// transform="translate(cx, cy)" wird vom Caller gesetzt; hier nur der innere Markup.
function _posvAvSvg(player, color, dataPid){
  const r = 11;
  if(!player){
    return `<g class="posv-end-av" data-pid="${esc(dataPid)}">
      <circle r="${r}" fill="var(--surface3)" stroke="${color}" stroke-width="1.5"/>
      <text text-anchor="middle" dominant-baseline="central" fill="var(--muted)" font-size="13" font-family="'Archivo Black',sans-serif">?</text>
    </g>`;
  }
  const em = player.avatar_id ? avatarEmoji(player.avatar_id) : null;
  if(em){
    return `<g class="posv-end-av" data-pid="${esc(dataPid)}">
      <circle r="${r}" fill="var(--surface3)" stroke="${color}" stroke-width="1.5"/>
      <text text-anchor="middle" dominant-baseline="central" font-size="14"
        font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji','Twemoji Mozilla',sans-serif">${em}</text>
    </g>`;
  }
  return `<g class="posv-end-av" data-pid="${esc(dataPid)}">
    <circle r="${r}" fill="${avColor(player.id)}" stroke="${color}" stroke-width="1.5"/>
    <text text-anchor="middle" dominant-baseline="central" fill="#0a0c0b" font-size="10"
      font-family="'Archivo Black',sans-serif">${esc(initials(player.name))}</text>
  </g>`;
}

// Baut das komplette SVG für den Positionsverlauf. Eine Funktion, ein String —
// kein DOM-Build aus Performance-Gründen. Highlight wird via CSS-Klassen-Toggle
// nachträglich angewendet.
function _buildPositionChartSvg(data){
  const VB_W = 360, VB_H = 280;
  const ML = 24, MR = 92, MT = 10, MB = 30;
  const PW = VB_W - ML - MR;
  const PH = VB_H - MT - MB;
  const N = data.activeIds.length; // Anzahl Positions-Slots
  const D = data.lastDay;

  // Edge: nur 1 Spieler → Linie wäre konstant Position 1, kaum sinnvoll, aber rendern wir
  // Edge: lastDay=1 → ein einzelner Punkt pro Spieler, X-Mitte
  const xOf = day => ML + (D <= 1 ? PW/2 : (day-1)/(D-1) * PW);
  const yOf = pos => MT + (N <= 1 ? PH/2 : (pos-1)/(N-1) * PH);

  // ── Grid: horizontale Linie pro Position
  let grid = '';
  for(let p=1; p<=N; p++){
    const y = yOf(p);
    grid += `<line x1="${ML}" y1="${y}" x2="${ML+PW}" y2="${y}"/>`;
  }
  // ── Y-Achse Ticks: jede Position
  let yTicks = '';
  for(let p=1; p<=N; p++){
    yTicks += `<text class="posv-y-tick" x="${ML-7}" y="${yOf(p)}">${p}</text>`;
  }
  // ── X-Achse Ticks: smart spacing — bei ≤7 Tagen jeder Tag, sonst 1,5,10,15,…
  let xTicks = '';
  const tickDays = [];
  if(D <= 7){
    for(let d=1; d<=D; d++) tickDays.push(d);
  } else {
    tickDays.push(1);
    for(let d=5; d<=D; d+=5) tickDays.push(d);
    if(tickDays[tickDays.length-1] !== D) tickDays.push(D); // Endpunkt immer
  }
  // Dedup
  const seenTicks = new Set();
  tickDays.filter(d => !seenTicks.has(d) && seenTicks.add(d)).forEach(d => {
    xTicks += `<text class="posv-x-tick" x="${xOf(d)}" y="${MT+PH+18}">${d}</text>`;
  });
  // X-Achsen-Caption "Tag" links unten
  const xCap = `<text class="posv-axis-cap" x="0" y="${MT+PH+18}">Tag</text>`;

  // ── Linien + Dots + Endpunkte pro Spieler
  // Sortierung: Endpunkt-Position aufsteigend (Position 1 oben zuerst) — verhindert
  // dass Avatar-Labels sich willkürlich überdecken; oben startet die Reihenfolge.
  const playersByEndPos = data.activeIds
    .map(id => {
      // Letzter nicht-null Wert im positionsByDay-Array
      const arr = data.positionsByDay[id];
      let lastVal = null, lastDayIdx = -1;
      for(let i=arr.length-1; i>=0; i--){
        if(arr[i] !== null){ lastVal = arr[i]; lastDayIdx = i; break; }
      }
      return {id, lastPos: lastVal, lastDayIdx};
    })
    .filter(o => o.lastPos !== null)
    .sort((a,b)=> a.lastPos - b.lastPos);

  let lines = '', hits = '', dots = '', ends = '';
  const pm = pmap();
  for(const o of playersByEndPos){
    const pid = o.id;
    const color = data.colorOf[pid] || '#888';
    const arr = data.positionsByDay[pid];
    // Pfad bauen: nur nicht-null-Punkte verbinden
    const pts = [];
    for(let i=0; i<arr.length; i++){
      if(arr[i] !== null){
        pts.push({x: xOf(i+1), y: yOf(arr[i])});
      }
    }
    if(pts.length === 0) continue;
    let d;
    if(pts.length === 1){
      // Single point — Mini-Strich für Sichtbarkeit
      d = `M ${pts[0].x-2} ${pts[0].y} L ${pts[0].x+2} ${pts[0].y}`;
    } else {
      d = 'M ' + pts.map(p => `${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' L ');
    }
    // Visible line
    lines += `<path class="posv-line" data-pid="${esc(pid)}" d="${d}" stroke="${color}"/>`;
    // Hit area (transparent, breit für Touch)
    hits  += `<path class="posv-line-hit" data-pid="${esc(pid)}" d="${d}"/>`;
    // Dots an jedem Datenpunkt — klein, am Endpunkt größer
    for(let i=0; i<pts.length; i++){
      const r = (i === pts.length-1) ? 3.2 : 2;
      dots += `<circle class="posv-dot" data-pid="${esc(pid)}" cx="${pts[i].x.toFixed(1)}" cy="${pts[i].y.toFixed(1)}" r="${r}" fill="${color}"/>`;
    }
    // Endpunkt: Avatar + Name. Avatar bei xEnd+12, Name dahinter.
    const xEnd = pts[pts.length-1].x;
    const yEnd = pts[pts.length-1].y;
    const avX = Math.min(xEnd + 16, VB_W - 72); // nicht ins Right-Margin reinrennen
    const labelX = avX + 14;
    const p = pm[pid];
    const name = p ? p.name : '?';
    ends += `<g transform="translate(${avX.toFixed(1)},${yEnd.toFixed(1)})">${_posvAvSvg(p, color, pid)}</g>`;
    // Name-Text nach rechts; clipt am Right-Edge via maxlength
    const shortName = name.length > 8 ? name.slice(0,8)+'…' : name;
    ends += `<text class="posv-end-label" data-pid="${esc(pid)}" x="${labelX.toFixed(1)}" y="${yEnd.toFixed(1)}">${esc(shortName)}</text>`;
  }

  return `<svg class="posv-svg" viewBox="0 0 ${VB_W} ${VB_H}" preserveAspectRatio="xMinYMin meet" xmlns="http://www.w3.org/2000/svg">
    <g class="posv-grid">${grid}</g>
    ${yTicks}
    ${xCap}${xTicks}
    <g>${hits}</g>
    <g>${lines}</g>
    <g>${dots}</g>
    <g>${ends}</g>
  </svg>`;
}

// Detail-Karte unten: zeigt entweder Empty-State oder Stats des hervorgehobenen
// Spielers. innerHTML-Update, kein Sheet-Re-Render.
function _renderPosvDetail(el, data, hlId){
  const stats = getSeasonPlayerStats(data.seasonId);

    el.classList.add('empty');

  el.innerHTML = `

// Highlight-Logik: zentraler Click-Handler auf das Sheet-Root via Event-Delegation,
// damit wir keine pro-Element-Listener leaken müssen und SVG-Elemente innerhalb
// nachträglich gewechselt werden können.
function _attachPosvHighlight(rootEl, data){
  const chartHost = rootEl.querySelector('.posv-chart-host');
  const detailEl  = rootEl.querySelector('#posvDetail');
  let curHl = null;

  function applyHl(pid){
    if(pid && pid === curHl) pid = null; // gleiche Linie nochmal → reset
    curHl = pid;
    // Highlight-Klassen toggeln
    chartHost.classList.toggle('posv-dim', !!pid);
    chartHost.querySelectorAll('.hl').forEach(el => el.classList.remove('hl'));
    if(pid){
      chartHost.querySelectorAll(`[data-pid="${CSS.escape(pid)}"]`)
        .forEach(el => el.classList.add('hl'));
    }
    _renderPosvDetail(detailEl, data, pid);
  }

  rootEl.addEventListener('click', (e) => {
    // Erstes Element mit data-pid in Aufstiegskette (für SVG-Click-Targets innerhalb von <g>)
    let target = e.target;
    let pid = null;
    while(target && target !== rootEl){
      if(target.dataset && target.dataset.pid){ pid = target.dataset.pid; break; }
      target = target.parentNode;
    }
    if(pid){
      e.stopPropagation();
      applyHl(pid);
      return;
    }
    // Click auf leeren Chart-Bereich → reset
    if(curHl && chartHost.contains(e.target)){
      applyHl(null);
    }
  });
}

// Hauptfunktion: öffnet das Sheet. Saison-Argument optional (default: aktuelle).
function showPositionHistory(seasonId){
  if(!seasonId) seasonId = currentSeason().id;
  _sheetSetReopen(()=>showPositionHistory(seasonId));
  const data = getSeasonPositionHistory(seasonId);
  const sLabel = seasonLabel(seasonId);

  // Empty-State: keine Saison-Matches
  if(data.empty || data.activeIds.length === 0 || data.lastDay === 0){
    openSheet(`
      <div class="posv-empty">
        <div class="posv-empty-title">Noch kein Verlauf</div>
        <div>Sobald in dieser Saison die ersten Matches gespielt sind,<br>siehst du hier die Entwicklung der Tabellenpositionen.</div>
      </div>
    `);
    return;
  }

  const headerDate = new Date().toLocaleString('de-DE',{hour:'2-digit',minute:'2-digit'});
  const subInfo = data.isCurrent
    ? `${sLabel} · Tag ${data.lastDay} von ${data.totalDays}`
    : `${sLabel} · Saison abgeschlossen`;

  openSheet(`
    <div style="padding:6px 4px 8px">
      <h2 style="font-family:'Archivo Black',sans-serif;font-size:22px;letter-spacing:-.02em;margin-bottom:4px">Saison-Positionsverlauf</h2>
      <div style="color:var(--muted);font-size:12px;margin-bottom:14px">Entwicklung der Tabellenplatzierungen während der Saison</div>

      <div class="posv-info-pill">
        <div class="posv-info-ic">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
        <div class="posv-info-text">
          <div class="posv-info-title">${data.isCurrent ? 'Aktuelle Saison' : 'Vergangene Saison'}</div>
          <div class="posv-info-sub">${esc(subInfo)}</div>
        </div>
      </div>

      <div class="posv-chart-host" id="posvChartHost">
        <div class="posv-chart-axislabel">Position</div>
        ${_buildPositionChartSvg(data)}
      </div>

      <div class="posv-hint">Tippe auf einen Spieler, um ihn hervorzuheben</div>

      <div class="posv-detail empty" id="posvDetail">
        <div class="posv-detail-empty-text">Tippe auf eine Linie oder einen Avatar,<br>um Details zu sehen.</div>
      </div>

      <div class="posv-update">
        <span>Letztes Update: Heute, ${headerDate}</span>
        <button class="posv-refresh" id="posvRefreshBtn" title="Aktualisieren">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8M21 3v5h-5M21 12a9 9 0 0 1-15.5 6.3L3 16M3 21v-5h5"/></svg>
        </button>
      </div>
    </div>
  `);

  const sheet = document.getElementById('sheet');
  _attachPosvHighlight(sheet, data);

  // Refresh: kurze Spin-Animation + Sheet neu rendern (Cache wird nicht hart
  // invalidiert — neuer Build via aktualisiertem Zeitstempel reicht, alle Daten
  // sind durch invalidateCache(['global', …]) nach jedem Match eh schon frisch).
  const refreshBtn = sheet.querySelector('#posvRefreshBtn');
  if(refreshBtn){
    refreshBtn.onclick = (e) => {
      e.stopPropagation();
      refreshBtn.classList.add('spin');
      setTimeout(()=>{
        refreshBtn.classList.remove('spin');
        showPositionHistory(seasonId);
      }, 380);
    };
  }
}


// HIER BEGINNT DER KORRIGIERTE showPotwRecap FUNKTIONSBLOCK
// opts.auto=true → Schutz-Phase aktiv (gegen versehentliches Schließen beim
// Auto-Trigger am Wochenanfang). Beim manuellen Aufruf via Hall-of-Fame-Button
// bleibt opts.auto leer → keine Schutz-Phase, sofort schließbar.
function showPotwRecap(opts){
  opts = opts || {};
  _sheetSetReopen(()=>showPotwRecap());
  try{
    const {start:weekStart, end:weekEnd}=_potwLastWeekRange();
    const ms=_potwMatchesInRange(weekStart,weekEnd);
    const wkKey=_potwKeyOf(weekStart);
    if(!ms.length){ toast('Letzte Woche keine Spiele','info'); return; }

    // Spieler-Stats für die Woche (inkl. längster Serie innerhalb der Woche)
    const ps={}; // player stats
    const run={}; // current streak
    const defStats={}; // defender stats for 'Eiserne Abwehr'
    const teamGames={}; // for Team of the Week
    const teamWins={};
    const teamEloDeltaRaw={}; // raw Elo delta for teams in this week

    const pm=pmap(); // Player map for quick lookup

    const orderedMatchesForWeek = [...ms].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

    // Cache-Schlüssel: pro Woche + Match-Count + Cache-Version
    const weekSimKey = 'potwSim_'+wkKey+'_'+matches.length+'_'+_cache.version;
    let weekSim;
    if(_cache._potwSim && _cache._potwSimKey === weekSimKey){
      weekSim = _cache._potwSim;
    } else {
      // Temporäre Elo-Simulation für die Woche, um Team-Elo-Deltas zu erhalten
      // Starte von einem neutralen Zustand, da wir nur die Elo-Änderungen *innerhalb* der Woche wollen
      weekSim = simulateElo(orderedMatchesForWeek, {
        initialState: {
          elo: Object.fromEntries(players.map(p => [p.id, cfg.start_elo])),
          played: Object.fromEntries(players.map(p => [p.id, 0])),
          playedSeason: Object.fromEntries(players.map(p => [p.id, 0])),
          wins: Object.fromEntries(players.map(p => [p.id, 0])),
          losses: Object.fromEntries(players.map(p => [p.id, 0])),
          curStreak: Object.fromEntries(players.map(p => [p.id, 0])),
          bestStreak: Object.fromEntries(players.map(p => [p.id, 0])),
          eloGain: Object.fromEntries(players.map(p => [p.id, 0])),
          eloLoss: Object.fromEntries(players.map(p => [p.id, 0])),
          gd: Object.fromEntries(players.map(p => [p.id, 0])),
          teamElo: {},
          seasonTeamElo: {},
          history: [],
          seasonEndElos: {},
          seasonPlayed: {},
          careerElo: {},
          posTracker: {}, 
          curSeason: null
        },
        startElo: cfg.start_elo
      });
      _cache._potwSim = weekSim;
      _cache._potwSimKey = weekSimKey;
    }

    // History-Lookup einmalig für O(1) Zugriff (statt history.find pro Match)
    const weekHistById = new Map();
    for(let i=0; i<weekSim.history.length; i++){
      weekHistById.set(weekSim.history[i].matchId, weekSim.history[i]);
    }

    orderedMatchesForWeek.forEach(m=>{
      const aWon=m.winner==='A';
      // Player stats
      [m.a1,m.a2,m.b1,m.b2].forEach(id=>{
        if(!ps[id]) ps[id]={wins:0,losses:0,gf:0,ga:0,eloDelta:0,bestStreak:0,defG:0,defGa:0};
        if(run[id]===undefined) run[id]=0;
        const onA=[m.a1,m.a2].includes(id);
        const won=(onA&&aWon)||(!onA&&!aWon);
        const gf=onA?m.score_a:m.score_b, ga=onA?m.score_b:m.score_a;
        const d=(m.deltas&&m.deltas[id])||0; // Original delta aus DB
        ps[id].gf+=gf; ps[id].ga+=ga; ps[id].eloDelta+=d;
        if(won){ ps[id].wins++; run[id]=run[id]>=0?run[id]+1:1; }
        else  { ps[id].losses++; run[id]=run[id]<=0?run[id]-1:-1; }
        if(run[id]>ps[id].bestStreak) ps[id].bestStreak=run[id];

        // Defender-Stats
        const pos=id===m.a1?m.a1_pos:id===m.a2?m.a2_pos:id===m.b1?m.b1_pos:m.b2_pos;
        if(pos==='def'){
          if(!defStats[id]) defStats[id]={games:0,goalsAgainst:0};
          defStats[id].games++;
          defStats[id].goalsAgainst+=ga;
        }
      });

      // Team-Stats
      [[m.a1,m.a2,m.winner==='A'],[m.b1,m.b2,m.winner==='B']]
      .forEach(([p1,p2,wonTeam])=>{
        const k=[p1,p2].sort().join('|');
        if(!teamGames[k]) teamGames[k]=0;
        if(!teamWins[k]) teamWins[k]=0;
        if(!teamEloDeltaRaw[k]) teamEloDeltaRaw[k]=0;

        teamGames[k]++;
        if(wonTeam) teamWins[k]++;

        const matchHistoryEntry = weekHistById.get(m.id);
        if (matchHistoryEntry) {
            teamEloDeltaRaw[k] += (matchHistoryEntry.deltas[p1] || 0) + (matchHistoryEntry.deltas[p2] || 0);
        }
      });
    });

    // POTW ermitteln — gleiche Regel wie Achievement (countPeriodWins):
    // Min 5 Siege in der Woche, höchste Winrate gewinnt.
    // Tiebreaker bei Gleichstand auf Winrate: mehr absolute Siege, dann mehr Elo-Delta.
    const POTW_MIN_WINS = 5;
    const candidates = Object.entries(ps)
      .filter(([id,s]) => s.wins >= POTW_MIN_WINS && pm[id] && !pm[id].hidden)
      .map(([id,s]) => {
        const games = s.wins + s.losses;
        return [id, s, games ? s.wins/games : 0];
      })
      .sort((a,b) => {
        if(b[2] !== a[2]) return b[2] - a[2];               // winrate desc
        if(b[1].wins !== a[1].wins) return b[1].wins - a[1].wins;
        return b[1].eloDelta - a[1].eloDelta;
      });

    let potwWinners = [];
    if (candidates.length > 0) {
      const topWr = candidates[0][2];
      // Geteilte POTW: jeder mit ≥ Min-Siegen und gleicher Winrate (mit kleinem Epsilon
      // gegen Floating-Point-Rundungsfehler — analog zu countPeriodWins).
      potwWinners = candidates.filter(c => Math.abs(c[2] - topWr) < 0.001);
    }
    
    if (!potwWinners.length) { toast('Kein POTW in Vorwoche', 'info'); return; }

    const mainPotwPlayerId = potwWinners[0][0];
    const mainPotwStats = potwWinners[0][1];
    const mainPotwPlayer = pm[mainPotwPlayerId];
    if (!mainPotwPlayer) { toast('Kein POTW in Vorwoche', 'info'); return; }

    document.querySelectorAll('.potw-hl[data-potw-award]').forEach(el=>{

    // Größter Elo-Aufstieg: direkt zum Spielerprofil

      el.onclick=()=>{
        const pid = el.dataset.potwPlayer;
        sheetNav(()=>showPlayer(pid));
      };
    });
  } catch(e){
    console.error('POTW Recap Fehler:',e);
  }

// Auto-Trigger: an Mo/Di der neuen Woche einmal pro Gerät
function autoShowPotwRecap(){
  try{
    const now=new Date();
    const wd=(now.getDay()+6)%7; // 0=Mo
    if(wd>=2) return;            // nur Mo/Di
    if(!matches.length) return;
    const {start}=_potwLastWeekRange();
    const wkKey=_potwKeyOf(start);
    if(localStorage.getItem('potw_shown_'+wkKey)) return;
    // Sheet bereits offen?
    const sheetEl=document.getElementById('sheet');
    if(sheetEl && sheetEl.classList.contains('show')) return;
    // Saison-Recap hat Vorrang
    if(seasons.length && now.getDate()<=3){
      const last=seasons[0];
      if(last && last.id!==currentSeason().id && !localStorage.getItem('recap_shown_'+last.id)) return;
    }
    if(!potwHasData()) return;
    showPotwRecap({auto:true});
  } catch(e){ console.error('POTW auto:',e); }
}

// Ermittelt den letzten Spieltag VOR heute, der einen POTD-Kandidaten hatte (min. 3 Siege).
// Wird sowohl vom Auto-Recap als auch vom manuellen "Letzten Tag ansehen"-Button genutzt.
// Kein eigener Cache nötig — Aufruf ist nur 1× pro Render, der Hot-Path ist Profil/Sheet.
function _potdLastDayData(){
  if(!matches.length) return null;
  const now=new Date();
  const todayStart=new Date(now); todayStart.setHours(0,0,0,0);
  const byDay={};
  for(const m of matches){
    const d=new Date(m.created_at);
    if(d>=todayStart) continue;
    const dk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(!byDay[dk]) byDay[dk]=[];
    byDay[dk].push(m);
  }
  const days=Object.keys(byDay).sort().reverse();
  if(!days.length) return null;
  // Erstes Datum mit qualifiziertem Kandidat (min. 3 Siege)
  const pm=pmap();
  for(const dk of days){
    const dms=byDay[dk];
    const wins={};
    dms.forEach(m=>[m.a1,m.a2,m.b1,m.b2].forEach(id=>{
      const onA=[m.a1,m.a2].includes(id);
      const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      if(!wins[id]) wins[id]=0;
      if(w) wins[id]++;
    }));
    const qualified=Object.entries(wins).some(([id,w])=>w>=3 && pm[id] && !pm[id].hidden);
    if(qualified) return {dayKey:dk, dayMatches:dms};
  }
  return null;
}

// True wenn es einen abgeschlossenen Spieltag mit ≥3-Siegen-Kandidat gibt (für Button-Sichtbarkeit)
function potdHasData(){ return _potdLastDayData()!==null; }

// Player-of-the-Day Recap: zeigt einmal pro Tag pro Gerät den Sieger des letzten Spieltags.
// Mit opts.force=true (vom "Letzten Tag ansehen"-Button) wird der localStorage-Check und
// das Setzen des "shown"-Flags übersprungen, damit der manuelle Aufruf den Auto-Trigger
// für heute nicht unterdrückt. Zusätzlich wird beim Force-Aufruf die Schutz-Phase
// (protectMs) deaktiviert → manueller Aufruf ist sofort per Backdrop-Klick schließbar.
function showPotdRecap(opts){
  opts = opts || {};
  _sheetSetReopen(()=>showPotdRecap());
  try{
    const now=new Date();
    const todayKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    if(!opts.force && localStorage.getItem('potd_shown_'+todayKey)) return;
    if(!matches.length){ if(opts.force) toast('Keine Matches vorhanden','info'); return; }

    // Konflikte vermeiden: nicht zeigen wenn ein Sheet offen ist
    // oder der Saison-Recap heute noch ansteht (Vorrang Saison-Recap).
    // Beim manuellen Force-Aufruf werden diese Auto-Trigger-Konflikte übersprungen.
    if(!opts.force){
      const sheetEl=document.getElementById('sheet');
      if(sheetEl && sheetEl.classList.contains('show')) return;
      if(seasons.length && now.getDate()<=3){
        const last=seasons[0];
        if(last && last.id!==currentSeason().id && !localStorage.getItem('recap_shown_'+last.id)) return;
      }
      // POTW hat Vorrang am Mo/Di der neuen Woche
      {
        const wd=(now.getDay()+6)%7;
        if(wd<2 && potwHasData()){
          const {start}=_potwLastWeekRange();
          if(!localStorage.getItem('potw_shown_'+_potwKeyOf(start))) return;
        }
      }
    }

    // Letzten Spieltag mit Kandidat ermitteln (zentral, identisch zum Auto-Trigger)
    const lastDay=_potdLastDayData();
    if(!lastDay){ if(opts.force) toast('Kein qualifizierter Spieltag','info'); return; }
    const lastDayKey=lastDay.dayKey;
    const dayMatches=lastDay.dayMatches;

    // Spieler-Stats für diesen Tag (inkl. längster Serie innerhalb des Tages)
    const ps={};
    const run={};
    const ordered=[...dayMatches].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    ordered.forEach(m=>{
      const aWon=m.winner==='A';
      [m.a1,m.a2,m.b1,m.b2].forEach(id=>{
        if(!ps[id]) ps[id]={wins:0,losses:0,gf:0,ga:0,eloDelta:0,bestStreak:0};
        if(run[id]===undefined) run[id]=0;
        const onA=[m.a1,m.a2].includes(id);
        const won=(onA&&aWon)||(!onA&&!aWon);
        const gf=onA?m.score_a:m.score_b, ga=onA?m.score_b:m.score_a;
        const d=(m.deltas&&m.deltas[id])||0;
        ps[id].gf+=gf; ps[id].ga+=ga; ps[id].eloDelta+=d;
        if(won){ ps[id].wins++; run[id]=run[id]>=0?run[id]+1:1; }
        else  { ps[id].losses++; run[id]=run[id]<=0?run[id]-1:-1; }
        if(run[id]>ps[id].bestStreak) ps[id].bestStreak=run[id];
      });
    });

    // Player of the Day: min. 3 Siege, Tiebreak via Elo-Delta des Tages.
    const pm=pmap();
    const candidates=Object.entries(ps)
      .filter(([id,s])=> s.wins>=3 && pm[id] && !pm[id].hidden)
      .sort((a,b)=>{
        if(b[1].wins!==a[1].wins) return b[1].wins-a[1].wins;
        return b[1].eloDelta-a[1].eloDelta;
      });
    if(!candidates.length) return;

    const potdId=candidates[0][0];
    const s=candidates[0][1];

function setConn(t,c){document.getElementById('connText').textContent=t;document.getElementById('connDot').className='dot '+c;}
function allPlayerStats(){
  const key='allStats_'+matches.length+'_'+_cache.version;
  if(_cache._allStatsKey===key) return _cache._allStatsData;
  
  const stats={};
  const run={};
  
  // Initialisierung: nur aktive Spieler (verringert die Anzahl der zu verarbeitenden IDs)
  const activeIds = new Set(players.filter(p=>!p.hidden).map(p=>p.id));
  activeIds.forEach(id=>{
    stats[id]={games:0,wins:0,losses:0,gf:0,ga:0,
      atkG:0,atkW:0,defG:0,defW:0,
      atkGoals:0,defConceded:0, // Ø Tore (Sturm) / Ø Gegentore (Abwehr) — Basis für Rollen-Donuts und Positionen-Tab
      mates:{},opps:{},best:-1e9,worst:1e9,curStreak:0};
    run[id]=0;
  });
  
  // Single-Pass durch die Matches, sortiert nach Zeit
  const ordered=[...matches].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  for(let i=0; i<ordered.length; i++){
    const m = ordered[i];
    const d_a = m.deltas || {}; // Match-Deltas für alle Spieler im Match
    
    // Team A Spieler verarbeiten
    const teamA_players = [m.a1, m.a2];
    const teamA_won = m.winner === 'A';
    const teamA_gf = m.score_a;
    const teamA_ga = m.score_b;

    for(let j=0; j<2; j++){
      const id = teamA_players[j];
      const s = stats[id];
      if(!s) continue; // Überspringen, wenn Spieler nicht aktiv oder nicht existiert
      
      const won = teamA_won;
      const gf = teamA_gf;
      const ga = teamA_ga;
      const pos = (id === m.a1) ? m.a1_pos : m.a2_pos;
      const delta = d_a[id] || 0;
      
      s.games++;
      s.gf += gf;
      s.ga += ga;
      if(won){ s.wins++; run[id] = run[id]>=0 ? run[id]+1 : 1; }
      else   { s.losses++; run[id] = run[id]<=0 ? run[id]-1 : -1; }
      
      if(pos==='atk'){ s.atkG++; if(won) s.atkW++; s.atkGoals += gf; }
      else            { s.defG++; if(won) s.defW++; s.defConceded += ga; }
      
      const mate = (id === m.a1) ? m.a2 : m.a1;
      if(!s.mates[mate]) s.mates[mate]={g:0,w:0};
      s.mates[mate].g++;
      if(won) s.mates[mate].w++;
      
      const opp1=m.b1, opp2=m.b2;
      if(!s.opps[opp1]) s.opps[opp1]={g:0,w:0};
      s.opps[opp1].g++;
      if(won) s.opps[opp1].w++;
      if(!s.opps[opp2]) s.opps[opp2]={g:0,w:0};
      s.opps[opp2].g++;
      if(won) s.opps[opp2].w++;
      
      if(delta > s.best) s.best = delta;
      if(delta < s.worst) s.worst = delta;
    }
    
    // Team B Spieler verarbeiten (analog zu Team A)
    const teamB_players = [m.b1, m.b2];
    const teamB_won = m.winner === 'B';
    const teamB_gf = m.score_b;
    const teamB_ga = m.score_a;
    
    for(let j=0; j<2; j++){
      const id = teamB_players[j];
      const s = stats[id];
      if(!s) continue; // Überspringen, wenn Spieler nicht aktiv oder nicht existiert
      
      const won = teamB_won;
      const gf = teamB_gf;
      const ga = teamB_ga;
      const pos = (id === m.b1) ? m.b1_pos : m.b2_pos;
      const delta = d_a[id] || 0;
      
      s.games++;
      s.gf += gf;
      s.ga += ga;
      if(won){ s.wins++; run[id] = run[id]>=0 ? run[id]+1 : 1; }
      else   { s.losses++; run[id] = run[id]<=0 ? run[id]-1 : -1; }
      
      if(pos==='atk'){ s.atkG++; if(won) s.atkW++; s.atkGoals += gf; }
      else            { s.defG++; if(won) s.defW++; s.defConceded += ga; }
      
      const mate = (id === m.b1) ? m.b2 : m.b1;
      if(!s.mates[mate]) s.mates[mate]={g:0,w:0};
      s.mates[mate].g++;
      if(won) s.mates[mate].w++;
      
      const opp1=m.a1, opp2=m.a2;
      if(!s.opps[opp1]) s.opps[opp1]={g:0,w:0};
      s.opps[opp1].g++;
      if(won) s.opps[opp1].w++;
      if(!s.opps[opp2]) s.opps[opp2]={g:0,w:0};
      s.opps[opp2].g++;
      if(won) s.opps[opp2].w++;
      
      if(delta > s.best) s.best = delta;
      if(delta < s.worst) s.worst = delta;
    }
  }
  
  // Finalisierung der Statistiken (z.B. Winrate, Tordifferenz)
  activeIds.forEach(id=>{
    const s = stats[id];
    s.curStreak = run[id];
    s.wr = s.games ? s.wins/s.games : 0;
    s.atkWr = s.atkG ? s.atkW/s.atkG : null;
    s.defWr = s.defG ? s.defW/s.defG : null;
    s.gd = s.gf - s.ga;
  });
  
  _cache._allStatsKey=key;
  _cache._allStatsData=stats;
  return stats;
}



// ╔═══ §3.4 ─── STATS ENGINE ───────────────────────────────────────────╗
//     winRate, atkW/defW, Pos-Klasse, allgemeine Player-Aggregate.
// ╚═════════════════════════════════════════════════════════════════════════╝
// matchSubset optional — defaults zu allen Matches
function playerStats(id, matchSubset){
  const ms = matchSubset || matches;

  // Wenn Statistiken für ALLE Matches angefragt werden, den bereits gecachten globalen Datensatz verwenden
  if (ms === matches) {
    const allStats = allPlayerStats(); // Dieser Datensatz ist bereits gecacht
    // allPlayerStats enthält nur aktive Spieler. Wenn ein versteckter Spieler angefragt wird,
    // der nicht im Cache ist, fällt die Logik auf die vollständige Berechnung zurück.
    if (allStats[id]) {
      // WICHTIG: Erstelle eine Kopie, um Änderungen am Cache-Objekt zu vermeiden,
      // da `bestWorstMate` und `nemesis` direkt in das Objekt schreiben könnten.
      return { ...allStats[id] };
    }
  }

  // Ursprüngliche Berechnungslogik für Teilmengen oder versteckte Spieler
  const s={games:0,wins:0,losses:0,gf:0,ga:0,atkG:0,atkW:0,defG:0,defW:0,
           atkGoals:0,defConceded:0, // Pos-spezifische Tore/Gegentore (Donut + Positionen-Tab)
           mates:{},opps:{},best:-1e9,worst:1e9,curStreak:0};
  let run=0;
  ms.forEach(m=>{
    const onA=[m.a1,m.a2].includes(id),onB=[m.b1,m.b2].includes(id);
    if(!onA&&!onB)return;
    const won=(onA&&m.winner==='A')||(onB&&m.winner==='B');
    const myPos=id===m.a1?m.a1_pos:id===m.a2?m.a2_pos:id===m.b1?m.b1_pos:m.b2_pos;
    const gf=onA?m.score_a:m.score_b, ga=onA?m.score_b:m.score_a;
    s.games++; s.gf+=gf; s.ga+=ga;
    if(won){s.wins++; run=run>=0?run+1:1;} else {s.losses++; run=run<=0?run-1:-1;}
    if(myPos==='atk'){s.atkG++; if(won)s.atkW++; s.atkGoals+=gf;} else {s.defG++; if(won)s.defW++; s.defConceded+=ga;}
    const mate=onA?(id===m.a1?m.a2:m.a1):(id===m.b1?m.b2:m.b1);
    if(!s.mates[mate])s.mates[mate]={g:0,w:0}; s.mates[mate].g++; if(won)s.mates[mate].w++;
    const opps=onA?[m.b1,m.b2]:[m.a1,m.a2];
    opps.forEach(o=>{if(!s.opps[o])s.opps[o]={g:0,w:0};s.opps[o].g++;if(won)s.opps[o].w++;});
    const d=(m.deltas&&m.deltas[id])||0;
    if(d>s.best)s.best=d; if(d<s.worst)s.worst=d;
  });
  s.curStreak=run;
  s.wr=s.games?s.wins/s.games:0;
  s.atkWr=s.atkG?s.atkW/s.atkG:null;
  s.defWr=s.defG?s.defW/s.defG:null;
  s.gd=s.gf-s.ga;
  return s;
}


function bestWorstMate(id, s_param){
  const s= s_param || playerStats(id); // Nutzt übergebene Stats oder berechnet neu (was jetzt gecacht ist)
  let best=null,worst=null;
  Object.entries(s.mates).forEach(([mid,v])=>{ if(v.g<2)return; const wr=v.w/v.g;
    if(!best||wr>best.wr)best={mid,wr,g:v.g}; if(!worst||wr<worst.wr)worst={mid,wr,g:v.g}; });
  return {best,worst};
}
function nemesis(id, s_param){
  const s= s_param || playerStats(id); // Nutzt übergebene Stats oder berechnet neu (was jetzt gecacht ist)
  let n=null,f=null;
  Object.entries(s.opps).forEach(([oid,v])=>{ if(v.g<2)return; const wr=v.w/v.g;
    if(!n||wr<n.wr)n={oid,wr,g:v.g}; if(!f||wr>f.wr)f={oid,wr,g:v.g}; });
  return {nemesis:n,favorite:f};
}


function teamStats(){
  const key='allTeamStats_'+matches.length+'_'+_cache.version;
  if(_cache._allTeamStatsKey===key) return _cache._allTeamStatsData;

  const T={};
  matches.forEach(m=>{
    [[m.a1,m.a2,m.winner==='A',m.score_a,m.score_b],[m.b1,m.b2,m.winner==='B',m.score_b,m.score_a]]
    .forEach(([x,y,won,gf,ga])=>{ const k=[x,y].sort().join('|');
      if(!T[k])T[k]={ids:[x,y].sort(),g:0,w:0,gf:0,ga:0};
      T[k].g++; if(won)T[k].w++; T[k].gf+=gf; T[k].ga+=ga; });
  });
  const result = Object.values(T);
  _cache._allTeamStatsKey = key;
  _cache._allTeamStatsData = result;
  return result;
}


// Detaillierte Team-Stats für das Team-Profil-Sheet.
// Ein Walk durch alle Matches → komplettes Detail. Gecached pro Team-Key + Cache-Version.
function teamDetail(p1,p2){
  const ids=[p1,p2].sort();
  const key=ids.join('|');
  if(!_cache._teamDetail) _cache._teamDetail={};
  if(_cache._teamDetail[key]) return _cache._teamDetail[key];

  let wins=0,losses=0,gf=0,ga=0,eloDelta=0;
  const oppStats={}; // einzelner Gegnerspieler → {g,w}
  const teamMatches=[]; // Matches in denen das Duo zusammen gespielt hat
  let biggestWin=null, biggestLoss=null, biggestUpset=null;
  // Positions-Tracking für ids[0]; ids[1] ist immer die Gegenposition
  // (im 2v2-Modell hat der Partner immer atk↔def zum Mate).
  let p0Atk=0, p0Def=0;
  // Aufstellungs-Quote pro Variante (für "Beste Aufstellung")
  let p0AtkWins=0, p0DefWins=0;
  // Fun-Facts-Aggregate
  let shutouts=0;       // Zu-Null-Siege (myGa===0 und gewonnen)
  let shutoutsAgainst=0;// Zu-Null-Niederlagen (myGf===0 und verloren)
  let perfectWins=0;    // 10:0-Siege
  let scoreCounts={};   // "myGf:myGa" → Anzahl (häufigster Endstand)

  for(const m of matches){
    const onA=(m.a1===ids[0]&&m.a2===ids[1])||(m.a1===ids[1]&&m.a2===ids[0]);
    const onB=(m.b1===ids[0]&&m.b2===ids[1])||(m.b1===ids[1]&&m.b2===ids[0]);
    if(!onA&&!onB) continue;
    const won=(onA&&m.winner==='A')||(onB&&m.winner==='B');
    const myGf=onA?m.score_a:m.score_b;
    const myGa=onA?m.score_b:m.score_a;
    const diff=myGf-myGa;
    const expected=onA?(m.exp_a||0.5):(1-(m.exp_a||0.5));
    const t=new Date(m.created_at).getTime();

    // Position von ids[0] in diesem Match bestimmen
    const slot = onA
      ? (m.a1===ids[0] ? 'a1' : 'a2')
      : (m.b1===ids[0] ? 'b1' : 'b2');
    const p0Pos = m[slot+'_pos'] || 'atk';
    if(p0Pos==='atk'){ p0Atk++; if(won) p0AtkWins++; }
    else             { p0Def++; if(won) p0DefWins++; }

    gf+=myGf; ga+=myGa;
    if(won) wins++; else losses++;
    const opps=onA?[m.b1,m.b2]:[m.a1,m.a2];
    opps.forEach(oid=>{
      if(!oppStats[oid]) oppStats[oid]={g:0,w:0};
      oppStats[oid].g++; if(won) oppStats[oid].w++;
    });

    teamMatches.push({m,onA,won,myGf,myGa,diff,expected,t});

    // Fun-Facts-Tracking
    if(won && myGa===0) shutouts++;
    if(!won && myGf===0) shutoutsAgainst++;
    if(won && myGf===10 && myGa===0) perfectWins++;
    const scoreKey = myGf+':'+myGa;
    scoreCounts[scoreKey] = (scoreCounts[scoreKey]||0) + 1;

    if(won){
      if(!biggestWin || diff>biggestWin.diff || (diff===biggestWin.diff && t>biggestWin.t)){
        biggestWin={m,diff,t,score:myGf+':'+myGa};
      }
      if(!biggestUpset || expected<biggestUpset.expected || (expected===biggestUpset.expected && t>biggestUpset.t)){
        biggestUpset={m,expected,t,score:myGf+':'+myGa};
      }
    } else {
      const lossDiff=-diff;
      if(!biggestLoss || lossDiff>biggestLoss.lossDiff || (lossDiff===biggestLoss.lossDiff && t>biggestLoss.t)){
        biggestLoss={m,lossDiff,t,score:myGf+':'+myGa};
      }
    }
  }

  // Erz-/Lieblingsgegner: einzelne Spieler, min. 2 Begegnungen
  let nemesis=null, favorite=null;
  Object.entries(oppStats).forEach(([oid,s])=>{
    if(s.g<2) return;
    const wr=s.w/s.g;
    if(!nemesis || wr<nemesis.wr || (wr===nemesis.wr && s.g>nemesis.g)) nemesis={oid,wr,g:s.g,w:s.w};
    if(!favorite || wr>favorite.wr || (wr===favorite.wr && s.g>favorite.g)) favorite={oid,wr,g:s.g,w:s.w};
  });
  if(nemesis && favorite && nemesis.oid===favorite.oid){ favorite=null; }

  // Upset nur zeigen wenn tatsächlich ein Underdog-Sieg (Erwartung < 45%)
  if(biggestUpset && biggestUpset.expected>=0.45) biggestUpset=null;

  // ═══ STREAKS (chronologisch) ═══
  const chronoMatches=[...teamMatches].sort((a,b)=>a.t-b.t);
  let currentStreak=0; // positiv=Sieges-, negativ=Niederlagen-Serie
  let longestWinStreak=0, longestLossStreak=0;
  let curWin=0, curLoss=0;
  chronoMatches.forEach(tm=>{
    if(tm.won){
      curWin++; if(curWin>longestWinStreak) longestWinStreak=curWin;
      curLoss=0;
    } else {
      curLoss++; if(curLoss>longestLossStreak) longestLossStreak=curLoss;
      curWin=0;
    }
  });
  // Aktuell-Streak: laufender Wert nach dem letzten Spiel
  if(chronoMatches.length){
    const last=chronoMatches[chronoMatches.length-1];
    currentStreak = last.won ? curWin : -curLoss;
  }

  // Letzte 10 Matches (neueste zuerst) — vorher waren es 5
  const recent=[...teamMatches].sort((a,b)=>b.t-a.t).slice(0,10);

  // ═══ KONSISTENTE ELO-BERECHNUNG ═══
  const globalSim=getGlobalSim();
  const teamKey=[ids[0],ids[1]].sort().join('|');
  const consistentEloDelta=Math.round(globalSim.teamElo[teamKey]||0);

  const games=teamMatches.length;
  // ═══ AUFSTELLUNGS-ANALYSE ═══
  // Typische Aufstellung = häufigere; Beste Aufstellung = höhere Siegrate.
  // "Beste" wird nur angezeigt, wenn (a) beide Aufstellungen je ≥2× vorkamen
  // (Mindestschwelle für stabile Quote) und (b) die "Beste" tatsächlich
  // VON DER TYPISCHEN ABWEICHT (= seltenere Aufstellung mit besserer Quote).
  const p0Dom = p0Atk>=p0Def ? 'atk' : 'def';
  const dominantCount = Math.max(p0Atk, p0Def);
  const swapped = Math.min(p0Atk, p0Def);
  const posStats = {
    [ids[0]]: {atk:p0Atk, def:p0Def, dom:p0Dom},
    [ids[1]]: {atk:p0Def, def:p0Atk, dom:p0Dom==='atk'?'def':'atk'}
  };
  // Aufstellungs-Siegraten (nur wenn jede Variante ≥2× vorkam)
  let bestLineup = null;
  if(p0Atk>=2 && p0Def>=2){
    const atkWr = p0AtkWins/p0Atk;
    const defWr = p0DefWins/p0Def;
    const bestP0Pos = atkWr >= defWr ? 'atk' : 'def';
    if(bestP0Pos !== p0Dom){ // nur wenn anders als typische
      bestLineup = {
        p0: bestP0Pos,
        wr: bestP0Pos==='atk' ? atkWr : defWr,
        wins: bestP0Pos==='atk' ? p0AtkWins : p0DefWins,
        games: bestP0Pos==='atk' ? p0Atk : p0Def,
        // Vergleichswert: wie viel besser als typische?
        typicalWr: p0Dom==='atk' ? atkWr : defWr
      };
    }
  }

  // Chronologisch sortierte Match-IDs für den Form-Spark (älteste zuerst)
  const matchIdsChrono = chronoMatches.map(tm=>tm.m.id);

  // ═══ GEMEINSAME SAISON-TITEL ═══
  // Team of the Season aus seasons[]: team_p1/team_p2 sind die archivierten Sieger-Duo-IDs
  const seasonTitles = seasons.filter(srow => {
    if(!srow.team_p1 || !srow.team_p2) return false;
    const t1 = srow.team_p1, t2 = srow.team_p2;
    return (t1===ids[0] && t2===ids[1]) || (t1===ids[1] && t2===ids[0]);
  }).map(srow => {
    let label = srow.id || '';
    if(srow.id){
      const [y, mo] = srow.id.split('-').map(Number);
      if(y && mo) label = new Date(y, mo-1, 1).toLocaleDateString('de-DE', {month:'long', year:'numeric'});
    }
    return { id: srow.id, label };
  });

  // ═══ HÄUFIGSTER ENDSTAND ═══
  let topScore = null, topScoreCount = 0;
  Object.entries(scoreCounts).forEach(([s, c]) => {
    if(c > topScoreCount){ topScoreCount = c; topScore = s; }
  });
  // Nur als "Lieblings-Score" anzeigen, wenn er ≥2× vorkam
  if(topScoreCount < 2) topScore = null;

  // Erstes/letztes gemeinsames Match-Datum (für "aktiv seit")
  const firstMatchDate = chronoMatches.length ? chronoMatches[0].m.created_at : null;
  const lastMatchDate  = chronoMatches.length ? chronoMatches[chronoMatches.length-1].m.created_at : null;

  const result={
    ids, games, wins, losses, gf, ga,
    gd: gf-ga,
    wr: games?wins/games:0,
    eloDelta: consistentEloDelta,
    nemesis, favorite,
    biggestWin, biggestLoss, biggestUpset,
    recent,
    posStats, dominantCount, swapped, bestLineup,
    matchIdsChrono,
    // Streaks
    currentStreak, longestWinStreak, longestLossStreak,
    // Fun Facts
    shutouts, shutoutsAgainst, perfectWins,
    topScore, topScoreCount,
    firstMatchDate, lastMatchDate,
    // Karriere
    seasonTitles
  };
  _cache._teamDetail[key]=result;
  return result;
}

// RANG-HELPER (extracted aus playerAwards für Wiederverwendung)
// ════════════════════════════════════════════════════════════════════
// Liefert 0-basierten Rang (0,1,2) wenn der Eintrag in den Top-3 einer
// Liste vorkommt — oder -1 wenn nicht. Tie-aware (Spieler mit gleichem
// Wert teilen sich den Rang).
function getRankInList(arr, valFn, checkFn){
  if(!arr || !arr.length) return -1;
  let rank = 1;
  for(let i=0; i<Math.min(arr.length, 10); i++){
    if(i>0 && valFn(arr[i]) !== valFn(arr[i-1])) rank = i+1;
    if(rank > 3) break;
    if(checkFn(arr[i])) return rank - 1;
  }
  return -1;
}

// ════════════════════════════════════════════════════════════════════
// TEAM-ACHIEVEMENTS: alle Team-Awards (Lifetime), in denen dieses
// konkrete Duo Top-3 erreicht hat. Genutzt vom Team-Profil-Sheet, um
// die Auszeichnungen des Duos prominent zu zeigen.
// ════════════════════════════════════════════════════════════════════
// Nutzt den globalen awardRankings('all')-Cache. Pro Award-Key prüfen
// wir, ob die Liste einen Eintrag enthält dessen ids === Duo-IDs (sortiert).
// Sonderbehandlung für Rivalry (4-Spieler-Award): das Duo kann entweder
// in idsA oder idsB sein.
function teamAchievements(p1Id, p2Id){
  const R = awardRankings('all');
  const sortKey = [p1Id, p2Id].sort().join('|');

  const TEAM_AWARD_LISTS = {
    mvt:              R.mvt,
    bestDuo:          R.bestDuo,
    worstTeam:        R.worstTeam,
    zirkus:           R.zirkusList,
    baustelle:        R.baustelleList,
    unstoppable:      R.unstoppableList,
    concreteWall:     R.concreteWallList,
    cheesePlatter:    R.cheesePlatterList,
    luckyCharm:       R.luckyCharmList,
    giantSlayer:      R.giantSlayerList,
    favoritenschreck: R.favoritenschreckList
  };
  // Sortier-Funktionen — konsistent mit playerAwards (teamValFns)
  const VAL_FNS = {
    mvt:              x => Math.round(x.v),
    bestDuo:          x => x.g,
    worstTeam:        x => -Math.round(x.w/x.g*100),
    zirkus:           x => Math.round(x.pct*1000),
    baustelle:        x => x.best,
    unstoppable:      x => x.v,
    concreteWall:     x => -Math.round(x.v*100),
    cheesePlatter:    x => Math.round(x.v*100),
    luckyCharm:       x => Math.round(x.v*1000),
    giantSlayer:      x => Math.round(x.v*1000),
    favoritenschreck: x => x.v
  };
  // Display-Werte für die Anzeige der erreichten Quote/Anzahl
  const DISP_FNS = {
    mvt:              x => (x.v>=0?'+':'')+Math.round(x.v),
    bestDuo:          x => x.g+' Sp.',
    worstTeam:        x => Math.round(x.w/x.g*100)+'%',
    zirkus:           x => Math.round(x.pct*100)+'%',
    baustelle:        x => x.best+'er',
    unstoppable:      x => x.v+'er',
    concreteWall:     x => x.v.toFixed(2),
    cheesePlatter:    x => x.v.toFixed(2),
    luckyCharm:       x => Math.round(x.v*100)+'%',
    giantSlayer:      x => Math.round(x.v*100)+'%',
    favoritenschreck: x => x.v+' Elo'
  };

  const found = [];
  Object.entries(TEAM_AWARD_LISTS).forEach(([key, arr]) => {
    if(!arr || !arr.length) return;
    const matchFn = x => x.ids && x.ids.slice().sort().join('|') === sortKey;
    const rank = getRankInList(arr, VAL_FNS[key], matchFn);
    if(rank >= 0 && rank <= 2){
      const entry = arr.find(matchFn);
      if(entry) found.push({key, rank, val: DISP_FNS[key](entry)});
    }
  });

  // Rivalry: 4-Spieler-Award — Duo kann entweder idsA oder idsB sein
  if(R.rivalryList && R.rivalryList.length){
    const matchFn = x => {
      const a = x.idsA.slice().sort().join('|');
      const b = x.idsB.slice().sort().join('|');
      return a === sortKey || b === sortKey;
    };
    const rank = getRankInList(R.rivalryList, x => Math.round(x.pct*1000), matchFn);
    if(rank >= 0 && rank <= 2){
      const entry = R.rivalryList.find(matchFn);
      if(entry) found.push({key:'rivalry', rank, val: Math.round(entry.pct*100)+'%'});
    }
  }

  return found;
}

// ════════════════════════════════════════════════════════════════════
// H2H-DETAIL: Bilanz zweier Spieler in zwei Dimensionen
// ════════════════════════════════════════════════════════════════════
// Liefert für Spieler-Paar (idA, idB) ALLES, was das H2H-Sheet braucht:
//   • asTeam     — gemeinsame Matches als Teamkollegen
//   • asOppForA  — Matches als Gegner, ALLES AUS SICHT VON idA
//                  (Wins zählen idA-Siege gegen idB; eloDelta = Σ idA-Deltas;
//                   gf/ga = idA-Team's Score)
//   • lastEncounters — die jüngsten 6 gemeinsamen Matches (Team ∪ Gegner)
//
// Achtung: Cache-Key behält die Reihenfolge (idA + '|' + idB), weil asOppForA
// asymmetrisch ist — h2hDetail(X,Y).asOppForA ≠ h2hDetail(Y,X).asOppForA.
// ════════════════════════════════════════════════════════════════════
function h2hDetail(idA, idB){
  const key = idA + '|' + idB;
  if(!_cache._h2hDetail) _cache._h2hDetail = {};
  if(_cache._h2hDetail[key]) return _cache._h2hDetail[key];

  const asTeam = {g:0, w:0, gf:0, ga:0, eloDelta:0};
  const asOppForA = {g:0, w:0, gf:0, ga:0, eloDelta:0};
  const encounters = [];

  for(const m of matches){
    const aInA = m.a1===idA || m.a2===idA;
    const bInA = m.a1===idB || m.a2===idB;
    const aInB = m.b1===idA || m.b2===idA;
    const bInB = m.b1===idB || m.b2===idB;

    const dA = (m.deltas||{})[idA] || 0;
    const dB = (m.deltas||{})[idB] || 0;

    if(aInA && bInA){
      // Beide im Team A
      asTeam.g++;
      if(m.winner==='A') asTeam.w++;
      asTeam.gf += m.score_a;
      asTeam.ga += m.score_b;
      asTeam.eloDelta += (dA + dB);
      encounters.push({m, type:'team', wonForA: m.winner==='A'});
    } else if(aInB && bInB){
      // Beide im Team B
      asTeam.g++;
      if(m.winner==='B') asTeam.w++;
      asTeam.gf += m.score_b;
      asTeam.ga += m.score_a;
      asTeam.eloDelta += (dA + dB);
      encounters.push({m, type:'team', wonForA: m.winner==='B'});
    } else if((aInA && bInB) || (aInB && bInA)){
      // Gegeneinander — aus Sicht von idA aggregieren
      asOppForA.g++;
      const aSideWon = aInA ? (m.winner==='A') : (m.winner==='B');
      if(aSideWon) asOppForA.w++;
      asOppForA.gf += aInA ? m.score_a : m.score_b;
      asOppForA.ga += aInA ? m.score_b : m.score_a;
      asOppForA.eloDelta += dA;
      encounters.push({m, type:'opp', wonForA: aSideWon});
    }
  }

  encounters.sort((a,b)=> new Date(b.m.created_at) - new Date(a.m.created_at));

  const result = {
    asTeam,
    asOppForA,
    total: asTeam.g + asOppForA.g,
    lastEncounters: encounters.slice(0, 6)
  };
  _cache._h2hDetail[key] = result;
  return result;
}

// Aggregierte Liste aller Mitspieler-Bilanzen für einen Spieler.
// Pro Mitspieler: Anzahl Team-Matches + Anzahl Gegner-Matches.
// Sortiert nach Gesamt-Häufigkeit, gefiltert ≥ min Spiele.
function playerH2HList(id, minTotal=3){
  if(!_cache._h2hList) _cache._h2hList = {};
  const ckey = id+'|'+minTotal;
  if(_cache._h2hList[ckey]) return _cache._h2hList[ckey];

  const stats = {}; // otherId → {teamG, teamW, oppG, oppW}
  for(const m of matches){
    const ids = [m.a1, m.a2, m.b1, m.b2];
    if(!ids.includes(id)) continue;
    const inA = m.a1===id || m.a2===id;
    const sameTeam = inA ? [m.a1, m.a2] : [m.b1, m.b2];
    const oppTeam  = inA ? [m.b1, m.b2] : [m.a1, m.a2];
    const won = (inA && m.winner==='A') || (!inA && m.winner==='B');

    sameTeam.forEach(other=>{
      if(other===id) return;
      if(!stats[other]) stats[other]={teamG:0,teamW:0,oppG:0,oppW:0};
      stats[other].teamG++;
      if(won) stats[other].teamW++;
    });
    oppTeam.forEach(other=>{
      if(!stats[other]) stats[other]={teamG:0,teamW:0,oppG:0,oppW:0};
      stats[other].oppG++;
      if(won) stats[other].oppW++;
    });
  }
  const pm = pmap();
  const out = Object.entries(stats)
    .filter(([oid, s]) => {
      const p = pm[oid];
      return p && !p.hidden && (s.teamG + s.oppG) >= minTotal;
    })
    .map(([oid, s]) => ({oid, ...s, total: s.teamG + s.oppG}))
    .sort((a,b)=> b.total - a.total);
  _cache._h2hList[ckey] = out;
  return out;
}

function monthlyElo(){
  const now=new Date(), ym=now.getFullYear()+'-'+now.getMonth();
  const pS={},tS={};
  matches.forEach(m=>{ const d=new Date(m.created_at);
    if(d.getFullYear()+'-'+d.getMonth()!==ym)return;
    Object.entries(m.deltas||{}).forEach(([id,v])=>pS[id]=(pS[id]||0)+v);
    const tA=[m.a1,m.a2].sort().join('|'),tB=[m.b1,m.b2].sort().join('|');
    tS[tA]=(tS[tA]||0)+(((m.deltas||{})[m.a1]||0)+((m.deltas||{})[m.a2]||0));
    tS[tB]=(tS[tB]||0)+(((m.deltas||{})[m.b1]||0)+((m.deltas||{})[m.b2]||0));
  });
  return {pS,tS};
}
