// ════════ ZEITRÄUME (Saison/Woche/Gesamt) ════════
function periodStart(period){
  const now=new Date();
  if(period==='season') return seasonStart();
  if(period==='week'){ const d=new Date(now); d.setHours(0,0,0,0);
    const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return d; }
  return null; // all
}
function matchesInPeriod(period){
  const key='mperiod_'+period+'_'+matches.length+'_'+_cache.version;
  if(!_cache._mperiod) _cache._mperiod={};
  if(_cache._mperiod[key]) return _cache._mperiod[key];
  let result;
  if(period==='season') result=matchesInSeason(currentSeason().id);
  else{
    const start=periodStart(period);
    result=start?matches.filter(m=>new Date(m.created_at)>=start):matches;
  }
  _cache._mperiod[key]=result;
  return result;
}

function periodLabel(period){
  const now=new Date();
  if(period==='season'){ return seasonLabel(currentSeason().id); }
  if(period==='week'){ const s=periodStart('week');
    return 'KW '+isoWeek(now)+' · ab '+s.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
  return 'Gesamte Liga';
}
function isoWeek(d){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=(date.getUTCDay()+6)%7; date.setUTCDate(date.getUTCDate()-dayNum+3);
  const firstThu=new Date(Date.UTC(date.getUTCFullYear(),0,4));
  const fd=(firstThu.getUTCDay()+6)%7; firstThu.setUTCDate(firstThu.getUTCDate()-fd+3);
  return 1+Math.round((date-firstThu)/(7*24*3600*1000));
}

// ════════ ZENTRALE ELO-ENGINE ════════
// Pro Saison isoliert: Bei jedem Monatswechsel werden Elo/Played auf start_elo zurückgesetzt.
// Positions-Tracker bleibt saison-übergreifend. Karriere-Elo = gewichteter Durchschnitt
// der Saison-End-Elos (gewichtet nach Spielanzahl pro Saison).
function simulateElo(matchSubset, opts={}){
  const startElo=opts.startElo ?? cfg.start_elo;
  const elo={}, played={}, playedSeason={}, wins={}, losses={}, curStreak={}, bestStreak={};
  const eloGain={}, eloLoss={}, gd={};
  const teamElo={};
  const seasonTeamElo={}; // seasonId → {teamKey → cumulative Elo-Zuwachs in dieser Saison}
  const history=[];
  players.forEach(p=>{elo[p.id]=startElo;played[p.id]=0;playedSeason[p.id]=0;wins[p.id]=0;losses[p.id]=0;curStreak[p.id]=0;bestStreak[p.id]=0;eloGain[p.id]=0;eloLoss[p.id]=0;gd[p.id]=0;});
  // Inkrementeller Positions-Tracker (ersetzt atkStrengthFrom(id, prior))
  const posTracker={};
  players.forEach(p=>{posTracker[p.id]={aG:0,aW:0,dG:0,dW:0,aPerf:0,dPerf:0};});

  // Optional: initialer State (für schnelle Vorschau eines einzelnen Hypo-Matches)
  // Erwartet ein Objekt mit den gleichen Keys wie der Return-Value von simulateElo.
  // Achtung: opts.initialCurSeason wird benötigt damit der Saison-Reset korrekt greift.
  let _curSeason=null;
  if(opts.initialState){
    const s=opts.initialState;
    Object.assign(elo, s.elo||{});
    Object.assign(played, s.played||{});
    Object.assign(playedSeason, s.playedSeason||{});
    Object.assign(wins, s.wins||{});
    Object.assign(losses, s.losses||{});
    Object.assign(curStreak, s.curStreak||{});
    Object.assign(bestStreak, s.bestStreak||{});
    Object.assign(eloGain, s.eloGain||{});
    Object.assign(eloLoss, s.eloLoss||{});
    Object.assign(gd, s.gd||{});
    // posTracker ist ein nested object → tief kopieren
    if(s.posTracker){
      Object.keys(s.posTracker).forEach(id=>{
        posTracker[id]={...s.posTracker[id]};
      });
    }
    _curSeason=opts.initialCurSeason||null;
  }
  const atkFromTracker=(id)=>{
    const t=posTracker[id]||{aG:0,aW:0,dG:0,dW:0,aPerf:0,dPerf:0};
    const total=t.aG+t.dG;
    const aOk=t.aG>=POS_MIN_GAMES, dOk=t.dG>=POS_MIN_GAMES;
    if(!aOk&&!dOk) return 0.5;
    let perfAtk;
    if(aOk&&dOk){
      const diff=(t.aPerf-t.dPerf)/total;
      perfAtk=0.5+diff*0.5;
    } else if(aOk){
      perfAtk=0.5+(t.aPerf/t.aG)*0.3;
    } else {
      perfAtk=0.5-(t.dPerf/t.dG)*0.3;
    }
    const expAtk=total>0?t.aG/total:0.5;
    return Math.max(0.1,Math.min(0.9,(1-EXP_WEIGHT)*perfAtk+EXP_WEIGHT*expAtk));
  };

  const ordered=[...matchSubset].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const localExp=(a,b)=>1/(1+Math.pow(10,(b-a)/400));
  const localDynK=(id)=>{const g=playedSeason[id]||0,e=elo[id];
    if(g<5)return cfg.k_factor*1.5;if(g<15)return cfg.k_factor*1.2;
    if(e>cfg.start_elo+400)return cfg.k_factor*0.85;return cfg.k_factor;};

  // Saison-Reset Tracking: bei jedem Monatswechsel werden Elo/Played zurückgesetzt
  // Positions-Tracker bleibt erhalten (saison-übergreifend gewollt).
  // Per-Saison Snapshots: Karriere-Elo = Durchschnitt der End-Elos pro Saison
  const seasonEndElos={}; // seasonId → {playerId → endElo}
  const seasonPlayed={};  // seasonId → {playerId → games}
  const resetSeason=()=>{
    players.forEach(p=>{elo[p.id]=startElo;playedSeason[p.id]=0;});
  };

  ordered.forEach((m)=>{
    const mSeason=seasonOf(m.created_at).id;
    if(_curSeason && _curSeason!==mSeason){
      // Snapshot der abgelaufenen Saison
      seasonEndElos[_curSeason]={};
      seasonPlayed[_curSeason]={};
      players.forEach(p=>{
        if((playedSeason[p.id]||0)>0){
          seasonEndElos[_curSeason][p.id]=elo[p.id];
          seasonPlayed[_curSeason][p.id]=playedSeason[p.id];
        }
      });
      resetSeason();
    }
    _curSeason=mSeason;
    const ids=[m.a1,m.a2,m.b1,m.b2];
    if(ids.some(id=>elo[id]===undefined)){
      history.push({matchId:m.id,eloBefore:{},eloAfter:{},deltas:{},expA:0.5,breakdowns:{}});
      priorMatches.push(m);
      return;
    }
    const eloBefore={};ids.forEach(id=>eloBefore[id]=elo[id]);
    const teamA=[{id:m.a1,pos:m.a1_pos},{id:m.a2,pos:m.a2_pos}];
    const teamB=[{id:m.b1,pos:m.b1_pos},{id:m.b2,pos:m.b2_pos}];
    const aAvg=(elo[m.a1]+elo[m.a2])/2,bAvg=(elo[m.b1]+elo[m.b2])/2;
    const expA=localExp(aAvg,bAvg);
    const rawMov=movMult(m.score_a,m.score_b);
    const res={}, breakdowns={};

    // Durchschnittliche Spielanzahl aller 4 Spieler (für Underdog-Berechnung)
    const avgGames=ids.reduce((s,id)=>s+(playedSeason[id]||0),0)/4;
    const avgElo=ids.reduce((s,id)=>s+elo[id],0)/4;

    const applyTeam=(team,opp,won,exp)=>{
      const e0=elo[team[0].id],e1=elo[team[1].id];
      const high=e0>=e1?team[0]:team[1];
      const w=riskWeights(Math.max(e0,e1),Math.min(e0,e1),cfg.risk_split);
      const oppAvg=(elo[opp[0].id]+elo[opp[1].id])/2;
      team.forEach(slot=>{
        const bd={playerId:slot.id,won,startElo:elo[slot.id]};
        const k=localDynK(slot.id); bd.kFactor=k;
        bd.expected=exp;
        const rawBase=k*((won?1:0)-exp); bd.rawBase=rawBase;

        // MoV
        const mov=won?rawMov:(1+(rawMov-1)*(cfg.mov_loss_damp||0.5));
        bd.movMult=mov; bd.movEffect=rawBase*mov-rawBase;

        // Win-Boost
        const boost=won?(cfg.win_boost||1.12):1.0;
        bd.winBoost=boost; bd.winBoostEffect=rawBase*mov*boost-rawBase*mov;

        // Erfahrungs-Schutz: greift erst ab Match 5, linear hochskaliert,
        // voll bei Match 30 (10% Schutz). Saison-basiert (Reset jeden Monat).
        const g=playedSeason[slot.id]||0;
        const protectShare=Math.max(0,Math.min(1,(g-5)/25));
        const expProtect=won?1:(1-0.1*protectShare);
        bd.expProtect=expProtect; bd.expProtectEffect=won?0:rawBase*mov*boost*expProtect-rawBase*mov*boost;

        // Underdog-Boost: basiert auf Elo-Differenz zum Gegnerteam + Spielanzahl-Differenz (Saison)
        const myElo=elo[slot.id];
        const eloDiff=oppAvg-myElo; // positiv = ich bin schwächer
        const gamesDiff=avgGames-(playedSeason[slot.id]||0); // positiv = ich habe weniger Spiele in dieser Saison
        // Sigmoid-artiger Boost: sanft skaliert, gecappt bei ±20%
        const eloFactor=Math.tanh(eloDiff/400)*0.15; // max ±15% aus Elo-Differenz
        const gamesFactor=Math.tanh(gamesDiff/30)*0.05; // max ±5% aus Spielanzahl
        const underdogRaw=eloFactor+gamesFactor;
        const underdogMult=won?Math.max(1,1+underdogRaw):Math.min(1,1+underdogRaw); // Siege: nur Boost, Niederlagen: nur Dämpfer
        bd.underdogMult=underdogMult;
        bd.underdogEloDiff=Math.round(eloDiff);
        bd.underdogGamesDiff=Math.round(gamesDiff);

        const afterMods=rawBase*mov*boost*expProtect*underdogMult;
        bd.afterMods=afterMods;

        // Risiko-Split
        const share=slot.id===high.id?w.strong:w.weak;
        bd.riskShare=share; bd.riskEffect=afterMods*share-afterMods;

        // Positions-Bonus
        const a=atkFromTracker(slot.id);
        const ps=slot.pos==='atk'?a:(1-a);
        const pf=posFactor(ps,cfg.pos_swing);
        const posMult=won?pf:(2-pf);
        bd.posStrength=a; bd.posMult=posMult; bd.posEffect=afterMods*share*posMult-afterMods*share;

        // Match-Bonus
        const mb=cfg.match_bonus||1.5;
        bd.matchBonus=mb;

        // Finale Delta
        const finalDelta=afterMods*share*posMult+mb;
        bd.finalDelta=finalDelta;
        bd.endElo=elo[slot.id]+finalDelta;

        res[slot.id]=finalDelta;
        breakdowns[slot.id]=bd;
      });
    };
    const aWon=m.winner==='A';
    applyTeam(teamA,teamB,aWon,expA);
    applyTeam(teamB,teamA,!aWon,1-expA);

    // Apply
    Object.entries(res).forEach(([id,d])=>{
      elo[id]+=d;played[id]++;playedSeason[id]++;
      if(d>=0)eloGain[id]=(eloGain[id]||0)+d; else eloLoss[id]=(eloLoss[id]||0)+d;
    });
    ids.forEach(id=>{
      const onA=[m.a1,m.a2].includes(id);
      const won=(onA&&aWon)||(!onA&&!aWon);
      const gf=onA?m.score_a:m.score_b, ga=onA?m.score_b:m.score_a;
      gd[id]=(gd[id]||0)+(gf-ga);
      if(won){wins[id]++;curStreak[id]=curStreak[id]>0?curStreak[id]+1:1;}
      else{losses[id]++;curStreak[id]=curStreak[id]<0?curStreak[id]-1:-1;}
      if(curStreak[id]>bestStreak[id])bestStreak[id]=curStreak[id];
    });

    // Team-Elo tracking (global + pro Saison)
    const winnerIds=aWon?[m.a1,m.a2]:[m.b1,m.b2];
    const loserIds=aWon?[m.b1,m.b2]:[m.a1,m.a2];
    const wKey=winnerIds.sort().join('|'),lKey=loserIds.sort().join('|');
    const wDelta=winnerIds.reduce((s,id)=>s+(res[id]||0),0);
    const lDelta=loserIds.reduce((s,id)=>s+(res[id]||0),0);
    teamElo[wKey]=(teamElo[wKey]||0)+wDelta;
    teamElo[lKey]=(teamElo[lKey]||0)+lDelta;
    // Pro Saison
    if(!seasonTeamElo[mSeason])seasonTeamElo[mSeason]={};
    seasonTeamElo[mSeason][wKey]=(seasonTeamElo[mSeason][wKey]||0)+wDelta;
    seasonTeamElo[mSeason][lKey]=(seasonTeamElo[mSeason][lKey]||0)+lDelta;

    history.push({matchId:m.id,eloBefore,eloAfter:{...elo},deltas:res,expA,breakdowns});
    // Positions-Tracker inkrementell updaten
    [[m.a1,m.a1_pos,aWon,expA],[m.a2,m.a2_pos,aWon,expA],
     [m.b1,m.b1_pos,!aWon,1-expA],[m.b2,m.b2_pos,!aWon,1-expA]]
    .forEach(([id,pos,won,myExp])=>{
      const t=posTracker[id]; if(!t) return;
      const perf=(won?1:0)-myExp;
      if(pos==='atk'){t.aG++;if(won)t.aW++;t.aPerf+=perf;}
      else{t.dG++;if(won)t.dW++;t.dPerf+=perf;}
    });
  });

  // Letzten Saison-Snapshot festhalten
  if(_curSeason){
    seasonEndElos[_curSeason]={};
    seasonPlayed[_curSeason]={};
    players.forEach(p=>{
      if((playedSeason[p.id]||0)>0){
        seasonEndElos[_curSeason][p.id]=elo[p.id];
        seasonPlayed[_curSeason][p.id]=playedSeason[p.id];
      }
    });

    // Falls die aktuelle Kalender-Saison NACH der letzten Match-Saison liegt
    // (z.B. neuer Monat ohne Matches), Elo zurücksetzen — sonst zeigt die UI
    // noch die Werte vom Vormonat.
    try {
      const currentCalSeason = currentSeason().id;
      if(currentCalSeason !== _curSeason){
        resetSeason();
        _curSeason = currentCalSeason;
      }
    } catch(e){}
  }
  // Karriere-Elo: gewichteter Durchschnitt der End-Elos, gewichtet nach Spielanzahl pro Saison.
  // So zählt eine Saison mit 30 Spielen 30× stärker als eine mit 1 Spiel.
  const careerElo={};
  players.forEach(p=>{
    let sumElo=0, sumGames=0;
    Object.keys(seasonEndElos).forEach(sid=>{
      if(seasonEndElos[sid][p.id]!==undefined){
        const g=seasonPlayed[sid][p.id]||0;
        sumElo+=seasonEndElos[sid][p.id]*g;
        sumGames+=g;
      }
    });
    careerElo[p.id]=sumGames>0?sumElo/sumGames:null;
  });
  return {elo,played,playedSeason,wins,losses,curStreak,bestStreak,eloGain,eloLoss,gd,teamElo,seasonTeamElo,history,seasonEndElos,seasonPlayed,careerElo,posTracker,curSeason:_curSeason};
}

// recalcHistory nutzt simulateElo
function recalcHistory(matchList){
  const sim=simulateElo(matchList);
  return {playerElos:sim.elo, matchPatches:sim.history.map(h=>({id:h.matchId,deltas:h.deltas,exp_a:h.expA}))};
}

// Berechnet Breakdown für ein einzelnes Match (für Match-Detail Anzeige)
function matchBreakdown(matchId){
  const sim=getGlobalSim();
  const entry=sim.history.find(h=>h.matchId===matchId);
  return entry?entry.breakdowns:{};
}

function periodPlayerStats(period){
  const sid=period==='season'?currentSeason().id:'';
  const key='periodStats_'+period+'_'+sid+'_'+matches.length+'_'+_cache.version;
  if(_cache._periodStatsKey===key) return _cache._periodStatsData;
  // EINE Wahrheit: alle Werte aus globalSim ableiten. Vorher gab es einen separaten
  // Sim für die Periode mit LEEREM Positions-Tracker → andere posBonus-Multiplikatoren
  // → andere Deltas → Anzeige "+X -Y" passte nicht zu "Elo" und Wochen-Werte
  // wichen vom Saison-Tab ab.
  const gSim=getGlobalSim();
  const ms=[...matchesInPeriod(period)].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  // Index der History-Einträge für schnellen Lookup
  const histById={};
  gSim.history.forEach(h=>{ histById[h.matchId]=h; });
  // Akkumulatoren initialisieren (nur für Spieler die in der Periode gespielt haben)
  const stats={};
  const ensure=(id)=>{
    if(!stats[id]) stats[id]={wins:0,losses:0,games:0,eloGain:0,eloLoss:0,gd:0,curStreak:0};
    return stats[id];
  };
  ms.forEach(m=>{
    const h=histById[m.id];
    const deltas=h&&h.deltas?h.deltas:{};
    // Wenn das Match keine Deltas hat (z.B. weil ein Spieler unbekannt ist und die
    // Sim-Engine es übersprungen hat), zählt es auch nicht als gespieltes Match —
    // konsistent mit dem Vorgänger-Code (simulateElo überspringt solche Matches).
    if(!Object.keys(deltas).length) return;
    const aWon=m.winner==='A';
    [m.a1,m.a2,m.b1,m.b2].forEach(id=>{
      const s=ensure(id);
      const d=deltas[id]||0;
      s.games++;
      if(d>=0) s.eloGain+=d; else s.eloLoss+=d;
      const onA=[m.a1,m.a2].includes(id);
      const won=(onA&&aWon)||(!onA&&!aWon);
      const gf=onA?m.score_a:m.score_b, ga=onA?m.score_b:m.score_a;
      s.gd+=(gf-ga);
      if(won){s.wins++; s.curStreak=s.curStreak>0?s.curStreak+1:1;}
      else  {s.losses++; s.curStreak=s.curStreak<0?s.curStreak-1:-1;}
    });
  });
  const hidden=new Set(players.filter(p=>p.hidden).map(p=>p.id));
  // Für 'season': absoluter Elo-Stand aus globalSim (deckt sich mit Profil & Recap).
  // Für 'week'/'all': eloNet = Summe der Deltas in der Periode (Net = Gain + Loss).
  const result=Object.keys(stats).filter(id=>stats[id].games>0&&!hidden.has(id)).map(id=>{
    const s=stats[id];
    const net=s.eloGain+s.eloLoss; // eloLoss ist negativ
    const absElo=gSim.elo[id]!==undefined?gSim.elo[id]:cfg.start_elo;
    return {
      id, wins:s.wins, losses:s.losses, games:s.games,
      elo: period==='season' ? Math.round(absElo) : Math.round(cfg.start_elo+net),
      eloNet: Math.round(net),
      eloGain: Math.round(s.eloGain),
      eloLoss: Math.round(s.eloLoss),
      gd: s.gd,
      curStreak: s.curStreak
    };
  });
  _cache._periodStatsKey=key;
  _cache._periodStatsData=result;
  return result;
}

// ════════ VIEW: RANKING ════════
function vRanking(){
  const periodBar=`
    <div class="seg accent" style="margin-bottom:14px">
      <button data-period="season" class="${period==='season'?'on':''}">Saison</button>
      <button data-period="week" class="${period==='week'?'on':''}">Woche</button>
      <button data-period="all" class="${period==='all'?'on':''}">Gesamt</button>
    </div>`;

  // ZEITRAUM-ANSICHT (Tag/Woche/Monat)
  if(period!=='all'){
    let ps=periodPlayerStats(period);
    if(rankSearch)ps=ps.filter(x=>{const p=pmap()[x.id];return p&&p.name.toLowerCase().includes(rankSearch.toLowerCase());});
    // Match-Liste des Zeitraums einmalig cachen — wird in formDots pro Spieler aufgerufen
    const periodMs=matchesInPeriod(period);
    // Sortierung: Saison nach Elo, Woche nach Siegen mit korrekten Tie-Breakern
    if(period==='season'){
      ps.sort((a,b)=>b.elo-a.elo||b.wins-a.wins);
    } else {
      ps.sort(periodSort==='elo'
        ?(a,b)=>b.eloNet-a.eloNet||b.wins-a.wins||(b.wins/b.games||0)-(a.wins/a.games||0)||b.gd-a.gd
        :(a,b)=>b.wins-a.wins||(b.wins/b.games||0)-(a.wins/a.games||0)||b.gd-a.gd||b.eloNet-a.eloNet);
    }
    const totalMatches=periodMs.length;
    // Saison-Champion: höchste Saison-Elo. Woche: Winrate bei Mindest-Siegen.
    let winner;
    if(period==='season'){
      winner=ps.length&&ps[0].games>0?ps[0]:null;
    } else {
      const minWins=period==='week'?5:1;
      const qual=ps.filter(x=>x.wins>=minWins);
      winner=qual.length?[...qual].sort((a,b)=>(b.wins/b.games)-(a.wins/a.games)||b.wins-a.wins)[0]:null;
    }
    const rows=(()=>{
      // Form der letzten 5 Matches (W/L Punkte) — nutzt das gecachte periodMs
      const formDots=(id)=>{
        const ms2=periodMs.filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(id))
          .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5).reverse();
        return ms2.map(m=>{const onA=[m.a1,m.a2].includes(id);
          const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
          return `<div class="dot ${w?'w':'l'}"></div>`;}).join('');
      };
      // Streak-Badge: 1/2/3 Flammen je nach Stärke — alle in Standard-Farbe
      const streakBadge=(cs)=>{
        if(cs>=3){
          const flames = cs>=7 ? 'flameTriple' : cs>=5 ? 'flameDouble' : 'flame';
          return `<span class="streak-badge" title="${cs}er Siegesserie">${svgI(flames)}</span>`;
        }
        if(cs<=-3){
          const drops = cs<=-7 ? 'dropTriple' : cs<=-5 ? 'dropDouble' : 'drop';
          return `<span class="streak-badge fire" title="${-cs}er Niederlagenserie">${svgI(drops)}</span>`;
        }
        return '';
      };
      return ps.map((x,i)=>{
        const p=pmap()[x.id]; if(!p)return '';
        const medal=medalB(i);
        let big, small;
        if(period==='season'){big=x.elo;small='Elo';}
        else if(periodSort==='elo'){big=(x.eloNet>=0?'+':'')+x.eloNet;small='Elo';}
        else {big=x.wins;small='Siege';}
        const wr=x.games?Math.round(x.wins/x.games*100):0;
        const streak=streakBadge(x.curStreak);
        const isTop=i<3;
        const gainLoss=x.games&&period!=='all'?`<div class="elo-gain-bar"><span class="gain">+${x.eloGain}</span><span class="loss">${x.eloLoss}</span></div>`:'';
        return `<div class="rrow ${isTop?'top'+(i+1):''}" data-detail="${x.id}" style="${isTop?'padding:14px 16px':'padding:10px 14px'}">
          ${medal?`<span class="medal">${medal}</span><span class="pos" style="opacity:0"></span>`:`<span class="pos num" style="${!isTop?'font-size:13px':''}">${i+1}</span>`}
          ${avHtml(p, i===0&&period==='season'?'width:46px;height:46px;font-size:16px':!isTop?'width:34px;height:34px;font-size:11px;border-radius:10px':'')}
          <div class="rmid">
            <div class="rname" style="${!isTop?'font-size:13px':''}">${esc(p.name)}${streak}</div>
            <div class="rmeta"><span>${x.wins}–${x.losses}</span>
              <span class="wbar"><i style="width:${wr}%"></i></span><span>${wr}%</span></div>
            ${period!=='all'?`<div class="form-dots">${formDots(x.id)}</div>`:''}
            ${period!=='all'&&x.games?`<div class="elo-gain-bar"><span class="gain">+${x.eloGain}</span><span class="loss">${x.eloLoss}</span></div>`:''}
          </div>
          <div class="rval"><div class="${isTop&&period==='season'?'elo-big':'big'} num" style="${!isTop?'font-size:15px':''}">${big}</div><div class="small">${small}</div></div>
        </div>`;}).join('');
    })();
    // Team of the Season + Titelverteidiger
    let teamBannerHtml='', defenderCards='', bestTeamKey='';
    // Hilfsfunktion für kleine Chip-Avatare (22 px)
    const chipAv=(pid)=>{
      const pp=pmap()[pid];
      if(!pp) return `<div class="sh-chip-av" style="background:var(--surface3);color:var(--muted)">?</div>`;
      const em=pp.avatar_id?avatarEmoji(pp.avatar_id):null;
      if(em) return `<div class="sh-chip-av" style="background:var(--surface3);color:inherit;font-size:13px">${em}</div>`;
      return `<div class="sh-chip-av" style="background:${avColor(pid)}">${esc(initials(pp.name))}</div>`;
    };
    if(period==='season'){
      const seasonMs=periodMs; // bereits gecacht
      const T={};
      seasonMs.forEach(m=>{
        [[m.a1,m.a2,m.winner==='A'],[m.b1,m.b2,m.winner==='B']]
        .forEach(([x,y,won])=>{const k=[x,y].sort().join('|');
          if(!T[k])T[k]={ids:[x,y].sort(),g:0,w:0};T[k].g++;if(won)T[k].w++;});
      });
      // Team of Season = höchster gemeinsamer Elo-Zuwachs (aus globalSim für Konsistenz)
      const _gsim=getGlobalSim();
      const _seasonTeamMap=_gsim.seasonTeamElo[currentSeason().id]||{};
      const teamEntries=Object.entries(_seasonTeamMap).filter(([k])=>{
        const ids=k.split('|');const tms=Object.values(T);
        return tms.some(t=>t.ids[0]===ids[0]&&t.ids[1]===ids[1]&&t.g>=2);
      }).sort((a,b)=>b[1]-a[1]);
      const bestTeamEntry=teamEntries[0];
      if(bestTeamEntry){
        const ids=bestTeamEntry[0].split('|');
        bestTeamKey=ids.sort().join('|');
        const eloGain=Math.round(bestTeamEntry[1]);
        const tData=Object.values(T).find(t=>t.ids[0]===ids[0]&&t.ids[1]===ids[1]);
        teamBannerHtml=`
          <div class="sh-chip team clickable" id="seasonTeamCard" data-team="${esc(bestTeamKey)}">
            <div class="sh-chip-label">Team of the Season</div>
            <div class="sh-chip-row">
              <div class="sh-chip-pair">${chipAv(ids[0])}${chipAv(ids[1])}</div>
              <div class="sh-chip-name">${esc(ids.map(pname).join(' & '))}</div>
            </div>
            <div class="sh-chip-detail">${eloGain>=0?'+':''}${eloGain} Elo${tData?' · '+tData.w+'/'+tData.g:''}</div>
          </div>`;
      } else {
        teamBannerHtml=`
          <div class="sh-chip team" id="seasonTeamCard">
            <div class="sh-chip-label">Team of the Season</div>
            <div class="sh-chip-row">
              <div class="sh-chip-av" style="background:var(--surface3);color:var(--muted)">?</div>
              <div class="sh-chip-name" style="color:var(--muted)">noch offen</div>
            </div>
            <div class="sh-chip-detail">min. 2 gemeinsame Spiele</div>
          </div>`;
      }
      if(seasons.length){
        const last=seasons.find(s=>s.id!==currentSeason().id);
        if(last&&last.player_id){
          const titleCount=seasons.filter(s=>s.id!==currentSeason().id&&s.player_id===last.player_id).length;
          defenderCards=`
            <div class="sh-chip def clickable" id="defenderCard">
              <div class="sh-chip-label">Defending Champion</div>
              <div class="sh-chip-row">
                ${chipAv(last.player_id)}
                <div class="sh-chip-name">${esc(pname(last.player_id))}</div>
              </div>
              <div class="sh-chip-detail">${last.label}${titleCount>1?' · '+titleCount+' Titel':''}</div>
            </div>`;
        }
      }
    }

    // Saison-Fortschritt: Tag X von Y mit Balken (ersetzt den alten Countdown)
    let seasonProgressHtml='';
    if(period==='season'){
      const sStart=seasonStart();
      const sEnd=seasonEnd();
      const totalMs=sEnd-sStart;
      const elapsedMs=Math.max(0,Math.min(totalMs,Date.now()-sStart));
      const dayElapsed=Math.max(1,Math.ceil(elapsedMs/(1000*60*60*24)));
      const dayTotal=Math.ceil(totalMs/(1000*60*60*24));
      const pct=Math.round((elapsedMs/totalMs)*100);
      seasonProgressHtml=`
        <div class="season-progress">
          <div class="season-progress-top">
            <span class="season-progress-label">Saison-Fortschritt</span>
            <span class="season-progress-days">Tag <b>${dayElapsed}</b> von ${dayTotal}</span>
          </div>
          <div class="season-progress-bar"><i style="width:${pct}%"></i></div>
        </div>`;
    } else if(period==='week'){
      // Wochen-Fortschritt: Tag X von 7
      const wkStart=periodStart('week');
      const wkEnd=new Date(wkStart); wkEnd.setDate(wkEnd.getDate()+7);
      const wkTotalMs=wkEnd-wkStart;
      const wkElapsedMs=Math.max(0,Math.min(wkTotalMs,Date.now()-wkStart));
      const wkDayElapsed=Math.max(1,Math.min(7,Math.ceil(wkElapsedMs/(1000*60*60*24))));
      const wkPct=Math.round((wkElapsedMs/wkTotalMs)*100);
      const wkRemain=7-wkDayElapsed;
      seasonProgressHtml=`
        <div class="season-progress">
          <div class="season-progress-top">
            <span class="season-progress-label">Woche läuft</span>
            <span class="season-progress-days">Tag <b>${wkDayElapsed}</b> von 7${wkRemain>0?' · noch '+wkRemain+(wkRemain===1?' Tag':' Tage'):''}</span>
          </div>
          <div class="season-progress-bar"><i style="width:${wkPct}%"></i></div>
        </div>`;
    }

    // Player of Season: Vorsprung auf Platz 2
    const gap2=ps.length>=2&&winner?Math.round(winner.elo-(ps.find(x=>x.id!==winner.id)||{elo:0}).elo):0;

    // Champion-Hero-Card (Saison-Modus) bzw. Wochensieger-Card (Wochen-Modus)
    let heroSection='';
    if(period==='season'){
      if(winner){
        const wp=pmap()[winner.id];
        const wWr=winner.games?Math.round(winner.wins/winner.games*100):0;
        // Tier-Klasse für den Avatar-Glow
        const rinf=getPlayerRank(winner.id);
        const tierCls=rinf?('tier-'+rinf.label.toLowerCase().replace('ä','a').replace('ö','o').replace('ü','u')):'';
        const isLegend=rinf&&rinf.label==='Legende';
        // Avatar (72 px, getöntem Border je Tier)
        const em=wp.avatar_id?avatarEmoji(wp.avatar_id):null;
        const avInner=em
          ? `<div class="sh-av has-emoji ${tierCls}" style="background:var(--surface3)"><span class="em">${em}</span></div>`
          : `<div class="sh-av ${tierCls}" style="background:${avColor(wp.id)}">${esc(initials(wp.name))}</div>`;
        // Form-Dots des Champions (letzte 5 Saison-Matches)
        const winnerForm=(()=>{
          const ms2=periodMs.filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(winner.id))
            .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5).reverse();
          return ms2.map(m=>{const onA=[m.a1,m.a2].includes(winner.id);
            const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
            return `<div class="dot ${w?'w':'l'}"></div>`;}).join('');
        })();
        const gdColor=winner.gd>=0?'var(--ink)':'var(--red)';
        heroSection=`
          <div class="season-hero" id="seasonLeaderCard">
            <div class="sh-row">
              <div class="sh-av-wrap">
                ${isLegend?`<div class="sh-crown">${svgI('crown')}</div>`:''}
                ${avInner}
              </div>
              <div class="sh-info">
                <div class="sh-label">Player of the Season</div>
                <div class="sh-name">${esc(wp.name)}</div>
                <div class="sh-meta">${gap2>0?'+'+gap2+' Vorsprung · ':''}${wWr}% Quote</div>
              </div>
              <div class="sh-elo-wrap">
                <div class="sh-elo-v">${winner.elo}</div>
                <div class="sh-elo-l">Elo</div>
              </div>
            </div>
            <div class="sh-stats">
              <div class="sh-stat"><div class="v acid">${winner.wins}</div><div class="l">Siege</div></div>
              <div class="sh-stat"><div class="v red">${winner.losses}</div><div class="l">Pleiten</div></div>
              <div class="sh-stat"><div class="v" style="color:${gdColor}">${winner.gd>=0?'+':''}${winner.gd}</div><div class="l">Tordiff</div></div>
              ${winnerForm?`<div class="sh-form">${winnerForm}</div>`:''}
            </div>
          </div>`;
      } else {
        heroSection=`
          <div class="season-hero" id="seasonLeaderCard">
            <div class="sh-row">
              <div class="sh-av-wrap">
                <div class="sh-av" style="background:var(--surface3);border-color:var(--line);box-shadow:none;color:var(--muted);font-size:32px">?</div>
              </div>
              <div class="sh-info">
                <div class="sh-label">Player of the Season</div>
                <div class="sh-name-empty">noch offen</div>
                <div class="sh-meta">Saison läuft</div>
              </div>
            </div>
          </div>`;
      }
      // Side-Chips (Team + Defender)
      if(teamBannerHtml||defenderCards){
        heroSection+=`<div class="sh-side">${teamBannerHtml}${defenderCards}</div>`;
      }
    } else {
      // ═══ WOCHE: Hero im season-hero-Stil + Highlights ═══
      if(winner){
        const wp=pmap()[winner.id];
        const wWr=winner.games?Math.round(winner.wins/winner.games*100):0;
        const em=wp.avatar_id?avatarEmoji(wp.avatar_id):null;
        const avInner=em
          ? `<div class="sh-av has-emoji tier-legende" style="background:var(--surface3)"><span class="em">${em}</span></div>`
          : `<div class="sh-av tier-legende" style="background:${avColor(wp.id)}">${esc(initials(wp.name))}</div>`;
        const winnerForm=(()=>{
          const ms2=periodMs.filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(winner.id))
            .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5).reverse();
          return ms2.map(m=>{const onA=[m.a1,m.a2].includes(winner.id);
            const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
            return `<div class="dot ${w?'w':'l'}"></div>`;}).join('');
        })();
        heroSection=`
          <div class="season-hero" data-detail="${winner.id}" style="cursor:pointer">
            <div class="sh-row">
              <div class="sh-av-wrap">
                <div class="sh-crown">${svgI('crown')}</div>
                ${avInner}
              </div>
              <div class="sh-info">
                <div class="sh-label">Wochensieger</div>
                <div class="sh-name">${esc(wp.name)}</div>
                <div class="sh-meta">${winner.wins}W · ${winner.losses}L · ${wWr}% Quote</div>
              </div>
              <div class="sh-elo-wrap">
                <div class="sh-elo-v" style="color:${winner.eloNet>=0?'var(--acid)':'var(--red)'}">${winner.eloNet>=0?'+':''}${winner.eloNet}</div>
                <div class="sh-elo-l">Elo Woche</div>
              </div>
            </div>
            <div class="sh-stats">
              <div class="sh-stat"><div class="v acid">+${winner.eloGain}</div><div class="l">Gewonnen</div></div>
              <div class="sh-stat"><div class="v red">${winner.eloLoss}</div><div class="l">Verloren</div></div>
              ${winnerForm?`<div class="sh-form">${winnerForm}</div>`:''}
            </div>
          </div>`;
      } else {
        heroSection=`
          <div class="season-hero">
            <div class="sh-row">
              <div class="sh-av-wrap">
                <div class="sh-av" style="background:var(--surface3);border-color:var(--line);box-shadow:none;color:var(--muted);font-size:32px">?</div>
              </div>
              <div class="sh-info">
                <div class="sh-label">Wochensieger</div>
                <div class="sh-name-empty">noch offen</div>
                <div class="sh-meta">min. 5 Siege benötigt</div>
              </div>
            </div>
          </div>`;
      }

      // Wochen-Highlights: Top-Tor / Heißeste Serie / Größter Upset
      // Top-Tor: Stürmer mit den meisten Toren pro Spiel (min 1 Sturm-Spiel)
      const wkAtk={};
      periodMs.forEach(m=>{
        const atkA=m.a1_pos==='atk'?m.a1:m.a2;
        const atkB=m.b1_pos==='atk'?m.b1:m.b2;
        if(!wkAtk[atkA])wkAtk[atkA]={g:0,goals:0};
        wkAtk[atkA].g++; wkAtk[atkA].goals+=m.score_a;
        if(!wkAtk[atkB])wkAtk[atkB]={g:0,goals:0};
        wkAtk[atkB].g++; wkAtk[atkB].goals+=m.score_b;
      });
      const topScorer=Object.entries(wkAtk).filter(([,v])=>v.g>=1)
        .map(([id,v])=>({id,goals:v.goals,g:v.g,avg:v.goals/v.g}))
        .sort((a,b)=>b.avg-a.avg||b.goals-a.goals)[0];

      // Heißeste Serie: längste Siegesserie innerhalb der Woche
      const wkStreaks=longestStreaks(periodMs);
      const topStreak=wkStreaks[0];

      // Größter Upset: niedrigste Sieg-Wahrscheinlichkeit des Gewinners
      const wkUps=periodMs.map(m=>{
        const expA=m.exp_a??0.5;
        const we=m.winner==='A'?expA:(1-expA);
        return {sp:1-we, m, winPct:Math.round(we*100)};
      }).sort((a,b)=>b.sp-a.sp);
      const topUpset=wkUps[0];

      const renderHl=(cls,labelTxt,iconKey,nameTxt,detailTxt)=>{
        if(!nameTxt) return `<div class="wk-hl empty">
          <div class="wk-hl-ic">${svgI(iconKey)}</div>
          <div class="wk-hl-label">${labelTxt}</div>
          <div class="wk-hl-val">–</div>
          <div class="wk-hl-detail">noch keine Daten</div>
        </div>`;
        return `<div class="wk-hl ${cls}">
          <div class="wk-hl-ic">${svgI(iconKey)}</div>
          <div class="wk-hl-label">${labelTxt}</div>
          <div class="wk-hl-val">${esc(nameTxt)}</div>
          <div class="wk-hl-detail">${detailTxt}</div>
        </div>`;
      };

      const upsetWinners=topUpset?(topUpset.m.winner==='A'?[topUpset.m.a1,topUpset.m.a2]:[topUpset.m.b1,topUpset.m.b2]):null;
      const upsetName=upsetWinners?(pname(upsetWinners[0])+' & '+pname(upsetWinners[1])):null;

      heroSection += `
        <div class="wk-highlights">
          ${renderHl('scorer','Top-Tor','ball', topScorer?pname(topScorer.id):null, topScorer?`Ø ${topScorer.avg.toFixed(1)} Tore`:'')}
          ${renderHl('streak','Heißeste Serie','flame', topStreak?pname(topStreak.id):null, topStreak?`${topStreak.v} in Folge`:'')}
          ${renderHl('upset','Größter Upset','bolt', upsetName, topUpset?`${topUpset.winPct}% Chance`:'')}
        </div>`;
    }

    return `
      <div class="view-head"><h2>Liga</h2><p>${periodLabel(period)} · ${ps.length} aktiv · ${totalMatches} Matches</p></div>
      ${periodBar}
      ${seasonProgressHtml}
      ${heroSection}
      ${period==='week'?`<div class="seg"><button data-periodsort="wins" class="${periodSort==='wins'?'on':''}">Nach Siegen</button>
        <button data-periodsort="elo" class="${periodSort==='elo'?'on':''}">Nach Elo</button></div>`:''}
      ${ps.length?`<div class="rlist">${rows}</div>`:emptyState('calendar','Keine Matches in diesem Zeitraum')}`;
  }

  // GESAMT-ANSICHT: Karriere-Elo = Durchschnitt der Saison-End-Elos
  const globalSim = getGlobalSim();
  const getGlobalElo = id => Math.round(globalSim.careerElo[id] ?? cfg.start_elo);

  const _allStats=allPlayerStats();
  let list = activePlayers().map(p => ({p, s:_allStats[p.id]||playerStats(p.id), globalElo:getGlobalElo(p.id)}));
  if(rankSearch) list = list.filter(x => x.p.name.toLowerCase().includes(rankSearch.toLowerCase()));

  const sortFn = {
    elo:      (a,b) => b.globalElo - a.globalElo,
    winrate:  (a,b) => b.s.wr - a.s.wr || b.s.games - a.s.games,
    goaldiff: (a,b) => b.s.gd - a.s.gd,
    streak:   (a,b) => b.s.curStreak - a.s.curStreak,
    games:    (a,b) => b.s.games - a.s.games
  }[rankMetric];
  list.sort(sortFn);

  const top = list.length ? list[0].globalElo : 0;
  const rows = list.map((x,i) => rrow(x.p, x.s, i, rankMetric, x.globalElo)).join('');

  // ═══ HALL OF FAME: #1 nach Karriere-Elo ═══
  const hofList=activePlayers().map(p=>({p, e:getGlobalElo(p.id), s:_allStats[p.id]||playerStats(p.id)})).sort((a,b)=>b.e-a.e);
  const hof=hofList[0];
  let hofHtml='';
  if(hof && hof.s.games>0){
    const hp=hof.p;
    const em=hp.avatar_id?avatarEmoji(hp.avatar_id):null;
    const avInner=em
      ? `<div class="hof-av has-emoji" style="background:var(--surface3)"><span class="em">${em}</span></div>`
      : `<div class="hof-av" style="background:${avColor(hp.id)}">${esc(initials(hp.name))}</div>`;
    const r=getPlayerRank(hp.id);
    const tierKey=r?r.label.toLowerCase().replace('ä','a').replace('ö','o').replace('ü','u'):'';
    const tierHtml=r?`<span class="hof-tier t-${tierKey}">${svgI(r.icon)}${r.label}</span>`:'';
    // Saison-Titel zählen
    const titleCount=seasons.filter(s=>s.id!==currentSeason().id&&s.player_id===hp.id).length;
    const wr=hof.s.wr?Math.round(hof.s.wr*100):0;
    const gdColor=hof.s.gd>=0?'var(--acid)':'var(--red)';
    hofHtml=`
      <div class="hof-hero" data-detail="${hp.id}">
        <span class="hof-ribbon">${svgI('trophy')}Hall of Fame · #1 All-Time</span>
        <div class="hof-main">
          <div class="hof-av-wrap">
            <div class="hof-crown">${svgI('crown')}</div>
            ${avInner}
          </div>
          <div class="hof-info">
            <div class="hof-name">${esc(hp.name)}</div>
            <div class="hof-tier-row">
              ${tierHtml}
              <span class="hof-elo">Ø <b>${hof.e}</b> Karriere-Elo</span>
            </div>
          </div>
        </div>
        <div class="hof-stats">
          <div class="hof-stat"><div class="v acid">${hof.s.wins}–${hof.s.losses}</div><div class="l">Bilanz</div></div>
          <div class="hof-stat"><div class="v acid">${wr}%</div><div class="l">Siegrate</div></div>
          <div class="hof-stat"><div class="v">${titleCount}</div><div class="l">Saison-Titel</div></div>
          <div class="hof-stat"><div class="v" style="color:${gdColor}">${hof.s.gd>=0?'+':''}${hof.s.gd}</div><div class="l">Tordiff.</div></div>
        </div>
      </div>`;
  }

  // ═══ ALL-TIME RECORDS ═══
  // Peak Elo: höchste Saison-End-Elo aller Spieler über alle Saisons
  let peakEloVal=null, peakEloId=null, peakSeason=null;
  Object.entries(globalSim.seasonEndElos||{}).forEach(([sid,eloMap])=>{
    Object.entries(eloMap).forEach(([pid,e])=>{
      if(peakEloVal===null || e>peakEloVal){ peakEloVal=e; peakEloId=pid; peakSeason=sid; }
    });
  });
  // Meiste Siege (Karriere)
  const winsArr=activePlayers().map(p=>({id:p.id, v:globalSim.wins[p.id]||0})).sort((a,b)=>b.v-a.v);
  const mostWins=winsArr[0];
  // Beste WR (min 10 Spiele Karriere)
  const wrArr=activePlayers().map(p=>{
    const g=globalSim.played[p.id]||0, w=globalSim.wins[p.id]||0;
    return {id:p.id, g, w, wr:g?w/g:0};
  }).filter(x=>x.g>=10).sort((a,b)=>b.wr-a.wr||b.g-a.g);

  const cls = i<3 ? `top${i+1}` : '';

    if(metric==='elo'){

  }

  else if(metric==='winrate'){big=Math.round(s.wr*100)+'%'; small=s.wins+'–'+s.losses;}
  else if(metric==='goaldiff'){big=(s.gd>=0?'+':'')+s.gd; small='Tordiff';}
  else if(metric==='streak'){
    const r=s.curStreak;
    big=(r>0?r+'W':r<0?(-r)+'L':'–');
    small=r>0?'Siege':r<0?'Niederlagen':'neutral';
  }
  else{big=s.games; small='Spiele';}
  const neutral = metric!=='elo' && !(metric==='goaldiff'&&s.gd>=0) && !(metric==='streak'&&s.curStreak>0) ? ' neutral':'';
  const fireTag = streakInline(s.curStreak);
  return `<div class="rrow ${cls}" data-detail="${p.id}">
    ${medal
      ? `<span class="medal">${medal}</span><span class="pos" style="opacity:0"></span>`
      : `<span class="pos num">${i+1}</span>`}

              <div class="rname">

        ? `<div style="font-size:13px;font-weight:700;color:${getPlayerRank(p.id)?.color||'var(--muted)'}; text-align:right">${big}</div>`
        : `<div class="big${neutral} num">${big}</div>`
      }
      <div class="small">${small}</div>
    </div>

  </div>`;
}

// ════════ VIEW: POSITIONS-RANGLISTE ════════
function vPositions(){
  function posList(pos){
    return activePlayers().map(p=>{
      const s=playerStats(p.id);
      const g=pos==='atk'?s.atkG:s.defG, w=pos==='atk'?s.atkW:s.defW;
      const perf=posPerfFrom(p.id,matches);
      const pAvg=pos==='atk'?perf.aPerfAvg:perf.dPerfAvg;
      const wr=g?w/g:0;
      // Score: Siegrate + Performance-Bonus, gewichtet nach Erfahrung.
      // Erfahrungsgewicht wächst asymptotisch — bei 25+ Spielen praktisch voll vertrauenswürdig.
      const expWeight=1-Math.exp(-g/5);
      const perfBonus=(pAvg||0)*0.3;
      const score=(wr+perfBonus)*expWeight;
      return {p,g,w,wr,pAvg:pAvg||0,score};
    }).filter(x=>x.g>0)
      // Sortierung: Position-Score (kombiniert WR, Performance, Erfahrung)
      .sort((a,b)=> b.score-a.score || b.pAvg-a.pAvg || b.wr-a.wr);
  }
  const atk=posList('atk'), def=posList('def');
  const block=(arr,pos)=>{
    if(!arr.length)return emptyState(pos==='atk'?'bolt':'shield','Noch keine Spiele auf dieser Position');
    return `<div class="rlist">${arr.map((x,i)=>{
      const medal=medalB(i);
      // Performance-Indikator: über/unter Erwartung
      const perfChip = x.pAvg>0.08?'<span class="perf-up">▲</span>':x.pAvg<-0.08?'<span class="perf-dn">▼</span>':'';
      return `<div class="rrow ${i<3?'top'+(i+1):''}" data-detail="${x.p.id}">
        ${medal?`<span class="medal">${medal}</span><span class="pos" style="opacity:0"></span>`:`<span class="pos num">${i+1}</span>`}
        ${avHtml(x.p)}
        <div class="rmid"><div class="rname">${esc(x.p.name)} ${perfChip}</div>
          <div class="rmeta"><span>${x.w}–${x.g-x.w}</span>
          <span class="wbar"><i style="width:${Math.round(x.wr*100)}%"></i></span></div></div>
        <div class="rval"><div class="big num">${x.w}</div><div class="small">${Math.round(x.wr*100)}% WR</div></div>
      </div>`;}).join('')}</div>`;
  };
  const which = rankMetric==='def'?'def':'atk';
  return `
    <div class="view-head"><h2>Positionen</h2><p>Beste Spieler je Position · Performance + Erfahrung</p></div>
    <div class="seg accent">
      <button data-postoggle="atk" class="${which==='atk'?'on':''}"><span class="pos-chip atk">${svgI('bolt')}Sturm</span></button>
      <button data-postoggle="def" class="${which==='def'?'on':''}"><span class="pos-chip def">${svgI('shield')}Abwehr</span></button>
    </div>
    <div class="mini-label">▲ über Erwartung · ▼ unter Erwartung (berücksichtigt Mate- & Gegnerstärke)</div>
    ${which==='atk'?block(atk,'atk'):block(def,'def')}`;
}

function _awardRankingsUncached(period){
  // Zentrale Match-Filterung: nutzt awSeasonId wenn period=season

  // Aggregat-Sammler über den Zeitraum
  const pElo={}, pWins={}, pGoals={}, pConceded={}, pGames={}, tElo={}, tWins={}, tGames={};
  const ensure=(o,k)=>{if(o[k]===undefined)o[k]=0;return k;};

  ms.forEach(m=>{
    Object.entries(m.deltas||{}).forEach(([id,v])=>single.push({v,id,m}));
    const dA=((m.deltas||{})[m.a1]||0)+((m.deltas||{})[m.a2]||0);
    const dB=((m.deltas||{})[m.b1]||0)+((m.deltas||{})[m.b2]||0);
    team.push({v:dA,ids:[m.a1,m.a2],m}); team.push({v:dB,ids:[m.b1,m.b2],m});
// FIX
const expA=m.exp_a??0.5;
const we=m.winner==='A'?expA:(1-expA);
upsets.push({sp:1-we,m});
    biggest.push({diff:Math.abs(m.score_a-m.score_b),m});

    // Spieler-Aggregate
    [m.a1,m.a2,m.b1,m.b2].forEach(id=>{
      const onA=[m.a1,m.a2].includes(id);
      const won=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      const gf=onA?m.score_a:m.score_b, ga=onA?m.score_b:m.score_a;
      ensure(pElo,id);  pElo[id]+=(m.deltas&&m.deltas[id])||0;
      ensure(pWins,id); if(won)pWins[id]++;
      ensure(pGoals,id); pGoals[id]+=gf;
      ensure(pConceded,id); pConceded[id]+=ga;
      ensure(pGames,id); pGames[id]++;
    });
    // Team-Aggregate
    const tA=[m.a1,m.a2].sort().join('|'), tB=[m.b1,m.b2].sort().join('|');
    ensure(tElo,tA); tElo[tA]+=dA; ensure(tElo,tB); tElo[tB]+=dB;
    ensure(tWins,tA); if(m.winner==='A')tWins[tA]++; ensure(tWins,tB); if(m.winner==='B')tWins[tB]++;
    ensure(tGames,tA); tGames[tA]++; ensure(tGames,tB); tGames[tB]++;
  });

  single.sort((a,b)=>b.v-a.v);
  team.sort((a,b)=>b.v-a.v);
  upsets.sort((a,b)=>b.sp-a.sp);
  biggest.sort((a,b)=>b.diff-a.diff || new Date(b.m.created_at)-new Date(a.m.created_at));

  // MVT (Team) = meiste Elo-Punkte (min. 2 gemeinsame Spiele für aussagekräftiges Duo)
  const mvt=Object.entries(tElo).map(([k,v])=>({ids:k.split('|'),v,g:tGames[k]||0}))
    .filter(x=>x.g>=2).sort((a,b)=>b.v-a.v);

  // Neue Awards:
  // Torjäger = Team-Tore gehen an den STÜRMER des Teams.
  // Der Abwehrspieler kann Tore erzielen, aber der Stürmer verantwortet sie als Award.
  const atkGoals={}, atkGoalGames={}, defConceded={}, defGames_={};

    // Team A Tore → an den Stürmer von Team A

    });
    players.forEach(p=>{
      const fmId=firstMatchInPeriod[p.id];
      if(fmId){
        const histEntry=globalSim2.history.find(h=>h.matchId===fmId);
        const entryElo=histEntry&&histEntry.eloBefore[p.id]!==undefined
          ?histEntry.eloBefore[p.id]:cfg.start_elo;
        peakElo[p.id]=entryElo; curElo[p.id]=entryElo;
      } else {
        peakElo[p.id]=cfg.start_elo; curElo[p.id]=cfg.start_elo;
      }
    });
    orderedAll.forEach(m=>{
      Object.entries(m.deltas||{}).forEach(([id,d])=>{
        if(curElo[id]!==undefined){curElo[id]+=d;if(curElo[id]>peakElo[id])peakElo[id]=curElo[id];}
      });
    });
  }
  const formtief=players.map(p=>({id:p.id,drop:peakElo[p.id]-curElo[p.id],peak:Math.round(peakElo[p.id]),cur:Math.round(curElo[p.id])}))
    .filter(x=>x.drop>10).sort((a,b)=>b.drop-a.drop);

  // 🎪 Zirkus: Team mit den meisten Niederlagen mit 5+ Toren Unterschied
  const zirkus={};
  ms.forEach(m=>{
    const diff=Math.abs(m.score_a-m.score_b); if(diff<5)return;
    const loserTeam=m.winner==='A'?[m.b1,m.b2].sort().join('|'):[m.a1,m.a2].sort().join('|');
    if(!zirkus[loserTeam])zirkus[loserTeam]={ids:loserTeam.split('|'),v:0};
    zirkus[loserTeam].v++;
  });
  const zirkusList=Object.values(zirkus).filter(x=>x.v>=1).sort((a,b)=>b.v-a.v);

  // 🚧 Baustelle: Team mit der längsten gemeinsamen Niederlagenserie
  const teamLossStreaks={};
  orderedAll.forEach(m=>{
    const loserKey=m.winner==='A'?[m.b1,m.b2].sort().join('|'):[m.a1,m.a2].sort().join('|');
    const winnerKey=m.winner==='A'?[m.a1,m.a2].sort().join('|'):[m.b1,m.b2].sort().join('|');
    // Verlierer-Team: Serie aufbauen
    if(!teamLossStreaks[loserKey])teamLossStreaks[loserKey]={cur:0,best:0,ids:loserKey.split('|')};
    teamLossStreaks[loserKey].cur++;
    if(teamLossStreaks[loserKey].cur>teamLossStreaks[loserKey].best)teamLossStreaks[loserKey].best=teamLossStreaks[loserKey].cur;
    // Gewinner-Team: Serie brechen
    if(teamLossStreaks[winnerKey])teamLossStreaks[winnerKey].cur=0;
  });
  const baustelleList=Object.values(teamLossStreaks).filter(x=>x.best>=2).sort((a,b)=>b.best-a.best);

  return {single,team,upsets,biggest,mvt,scorer,wall,grinder,winsList,perfect,streaks,
          worstWr,worstAtk,worstDef,worstElo,
          endgegner,clutchList,iceList,worstTeam,bestDuo,onFire,coldStreak,carryList,lossStreaks,
          soloList,formtief,zirkusList,baustelleList,showmasterList,
          counts:{matches:ms.length}};
}

// Team-Stats aus einer gefilterten Match-Liste
function teamStatsFromMatches(ms){
  const T={};
  ms.forEach(m=>{
    [[m.a1,m.a2,m.winner==='A',m.score_a,m.score_b],[m.b1,m.b2,m.winner==='B',m.score_b,m.score_a]]
    .forEach(([x,y,won,gf,ga])=>{const k=[x,y].sort().join('|');
      if(!T[k])T[k]={ids:[x,y].sort(),g:0,w:0,gf:0,ga:0};
      T[k].g++;if(won)T[k].w++;T[k].gf+=gf;T[k].ga+=ga;});
  });
  return Object.values(T);
}

// Aktuelle (noch laufende) Serie je Spieler
function currentStreaks(ms,forWins){
  const ordered=[...ms].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const cur={};
  ordered.forEach(m=>{
    [m.a1,m.a2,m.b1,m.b2].forEach(id=>{
      const onA=[m.a1,m.a2].includes(id);
      const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      if(forWins?w:!w) cur[id]=(cur[id]||0)+1; else cur[id]=0;
    });
  });
  return Object.entries(cur).filter(([,v])=>v>=1).map(([id,v])=>({id,v})).sort((a,b)=>b.v-a.v);
}

// Längste Siegesserie je Spieler innerhalb der (zeitlich sortierten) Match-Liste
function longestStreaks(ms){
  const ordered=[...ms].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const cur={}, best={};
  ordered.forEach(m=>{
    [m.a1,m.a2,m.b1,m.b2].forEach(id=>{
      const onA=[m.a1,m.a2].includes(id);
      const won=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      if(won){cur[id]=(cur[id]||0)+1; if((cur[id])>(best[id]||0))best[id]=cur[id];}
      else cur[id]=0;
    });
  });
  return Object.entries(best).map(([id,v])=>({id,v})).filter(x=>x.v>=2).sort((a,b)=>b.v-a.v);
}

// Längste Niederlagenserie je Spieler (insgesamt, nicht nur aktuell laufend)
function longestLossStreaks(ms){
  const ordered=[...ms].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const cur={}, best={};
  ordered.forEach(m=>{
    [m.a1,m.a2,m.b1,m.b2].forEach(id=>{
      const onA=[m.a1,m.a2].includes(id);
      const won=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      if(!won){cur[id]=(cur[id]||0)+1; if((cur[id])>(best[id]||0))best[id]=cur[id];}
      else cur[id]=0;
    });
  });
  return Object.entries(best).map(([id,v])=>({id,v})).filter(x=>x.v>=2).sort((a,b)=>b.v-a.v);
}

    <div class="view-head"><h2>Awards</h2><p>${pl} · tippen für Top 3</p></div>

  solo:{em:'🐺',title:'Einzelkämpfer',cls:'acid',why:'Höchste Siegrate mit einem Mitspieler aus den unteren 3 der Elo-Rangliste (min. 2 Spiele). Wer gewinnt auch alleine?'},
  formtief:{em:'🫠',title:'Formtief',cls:'red',why:'Größter Elo-Abstieg vom persönlichen Höchststand. Peak-Elo minus aktuelle Elo.'},
  zirkus:{em:'🎪',title:'Zirkus',cls:'red',why:'Team mit den meisten Niederlagen mit 5+ Toren Unterschied. Wird regelmäßig abgeschossen.'},
  baustelle:{em:'🚧',title:'Baustelle',cls:'red',why:'Team mit der längsten gemeinsamen Niederlagenserie. Zusammen funktioniert es einfach nicht.'}
};
function showAward(key){
  const R=awardRankings(awPeriod); const pl=awPeriodLabel(); const meta=AWARD_META[key]; if(!meta)return;
  const tn=ids=>ids.map(pname).join(' & ');
  // Award-Key → SVG-Icon
  const AW_IC = {
    wins:'trophyStar',     onFire:'flame',       perfect:'star',          streaks:'flameTriple',
    showmaster:'award',    mvt:'handshake',      bestDuo:'duo',           scorer:'ball',
    wall:'shieldCheck',    ice:'snowflake',      endgegner:'skull',       clutch:'target',
    carryKing:'weight',    solo:'lonewolf',      upset:'surprise',        biggest:'explosion',
    grinder:'gamepad',     worstWr:'ghost',      coldStreak:'iceCube',    lossStreaks:'trendCrash',
    formtief:'meltDown',   worstAtk:'blockedShot',worstDef:'hole',        worstTeam:'brokenHeart',
    zirkus:'circus',       baustelle:'cone'
  };

  // Awards die ein einzelnes Match darstellen (kein Podium, ein großes Match-Card)
  const MATCH_AWARDS = new Set(['upset','biggest']);
  // Team-Awards (zwei Spieler je Eintrag → Avatar-Paar im Podium)
  const TEAM_AWARDS = new Set(['mvt','bestDuo','endgegner','worstTeam','zirkus','baustelle']);

  let bodyHtml='';

  if(MATCH_AWARDS.has(key)){
    // Match-Card-Layout — zeigt das Match prominent
    const arr = key==='upset' ? R.upsets : R.biggest;
    if(arr&&arr.length){
      const top = arr[0];
      const m = top.m;
      const winnerSide = m.winner;
      const isUpsetVariant = key==='upset';
      const upsetWinPct = isUpsetVariant ? Math.round((1-top.sp)*100) : null;
      const diffStr = key==='biggest' ? '+'+top.diff+' Tore' : 'Siegchance nur '+upsetWinPct+'%';
      bodyHtml = `
        <div class="aw-match${isUpsetVariant?' upset':''}">
          <div class="aw-match-score">${m.score_a} : ${m.score_b}</div>
          <div class="aw-match-meta">${dateStr(m.created_at)} · ${diffStr}</div>
          <div class="aw-match-teams">
            <div class="aw-match-team">
              ${winnerSide==='A'?'<div class="aw-match-winner">Gewinner</div>':''}
              ${awMiniPair(m.a1,m.a2)}
              <div class="aw-match-team-name">${esc(pname(m.a1)+' & '+pname(m.a2))}</div>
            </div>
            <div class="aw-match-vs">vs</div>
            <div class="aw-match-team">
              ${winnerSide==='B'?'<div class="aw-match-winner">Gewinner</div>':''}
              ${awMiniPair(m.b1,m.b2)}
              <div class="aw-match-team-name">${esc(pname(m.b1)+' & '+pname(m.b2))}</div>
            </div>
          </div>
        </div>`;
    } else {
      bodyHtml = `<div class="empty" style="margin-top:24px">Keine Daten</div>`;
    }
  } else {
    // Podium 2-1-3 für Player- und Team-Awards.
    // 1) Top-3-Liste je Award-Key ermitteln, mit (ids, name, valFormatted, detail)
    const arr = (() => {
      switch(key){
        case 'wins':       return R.winsList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Siege',sort:x.v}));
        case 'mvt':        return R.mvt.map(x=>({ids:x.ids,name:tn(x.ids),val:(x.v>=0?'+':'')+Math.round(x.v)+' Elo',sort:Math.round(x.v)}));
        case 'streaks':    return R.streaks.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'scorer':     return R.scorer.map(x=>({ids:[x.id],name:pname(x.id),val:'Ø '+x.avg.toFixed(1)+' Tore',sort:Math.round(x.avg*10)}));
        case 'wall':       return R.wall.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' /Sp.',sort:-Math.round(x.v/x.g*10)}));
        case 'perfect':    return R.perfect.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'grinder':    return R.grinder.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Spiele',sort:x.v}));
        case 'worstWr':    return R.worstWr.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:-Math.round(x.wr*100)}));
        case 'worstAtk':   return R.worstAtk.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' Tore/Sp.',sort:-Math.round(x.v/x.g*10)}));
        case 'worstDef':   return R.worstDef.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' Gegen/Sp.',sort:Math.round(x.v/x.g*10)}));
        case 'endgegner':  return R.endgegner.map(x=>({ids:x.ids,name:tn(x.ids),val:x.g+' Beg.',sort:x.g}));
        case 'clutch':     return R.clutchList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'ice':        return R.iceList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× Zu-Null',sort:x.v}));
        case 'worstTeam':  return R.worstTeam.map(x=>({ids:x.ids,name:tn(x.ids),val:Math.round(x.w/x.g*100)+'%',sort:-Math.round(x.w/x.g*100)}));
        case 'bestDuo':    return R.bestDuo.map(x=>({ids:x.ids,name:tn(x.ids),val:x.g+' Spiele',sort:x.g}));
        case 'onFire':     return R.onFire.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'coldStreak': return R.coldStreak.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Niederlagen',sort:x.v}));
        case 'lossStreaks':return R.lossStreaks.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'carryKing':  return R.carryList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Carries',sort:x.v}));
        case 'showmaster': return R.showmasterList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× 10:0',sort:x.v}));
        case 'solo':       return R.soloList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'formtief':   return R.formtief.map(x=>({ids:[x.id],name:pname(x.id),val:'-'+Math.round(x.drop)+' Elo',sort:Math.round(x.drop)}));
        case 'zirkus':     return R.zirkusList.map(x=>({ids:x.ids,name:tn(x.ids),val:x.v+'× 5+ Tore',sort:x.v}));
        case 'baustelle':  return R.baustelleList.map(x=>({ids:x.ids,name:tn(x.ids),val:x.best+'er Serie',sort:x.best}));
        default: return [];
      }
    })();

    // 2) Top-3 mit geteilten Plätzen ermitteln (gleicher Wert = gleicher Rang).
    // Liste ist bereits durch awardRankings vorsortiert (besser oben). Wir nutzen sort-Feld nur für Tie-Erkennung.
    // Top-3 mit geteilten Plätzen: gruppieren statt überschreiben.
    // Bei Gleichstand (gleicher sort-Wert) landen alle Einträge im gleichen Rang.
    // Nach einer Gruppe von n Einträgen springt der Rang auf i+1 (Standard-Tied-Ranking).
    const grouped={1:[],2:[],3:[]};
    let rank=1;
    for(let i=0;i<arr.length && rank<=3;i++){
      if(i>0 && arr[i].sort!==arr[i-1].sort) rank=i+1;
      if(rank>3) break;
      grouped[rank].push(arr[i]);
    }

    const totalEntries=grouped[1].length+grouped[2].length+grouped[3].length;
    if(!totalEntries){
      bodyHtml = `<div class="empty" style="margin-top:24px">Keine Daten</div>`;
    } else {
      const isTeam = TEAM_AWARDS.has(key);

      // Avatar-Renderer je Eintrag (Single = Pair bei Team, sonst Einzel-Avatar)
      const avForEntry = (e) => isTeam ? awPodPair(e.ids[0],e.ids[1]) : awPodAv(e.ids[0]);

      // Podium-Step: rendert 0, 1 oder mehrere geteilte Einträge in einem Slot
      const step = (entries, place, blockCls, label) => {
        const isFirst = place===1;
        // Leerer Slot (z. B. wenn alle nach oben durchgereicht wurden wegen Tie)
        if(!entries.length){
          return `<div class="aw-pod empty">
            <div class="aw-pod-empty-hint">—</div>
            <div class="aw-pod-block ${blockCls}">${label}</div>
          </div>`;
        }
        // Genau ein Eintrag → Standard-Layout (wie bisher)
        if(entries.length===1){
          const e=entries[0];
          return `<div class="aw-pod${isFirst?' first':''}">
            ${isFirst?'<div class="aw-pod-crown">👑</div>':''}
            ${avForEntry(e)}
            <div class="aw-pod-name">${esc(e.name)}</div>
            <div class="aw-pod-val">${esc(e.val)}</div>
            <div class="aw-pod-block ${blockCls}">${label}</div>
          </div>`;
        }
        // Mehrere geteilte Einträge → Tied-Layout
        const showMax = 3;
        const visible = entries.slice(0,showMax);
        const extra = entries.length-visible.length;
        // Avatare: bei Player-Awards mehrere kleine überlappend; bei Team-Awards
        // nur das erste Paar als visueller Repräsentant (sonst zu voll).
        const avsHtml = isTeam
          ? avForEntry(visible[0])
          : `<div class="aw-pod-tied-avs">${visible.map(avForEntry).join('')}</div>`;
        const namesHtml = visible.map(e=>`<div class="nm">${esc(e.name)}</div>`).join('') +
          (extra>0?`<div class="more">+${extra} weitere</div>`:'');
        return `<div class="aw-pod tied${isFirst?' first':''}">
          ${isFirst?'<div class="aw-pod-crown">👑</div>':''}
          ${avsHtml}
          <div class="aw-pod-tied-names">${namesHtml}</div>
          <div class="aw-pod-val">${esc(entries[0].val)}</div>
          <div class="aw-pod-tied-badge">geteilt · ${entries.length}×</div>
          <div class="aw-pod-block ${blockCls}">${label}</div>
        </div>`;
      };
      // Visuelle Reihenfolge: 2 - 1 - 3
      bodyHtml = `<div class="aw-podium">
        ${step(grouped[2],2,'silver','2')}
        ${step(grouped[1],1,'gold','1')}
        ${step(grouped[3],3,'bronze','3')}
      </div>`;
    }
  }

  // Hero-Icon-Color: aus AWARD_META.cls
  const heroCls = meta.cls || 'gold';

  openSheet(`
    <div class="aw-hero-icon">
      <div class="aw-hero-icon-glow ${heroCls}">
        <svg viewBox="0 0 24 24">${ICONS[AW_IC[key]||'trophy']||''}</svg>
      </div>
      <div class="aw-hero-title">${meta.title}</div>
      <div class="aw-hero-sub">${pl}</div>
    </div>
    ${bodyHtml}
    <div class="aw-why">
      <div class="aw-why-ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16v.5"/></svg></div>
      <div class="aw-why-content">
        <div class="aw-why-label">So wird gewertet</div>
        <div class="aw-why-body">${meta.why}</div>
      </div>
    </div>`);

  // Match-Card optional klickbar → öffnet Match-Detail
  if(MATCH_AWARDS.has(key)){
    const arr = key==='upset' ? R.upsets : R.biggest;
    if(arr&&arr.length){
      const el = document.querySelector('.aw-match');
      if(el){
        el.style.cursor='pointer';
        el.onclick=()=>{ const mid=arr[0].m.id; closeSheet(); setTimeout(()=>showMatchDetail(mid),350); };
      }
    }
  }
}
function dedupeBy(arr,keyFn){const seen=new Set(),out=[];for(const x of arr){const k=keyFn(x);if(seen.has(k))continue;seen.add(k);out.push(x);}return out;}
function mscoreLabel(m){return m.score_a+':'+m.score_b;}

// ════════ VIEW: TEAMS ════════
function vTeams(){
  const T=teamStats().filter(t=>t.g>=4);
  if(!T.length)return `<div class="view-head"><h2>Teams</h2><p>Min. 4 gemeinsame Spiele</p></div>${emptyState('handshake','Noch nicht genug Daten')}`;
  const showBest=teamView!=='worst';
  const sorted=[...T].sort((a,b)=>(b.w/b.g)-(a.w/a.g)||(b.gf-b.ga)-(a.gf-a.ga)||b.g-a.g);
  const arr=showBest?sorted:[...sorted].reverse();

  // Top-3 Akzente (Gold/Silber/Bronze) — Border + Rang-Kachel-Hintergrund
  const TOP=[
    {border:'rgba(247,207,74,.45)', bg:'#f7cf4a', fg:'#1d1700'},
    {border:'rgba(200,208,203,.35)',bg:'#c8d0cb', fg:'#1a1f1c'},
    {border:'rgba(255,120,73,.3)',  bg:'#ff7849', fg:'#2a1108'}
  ];

  const pm=pmap();
  const avPair=(idA,idB)=>{
    const a=pm[idA], b=pm[idB];
    const one=(p,offset)=>{
      if(!p) return `<div style="width:32px;height:32px;border-radius:50%;background:var(--surface3);border:2px solid var(--surface);${offset?'margin-left:-9px':''}"></div>`;
      const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
      if(em) return `<div style="width:32px;height:32px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:15px;border:2px solid var(--surface);${offset?'margin-left:-9px':''}">${em}</div>`;
      return `<div style="width:32px;height:32px;border-radius:50%;background:${avColor(p.id)};display:grid;place-items:center;font-size:11px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;border:2px solid var(--surface);${offset?'margin-left:-9px':''}">${esc(initials(p.name))}</div>`;
    };
    return `<div style="display:flex;align-items:center;flex-shrink:0">${one(a,false)}${one(b,true)}</div>`;
  };

  const rows=arr.map((t,i)=>{
    const wr=Math.round(t.w/t.g*100),gd=t.gf-t.ga;
    const isTop=showBest&&i<3;
    const top=isTop?TOP[i]:null;
    const borderColor=top?top.border:'var(--line)';
    const rankBlock=top
      ? `<div style="width:24px;height:24px;border-radius:8px;background:${top.bg};color:${top.fg};display:grid;place-items:center;font-family:'Archivo Black',sans-serif;font-size:12px;flex-shrink:0">${i+1}</div>`
      : `<div style="width:24px;text-align:center;font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--faint);flex-shrink:0">${i+1}</div>`;
    return `<div class="rrow" data-team="${esc(t.ids.join('|'))}" style="background:var(--surface);border:1px solid ${borderColor};border-radius:18px;padding:13px 15px;display:block">
      <div style="display:flex;align-items:center;gap:12px">
        ${rankBlock}
        ${avPair(t.ids[0],t.ids[1])}
        <div style="flex:1;min-width:0">
          <div style="font-family:'Archivo Black',sans-serif;font-size:14px;letter-spacing:-.01em;line-height:1.1">${esc(t.ids.map(pname).join(' & '))}</div>
          <div class="num" style="margin-top:4px;font-size:10.5px;color:var(--muted)">${t.w}–${t.g-t.w} · TD ${gd>=0?'+':''}${gd}</div>
        </div>
        <div style="font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--acid);line-height:1;flex-shrink:0">${wr}%</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="view-head"><h2>Teams</h2><p>${arr.length} Duo${arr.length===1?'':'s'} mit min. 4 gemeinsamen Spielen</p></div>
    <div class="seg accent">
      <button data-teamtoggle="best" class="${showBest?'on':''}">▲ Beste</button>
      <button data-teamtoggle="worst" class="${!showBest?'on':''}">▼ Schlechteste</button>
    </div>
    <div class="rlist">${rows}</div>`;
}

function vHistory(){
  if(!matches.length)return `<div class="view-head"><h2>Verlauf</h2></div>${emptyState('scroll','Noch keine Matches')}`;
  let list=[...matches].reverse();
  if(histFilter!=='all')
    list=list.filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(histFilter));
  const opts=`<option value="all">Alle Spieler</option>`+
    [...players].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${p.id}" ${histFilter===p.id?'selected':''}>${esc(p.name)}</option>`).join('');
  const rows=list.map(m=>{
    const aWon=m.winner==='A';
    const tA=`${pname(m.a1)} & ${pname(m.a2)}`, tB=`${pname(m.b1)} & ${pname(m.b2)}`;
    const dl=ids=>ids.map(id=>{const d=(m.deltas||{})[id]||0;
      return `<span><b>${esc(pname(id))}</b> <span class="${d>=0?'delta-v pos':'delta-v neg'}" style="font-size:11px">${d>=0?'+':''}${Math.round(d)}</span></span>`;}).join('');
    // Kompakte Badge-Icons für errungene Auszeichnungen
    const earned=badgesEarnedInMatch(m.id);
    const badgeChips=earned.length?`<div style="display:flex;gap:3px;align-items:center;margin-top:4px;flex-wrap:wrap">${earned.map(e=>
      `<span style="font-size:11px;background:var(--surface3);padding:2px 6px;border-radius:7px;display:inline-flex;align-items:center;gap:4px;color:var(--ink2)">${badgeIc(e.badge,'12px')}<span style="font-size:10px">${esc(pname(e.playerId).split(' ')[0])}</span></span>`
    ).join('')}</div>`:'';
    return `<div class="mrow" data-match="${m.id}">
      <div class="mrow-top">
        <div class="mteam ${aWon?'won':'lost'}">${esc(tA)}</div>
        <div class="mscore num">${m.score_a}:${m.score_b}</div>
        <div class="mteam r ${!aWon?'won':'lost'}">${esc(tB)}</div>
      </div>
      <div class="mrow-bot"><div class="mdeltas">${dl([m.a1,m.a2,m.b1,m.b2])}</div></div>
      ${badgeChips}
      <div class="mrow-bot" style="margin-top:6px"><span>${dateStr(m.created_at)}</span>
        <span data-delmatch="${m.id}" style="color:var(--acid2);display:inline-flex;align-items:center;gap:5px">${svgI('edit')} bearbeiten</span></div>
    </div>`;
  }).join('');
  return `
    <div class="view-head"><h2>Verlauf</h2><p>${list.length} Matches</p></div>
    <div class="search" style="margin-bottom:14px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 3H2l8 9.5V19l4 2v-8.5z"/></svg>
      <select id="histSel" style="padding-left:40px">${opts}</select>
    </div>
    ${list.length?`<div class="mlist">${rows}</div>`:emptyState('search','Keine Matches für diesen Filter')}`;
}

      <div class="score-col B"><div class="cl">Team B</div>
        <div class="stepper"><button data-step="sb,-1">−</button><span class="sval num" id="svB" data-scoreedit="sb">${M.sb}</span><button data-step="sb,1">+</button></div></div>

// ════════ MATCH PREVIEW & LOGIC ════════
function readM(){
  document.querySelectorAll('[data-p]').forEach(s=>M[s.dataset.p]=s.value);
  document.querySelectorAll('[data-pos]').forEach(s=>M['p'+s.dataset.pos]=s.value);
}
function validM(){const ids=[M.A1,M.A2,M.B1,M.B2];
  return !ids.some(x=>!x)&&new Set(ids).size===4&&M.sa!==M.sb
    &&M.pA1!==M.pA2&&M.pB1!==M.pB2;}
function teamsFromM(){return{teamA:[{id:M.A1,pos:M.pA1},{id:M.A2,pos:M.pA2}],teamB:[{id:M.B1,pos:M.pB1},{id:M.B2,pos:M.pB2}]};}
function updatePreview(){
  const slot = document.getElementById('previewSlot');
  const save = document.getElementById('saveM');
  if(!slot) return;
  const P = pmap();
  const gSim = getGlobalSim();
  const seasonElo = id => gSim.elo[id] ?? cfg.start_elo;

  const setAvg = (el,a,b) => {
    const e = document.getElementById(el);
    if(e && P[a] && P[b]) e.textContent = 'Ø '+Math.round((seasonElo(a)+seasonElo(b))/2)+' (Saison)';
    else if(e) e.textContent = '';
  };
  setAvg('avgA', M.A1, M.A2); setAvg('avgB', M.B1, M.B2);

  const ids = [M.A1,M.A2,M.B1,M.B2].filter(Boolean);
  if(new Set(ids).size !== ids.length){
    slot.innerHTML = `<div class="preview" style="color:var(--red);font-size:12px;text-align:center">Ein Spieler steht doppelt.</div>`;
    save.disabled = true; return;
  }
  // Beide Spieler eines Teams müssen unterschiedliche Positionen haben
  const allFour = ids.length === 4;
  if(allFour && (M.pA1===M.pA2 || M.pB1===M.pB2)){
    slot.innerHTML = `<div class="preview" style="color:var(--red);font-size:12px;text-align:center">Jedes Team braucht Sturm + Abwehr.</div>`;
    save.disabled = true; return;
  }
  if(!validM()){slot.innerHTML=''; save.disabled=true; return;}

  const winner = M.sa > M.sb ? 'A' : 'B';
  const{teamA, teamB} = teamsFromM();
  const c = computeMatch(teamA, teamB, winner, M.sa, M.sb);
  const pA = Math.round(c.expA*100), pB = 100-pA;
  const line = s => {
    const d = c.res[s.id];
    return `<div class="delta-row">
      <span class="dn">${esc(P[s.id].name)}
        <span class="chip ${s.pos}">${s.pos==='atk'?'STU':'ABW'}</span>
      </span>
      <span class="delta-v ${d>=0?'pos':'neg'}">${d>=0?'+':''}${Math.round(d)}</span>
    </div>`;
  };
  slot.innerHTML = `<div class="preview">
    <div class="prob">
      <div class="pa" style="width:${pA}%">${pA}%</div>
      <div class="pb" style="width:${pB}%">${pB}%</div>
    </div>
    <div class="prob-cap">Siegchance (Saison-Elo) · Team ${winner} gewinnt ${M.sa}:${M.sb}
      ${c.mov>1.08?' · Kantersieg ×'+c.mov.toFixed(2):''}
    </div>
    <div class="delta-list">
      ${line(teamA[0])}${line(teamA[1])}
      <div class="delta-div"></div>
      ${line(teamB[0])}${line(teamB[1])}
    </div>
  </div>`;
  save.disabled = false;
}

async function doSaveMatch(){
  readM(); if(!validM()){toast('Match unvollständig',true);return;}
  const winner = M.sa > M.sb ? 'A' : 'B';
  const{teamA, teamB} = teamsFromM();

  // players.elo = Saison-Elo → direkt nutzen
  const c = computeMatch(teamA, teamB, winner, M.sa, M.sb);

  const row = {
    a1:M.A1, a1_pos:M.pA1, a2:M.A2, a2_pos:M.pA2,
    b1:M.B1, b1_pos:M.pB1, b2:M.B2, b2_pos:M.pB2,
    score_a:M.sa, score_b:M.sb, winner, deltas:c.res, exp_a:c.expA
  };
  // insert(...).select() gibt die erzeugte Zeile inkl. id + created_at zurück,
  // damit die lokale Kopie exakt der DB entspricht (created_at wird für die
  // Saison-Filterung in matchesInSeason zwingend gebraucht).
  const{data:inserted, error} = await sb.from('matches').insert(row).select().single();
  if(error){toast('Fehler: '+error.message,true);return;}

  // Fallback: falls select() nicht greift, created_at lokal setzen,
  // sonst fiele das frische Match aus matchesInSeason heraus.
  const savedRow = inserted || {...row, created_at:new Date().toISOString()};

  // Lokal updaten, dann über die EINE kanonische Engine neu berechnen.
  // persistRecalc schreibt atk, Match-Deltas und Saison-Elos konsistent.
  matches = [...matches, savedRow];
  invalidateCache();
  await persistNewMatch(savedRow.id);

  toast('Match gespeichert', 'ok');
  M = {A1:'',A2:'',B1:'',B2:'',pA1:'atk',pA2:'def',pB1:'atk',pB2:'def',sa:0,sb:0};
  tab = 'ranking'; await loadAll();
}

// ════════ DETAIL SHEET ════════
function openSheet(html){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  // Falls bereits ein Sheet offen war (openSheet direkt nach openSheet, ohne
  // closeSheet dazwischen), zuerst dessen Swipe-Listener aufräumen — sonst
  // stapeln sich window-mousemove/mouseup-Listener und lecken.
  if(sheet._swipeCleanup){ sheet._swipeCleanup(); sheet._swipeCleanup=null; }
  sheet.innerHTML=`<div class="sheet-grab" id="sheetGrab"></div>${html}`;
  bg.classList.add('show');
  sheet.classList.add('show');
  bindSheetSwipe();
}

function closeSheet(){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  // Swipe-Listener aufräumen
  if(sheet._swipeCleanup){ sheet._swipeCleanup(); sheet._swipeCleanup=null; }
  sheet.classList.remove('show','is-dragging');
  sheet.style.transform='';
  bg.style.opacity='';
  bg.classList.remove('show');
}

function bindSheetSwipe(){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  let startY=0, startScrollTop=0, dragging=false;
  let lastY=0, lastT=0;
  const CLOSE_THRESHOLD=120;
  const VELOCITY_THRESHOLD=0.5;
  const DRAG_INTENT_THRESHOLD=10;

  // ── TOUCH (Smartphone) ──
  const onTouchStart=(e)=>{
    const touch=e.touches[0];
    startY=touch.clientY;
    startScrollTop=sheet.scrollTop;
    lastY=startY; lastT=Date.now();
    dragging=false;
  };

  const onTouchMove=(e)=>{
    const touch=e.touches[0];
    const dy=touch.clientY-startY;
    lastY=touch.clientY; lastT=Date.now();
    if(startScrollTop>0) return;
    if(dy<0) return;
    if(dy<DRAG_INTENT_THRESHOLD) return;
    if(!dragging){ dragging=true; sheet.classList.add('is-dragging'); }
    e.preventDefault();
    sheet.style.transform=`translateY(${dy*0.88}px)`;
    bg.style.opacity=1-Math.min(dy*0.88/300,1)*0.6;
  };

  const onTouchEnd=(e)=>{
    if(!dragging){ sheet.classList.remove('is-dragging'); return; }
    dragging=false;
    sheet.classList.remove('is-dragging');
    const touch=e.changedTouches[0];
    const dy=touch.clientY-startY;
    const velocity=Math.abs(dy)/(Date.now()-lastT+1);
    snapOrClose(dy,velocity);
  };

  // ── MOUSE (Desktop) ──
  const onMouseDown=(e)=>{
    // Nur auf dem Grab-Handle reagieren, nicht auf das gesamte Sheet
    const grab=document.getElementById('sheetGrab');
    if(!grab||!grab.contains(e.target)) return;
    startY=e.clientY;
    startScrollTop=sheet.scrollTop;
    lastY=startY; lastT=Date.now();
    dragging=true;
    sheet.classList.add('is-dragging');
    e.preventDefault();
  };

  const onMouseMove=(e)=>{
    if(!dragging) return;
    const dy=e.clientY-startY;
    lastY=e.clientY; lastT=Date.now();
    if(dy<0){ sheet.style.transform='translateY(0)'; return; }
    sheet.style.transform=`translateY(${dy*0.88}px)`;
    bg.style.opacity=1-Math.min(dy*0.88/300,1)*0.6;
  };

  const onMouseUp=(e)=>{
    if(!dragging) return;
    dragging=false;
    sheet.classList.remove('is-dragging');
    const dy=e.clientY-startY;
    const velocity=Math.abs(dy)/(Date.now()-lastT+1);
    snapOrClose(dy,velocity);
  };

  // ── GEMEINSAME SNAP/CLOSE LOGIK ──
  function snapOrClose(dy,velocity){
    if(dy>CLOSE_THRESHOLD||velocity>VELOCITY_THRESHOLD){
      sheet.style.transition='transform .28s cubic-bezier(.4,0,1,1)';
      sheet.style.transform='translateY(100%)';
      bg.style.transition='opacity .28s';
      bg.style.opacity='0';
      setTimeout(()=>{
        closeSheet();
        sheet.style.transition='';
        bg.style.transition='';
      },280);
    } else {
      sheet.style.transition='transform .32s cubic-bezier(.2,.8,.2,1)';
      sheet.style.transform='translateY(0)';
      bg.style.transition='opacity .32s';
      bg.style.opacity='1';
      setTimeout(()=>{
        sheet.style.transition='';
        bg.style.transition='';
      },320);
    }
  }

  // Events registrieren
  sheet.addEventListener('touchstart',onTouchStart,{passive:true});
  sheet.addEventListener('touchmove',onTouchMove,{passive:false});
  sheet.addEventListener('touchend',onTouchEnd,{passive:true});

  // Mouse nur auf dem Grab-Handle
  sheet.addEventListener('mousedown',onMouseDown);
  window.addEventListener('mousemove',onMouseMove);
  window.addEventListener('mouseup',onMouseUp);

  // Cleanup wenn Sheet geschlossen wird
  const cleanup=()=>{
    sheet.removeEventListener('touchstart',onTouchStart);
    sheet.removeEventListener('touchmove',onTouchMove);
    sheet.removeEventListener('touchend',onTouchEnd);
    sheet.removeEventListener('mousedown',onMouseDown);
    window.removeEventListener('mousemove',onMouseMove);
    window.removeEventListener('mouseup',onMouseUp);
  };
  sheet._swipeCleanup=cleanup;
}

// Hintergrund-Klick schließt Sheet
document.getElementById('sheetBg').onclick=closeSheet;
