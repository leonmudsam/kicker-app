function showAward(key){
  const R=awardRankings(awPeriod); const pl=awPeriodLabel(); const meta=AWARD_META[key]; if(!meta)return;
  const tn=ids=>ids.map(pname).join(' & ');
  const AW_IC = {
    wins:'trophyStar',     onFire:'flame',       perfect:'star',          streaks:'flameTriple',
    showmaster:'award',    mvt:'handshake',      bestDuo:'duo',           scorer:'ball',
    wall:'shieldCheck',    ice:'snowflake',      endgegner:'skull',       clutch:'target',
    carryKing:'weight',    solo:'lonewolf',      upset:'surprise',        biggest:'explosion',
    grinder:'gamepad',     worstWr:'ghost',      coldStreak:'iceCube',    lossStreaks:'trendCrash',
    formtief:'meltDown',   worstAtk:'blockedShot',worstDef:'hole',        worstTeam:'brokenHeart',
    zirkus:'circus',       baustelle:'cone',     peakElo:'peak',
    weekKing:'weekKing',   dayKing:'dayKing',
    plusMinus:'plusMinus', underdog:'underdog',  pechvogel:'rainCloud'
  };

  const MATCH_AWARDS = new Set(['upset','biggest']);
  const TEAM_AWARDS = new Set(['mvt','bestDuo','endgegner','worstTeam','zirkus','baustelle']);
  const NEG_KEYS = new Set(['worstWr','worstAtk','worstDef','worstTeam','formtief','coldStreak','lossStreaks','zirkus','baustelle','pechvogel']);

  let bodyHtml='';

  if(MATCH_AWARDS.has(key)){
    const arr = key==='upset' ? R.upsets : R.biggest;
    if(arr&&arr.length){
      const top = arr[0];
      const m = top.m;
      const winnerSide = m.winner;
      const isUpsetVariant = key==='upset';
      const upsetWinPct = isUpsetVariant ? Math.round((1-top.sp)*100) : null;
      const diffStr = key==='biggest' ? '+'+top.diff+' Tore' : 'Siegchance nur '+upsetWinPct+'%';
      bodyHtml = `
        <div class="aw-match${isUpsetVariant?' upset':''}">
          <div class="aw-match-score">${m.score_a} : ${m.score_b}</div>
          <div class="aw-match-meta">${dateStr(m.created_at)} · ${diffStr}</div>
          <div class="aw-match-teams">
            <div class="aw-match-team">
              ${winnerSide==='A'?'<div class="aw-match-winner">Gewinner</div>':''}
              ${awMiniPair(m.a1,m.a2)}
              <div class="aw-match-team-name">${esc(pname(m.a1)+' & '+pname(m.a2))}</div>
            </div>
            <div class="aw-match-vs">vs</div>
            <div class="aw-match-team">
              ${winnerSide==='B'?'<div class="aw-match-winner">Gewinner</div>':''}
              ${awMiniPair(m.b1,m.b2)}
              <div class="aw-match-team-name">${esc(pname(m.b1)+' & '+pname(m.b2))}</div>
            </div>
          </div>
        </div>`;
    } else {
      bodyHtml = `<div class="empty" style="margin-top:24px">Keine Daten</div>`;
    }
  } else {
    const arr = (() => {
      switch(key){
        case 'wins':       return R.winsList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Siege',sort:x.v}));
        case 'mvt':        return R.mvt.map(x=>({ids:x.ids,name:tn(x.ids),val:(x.v>=0?'+':'')+Math.round(x.v)+' Elo',sort:Math.round(x.v)}));
        case 'streaks':    return R.streaks.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'scorer':     return R.scorer.map(x=>({ids:[x.id],name:pname(x.id),val:'Ø '+x.avg.toFixed(1)+' Tore',sort:Math.round(x.avg*10)}));
        case 'wall':       return R.wall.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' /Sp.',sort:-Math.round(x.v/x.g*10)}));
        case 'perfect':    return R.perfect.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'grinder':    return R.grinder.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Spiele',sort:x.v}));
        case 'worstWr':    return R.worstWr.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:-Math.round(x.wr*100)}));
        case 'worstAtk':   return R.worstAtk.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' Tore/Sp.',sort:-Math.round(x.v/x.g*10)}));
        case 'worstDef':   return R.worstDef.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v/x.g).toFixed(1)+' Gegen/Sp.',sort:Math.round(x.v/x.g*10)}));
        case 'endgegner':  return R.endgegner.map(x=>({ids:x.ids,name:tn(x.ids),val:x.g+' Beg.',sort:x.g}));
        case 'clutch':     return R.clutchList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'ice':        return R.iceList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× Zu-Null',sort:x.v}));
        case 'worstTeam':  return R.worstTeam.map(x=>({ids:x.ids,name:tn(x.ids),val:Math.round(x.w/x.g*100)+'%',sort:-Math.round(x.w/x.g*100)}));
        case 'bestDuo':    return R.bestDuo.map(x=>({ids:x.ids,name:tn(x.ids),val:x.g+' Spiele',sort:x.g}));
        case 'onFire':     return R.onFire.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'coldStreak': return R.coldStreak.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Niederlagen',sort:x.v}));
        case 'lossStreaks':return R.lossStreaks.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'er Serie',sort:x.v}));
        case 'carryKing':  return R.carryList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Carries',sort:x.v}));
        case 'showmaster': return R.showmasterList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× 10:0',sort:x.v}));
        case 'solo':       return R.soloList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.wr*100)+'%',sort:Math.round(x.wr*100)}));
        case 'formtief':   return R.formtief.map(x=>({ids:[x.id],name:pname(x.id),val:'-'+Math.round(x.drop)+' Elo',sort:Math.round(x.drop)}));
        case 'zirkus':     return R.zirkusList.map(x=>({ids:x.ids,name:tn(x.ids),val:x.v+'× 5+ Tore',sort:x.v}));
        case 'baustelle':  return R.baustelleList.map(x=>({ids:x.ids,name:tn(x.ids),val:x.best+'er Serie',sort:x.best}));
        case 'peakElo':    return (R.peakEloList||[]).map(x=>({ids:[x.id],name:pname(x.id),val:x.v+' Elo',sort:x.v}));
        case 'weekKing':   return (R.weekKingList||[]).map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× POTW',sort:x.v}));
        case 'dayKing':    return (R.dayKingList||[]).map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× POTD',sort:x.v}));
        // ── NEUE AWARDS v3 ──
        case 'plusMinus':  return R.plusMinusList.map(x=>({ids:[x.id],name:pname(x.id),val:(x.v>=0?'+':'')+x.v.toFixed(1)+' /Sp.',sort:Math.round(x.v*10)}));
        case 'underdog':   return R.underdogList.map(x=>({ids:[x.id],name:pname(x.id),val:x.v+'× Underdog-Sieg',sort:x.v}));
        case 'pechvogel':  return R.pechvogelList.map(x=>({ids:[x.id],name:pname(x.id),val:Math.round(x.pct*100)+'% knapp verloren ('+x.v+'/'+x.g+')',sort:Math.round(x.pct*1000)}));
        default: return [];
      }
    })();

    // Hero (#1) + Liste der weiteren Plätze
    if(!arr.length){
      bodyHtml = `<div class="empty" style="margin-top:24px">Keine Daten</div>`;
    } else {
      const isTeamAward = TEAM_AWARDS.has(key);
      const isNeg = NEG_KEYS.has(key);
      // meta.cls → RGB für Hero-Akzentfarbe
      const CLS_RGB = {gold:'247,207,74',acid:'190,242,100',blue:'86,180,232',orange:'255,120,73',purple:'167,139,250',red:'240,86,106'};
      const heroRgb = CLS_RGB[meta.cls] || CLS_RGB.gold;

      // ─── Hero (#1) – alle bei sort=arr[0].sort sind geteilte #1 ───
      const topGroup = arr.filter(x => x.sort === arr[0].sort);
      const isShared = topGroup.length > 1;
      const top = arr[0];
      // Wert (für Hero – alle teilen denselben Wert)
      const heroVal = (() => {
        const v = top.val;
        const m = v.match(/^([+\-]?\d+(?:[.,]\d+)?)/);
        return m ? `<b>${esc(m[1])}</b>${esc(v.slice(m[1].length))}` : esc(v);
      })();

      let heroHtml;
      if(!isShared){
        // ─── Single Hero (#1) ───
        const heroClick = isTeamAward
          ? `data-li-team="${esc(top.ids.slice().sort().join('|'))}"`
          : `data-li-player="${esc(top.ids[0])}"`;
        const heroAv = isTeamAward ? awHeroPair(top.ids[0], top.ids[1]) : awHeroAv(top.ids[0]);
        const heroMarker = isNeg
          ? `<div class="aw-winner-marker"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.skull}</svg></div>`
          : `<div class="aw-winner-crown">${svgI('crown')}</div>`;
        const heroBadge = isNeg
          ? `<span class="aw-winner-badge">Schandfleck · #1</span>`
          : `<span class="aw-winner-badge"><svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0z"/></svg> Best · #1</span>`;

        heroHtml = `
          <div class="aw-winner ${isNeg?'shame':''}" style="--c:${heroRgb}" ${heroClick}>
            ${heroBadge}
            <div class="aw-winner-av-wrap">
              ${heroMarker}
              ${heroAv}
            </div>
            <div class="aw-winner-name">${esc(top.name)}</div>
            <div class="aw-winner-val">${heroVal}</div>
          </div>`;
      } else {
        // ─── Shared Hero: mehrere Spieler/Teams teilen sich #1 ───
        const sharedBadge = isNeg
          ? `<span class="aw-winner-badge">Geteilt · #1 · ${topGroup.length} ${isTeamAward?'Teams':'Sünder'}</span>`
          : `<span class="aw-winner-badge"><svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0z"/></svg> Geteilt · #1 · ${topGroup.length} ${isTeamAward?'Teams':'Spieler'}</span>`;
        const sharedMarker = isNeg
          ? `<div class="aw-winner-shared-marker shame"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS.skull}</svg></div>`
          : `<div class="aw-winner-shared-marker">${svgI('crown')}</div>`;
        const entries = topGroup.map(e => {
          const av = isTeamAward
            ? `<div class="aw-winner-tied-pair">${awLiAv(e.ids[0])}${awLiAv(e.ids[1])}</div>`
            : awLiAv(e.ids[0]);
          const click = isTeamAward
            ? `data-li-team="${esc(e.ids.slice().sort().join('|'))}"`
            : `data-li-player="${esc(e.ids[0])}"`;
          return `<div class="aw-winner-tied-entry" ${click}>
            ${av}
            <div class="aw-winner-tied-name">${esc(e.name)}</div>
          </div>`;
        }).join('');

        heroHtml = `
          <div class="aw-winner shared ${isNeg?'shame':''}" style="--c:${heroRgb}">
            ${sharedBadge}
            ${sharedMarker}
            <div class="aw-winner-shared-grid">${entries}</div>
            <div class="aw-winner-val">${heroVal}</div>
          </div>`;
      }

      // ─── Liste (Plätze ab nach allen #1-Geteilten) ───
      // Olympische Ränge: Position des ersten Eintrags mit gleichem sort + 1
      const rankOf = (i) => {
        for(let j=0; j<=i; j++) if(arr[j].sort === arr[i].sort) return j+1;
        return i+1;
      };
      const MAX_LIST = 6;
      const byRank = {};
      const orderRanks = [];
      // Bei geteiltem #1 starten wir die Liste hinter allen geteilten Plätzen
      const listStart = topGroup.length;
      for(let i=listStart; i<arr.length; i++){
        const rk = rankOf(i);
        if(!byRank[rk]){ byRank[rk] = []; orderRanks.push(rk); }
        byRank[rk].push(arr[i]);
        if(Object.values(byRank).reduce((a,b)=>a+b.length,0) >= MAX_LIST) break;
      }

      const listItems = [];
      const shameCls = isNeg ? 'shame' : '';
      for(const rk of orderRanks){
        const entries = byRank[rk];
        if(entries.length === 1){
          const e = entries[0];
          const avHtml = isTeamAward ? awLiPair(e.ids[0],e.ids[1]) : awLiAv(e.ids[0]);
          const clickAttr = isTeamAward
            ? `data-li-team="${esc(e.ids.slice().sort().join('|'))}"`
            : `data-li-player="${esc(e.ids[0])}"`;
          listItems.push(`
            <div class="aw-li ${shameCls}" ${clickAttr}>
              <div class="aw-li-rank">${rk}.</div>
              ${avHtml}
              <div class="aw-li-info">
                <div class="aw-li-name">${esc(e.name)}</div>
              </div>
              <div class="aw-li-val">${esc(e.val)}</div>
            </div>
          `);
        } else {
          const tiedRows = entries.map(e => {
            const avHtml = isTeamAward ? awLiPair(e.ids[0],e.ids[1],true) : awLiAv(e.ids[0],true);
            const clickAttr = isTeamAward
              ? `data-li-team="${esc(e.ids.slice().sort().join('|'))}"`
              : `data-li-player="${esc(e.ids[0])}"`;
            return `
              <div class="aw-li-tied-row" ${clickAttr}>
                ${avHtml}
                <div class="aw-li-info">
                  <div class="aw-li-name">${esc(e.name)}</div>
                </div>
              </div>`;
          }).join('');
          listItems.push(`
            <div class="aw-li tied ${shameCls}">
              <div class="aw-li-rank">${rk}.</div>
              <div class="aw-li-tied-stack">
                ${tiedRows}
                <span class="aw-li-tie-badge">Geteilt · ${entries.length} ${isTeamAward?'Teams':'Spieler'}</span>
              </div>
              <div class="aw-li-val">${esc(entries[0].val)}</div>
            </div>`);
        }
      }

      const listLabel = isNeg ? 'Weitere Sünder' : 'Weitere Plätze';
      bodyHtml = heroHtml + (listItems.length
        ? `<div class="aw-list-label">${listLabel}</div><div class="aw-list">${listItems.join('')}</div>`
        : '');
    }
  }

  const heroCls = meta.cls || 'gold';

  openSheet(`
    <div class="aw-hero-icon">
      <div class="aw-hero-icon-glow ${heroCls}">
        <svg viewBox="0 0 24 24">${ICONS[AW_IC[key]||'trophy']||''}</svg>
      </div>
      <div class="aw-hero-title">${meta.title}</div>
      <div class="aw-hero-sub">${pl}</div>
    </div>
    ${bodyHtml}
    <div class="aw-why">
      <div class="aw-why-ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16v.5"/></svg></div>
      <div class="aw-why-content">
        <div class="aw-why-label">So wird gewertet</div>
        <div class="aw-why-body">${meta.why}</div>
      </div>
    </div>`);

  // Match-Card klickbar
  if(MATCH_AWARDS.has(key)){
    const arr = key==='upset' ? R.upsets : R.biggest;
    if(arr&&arr.length){
      const el = document.querySelector('.aw-match');
      if(el){ el.style.cursor='pointer'; el.onclick=()=>{ closeSheet(); setTimeout(()=>showMatchDetail(arr[0].m.id),350); }; }
    }
  }

  // Listen-Einträge klickbar
  document.querySelectorAll('.aw-li[data-li-player], .aw-li-tied-row[data-li-player], .aw-winner[data-li-player], .aw-winner-tied-entry[data-li-player]').forEach(el=>{
    el.style.cursor='pointer';
    el.onclick=()=>{ const pid=el.dataset.liPlayer; closeSheet(); setTimeout(()=>showPlayer(pid),350); };
  });
  document.querySelectorAll('.aw-li[data-li-team], .aw-li-tied-row[data-li-team], .aw-winner[data-li-team], .aw-winner-tied-entry[data-li-team]').forEach(el=>{
    el.style.cursor='pointer';
    el.onclick=()=>{ const [a,b]=el.dataset.liTeam.split('|'); closeSheet(); setTimeout(()=>showTeam(a,b),350); };
  });
}


function dedupeBy(arr,keyFn){const seen=new Set(),out=[];for(const x of arr){const k=keyFn(x);if(seen.has(k))continue;seen.add(k);out.push(x);}return out;}
function mscoreLabel(m){return m.score_a+':'+m.score_b;}

// ════════ VIEW: TEAMS ════════
function vTeams(){
  const T=teamStats().filter(t=>t.g>=4);
  if(!T.length)return `<div class="view-head"><h2>Teams</h2><p>Min. 4 gemeinsame Spiele</p></div>${emptyState('handshake','Noch nicht genug Daten')}`;
  const showBest=teamView!=='worst';
  
  // ═══ SORTIERUNG BASIEREND AUF teamSort VARIABLE ═══
  let sorted;
  if(teamSort==='wr'){
    // Standard: Nach Winrate
    sorted=[...T].sort((a,b)=>(b.w/b.g)-(a.w/a.g)||(b.gf-b.ga)-(a.gf-a.ga)||b.g-a.g);
  } else if(teamSort==='gd'){
    // Nach Tordifferenz
    sorted=[...T].sort((a,b)=>(b.gf-b.ga)-(a.gf-a.ga)||(b.w/b.g)-(a.w/a.g)||b.g-a.g);
  } else if(teamSort==='elo'){
    // Nach gesamtem Elo-Zuwachs (über alle Saisons hinweg)
    const gSim=getGlobalSim();
    sorted=[...T].sort((a,b)=>{
      const keyA=[a.ids[0],a.ids[1]].sort().join('|');
      const keyB=[b.ids[0],b.ids[1]].sort().join('|');
      const eloA=gSim.teamElo[keyA]||0;
      const eloB=gSim.teamElo[keyB]||0;
      return eloB-eloA || (b.w/b.g)-(a.w/a.g) || (b.gf-b.ga)-(a.gf-a.ga);
    });
  }
 else {
    // Fallback
    sorted=[...T].sort((a,b)=>(b.w/b.g)-(a.w/a.g)||(b.gf-b.ga)-(a.gf-a.ga)||b.g-a.g);
  }
  
  const arr=showBest?sorted:[...sorted].reverse();


  // Top-3 Akzente (Gold/Silber/Bronze) — Border + Rang-Kachel-Hintergrund
  const TOP=[
    {border:'rgba(247,207,74,.45)', bg:'#f7cf4a', fg:'#1d1700'},
    {border:'rgba(200,208,203,.35)',bg:'#c8d0cb', fg:'#1a1f1c'},
    {border:'rgba(255,120,73,.3)',  bg:'#ff7849', fg:'#2a1108'}
  ];

  const pm=pmap();
  const avPair=(idA,idB)=>{
    const a=pm[idA], b=pm[idB];
    const one=(p,offset)=>{
      if(!p) return `<div style="width:32px;height:32px;border-radius:50%;background:var(--surface3);border:2px solid var(--surface);${offset?'margin-left:-9px':''}"></div>`;
      const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
      if(em) return `<div style="width:32px;height:32px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:15px;border:2px solid var(--surface);${offset?'margin-left:-9px':''}">${em}</div>`;
      return `<div style="width:32px;height:32px;border-radius:50%;background:${avColor(p.id)};display:grid;place-items:center;font-size:11px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;border:2px solid var(--surface);${offset?'margin-left:-9px':''}">${esc(initials(p.name))}</div>`;
    };
    return `<div style="display:flex;align-items:center;flex-shrink:0">${one(a,false)}${one(b,true)}</div>`;
  };

  const gSim=getGlobalSim();
  const seasonTeamMap=gSim.seasonTeamElo[currentSeason().id]||{};
  
  const rows=arr.map((t,i)=>{
    const wr=Math.round(t.w/t.g*100);
    const gd=t.gf-t.ga;
    const keyTeam=[t.ids[0],t.ids[1]].sort().join('|');
    const eloGain=Math.round(seasonTeamMap[keyTeam]||0);
    
    // ═══ DYNAMISCHE HAUPTMETRIK BASIEREND AUF teamSort ═══
    let mainValue, mainLabel, mainColor;
    if(teamSort==='wr'){
      mainValue=wr+'%';
      mainLabel='WR';
      mainColor='var(--acid)';
    } else if(teamSort==='gd'){
      mainValue=(gd>=0?'+':'')+gd;
      mainLabel='TD';
      mainColor=gd>=0?'var(--acid)':'var(--red)';
    } else if(teamSort==='elo'){
      const eloGainTotal=Math.round(gSim.teamElo[keyTeam]||0);
      mainValue=(eloGainTotal>=0?'+':'')+eloGainTotal;
      mainLabel='Elo';
      mainColor=eloGainTotal>=0?'var(--acid)':'var(--red)';
    }

    
    const isTop=showBest&&i<3;
    const top=isTop?TOP[i]:null;
    const borderColor=top?top.border:'var(--line)';
    const rankBlock=top
      ? `<div style="width:24px;height:24px;border-radius:8px;background:${top.bg};color:${top.fg};display:grid;place-items:center;font-family:'Archivo Black',sans-serif;font-size:12px;flex-shrink:0">${i+1}</div>`
      : `<div style="width:24px;text-align:center;font-family:'Archivo Black',sans-serif;font-size:14px;color:var(--faint);flex-shrink:0">${i+1}</div>`;
    
    return `<div class="rrow" data-team="${esc(t.ids.join('|'))}" style="background:var(--surface);border:1px solid ${borderColor};border-radius:18px;padding:13px 15px;display:block">
      <div style="display:flex;align-items:center;gap:12px">
        ${rankBlock}
        ${avPair(t.ids[0],t.ids[1])}
        <div style="flex:1;min-width:0">
          <div style="font-family:'Archivo Black',sans-serif;font-size:14px;letter-spacing:-.01em;line-height:1.1">${esc(t.ids.map(pname).join(' & '))}</div>
          <div class="num" style="margin-top:4px;font-size:10.5px;color:var(--muted)">${t.w}–${t.g-t.w} · TD ${gd>=0?'+':''}${gd}</div>
        </div>
        <div style="font-family:'Archivo Black',sans-serif;font-size:20px;color:${mainColor};line-height:1;flex-shrink:0">${mainValue}</div>
      </div>
    </div>`;
  }).join('');


  return `
    <div class="view-head"><h2>Teams</h2><p>${arr.length} Duo${arr.length===1?'':'s'} mit min. 4 gemeinsamen Spielen</p></div>
    <div class="seg accent">
      <button data-teamtoggle="best" class="${showBest?'on':''}">▲ Beste</button>
      <button data-teamtoggle="worst" class="${!showBest?'on':''}">▼ Schlechteste</button>
    </div>
    <div class="seg" style="margin-bottom:14px">
      <button data-teamsort="wr" class="${teamSort==='wr'?'on':''}">Winrate</button>
      <button data-teamsort="gd" class="${teamSort==='gd'?'on':''}">Tordiff</button>
      <button data-teamsort="elo" class="${teamSort==='elo'?'on':''}">Elo-Zuwachs</button>
    </div>
    <div class="rlist">${rows}</div>`;
}


// ════════ VIEW: HISTORY (mit Filter) ════════
function vHistory(){
  if(!matches.length)return `<div class="view-head"><h2>Verlauf</h2></div>${emptyState('scroll','Noch keine Matches')}`;
  let list=[...matches].reverse();
  if(histFilter!=='all')
    list=list.filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(histFilter));
  
  // ═══ PAGINIERUNGSLOGIK ═══
  const ITEMS_PER_PAGE = 20; // Anzahl der Matches pro Seite
  const currentPage = _histPage; // Nutze die globale Variable
  const totalPages = Math.ceil(list.length / ITEMS_PER_PAGE);
  const paginatedList = list.slice(currentPage * ITEMS_PER_PAGE, (currentPage + 1) * ITEMS_PER_PAGE);
  
  const opts=`<option value="all">Alle Spieler</option>`+
    [...players].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`<option value="${p.id}" ${histFilter===p.id?'selected':''}>${esc(p.name)}</option>`).join('');
  
  const rows=paginatedList.map(m=>{
    const aWon=m.winner==='A';
    const tA=`${pname(m.a1)} & ${pname(m.a2)}`, tB=`${pname(m.b1)} & ${pname(m.b2)}`;
    const dl=ids=>ids.map(id=>{const d=(m.deltas||{})[id]||0;
      return `<span><b>${esc(pname(id))}</b> <span class="${d>=0?'delta-v pos':'delta-v neg'}" style="font-size:11px">${d>=0?'+':''}${Math.round(d)}</span></span>`;}).join('');
    // Kompakte Badge-Icons für errungene Auszeichnungen
    const earned=badgesEarnedInMatch(m.id);
    const badgeChips=earned.length?`<div style="display:flex;gap:3px;align-items:center;margin-top:4px;flex-wrap:wrap">${earned.map(e=>
      `<span style="font-size:11px;background:var(--surface3);padding:2px 6px;border-radius:7px;display:inline-flex;align-items:center;gap:4px;color:var(--ink2)">${badgeIc(e.badge,'12px')}<span style="font-size:10px">${esc(pname(e.playerId).split(' ')[0])}</span></span>`
    ).join('')}</div>`:'';
    return `<div class="mrow" data-match="${m.id}">
      <div class="mrow-top">
        <div class="mteam ${aWon?'won':'lost'}">${esc(tA)}</div>
        <div class="mscore num">${m.score_a}:${m.score_b}</div>
        <div class="mteam r ${!aWon?'won':'lost'}">${esc(tB)}</div>
      </div>
      <div class="mrow-bot"><div class="mdeltas">${dl([m.a1,m.a2,m.b1,m.b2])}</div></div>
      ${badgeChips}
      <div class="mrow-bot" style="margin-top:6px"><span>${dateStr(m.created_at)}</span>
        <span data-delmatch="${m.id}" style="color:var(--acid2);display:inline-flex;align-items:center;gap:5px">${svgI('edit')} bearbeiten</span></div>
    </div>`;
  }).join('');

  // ═══ PAGINIERUNGS-CONTROLS ═══
  const paginationControls = totalPages > 1 ? `
    <div style="display:flex;align-items:center;gap:8px;margin-top:16px;padding-bottom:20px;width:100%">
      <button class="btn ghost sm" id="prevPageBtn" style="flex:1;min-width:0;padding:10px 8px;white-space:nowrap" ${currentPage===0?'disabled':''}>← Vorher</button>
      <div style="flex-shrink:0;color:var(--muted);font-size:11px;font-family:'Sometype Mono',monospace;text-align:center;padding:0 2px;white-space:nowrap">
        <b style="color:var(--ink)">${currentPage+1}</b> / <b style="color:var(--ink)">${totalPages}</b>
      </div>
      <button class="btn ghost sm" id="nextPageBtn" style="flex:1;min-width:0;padding:10px 8px;white-space:nowrap" ${currentPage>=(totalPages-1)?'disabled':''}>Weiter →</button>
    </div>
  ` : '';

  return `
    <div class="view-head"><h2>Verlauf</h2><p>${list.length} Matches</p></div>
    <div class="search" style="margin-bottom:14px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 3H2l8 9.5V19l4 2v-8.5L22 3z"/></svg>
      <select id="histSel" style="padding-left:40px">${opts}</select>
    </div>
    ${list.length?`<div class="mlist">${rows}</div>${paginationControls}`:emptyState('search','Keine Matches für diesen Filter')}`;
}

// ════════ MATCH PREVIEW & LOGIC ════════
function readM(){
  document.querySelectorAll('[data-p]').forEach(s=>M[s.dataset.p]=s.value);
  document.querySelectorAll('[data-pos]').forEach(s=>M['p'+s.dataset.pos]=s.value);
}
function validM(){const ids=[M.A1,M.A2,M.B1,M.B2];
  return !ids.some(x=>!x)&&new Set(ids).size===4&&M.sa!==M.sb
    &&M.pA1!==M.pA2&&M.pB1!==M.pB2;}
function teamsFromM(){return{teamA:[{id:M.A1,pos:M.pA1},{id:M.A2,pos:M.pA2}],teamB:[{id:M.B1,pos:M.pB1},{id:M.B2,pos:M.pB2}]};}
function updatePreview(){
  const slot = document.getElementById('previewSlot');
  const save = document.getElementById('saveM');
  if(!slot) return;
  const P = pmap();
  const gSim = getGlobalSim();
  const seasonElo = id => gSim.elo[id] ?? cfg.start_elo;

  const setAvg = (el,a,b) => {
    const e = document.getElementById(el);
    if(e && P[a] && P[b]) e.textContent = 'Ø '+Math.round((seasonElo(a)+seasonElo(b))/2)+' (Saison)';
    else if(e) e.textContent = '';
  };
  setAvg('avgA', M.A1, M.A2); setAvg('avgB', M.B1, M.B2);

  const ids = [M.A1,M.A2,M.B1,M.B2].filter(Boolean);
  if(new Set(ids).size !== ids.length){
    slot.innerHTML = `<div class="preview" style="color:var(--red);font-size:12px;text-align:center">Ein Spieler steht doppelt.</div>`;
    save.disabled = true; return;
  }
  // Beide Spieler eines Teams müssen unterschiedliche Positionen haben
  const allFour = ids.length === 4;
  if(allFour && (M.pA1===M.pA2 || M.pB1===M.pB2)){
    slot.innerHTML = `<div class="preview" style="color:var(--red);font-size:12px;text-align:center">Jedes Team braucht Sturm + Abwehr.</div>`;
    save.disabled = true; return;
  }
  if(!validM()){slot.innerHTML=''; save.disabled=true; return;}

  const winner = M.sa > M.sb ? 'A' : 'B';
  const{teamA, teamB} = teamsFromM();
  const c = computeMatch(teamA, teamB, winner, M.sa, M.sb);
  const pA = Math.round(c.expA*100), pB = 100-pA;
  const line = s => {
    const d = c.res[s.id];
    return `<div class="delta-row">
      <span class="dn">${esc(P[s.id].name)}
        <span class="chip ${s.pos}">${s.pos==='atk'?'STU':'ABW'}</span>
      </span>
      <span class="delta-v ${d>=0?'pos':'neg'}">${d>=0?'+':''}${Math.round(d)}</span>
    </div>`;
  };
  slot.innerHTML = `<div class="preview">
    <div class="prob">
      <div class="pa" style="width:${pA}%">${pA}%</div>
      <div class="pb" style="width:${pB}%">${pB}%</div>
    </div>
    <div class="prob-cap">Siegchance (Saison-Elo) · Team ${winner} gewinnt ${M.sa}:${M.sb}
      ${c.mov>1.08?' · Kantersieg ×'+c.mov.toFixed(2):''}
    </div>
    <div class="delta-list">
      ${line(teamA[0])}${line(teamA[1])}
      <div class="delta-div"></div>
      ${line(teamB[0])}${line(teamB[1])}
    </div>
  </div>`;
  save.disabled = false;
}

async function doSaveMatch(){
  readM(); if(!validM()){toast('Match unvollständig',true);return;}
  const winner = M.sa > M.sb ? 'A' : 'B';
  const{teamA, teamB} = teamsFromM();

  // players.elo = Saison-Elo → direkt nutzen
  const c = computeMatch(teamA, teamB, winner, M.sa, M.sb);

  const row = {
    a1:M.A1, a1_pos:M.pA1, a2:M.A2, a2_pos:M.pA2,
    b1:M.B1, b1_pos:M.pB1, b2:M.B2, b2_pos:M.pB2,
    score_a:M.sa, score_b:M.sb, winner, deltas:c.res, exp_a:c.expA
  };
  // insert(...).select() gibt die erzeugte Zeile inkl. id + created_at zurück,
  // damit die lokale Kopie exakt der DB entspricht (created_at wird für die
  // Saison-Filterung in matchesInSeason zwingend gebraucht).
  const{data:inserted, error} = await sb.from('matches').insert(row).select().single();
  if(error){toast('Fehler: '+error.message,true);return;}

  // Fallback: falls select() nicht greift, created_at lokal setzen,
  // sonst fiele das frische Match aus matchesInSeason heraus.
  const savedRow = inserted || {...row, created_at:new Date().toISOString()};

  // Lokal updaten, dann über die EINE kanonische Engine neu berechnen.
  // persistRecalc schreibt atk, Match-Deltas und Saison-Elos konsistent.
  matches = [...matches, savedRow];
  invalidateCache(['global', 'stats', 'awards', 'badges']);
  await persistNewMatch(savedRow.id);

  // ─── ACHIEVEMENT-TOASTS ───────────────────────────────────────────
  // Nach dem persist+invalidate liefert badgesEarnedInMatch genau die in
  // DIESEM Match neu erreichten Badges (Pre-State-Vergleich → echte Neu-
  // erreichungen, keine Wiederholungen). Sequenzielle Queue zeigt sie der
  // Reihe nach, jeder Toast 2.6s. Spielername aus pname() konsistent zur
  // gesamten App.
  const newBadges = badgesEarnedInMatch(savedRow.id);
  if(newBadges.length){
    newBadges.forEach(e => showAchievementToast(pname(e.playerId), e.badge));
  } else {
    toast('Match gespeichert', 'ok');
  }
  M = {A1:'',A2:'',B1:'',B2:'',pA1:'atk',pA2:'def',pB1:'atk',pB2:'def',sa:0,sb:0};
  tab = 'ranking'; await loadAll();
}

// ════════ DETAIL SHEET ════════
function openSheet(html){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  // Falls bereits ein Sheet offen war (openSheet direkt nach openSheet, ohne
  // closeSheet dazwischen), zuerst dessen Swipe-Listener aufräumen — sonst
  // stapeln sich window-mousemove/mouseup-Listener und lecken.
  if(sheet._swipeCleanup){ sheet._swipeCleanup(); sheet._swipeCleanup=null; }
  sheet.innerHTML=`<div class="sheet-grab" id="sheetGrab"></div>${html}`;
  // Scroll-Position zurücksetzen — sonst landet man im neuen Sheet dort, wo
  // im vorigen Sheet (oder bei vorigem Öffnen desselben Sheets) gescrollt war.
  // Muss nach innerHTML kommen, damit das Layout schon steht.
  sheet.scrollTop = 0;
  bg.classList.add('show');
  sheet.classList.add('show');
  bindSheetSwipe();
}

function closeSheet(){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  // Swipe-Listener aufräumen
  if(sheet._swipeCleanup){ sheet._swipeCleanup(); sheet._swipeCleanup=null; }
  sheet.classList.remove('show','is-dragging');
  sheet.style.transform='';
  bg.style.opacity='';
  bg.classList.remove('show');
}

function bindSheetSwipe(){
  const sheet=document.getElementById('sheet');
  const bg=document.getElementById('sheetBg');
  let startY=0, startScrollTop=0, dragging=false;
  let lastY=0, lastT=0;
  const CLOSE_THRESHOLD=120;
  const VELOCITY_THRESHOLD=0.5;
  const DRAG_INTENT_THRESHOLD=10;

  // ── TOUCH (Smartphone) ──
  const onTouchStart=(e)=>{
    const touch=e.touches[0];
    startY=touch.clientY;
    startScrollTop=sheet.scrollTop;
    lastY=startY; lastT=Date.now();
    dragging=false;
  };

  const onTouchMove=(e)=>{
    const touch=e.touches[0];
    const dy=touch.clientY-startY;
    lastY=touch.clientY; lastT=Date.now();
    if(startScrollTop>0) return;
    if(dy<0) return;
    if(dy<DRAG_INTENT_THRESHOLD) return;
    if(!dragging){ dragging=true; sheet.classList.add('is-dragging'); }
    e.preventDefault();
    sheet.style.transform=`translateY(${dy*0.88}px)`;
    bg.style.opacity=1-Math.min(dy*0.88/300,1)*0.6;
  };

  const onTouchEnd=(e)=>{
    if(!dragging){ sheet.classList.remove('is-dragging'); return; }
    dragging=false;
    sheet.classList.remove('is-dragging');
    const touch=e.changedTouches[0];
    const dy=touch.clientY-startY;
    const velocity=Math.abs(dy)/(Date.now()-lastT+1);
    snapOrClose(dy,velocity);
  };

  // ── MOUSE (Desktop) ──
  const onMouseDown=(e)=>{
    // Nur auf dem Grab-Handle reagieren, nicht auf das gesamte Sheet
    const grab=document.getElementById('sheetGrab');
    if(!grab||!grab.contains(e.target)) return;
    startY=e.clientY;
    startScrollTop=sheet.scrollTop;
    lastY=startY; lastT=Date.now();
    dragging=true;
    sheet.classList.add('is-dragging');
    e.preventDefault();
  };

  const onMouseMove=(e)=>{
    if(!dragging) return;
    const dy=e.clientY-startY;
    lastY=e.clientY; lastT=Date.now();
    if(dy<0){ sheet.style.transform='translateY(0)'; return; }
    sheet.style.transform=`translateY(${dy*0.88}px)`;
    bg.style.opacity=1-Math.min(dy*0.88/300,1)*0.6;
  };

  const onMouseUp=(e)=>{
    if(!dragging) return;
    dragging=false;
    sheet.classList.remove('is-dragging');
    const dy=e.clientY-startY;
    const velocity=Math.abs(dy)/(Date.now()-lastT+1);
    snapOrClose(dy,velocity);
  };

  // ── GEMEINSAME SNAP/CLOSE LOGIK ──
  function snapOrClose(dy,velocity){
    if(dy>CLOSE_THRESHOLD||velocity>VELOCITY_THRESHOLD){
      sheet.style.transition='transform .28s cubic-bezier(.4,0,1,1)';
      sheet.style.transform='translateY(100%)';
      bg.style.transition='opacity .28s';
      bg.style.opacity='0';
      setTimeout(()=>{
        closeSheet();
        sheet.style.transition='';
        bg.style.transition='';
      },280);
    } else {
      sheet.style.transition='transform .32s cubic-bezier(.2,.8,.2,1)';
      sheet.style.transform='translateY(0)';
      bg.style.transition='opacity .32s';
      bg.style.opacity='1';
      setTimeout(()=>{
        sheet.style.transition='';
        bg.style.transition='';
      },320);
    }
  }

  // Events registrieren
  sheet.addEventListener('touchstart',onTouchStart,{passive:true});
  sheet.addEventListener('touchmove',onTouchMove,{passive:false});
  sheet.addEventListener('touchend',onTouchEnd,{passive:true});

  // Mouse nur auf dem Grab-Handle
  sheet.addEventListener('mousedown',onMouseDown);
  window.addEventListener('mousemove',onMouseMove);
  window.addEventListener('mouseup',onMouseUp);

  // Cleanup wenn Sheet geschlossen wird
  const cleanup=()=>{
    sheet.removeEventListener('touchstart',onTouchStart);
    sheet.removeEventListener('touchmove',onTouchMove);
    sheet.removeEventListener('touchend',onTouchEnd);
    sheet.removeEventListener('mousedown',onMouseDown);
    window.removeEventListener('mousemove',onMouseMove);
    window.removeEventListener('mouseup',onMouseUp);
  };
  sheet._swipeCleanup=cleanup;
}

// Liefert die Rarity eines Badges (Default: common falls jemand neu hinzukommt
// und vergisst BADGE_RARITY zu erweitern — verhindert undefined-Bugs).
function rarityOf(badgeId){ return BADGE_RARITY[badgeId] || 'common'; }

// ─── Helfer für die neuen Badges ───
// Saison-Peak-Elo eines Spielers: höchster jemals erreichter Saison-Elo,
// überlebt Saison-Resets (kommt direkt aus dem globalen Sim-Cache).
function seasonPeakFor(id){
  const pk=getGlobalSim().peakElo||{};
  return pk[id]!==undefined ? pk[id] : cfg.start_elo;
}

// Anzahl abgeschlossener Saisons, in denen der Spieler auf Platz 2 endete.
// Nutzt die archivierten seasons (top_elo enthält die Top-3 als JSON-Array).
function countViceChampion(id){
  if(!seasons||!seasons.length) return 0;
  const curId=currentSeason().id;
  let c=0;
  seasons.forEach(s=>{
    if(s.id===curId) return; // laufende Saison zählt nicht
    let top=s.top_elo;
    if(typeof top==='string'){ try{ top=JSON.parse(top); }catch(e){ top=[]; } }
    if(Array.isArray(top) && top[1] && top[1].id===id) c++;
  });
  return c;
}

// Tage, an denen der Spieler beim chronologisch ersten Match des Tages
// dabei war und es gewonnen hat. Max. 1 pro Tag (durch die Logik garantiert).
function countEarlyBirdDays(id,ms){
  const byDay={};
  ms.forEach(m=>{
    const day=new Date(m.created_at).toISOString().slice(0,10);
    if(!byDay[day]||new Date(m.created_at)<new Date(byDay[day].created_at)) byDay[day]=m;
  });
  let c=0;
  Object.values(byDay).forEach(first=>{
    if(matchOf(id,first)&&won(id,first)) c++;
  });
  return c;
}

// Wie oft eine Serie von n aufeinanderfolgenden 10:n-Siegen erreicht wurde.
// Nach Erreichen Serie zurücksetzen (analog zu countStreakOccurrences).
// Unterbrochen wird die Serie durch jede Niederlage UND durch jeden Sieg ohne 10:9.
function countNailBiterStreaks(id,ms,n){
  // Zählt wie oft n Zittersiege in Folge erreicht wurden — nur knappe Partien (9:10/10:9)
  // werden überhaupt betrachtet. Klare Siege oder klare Niederlagen sind irrelevant
  // und werden übersprungen, ohne die Serie zu unterbrechen. Nur eine knappe Niederlage
  // (9:10) bricht die Serie.
  const ordered=[...ms].filter(m=>matchOf(id,m))
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let cur=0,count=0;
  ordered.forEach(m=>{
    const gf=goalsFor(id,m), ga=goalsAgainst(id,m);
    const isClose=(gf===10&&ga===9)||(gf===9&&ga===10);
    if(!isClose) return; // nicht-knappe Partien ignorieren
    if(won(id,m)){
      cur++;
      if(cur>=n){count++;cur=0;}
    } else {
      cur=0; // knappe Niederlage bricht die Serie
    }
  });
  return count;
}

// Hilfsfunktion: Badge → SVG-Icon-HTML (mit Fallback auf Emoji)
function badgeIc(b, size){
  size = size || 'inherit';
  if(!b) return '';
  const key = b.ic || null;
  if(key && ICONS[key]) {
    return `<span class="ic svg-ic" style="font-size:${size}"><svg viewBox="0 0 24 24">${ICONS[key]}</svg></span>`;
  }
  return '';
}

// Badge-Hilfsfunktionen
function matchOf(id,m){return [m.a1,m.a2,m.b1,m.b2].includes(id);}
function won(id,m){const onA=[m.a1,m.a2].includes(id);return (onA&&m.winner==='A')||(!onA&&m.winner==='B');}
function goalsFor(id,m){return [m.a1,m.a2].includes(id)?m.score_a:m.score_b;}
function goalsAgainst(id,m){return [m.a1,m.a2].includes(id)?m.score_b:m.score_a;}
function shutout(id,m,myG,theirG){return goalsFor(id,m)===myG&&goalsAgainst(id,m)===theirG;}
function myExp(id,m){const onA=[m.a1,m.a2].includes(id);return onA?(m.exp_a||0.5):(1-(m.exp_a||0.5));}
function countGames(id,ms){return ms.filter(m=>matchOf(id,m)).length;}
function countWins(id,ms){return ms.filter(m=>matchOf(id,m)&&won(id,m)).length;}

// Zählt in wie vielen abgeschlossenen Wochen/Monaten der Spieler die meisten Siege hatte
function countPeriodWins(id,allMs,periodType){
  const buckets={};
  allMs.forEach(m=>{
    const d=new Date(m.created_at);
    let key;
    if(periodType==='week'){
      // ISO Kalenderwoche (gleiche Formel wie isoWeek)
      key=d.getFullYear()+'-W'+isoWeek(d);
    } else {
      key=d.getFullYear()+'-'+d.getMonth();
    }
    if(!buckets[key])buckets[key]=[];
    buckets[key].push(m);
  });
  // Aktuellen Zeitraum ausschließen (noch nicht abgeschlossen)
  const now=new Date();
  let curKey;
  if(periodType==='week'){
    curKey=now.getFullYear()+'-W'+isoWeek(now);
  } else {
    curKey=now.getFullYear()+'-'+now.getMonth();
  }
  let count=0;
  Object.entries(buckets).forEach(([key,ms])=>{
    if(key===curKey)return; // noch laufend
    if(ms.length<2)return;  // min. 2 Spiele im Zeitraum
    // Siege pro Spieler in diesem Zeitraum
    const winsById={},gamesById={};
    ms.forEach(m=>[m.a1,m.a2,m.b1,m.b2].forEach(pid=>{
      if(!winsById[pid])winsById[pid]=0; if(!gamesById[pid])gamesById[pid]=0;
      gamesById[pid]++;
      const onA=[m.a1,m.a2].includes(pid);
      if((onA&&m.winner==='A')||(!onA&&m.winner==='B'))winsById[pid]++
    }));
    const minW=periodType==='week'?5:10;
    // Nur Spieler mit genug Siegen qualifiziert, dann nach Winrate
    const qual=Object.entries(winsById).filter(([,w])=>w>=minW);
    if(!qual.length)return;
    const wrs=qual.map(([pid,w])=>w/(gamesById[pid]||1));
    if(!wrs.length)return;
    const bestWr=Math.max(...wrs);
    const myW=winsById[id]||0;
    if(myW>=minW && myW/(gamesById[id]||1)>=bestWr-0.001) count++;
  });
  return count;
}

// Player of the Day: zählt Tage an denen dieser Spieler die meisten Siege hatte (min 3 Siege am Tag)
function countDayWins(id,allMs){
  const byDay={};
  allMs.forEach(m=>{
    const day=new Date(m.created_at).toISOString().slice(0,10);
    if(!byDay[day])byDay[day]=[];
    byDay[day].push(m);
  });
  let count=0;
  Object.values(byDay).forEach(dayMs=>{
    if(dayMs.length<2)return;
    const winsById={};
    dayMs.forEach(m=>[m.a1,m.a2,m.b1,m.b2].forEach(pid=>{
      if(!winsById[pid])winsById[pid]=0;
      const onA=[m.a1,m.a2].includes(pid);
      if((onA&&m.winner==='A')||(!onA&&m.winner==='B'))winsById[pid]++;
    }));
    const maxW=Math.max(...Object.values(winsById));
    if(maxW<3)return;
    if((winsById[id]||0)===maxW) count++;
  });
  return count;
}

// ─── Krimi-Reihe: 5 Spiele in Folge mit Tordifferenz ≤ 2 (Sieg ODER Niederlage) ───
// Sobald 5 erreicht, wird die Serie zurückgesetzt → mehrfach erreichbar.
function countKrimiStreaks(id,ms){
  const ordered=[...ms].filter(m=>matchOf(id,m))
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let cur=0,count=0;
  ordered.forEach(m=>{
    const diff=Math.abs(m.score_a-m.score_b);
    if(diff<=2){
      cur++;
      if(cur>=5){count++; cur=0;}
    } else {
      cur=0;
    }
  });
  return count;
}

// ─── Klares Ding: Sieg mit Tordifferenz ≥ 7 ───
function countClearWins(id,ms){
  return ms.filter(m=>matchOf(id,m)&&won(id,m)
    &&Math.abs(m.score_a-m.score_b)>=7).length;
}

// ─── Wiederholungstäter: 3 Siege in Folge mit identischem Endstand ───
// Niederlagen oder Siege mit anderem Score brechen die Serie.
function countRepeatScoreStreaks(id,ms){
  const ordered=[...ms].filter(m=>matchOf(id,m))
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let lastScore=null,cur=0,count=0;
  ordered.forEach(m=>{
    if(!won(id,m)){cur=0; lastScore=null; return;}
    const score=goalsFor(id,m)+':'+goalsAgainst(id,m);
    if(score===lastScore){
      cur++;
      if(cur>=3){count++; cur=0; lastScore=null;}
    } else {
      cur=1; lastScore=score;
    }
  });
  return count;
}

// ─── Comeback-Tag: Tag mit Niederlage gestartet, mit Sieg beendet, min. 3 Matches ───
function countComebackDays(id,ms){
  const mine=ms.filter(m=>matchOf(id,m))
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const byDay={};
  mine.forEach(m=>{
    const d=new Date(m.created_at).toISOString().slice(0,10);
    if(!byDay[d]) byDay[d]=[];
    byDay[d].push(m);
  });
  let count=0;
  Object.values(byDay).forEach(dayMs=>{
    if(dayMs.length<3) return;
    const first=dayMs[0], last=dayMs[dayMs.length-1];
    if(!won(id,first) && won(id,last)) count++;
  });
  return count;
}

// ─── Revanchist: nach Niederlage gegen Team X im direkt folgenden Match Sieg gegen X ───
// Strikt: das unmittelbar nächste Match muss gegen das gleiche Gegner-Team sein.
function countRevenge(id,ms){
  const mine=ms.filter(m=>matchOf(id,m))
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const oppKey=(m)=>{
    const onA=[m.a1,m.a2].includes(id);
    return (onA?[m.b1,m.b2]:[m.a1,m.a2]).slice().sort().join('|');
  };
  let count=0;
  for(let i=0;i<mine.length-1;i++){
    if(won(id,mine[i])) continue; // M_i muss Niederlage sein
    if(!won(id,mine[i+1])) continue; // M_{i+1} muss Sieg sein
    if(oppKey(mine[i])===oppKey(mine[i+1])) count++;
  }
  return count;
}

// ─── Königsklasse: Sieg gegen mind. 1 Gegner aus den Top 3 der Saison-Endrangliste ───
function countTopThreeWins(id,ms){
  const rk=getSeasonRankingsCache();
  return ms.filter(m=>{
    if(!matchOf(id,m)||!won(id,m)) return false;
    const r=rk[seasonOf(m.created_at).id];
    if(!r||!r.top3.size) return false;
    const onA=[m.a1,m.a2].includes(id);
    const opps=onA?[m.b1,m.b2]:[m.a1,m.a2];
    return opps.some(oId=>r.top3.has(oId));
  }).length;
}

// ─── Pflichtaufgabe: Sieg gegen mind. 1 Gegner aus den Bottom 3 der Saison-Endrangliste ───
function countBottomThreeWins(id,ms){
  const rk=getSeasonRankingsCache();
  return ms.filter(m=>{
    if(!matchOf(id,m)||!won(id,m)) return false;
    const r=rk[seasonOf(m.created_at).id];
    if(!r||!r.bottom3.size) return false;
    const onA=[m.a1,m.a2].includes(id);
    const opps=onA?[m.b1,m.b2]:[m.a1,m.a2];
    return opps.some(oId=>r.bottom3.has(oId));
  }).length;
}

// ─── Award-Sammler: in einer Saison min. 5 POTD UND min. 2 POTW Auszeichnungen ───
// Pro qualifizierter Saison vergeben (mehrfach über Karriere).
function countAwardCollector(id){
  const bySeason=getMatchesBySeason();
  let count=0;
  Object.values(bySeason).forEach(seasonMs=>{
    const potd=countDayWins(id,seasonMs);
    if(potd<5) return; // billiger Vorab-Filter
    const potw=countPeriodWins(id,seasonMs,'week');
    if(potw>=2) count++;
  });
  return count;
}

function longestPlayerStreak(id,ms){
  const ordered=[...ms].filter(m=>matchOf(id,m)).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let cur=0,best=0;
  ordered.forEach(m=>{if(won(id,m)){cur++;if(cur>best)best=cur;}else cur=0;});
  return best;
}
// Zählt wie oft eine Siegesserie der Länge >= n erreicht wurde (separate Serien)
function countStreakOccurrences(id,ms,n){
  const ordered=[...ms].filter(m=>matchOf(id,m)).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let cur=0,count=0,awarded=false;
  ordered.forEach(m=>{
    if(won(id,m)){cur++;if(cur>=n&&!awarded){count++;awarded=true;}}
    else {cur=0;awarded=false;}
  });
  return count;
}
// Zählt wie oft eine Niederlagenserie >= n erreicht wurde
function countLossStreakOccurrences(id,ms,n){
  const ordered=[...ms].filter(m=>matchOf(id,m)).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let cur=0,count=0,awarded=false;
  ordered.forEach(m=>{if(!won(id,m)){cur++;if(cur>=n&&!awarded){count++;awarded=true;}}else{cur=0;awarded=false;}});
  return count;
}
// Carry: Sieg wenn dein Mate der schwächste der 4 Spieler im Match war
// Nutzt globalen Elo-History-Cache für historische Elo-Stände
function countCarries(id,ms){
  const snapMap=getSnapMap();
  return ms.filter(m=>{
    if(!matchOf(id,m)||!won(id,m))return false;
    const snap=snapMap[m.id]; if(!snap)return false;
    const allFour=[m.a1,m.a2,m.b1,m.b2];
    if(allFour.some(x=>snap[x]===undefined))return false;
    const weakest=allFour.reduce((a,b)=>(snap[a] ?? cfg.start_elo)<=(snap[b] ?? cfg.start_elo)?a:b);
    const onA=[m.a1,m.a2].includes(id);
    const mate=onA?(id===m.a1?m.a2:m.a1):(id===m.b1?m.b2:m.b1);
    return mate===weakest;
  }).length;
}
// Zählt Tage an denen der Spieler min. 3 Spiele hatte und keines verloren hat
function countUnbeatableDays(id,ms){
  const mine=ms.filter(m=>matchOf(id,m));
  const byDay={};
  mine.forEach(m=>{const d=new Date(m.created_at).toISOString().slice(0,10);
    if(!byDay[d])byDay[d]={games:0,losses:0}; byDay[d].games++; if(!won(id,m))byDay[d].losses++;});
  return Object.values(byDay).filter(d=>d.games>=3&&d.losses===0).length;
}
function getCachedBadges(id){
  const key='badges_'+id+'_'+matches.length+'_'+_cache.version;
  if(!_cache._badges) _cache._badges={};
  if(_cache._badges[key]) return _cache._badges[key];
  const r=computeBadges(id);
  _cache._badges[key]=r;
  return r;
}

// Berechnet alle freigeschalteten Badges für einen Spieler (mit Anzahl für multi-Badges)
function computeBadges(id){
  const result=[];
  BADGES.forEach(b=>{
    const c=b.count(id,matches);
    if(c>0) result.push({id:b.id,em:b.em,ic:b.ic,name:b.name,desc:b.desc,count:c});
  });
  return result;
}

// Ermittelt welche Badges durch ein bestimmtes Match NEU freigeschaltet / erneut erreicht wurden
function getBadgeEarnedCache(){
  const key='badgeEarned_'+matches.length+'_'+_cache.version;
  if(_cache._badgeEarnedKey===key) return _cache._badgeEarnedMap;

  const map={};
  const ordered=[...matches].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  // Globale Sim für Carry (historische Elo-Stände vor jedem Match) — gecached
  const snapMap=getSnapMap();
  // History-Map für eloAfter-Lookup (Saison-Peak-Tracking pro Match)
  const histById=getHistoryByMatchId();
  // Tages-Tracker (global, nicht per-player): welcher Tag hatte schon sein erstes Match?
  const firstOfDaySeen={};

  // Inkrementeller State pro Spieler
  const st={};
  players.forEach(p=>{
    st[p.id]={
      games:0, wins:0,
      atkG:0, atkW:0,
      defG:0, defW:0,
      curStreak:0, curLoss:0,
      // Streak-Awards: werden zurückgesetzt wenn Serie bricht
      sa5:false, sa10:false, sa15:false, sa30:false,
      // Loss-Streak-Award: wird zurückgesetzt wenn Sieg kommt
      la5:false,
      // Tages-Tracker für Unbeatable
      days:{}, // "YYYY-MM-DD" → { g, l }
      // ── Neue Badges ──
      // Saison-Peak-Elo (überlebt Saison-Reset, einmalige Schwellen-Badges)
      peakElo: cfg.start_elo,
      climbed: false, dominated: false, dynastic: false,
      // 10:9-Serien-Counter (resettet bei Nicht-10:9 oder Niederlage)
      nailStreak: 0,
      // Krimi-Reihe: aufeinanderfolgende Spiele mit Tordifferenz ≤ 2
      krimiCur: 0,
      // Wiederholungstäter: letzter Sieg-Score und aktueller Counter
      lastWinScore: null, wtCur: 0,
      // Comeback-Tag: erstes Match-Ergebnis pro Tag + Trigger-Flag
      firstResOfDay: {},   // "YYYY-MM-DD" → 'W' | 'L'
      comebackFired: {},   // "YYYY-MM-DD" → true (schon gefeuert)
      // Revanchist: letztes verlorenes Gegner-Team (sortierter String "p1|p2")
      lastLossOpp: null,
    };
  });

  ordered.forEach(m=>{
    const earned=[];
    const ids=[m.a1,m.a2,m.b1,m.b2];
    const day=new Date(m.created_at).toISOString().slice(0,10);
    // Ist dies das erste Match dieses Tages? (Global, eine Frage pro Match)
    const isFirstOfDay = !firstOfDaySeen[day];
    if(isFirstOfDay) firstOfDaySeen[day]=true;
    // Saison-Peak-Tracking nutzt die Sim-History (Elo-Stand nach diesem Match)
    const hist=histById.get(m.id);
    const eloAfter=(hist&&hist.eloAfter)||{};

    ids.forEach(id=>{
      if(!st[id]) return;
      const s=st[id];
      const onA=[m.a1,m.a2].includes(id);
      const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      const gf=onA?m.score_a:m.score_b;
      const ga=onA?m.score_b:m.score_a;
      const pos=id===m.a1?m.a1_pos:id===m.a2?m.a2_pos:id===m.b1?m.b1_pos:m.b2_pos;
      const myExp=onA?(m.exp_a||0.5):(1-(m.exp_a||0.5));

      // Werte VOR diesem Match sichern (für Schwellen-Checks)
      const pg=s.games, pAtkW=s.atkW, pDefW=s.defW, pAtkG=s.atkG, pDefG=s.defG;
      const prevAllrounder=pAtkW>=20&&pDefW>=20;

      // ── State updaten ──
      s.games++;
      if(w) s.wins++;
      if(pos==='atk'){s.atkG++;if(w)s.atkW++;}
      else            {s.defG++;if(w)s.defW++;}

      if(w){
        s.curStreak=s.curStreak>0?s.curStreak+1:1;
        s.curLoss=0;
        s.la5=false;
      } else {
        s.curLoss=s.curLoss>0?s.curLoss+1:1;
        s.curStreak=0;
        s.sa5=false; s.sa10=false; s.sa15=false; s.sa30=false;
      }

      if(!s.days[day]) s.days[day]={g:0,l:0};
      s.days[day].g++;
      if(!w) s.days[day].l++;

      // ── Helper ──
      const fire=(bid)=>{
        const b=BADGES.find(x=>x.id===bid);
        if(b) earned.push({playerId:id,badge:b});
      };

      // ── Einfache Schwellen-Badges ──
      if(pg===0)                                    fire('first_match');
      if(pg<25   && s.games>=25)                    fire('games25');
      if(pg<150  && s.games>=150)                   fire('games150');
      if(!prevAllrounder && s.atkW>=20 && s.defW>=20) fire('allrounder');
      if(pDefG<50 && s.defG>=50)                    fire('def50');
      if(pAtkG<50 && s.atkG>=50)                    fire('atk50');

      // ── Match-Ergebnis-Badges ──
      if(w  && gf===10 && ga===0)                   fire('perfect_win');
      if(!w && gf===0  && ga===10)                  fire('perfect_loss');
      if(w  && gf===10 && ga===9)                   fire('nail_biter');
      if(w  && pos==='def' && ga<=2)                fire('wall_badge');
      if(w  && myExp<0.35)                          fire('upset_king');

      // ── Streak-Badges (nur wenn Schwelle NEU in dieser Serie) ──
      if(w && s.curStreak>=5  && !s.sa5)  { s.sa5=true;  fire('streak5');  }
      if(w && s.curStreak>=10 && !s.sa10) { s.sa10=true; fire('streak10'); }
      if(w && s.curStreak>=15 && !s.sa15) { s.sa15=true; fire('streak15'); }
      if(w && s.curStreak>=30 && !s.sa30) { s.sa30=true; fire('streak30'); }

      // ── Loss-Streak-Badge ──
      if(!w && s.curLoss>=5 && !s.la5)   { s.la5=true;  fire('losing5');  }

      // ── Carry ──
      const snap=snapMap[m.id];
      if(w && snap){
        const allFour=[m.a1,m.a2,m.b1,m.b2];
        if(allFour.every(x=>snap[x]!==undefined)){
          const weakest=allFour.reduce((a,b)=>
            (snap[a]??cfg.start_elo)<=(snap[b]??cfg.start_elo)?a:b);
          const mate=onA?(id===m.a1?m.a2:m.a1):(id===m.b1?m.b2:m.b1);
          if(mate===weakest) fire('carry');
        }
      }

      // ── Unbeatable Day ──
      // Feuert genau wenn der 3. saubere Sieg an einem Tag erreicht wird
      const d=s.days[day];
      if(d.g===3 && d.l===0) fire('unbeatable');

      // ── Frühschicht: Sieg im chronologisch ersten Match des Tages ──
      // isFirstOfDay ist für ALLE 4 Spieler dieses Matches identisch true,
      // garantiert max. 1 Trigger pro Spieler+Tag (mehr als 1 erstes Match gibt's nicht).
      if(isFirstOfDay && w) fire('early_bird');

      // ── Nerven aus Stahl: 3 Zittersiege in Folge — nur knappe Partien zählen ──
      // Nicht-knappe Partien (klare Siege/Niederlagen) sind irrelevant und ändern die
      // Serie nicht. Nur eine knappe Niederlage (9:10) bricht die Serie.
      // Bei Erreichen wird der Counter zurückgesetzt → mehrfach erreichbar.
      const isClose=(gf===10&&ga===9)||(gf===9&&ga===10);
      if(isClose){
        if(w){
          s.nailStreak++;
          if(s.nailStreak>=3){ fire('nerves_of_steel'); s.nailStreak=0; }
        } else {
          s.nailStreak=0;
        }
      }
      // sonst: nicht-knappe Partie → nailStreak bleibt unverändert

      // ── Saison-Peak-Schwellen (einmalige Unlocks) ──
      // Nutzt den Elo-Stand nach diesem Match aus der zentralen Sim-History.
      // Über Saison-Resets hinweg gilt der höchste je erreichte Wert — wir tracken
      // hier den lokalen Spieler-Peak in s.peakElo und feuern bei Schwellen-Überschreitung.
      const myEloAfter=eloAfter[id];
      if(myEloAfter!==undefined && myEloAfter>s.peakElo){
        s.peakElo=myEloAfter;
        if(!s.climbed   && s.peakElo>=100){ s.climbed=true;   fire('climber_100');   }
        if(!s.dominated && s.peakElo>=400){ s.dominated=true; fire('dominator_400'); }
        if(!s.dynastic  && s.peakElo>=600){ s.dynastic=true;  fire('dynasty_600');   }
      }

      // ── Klares Ding: Sieg mit Tordifferenz ≥ 7 ──
      const goalDiff=Math.abs(gf-ga);
      if(w && goalDiff>=7) fire('clear_win');

      // ── Krimi-Reihe: 5 Spiele in Folge mit Tordifferenz ≤ 2 ──
      // Egal ob Sieg oder Niederlage; sobald 5 erreicht → Counter-Reset.
      if(goalDiff<=2){
        s.krimiCur++;
        if(s.krimiCur>=5){ fire('krimi'); s.krimiCur=0; }
      } else {
        s.krimiCur=0;
      }

      // ── Wiederholungstäter: 3 Siege in Folge mit identischem Endstand ──
      // Niederlagen oder Siege mit anderem Score brechen die Serie.
      if(w){
        const score=gf+':'+ga;
        if(score===s.lastWinScore){
          s.wtCur++;
          if(s.wtCur>=3){ fire('repeat_score'); s.wtCur=0; s.lastWinScore=null; }
        } else {
          s.wtCur=1; s.lastWinScore=score;
        }
      } else {
        s.wtCur=0; s.lastWinScore=null;
      }

      // ── Comeback-Tag: Tag mit Niederlage gestartet, mit Sieg beendet, min. 3 Matches ──
      // Erstes Match des Tages für diesen Spieler? → Ergebnis als Tag-Start merken.
      if(s.days[day].g===1){
        s.firstResOfDay[day] = w ? 'W' : 'L';
      }
      // Aktueller Sieg + Tag startete mit Niederlage + min. 3 Matches + noch nicht gefeuert
      if(w && s.days[day].g>=3 && s.firstResOfDay[day]==='L' && !s.comebackFired[day]){
        s.comebackFired[day]=true;
        fire('comeback_day');
      }

      // ── Revanchist: Sieg gegen das Team, gegen das man im direkt vorigen Match verloren hat ──
      // Strikt: das unmittelbar nächste Match nach einer Niederlage muss gegen X sein.
      const currentOpp=(onA?[m.b1,m.b2]:[m.a1,m.a2]).slice().sort().join('|');
      if(s.lastLossOpp){
        if(currentOpp===s.lastLossOpp && w){
          fire('revanchist');
        }
        // Egal ob Revanche gelang oder nicht: Counter resetten (nicht mehr "direkt nächstes Match")
        s.lastLossOpp=null;
      }
      // Wenn aktuelles Match Niederlage: setze lastLossOpp für nächstes Match
      if(!w) s.lastLossOpp=currentOpp;

      // ── Königsklasse / Pflichtaufgabe: Sieg gegen Top-3 / Bottom-3 der Saison-Endrangliste ──
      // Cache ist nach erstem Aufruf für alle weiteren Matches verfügbar.
      if(w){
        const rk=getSeasonRankingsCache();
        const r=rk[seasonOf(m.created_at).id];
        if(r){
          const opps=onA?[m.b1,m.b2]:[m.a1,m.a2];
          if(r.top3.size && opps.some(oId=>r.top3.has(oId))) fire('koenigsklasse');
          if(r.bottom3.size && opps.some(oId=>r.bottom3.has(oId))) fire('pflichtaufgabe');
        }
      }

      // potw / potd / award_collector: erfordern Vergleich aller Spieler am Periodenende →
      // zu komplex für inkrementell, werden in computeBadges() lazy berechnet
      // vice_champion: Saison-End-Event, nicht an ein einzelnes Match gebunden →
      // wird ebenfalls in computeBadges() aus dem seasons-Archiv ermittelt
    });

    map[m.id]=earned;
  });

  _cache._badgeEarnedKey=key;
  _cache._badgeEarnedMap=map;
  return map;
}

function badgesEarnedInMatch(matchId){
  return getBadgeEarnedCache()[matchId]||[];
}

// Ermittelt alle Awards, die ein Spieler aktuell hält (Platz 1–3)
function playerAwards(id){
  const R=awardRankings('all');
  const found=[];

  // Hilfsfunktion: Rang eines Spielers in einem Array berechnen
  // berücksichtigt geteilte Plätze
  const getRank=(arr,valFn,checkFn)=>{
    if(!arr||!arr.length) return -1;
    const topVal=valFn(arr[0]);
    let rank=1;
    for(let i=0;i<Math.min(arr.length,10);i++){
      const val=valFn(arr[i]);
      if(i>0 && val!==valFn(arr[i-1])) rank=i+1;
      if(rank>3) break;
      if(checkFn(arr[i])) return rank-1; // 0-basiert für Kompatibilität
    }
    return -1;
  };

  // Einzel-Awards
  const singleKeys={
    wins:R.winsList, streaks:R.streaks, scorer:R.scorer, wall:R.wall,
    perfect:R.perfect, grinder:R.grinder, worstWr:R.worstWr,
    worstAtk:R.worstAtk, worstDef:R.worstDef,
    clutch:R.clutchList, carryKing:R.carryList,
    onFire:R.onFire, coldStreak:R.coldStreak, lossStreaks:R.lossStreaks,
    solo:R.soloList, formtief:R.formtief, showmaster:R.showmasterList,
    ice:R.iceList, peakElo:R.peakEloList,
    weekKing:R.weekKingList, dayKing:R.dayKingList,
    // ── NEUE AWARDS v3 ──
    plusMinus:R.plusMinusList, underdog:R.underdogList, pechvogel:R.pechvogelList
  };
  const singleValFns={
    wins:x=>x.v, streaks:x=>x.v, scorer:x=>Math.round(x.avg*10),
    wall:x=>-Math.round(x.v/x.g*10), // weniger = besser → negieren
    perfect:x=>Math.round(x.wr*100), grinder:x=>x.v,
    worstWr:x=>-Math.round(x.wr*100), // weniger = "besser" für Schandtafel → negieren
    worstAtk:x=>-Math.round(x.v/x.g*10),
    worstDef:x=>Math.round(x.v/x.g*10),
    clutch:x=>Math.round(x.wr*100),
    carryKing:x=>x.v, onFire:x=>x.v, coldStreak:x=>x.v,
    lossStreaks:x=>x.v, solo:x=>Math.round(x.wr*100),
    formtief:x=>Math.round(x.drop), showmaster:x=>x.v, ice:x=>x.v,
    peakElo:x=>x.v,
    weekKing:x=>x.v, dayKing:x=>x.v,
    // ── NEUE AWARDS v3 ──
    plusMinus:x=>Math.round(x.v*10), // höchster Tor-Saldo gewinnt
    underdog:x=>x.v,                  // meiste Underdog-Siege gewinnt
    pechvogel:x=>Math.round(x.pct*1000)  // höchstes Pct an knappen Niederlagen = Top-1
  };

  Object.entries(singleKeys).forEach(([key,arr])=>{
    if(!arr||!arr.length) return;
    const valFn=singleValFns[key]||(x=>x.v);
    const rank=getRank(arr,valFn,x=>x.id===id);
    if(rank>=0 && rank<=2) found.push({key,rank});
  });

  // Team-Awards
  const teamKeys={
    mvt:R.mvt, bestDuo:R.bestDuo, worstTeam:R.worstTeam,
    endgegner:R.endgegner,
    zirkus:R.zirkusList, baustelle:R.baustelleList
  };
  const teamValFns={
    mvt:x=>Math.round(x.v), bestDuo:x=>x.g,
    worstTeam:x=>-Math.round(x.w/x.g*100),
    endgegner:x=>x.g,
    zirkus:x=>x.v, baustelle:x=>x.best
  };
  Object.entries(teamKeys).forEach(([key,arr])=>{
    if(!arr||!arr.length) return;
    const valFn=teamValFns[key]||(x=>x.v);
    const rank=getRank(arr,valFn,x=>x.ids&&x.ids.includes(id));
    if(rank>=0 && rank<=2){
      const entry=arr.find(x=>x.ids&&x.ids.includes(id));
      const partner=entry?entry.ids.find(x=>x!==id):null;
      found.push({key,rank,partner});
    }
  });

  // Match-Awards
  const matchKeys={upset:R.upsets, biggest:R.biggest};
  const matchValFns={upset:x=>Math.round(x.sp*100), biggest:x=>x.diff};
  Object.entries(matchKeys).forEach(([key,arr])=>{
    if(!arr||!arr.length) return;
    const valFn=matchValFns[key];
    const rank=getRank(arr,valFn,x=>[x.m.a1,x.m.a2,x.m.b1,x.m.b2].includes(id));
    if(rank>=0 && rank<=2) found.push({key,rank});
  });

  return found;
}

function showPlayer(id){
  const p=pmap()[id];if(!p)return;
  const allStats = allPlayerStats(); // Hole den globalen Cache einmal
  const s = allStats[id] || playerStats(id); // Nutze Cache, Fallback für versteckte Spieler
  const {best,worst}=bestWorstMate(id, s); // Übergebe 's'
  const {nemesis:nem,favorite:fav}=nemesis(id, s); // Übergebe 's'
  const wr=Math.round(s.wr*100);
  const atkWr=s.atkWr!==null?Math.round(s.atkWr*100):null;
  const defWr=s.defWr!==null?Math.round(s.defWr*100):null;
  // Saison-Platzierung: nur Spieler mit Spielen IN DIESER SAISON werden gerankt.
  // Wer 0 Saison-Spiele hat, bekommt keinen #-Badge.
  // Sortierung: Saison-Elo (gSim.elo enthält nach Saison-Reset die aktuelle Saison-Elo).
  const gSim=getGlobalSim();
  const rankedSeason=activePlayers()
    .filter(x=>(gSim.playedSeason[x.id]||0)>0)
    .sort((a,b)=>(gSim.elo[b.id]??cfg.start_elo)-(gSim.elo[a.id]??cfg.start_elo));
  const rank=rankedSeason.findIndex(x=>x.id===id)+1;
  const streak=s.curStreak;
  const autoAtk=atkStrength(id);
  const atkPct=Math.round(autoAtk*100);
  const defPct=100-atkPct;
  const longestStr=longestPlayerStreak(id,matches);

  // Form: letzte 5 Matches
  const formMs=matches.filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(id))
    .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5).reverse();
  const formHtml=formMs.map(m=>{const onA=[m.a1,m.a2].includes(id);
    const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
    return `<div class="pd ${w?'w':'l'}"></div>`;}).join('');

  // Elo-Sparkline für die aktuelle Saison (zeigt Saison-Verlauf)
  let sparkHtml='';
  {
    const seasonMs=matchesInSeason().filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(id))
      .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    if(seasonMs.length>=2){
      // FIX: Spark-Trace aus der echten Sim-History bauen, NICHT aus m.deltas (DB).
      // m.deltas kann durch Algo-Tweaks vs. live-Sim divergieren → Anzeige zeigt 222 Elo,
      // Spark zeigt aber +221 weil die Summe der DB-Deltas leicht abweicht.
      // Mit sim.history.eloAfter[id] endet die Linie exakt auf dem angezeigten Elo-Wert.
      const histById = getHistoryByMatchId();
      let eloTrace = cfg.start_elo;
      const series = [eloTrace];
      for(const m of seasonMs){
        const h = histById.get(m.id);
        if(h && h.eloAfter && h.eloAfter[id] !== undefined){
          eloTrace = h.eloAfter[id];
        } else {
          // Fallback (z.B. Match liegt außerhalb der Sim wegen versteckter Spieler):
          // DB-Delta verwenden, damit die Linie weiterläuft
          eloTrace += (m.deltas||{})[id] || 0;
        }
        series.push(eloTrace);
      }
      const minE=Math.min(...series), maxE=Math.max(...series);
      const range=Math.max(20, maxE-minE); // mind. 20 Elo-Range für Sichtbarkeit
      const W=300, H=42, pad=4;
      const usableH=H-2*pad;
      const points=series.map((e,i)=>{
        const x=(i/(series.length-1))*W;
        const y=pad+(1-(e-minE)/range)*usableH;
        return [x,y];
      });
      const linePath='M'+points.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
      const fillPath=linePath+` L${W},${H} L0,${H} Z`;
      const last=points[points.length-1];
      // Konsistenz mit der Elo-Anzeige: gerundete Endsumme minus gerundeter Start
      const net=Math.round(series[series.length-1])-Math.round(series[0]);
      const netCls=net>=0?'pos':'neg';
      const netTxt=(net>=0?'+':'')+net;
      const lineCol=net>=0?'var(--acid)':'var(--red)';
      const gradId='ppspark-'+id;
      sparkHtml=`
        <div class="pp-spark">
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
            <defs>
              <linearGradient id="${esc(gradId)}" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="${lineCol}" stop-opacity=".35"/>
                <stop offset="100%" stop-color="${lineCol}" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <path d="${fillPath}" fill="url(#${esc(gradId)})"/>
            <path d="${linePath}" fill="none" stroke="${lineCol}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.5" fill="${lineCol}"/>
          </svg>
        </div>
        <div class="pp-spark-foot">
          <span>Elo · ${esc(seasonLabel(currentSeason().id))}</span>
          <span class="delta ${netCls}">${netTxt}</span>
        </div>`;
    }
  }

  const streakBadge = streakInline(streak);
  const _posCls = posClassify(autoAtk);
  const posIcon = svgI(_posCls.icon);
  const posLabel = _posCls.label;

  // ── Peak-Elo (Saison + Allzeit) für die Trinity-Box ──
  // Peak Saison: höchster Stand in der LAUFENDEN Saison — aus History rekonstruiert
  // Peak Allzeit: höchster je erreichter Saison-Elo (saison-übergreifend, aus globalSim)
  // Zusätzlich: Saison-Label des Allzeit-Peaks als Sub-Text ("Mai 2026")
  let peakSeason = null, peakAlltime = null, peakAlltimeSeason = '';
  {
    const histByMatch = getHistoryByMatchId();
    // Peak Saison: über alle Saison-Matches des Spielers in chronologischer Reihenfolge
    const seasonMsForPeak = matchesInSeason()
      .filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(id))
      .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    if(seasonMsForPeak.length){
      let v = cfg.start_elo, mx = v;
      for(const m of seasonMsForPeak){
        const h = histByMatch.get(m.id);
        if(h && h.eloAfter && h.eloAfter[id]!==undefined) v = h.eloAfter[id];
        else v += (m.deltas||{})[id] || 0;
        if(v > mx) mx = v;
      }
      peakSeason = Math.round(mx);

    // Peak Allzeit: bevorzugt aus globalSim.peakElo, sonst über alle Matches scannen
    const peakV = gSim.peakElo ? gSim.peakElo[id] : undefined;

      let bestMatch = null, bestVal = -Infinity;
      for(const m of matches){
        if(![m.a1,m.a2,m.b1,m.b2].includes(id)) continue;
        const h = histByMatch.get(m.id);
        if(!h || !h.eloAfter || h.eloAfter[id] === undefined) continue;
        if(h.eloAfter[id] > bestVal){
          bestVal = h.eloAfter[id];

        }

  const cnt = (set) => awards.filter(a => set.has(a.key)).length;
  const awCats = [
    {ic:'star',   nm:'Positive<br>Awards', n: cnt(POSITIVE_KEYS)},

  const badges=getCachedBadges(id);
  const badgeTotal=badges.reduce((sum,b)=>sum+b.count,0);

  const sa = playerSeasonAwards(id);
  const seasonHistory = computeSeasonHistory(id, 5);
  // Saison-Trend: vergleicht jüngste mit älteren Platzierungen
  const seasonTrend = (() => {
    if(!seasonHistory || seasonHistory.length < 2) return null;
    const places = seasonHistory.map(h => h.place).filter(p => p > 0);
    if(places.length < 2) return null;
    const half = Math.ceil(places.length / 2);
    const recent = places.slice(0, half);
    const older = places.slice(half);
    if(!older.length) return null;
    const recentAvg = recent.reduce((a,b)=>a+b, 0) / recent.length;
    const olderAvg  = older.reduce((a,b)=>a+b, 0) / older.length;
    if(recentAvg < olderAvg - 0.5) return {arrow:'↗', cls:'', text:'Form steigend'};
    if(recentAvg > olderAvg + 0.5) return {arrow:'↘', cls:'neg', text:'Form fallend'};
    const avg = places.reduce((a,b)=>a+b, 0) / places.length;
    if(avg <= 3) return {arrow:'→', cls:'', text:'stabil top 3'};
    if(avg <= 5) return {arrow:'→', cls:'neutral', text:'stabil top 5'};
    return {arrow:'→', cls:'neutral', text:'Ø Platz '+Math.round(avg)};
  })();

  const rInfo = getPlayerRank(id);

  const trophyHtml = `

  const _fillPct = _activeIdx >= 0 ? _activeIdx * 25 : 0;
const rankProgHtml = `

    ${rInfo?`
      <div class="pp-percentile ${tierClass}">
        <div class="pp-percentile-foot">
          <span>Ø Saison-Elo <strong>${rInfo.avg}</strong></span>

  openSheet(`

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[rInfo.icon]||''}</svg>

    <div class="pp-sec" style="animation-delay:.4s">

      <div class="pp-streaks">

// ─── Spieler bearbeiten: Spitzname + Avatar wählen ───
function showEditPlayer(id){
  const p=pmap()[id]; if(!p) return;
  let selectedAvatar = p.avatar_id || null;

  const avPickerHtml = `
    <div class="av-picker" id="avPicker">
      <div class="av-opt initials ${!selectedAvatar?'selected':''}" data-av="">
        <span class="em">${initials(p.name)}</span>
      </div>
      ${AVATAR_OPTIONS.map(o=>`
        <div class="av-opt ${selectedAvatar===o.id?'selected':''}" data-av="${o.id}">
          <span class="em">${o.em}</span>
        </div>`).join('')}
    </div>`;

  openSheet(`
    <h3>Profil bearbeiten</h3>
    <div class="sheet-sub">${esc(p.name)}</div>

    <div class="field-label">Profilbild</div>
    ${avPickerHtml}

    <div class="btn-row" style="margin-top:20px">
      <button class="btn ghost" id="editCancel">Abbrechen</button>
      <button class="btn" id="editSave">Speichern</button>
    </div>
  `);

  const picker = document.getElementById('avPicker');
  if(picker){
    picker.querySelectorAll('.av-opt').forEach(el=>{
      el.onclick=()=>{
        picker.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('selected'));
        el.classList.add('selected');
        selectedAvatar = el.dataset.av || null;
      };
    });
  }

  document.getElementById('editCancel').onclick=()=>{
    closeSheet(); setTimeout(()=>showPlayer(id),350);
  };

  document.getElementById('editSave').onclick=async()=>{
    const updates = { avatar_id: selectedAvatar || null };
    // Lokales Update sofort
    p.avatar_id = updates.avatar_id;
    // DB-Update versuchen
    const {error} = await sb.from('players').update(updates).eq('id',id);
    if(error){
      // Spalte existiert evtl. nicht in DB – lokaler Fallback via localStorage
      console.warn('DB-Update fehlgeschlagen, localStorage-Fallback:', error.message);
      try{
        localStorage.setItem('playerEdit_'+id, JSON.stringify(updates));
        toast('Gespeichert (lokal)','ok');
      }catch(e){
        toast('Lokal gespeichert');
      }
    } else {
      toast('Gespeichert','ok');
    }
    closeSheet();
    setTimeout(()=>showPlayer(id),350);
  };
}

// ─── Saison-Verlauf berechnen (letzte N) ───
function computeSeasonHistory(playerId, limit){
  const allSeasonIds = [...allPastSeasons(), currentSeason().id];
  const last = allSeasonIds.slice(-limit);
  return last.map(sid=>{
    const sMatches = matchesInSeason(sid).filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(playerId));
    if(!sMatches.length) return null;
    let w=0, l=0;
    sMatches.forEach(m=>{
      const onA=[m.a1,m.a2].includes(playerId);
      const won=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      if(won) w++; else l++;
    });
    const gSim = getGlobalSim();
    const snapshot = gSim.seasonEndElos[sid] || {};
    const seasonPlayedMap = gSim.seasonPlayed[sid] || {};
    const startElo = cfg.start_elo;
    const endElo = snapshot[playerId] ?? startElo;
    const eloDelta = Math.round(endElo - startElo);
    const playersInSeason = players.filter(pp=>!pp.hidden);
    const seasonRanking = playersInSeason.map(pp=>({
      id:pp.id, e: (snapshot[pp.id] ?? startElo), g: (seasonPlayedMap[pp.id]||0)
    })).filter(x=>x.g>0).sort((a,b)=>b.e-a.e);
    const place = seasonRanking.findIndex(x=>x.id===playerId)+1;
    return {
      id:sid, label:seasonLabel(sid),
      wins:w, losses:l, eloDelta,
      place: place>0?place:null,
    };
  }).filter(Boolean).reverse();
}

// Awards-Sheet für einen Spieler: listet alle gehaltenen Awards auf, jeweils anklickbar

    .sort((a,b)=>avgs[b.id]-avgs[a.id]);
  const rows=RANKS.map((r,i)=>{
    const prev=RANKS[i-1];
    const fromPct=prev?Math.round(prev.pct*100):0;
    const toPct=Math.round(r.pct*100);
    const label=i===0?'Top '+toPct+'%':fromPct+'% – '+toPct+'%';
    const inRank=ranked.filter((_,idx)=>{
      const pct=(idx+1)/ranked.length;

        ${inRank.map(p=>`<div style="display:flex;justify-content:space-between;
          align-items:center;font-size:12px;padding:4px 0;border-top:1px solid var(--line)">
          <div style="display:flex;align-items:center;gap:8px">
            ${avHtml(p,'width:24px;height:24px;border-radius:7px;font-size:9px')}

          <span style="font-family:'Sometype Mono',monospace;font-size:11px;color:${r.color}">
            Ø ${avgs[p.id]}
          </span>
        </div>`).join('')}
      </div>`:''}    </div>`;
  }).join('');

// Badges-Sheet: zeigt alle Badges (freigeschaltet vs. gesperrt)
function showPlayerBadges(playerId){
  const p = pmap()[playerId]; if(!p) return;
  const earned = getCachedBadges(playerId);
  const earnedIds = new Map(earned.map(b => [b.id, b.count]));
  // ONCE_ONLY: Badges, die man nur einmal erreicht (keine Wiederholung als ×N)
  const ONCE_ONLY = new Set(['first_match','games25','games150','allrounder','def50','atk50',
    'climber_100','dominator_400','dynasty_600']);

  // ─── Aggregation pro Tier ───
  // Pro Rarity: BADGES-Array in Reihenfolge durchgehen, in Buckets sortieren.
  // Innerhalb des Buckets bleibt die thematische Reihenfolge erhalten.
  const buckets = {legendary:[], rare:[], common:[], negative:[]};
  BADGES.forEach(b => {
    const r = rarityOf(b.id);
    if(buckets[r]) buckets[r].push(b);
  });
  const have = (r) => buckets[r].filter(b => earnedIds.has(b.id)).length;
  const haveTotal = have('legendary')+have('rare')+have('common')+have('negative');
  const trigCount = earned.reduce((s,b)=>s+b.count,0);

  // ─── Tier-Counter-Bar (oben im Sheet) ───
  const pill = (r) => {
    const meta = RARITY_META[r];
    const h = have(r);
    const dim = h===0 ? 'dim' : '';
    return `<span class="tc-pill ${r} ${dim}"><span class="dot"></span><span class="n">${h} / ${meta.total}</span></span>`;
  };
  const counterHtml = `
    <div class="bsh-counter">
      ${pill('legendary')}
      ${pill('rare')}
      ${pill('common')}
      <span class="tc-sep"></span>
      ${pill('negative')}
    </div>`;

  // ─── Card-Renderer (eine Badge → eine Card) ───
  const renderCard = (b, r) => {
    const cnt = earnedIds.get(b.id) || 0;
    const unlocked = cnt > 0;
    const isRepeatable = !ONCE_ONLY.has(b.id);
    if(!unlocked){
      // Locked: neutral grau, Lock-Icon zentral, winziger Tier-Dot oben links
      return `<div class="bsh-card locked ${r}">
        <span class="tier-dot"></span>
        <div class="bsh-card-ic">${svgI('lock')}</div>
        <div class="bsh-card-name">${esc(b.name)}</div>
        <div class="bsh-card-desc">${esc(b.desc)}</div>
      </div>`;
    }
    // Unlocked: Tier-Farbe + Akzent-Strich oben (per CSS)
    const meta = isRepeatable
      ? `<div class="bsh-card-count">×${cnt}</div>`
      : `<div class="bsh-card-once">Freigeschaltet</div>`;
    return `<div class="bsh-card unlocked ${r}">
      <div class="bsh-card-ic">${badgeIc(b,'30px')}</div>
      <div class="bsh-card-name">${esc(b.name)}</div>
      <div class="bsh-card-desc">${esc(b.desc)}</div>
      ${meta}
    </div>`;
  };

  // Positive Tiers (Legendary → Rare → Common) zusammengefasst in einem Grid
  const positiveCards = ['legendary','rare','common']
    .flatMap(r => buckets[r].map(b => renderCard(b, r)))
    .join('');

  // Negative-Block separat mit Schande-Trennlinie
  const negativeCards = buckets.negative.map(b => renderCard(b, 'negative')).join('');
  const negativeBlock = negativeCards ? `
    <div class="bsh-neg-divider">
      <div class="bsh-neg-divider-line"></div>
      <div class="bsh-neg-divider-label"><span class="dot"></span>Schande</div>
      <div class="bsh-neg-divider-line"></div>
    </div>
    <div class="bsh-grid">${negativeCards}</div>` : '';

  openSheet(`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
      ${avHtml(p,"width:48px;height:48px;border-radius:14px;font-size:18px")}
      <div>
        <h3>Auszeichnungen</h3>
        <div class="sheet-sub">${esc(p.name)} · <b style="color:var(--acid)">${haveTotal}</b> von ${BADGES.length} · ${trigCount}× ausgelöst</div>
      </div>
    </div>
    ${counterHtml}
    <div class="bsh-grid">${positiveCards}</div>
    ${negativeBlock}
    <button class="btn ghost sm" id="backToPlayer2" style="margin-top:18px">← Zurück zum Profil</button>
  `);
  const back = document.getElementById('backToPlayer2');
  if(back) back.onclick = () => { closeSheet(); setTimeout(()=>showPlayer(playerId), 350); };
}

    <button class="btn ghost sm" id="backToPlayerH2H" style="margin-top:16px">← Zurück zum Profil</button>

// Saison-Auszeichnungen eines Spielers
function playerSeasonAwards(id){
  // Cache-Schlüssel muss auch die Version der 'seasons' berücksichtigen,
  // da sich diese unabhängig von `matches` ändern können.
  const key='playerSeasonAwards_'+id+'_'+seasons.length+'_'+_cache.version;
  if(!_cache._playerSeasonAwards) _cache._playerSeasonAwards={};
  if(_cache._playerSeasonAwards[key]) return _cache._playerSeasonAwards[key];

  const result=seasons.filter(s=>s.player_id===id||s.team_p1===id||s.team_p2===id);
  _cache._playerSeasonAwards[key]=result;
  return result;
}
