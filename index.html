// Hilfsfunktion: Badge → SVG-Icon-HTML (mit Fallback auf Emoji)
function badgeIc(b, size){
  size = size || 'inherit';
  if(!b) return '';
  const key = b.ic || null;
  if(key && ICONS[key]) {
    return `<span class="ic svg-ic" style="font-size:${size}"><svg viewBox="0 0 24 24">${ICONS[key]}</svg></span>`;
  }
  return b.em || '';
}

// Badge-Hilfsfunktionen
function matchOf(id,m){return [m.a1,m.a2,m.b1,m.b2].includes(id);}
function won(id,m){const onA=[m.a1,m.a2].includes(id);return (onA&&m.winner==='A')||(!onA&&m.winner==='B');}
function goalsFor(id,m){return [m.a1,m.a2].includes(id)?m.score_a:m.score_b;}
function goalsAgainst(id,m){return [m.a1,m.a2].includes(id)?m.score_b:m.score_a;}
function shutout(id,m,myG,theirG){return goalsFor(id,m)===myG&&goalsAgainst(id,m)===theirG;}
function myExp(id,m){const onA=[m.a1,m.a2].includes(id);return onA?(m.exp_a||0.5):(1-(m.exp_a||0.5));}
function countGames(id,ms){return ms.filter(m=>matchOf(id,m)).length;}
function countWins(id,ms){return ms.filter(m=>matchOf(id,m)&&won(id,m)).length;}

// Zählt in wie vielen abgeschlossenen Wochen/Monaten der Spieler die meisten Siege hatte
function countPeriodWins(id,allMs,periodType){
  const buckets={};
  allMs.forEach(m=>{
    const d=new Date(m.created_at);
    let key;
    if(periodType==='week'){
      // ISO Kalenderwoche (gleiche Formel wie isoWeek)
      key=d.getFullYear()+'-W'+isoWeek(d);
    } else {
      key=d.getFullYear()+'-'+d.getMonth();
    }
    if(!buckets[key])buckets[key]=[];
    buckets[key].push(m);
  });
  // Aktuellen Zeitraum ausschließen (noch nicht abgeschlossen)
  const now=new Date();
  let curKey;
  if(periodType==='week'){
    curKey=now.getFullYear()+'-W'+isoWeek(now);
  } else {
    curKey=now.getFullYear()+'-'+now.getMonth();
  }
  let count=0;
  Object.entries(buckets).forEach(([key,ms])=>{
    if(key===curKey)return; // noch laufend
    if(ms.length<2)return;  // min. 2 Spiele im Zeitraum
    // Siege pro Spieler in diesem Zeitraum
    const winsById={},gamesById={};
    ms.forEach(m=>[m.a1,m.a2,m.b1,m.b2].forEach(pid=>{
      if(!winsById[pid])winsById[pid]=0; if(!gamesById[pid])gamesById[pid]=0;
      gamesById[pid]++;
      const onA=[m.a1,m.a2].includes(pid);
      if((onA&&m.winner==='A')||(!onA&&m.winner==='B'))winsById[pid]++
    }));
    const minW=periodType==='week'?5:10;
    // Nur Spieler mit genug Siegen qualifiziert, dann nach Winrate
    const qual=Object.entries(winsById).filter(([,w])=>w>=minW);
    if(!qual.length)return;
    const wrs=qual.map(([pid,w])=>w/(gamesById[pid]||1));
    if(!wrs.length)return;
    const bestWr=Math.max(...wrs);
    const myW=winsById[id]||0;
    if(myW>=minW && myW/(gamesById[id]||1)>=bestWr-0.001) count++;
  });
  return count;
}

// Player of the Day: zählt Tage an denen dieser Spieler die meisten Siege hatte (min 3 Siege am Tag)
function countDayWins(id,allMs){
  const byDay={};
  allMs.forEach(m=>{
    const day=new Date(m.created_at).toISOString().slice(0,10);
    if(!byDay[day])byDay[day]=[];
    byDay[day].push(m);
  });
  let count=0;
  Object.values(byDay).forEach(dayMs=>{
    if(dayMs.length<2)return;
    const winsById={};
    dayMs.forEach(m=>[m.a1,m.a2,m.b1,m.b2].forEach(pid=>{
      if(!winsById[pid])winsById[pid]=0;
      const onA=[m.a1,m.a2].includes(pid);
      if((onA&&m.winner==='A')||(!onA&&m.winner==='B'))winsById[pid]++;
    }));
    const maxW=Math.max(...Object.values(winsById));
    if(maxW<3)return;
    if((winsById[id]||0)===maxW) count++;
  });
  return count;
}

function longestPlayerStreak(id,ms){
  const ordered=[...ms].filter(m=>matchOf(id,m)).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let cur=0,best=0;
  ordered.forEach(m=>{if(won(id,m)){cur++;if(cur>best)best=cur;}else cur=0;});
  return best;
}
// Zählt wie oft eine Siegesserie der Länge >= n erreicht wurde (separate Serien)
function countStreakOccurrences(id,ms,n){
  const ordered=[...ms].filter(m=>matchOf(id,m)).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let cur=0,count=0,awarded=false;
  ordered.forEach(m=>{
    if(won(id,m)){cur++;if(cur>=n&&!awarded){count++;awarded=true;}}
    else {cur=0;awarded=false;}
  });
  return count;
}
// Zählt wie oft eine Niederlagenserie >= n erreicht wurde
function countLossStreakOccurrences(id,ms,n){
  const ordered=[...ms].filter(m=>matchOf(id,m)).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let cur=0,count=0,awarded=false;
  ordered.forEach(m=>{if(!won(id,m)){cur++;if(cur>=n&&!awarded){count++;awarded=true;}}else{cur=0;awarded=false;}});
  return count;
}
// Carry: Sieg wenn dein Mate der schwächste der 4 Spieler im Match war
// Nutzt globalen Elo-History-Cache für historische Elo-Stände
function countCarries(id,ms){
  const sim=getGlobalSim();
  const snapMap={};
  sim.history.forEach(h=>{snapMap[h.matchId]=h.eloBefore;});
  return ms.filter(m=>{
    if(!matchOf(id,m)||!won(id,m))return false;
    const snap=snapMap[m.id]; if(!snap)return false;
    const allFour=[m.a1,m.a2,m.b1,m.b2];
    if(allFour.some(x=>snap[x]===undefined))return false;
    const weakest=allFour.reduce((a,b)=>(snap[a] ?? cfg.start_elo)<=(snap[b] ?? cfg.start_elo)?a:b);
    const onA=[m.a1,m.a2].includes(id);
    const mate=onA?(id===m.a1?m.a2:m.a1):(id===m.b1?m.b2:m.b1);
    return mate===weakest;
  }).length;
}
// Zählt Tage an denen der Spieler min. 3 Spiele hatte und keines verloren hat
function countUnbeatableDays(id,ms){
  const mine=ms.filter(m=>matchOf(id,m));
  const byDay={};
  mine.forEach(m=>{const d=new Date(m.created_at).toISOString().slice(0,10);
    if(!byDay[d])byDay[d]={games:0,losses:0}; byDay[d].games++; if(!won(id,m))byDay[d].losses++;});
  return Object.values(byDay).filter(d=>d.games>=3&&d.losses===0).length;
}
function getCachedBadges(id){

  if(_cache._badges[key]) return _cache._badges[key];

  return r;
}

// Berechnet alle freigeschalteten Badges für einen Spieler (mit Anzahl für multi-Badges)
function computeBadges(id){
  const result=[];
  BADGES.forEach(b=>{
    const c=b.count(id,matches);
    if(c>0) result.push({id:b.id,em:b.em,ic:b.ic,name:b.name,desc:b.desc,count:c});
  });
  return result;
}

// Ermittelt welche Badges durch ein bestimmtes Match NEU freigeschaltet / erneut erreicht wurden
function getBadgeEarnedCache(){
  const key='badgeEarned_'+matches.length+'_'+_cache.version;
  if(_cache._badgeEarnedKey===key) return _cache._badgeEarnedMap;

  const map={};
  const ordered=[...matches].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  // Globale Sim für Carry (historische Elo-Stände vor jedem Match)
  const globalSim=getGlobalSim();
  const snapMap={};
  globalSim.history.forEach(h=>{ snapMap[h.matchId]=h.eloBefore; });

  // Inkrementeller State pro Spieler
  const st={};
  players.forEach(p=>{
    st[p.id]={
      games:0, wins:0,
      atkG:0, atkW:0,
      defG:0, defW:0,
      curStreak:0, curLoss:0,
      // Streak-Awards: werden zurückgesetzt wenn Serie bricht
      sa5:false, sa10:false, sa15:false, sa30:false,
      // Loss-Streak-Award: wird zurückgesetzt wenn Sieg kommt
      la5:false,
      // Tages-Tracker für Unbeatable
      days:{}, // "YYYY-MM-DD" → { g, l }
    };
  });

  ordered.forEach(m=>{
    const earned=[];
    const ids=[m.a1,m.a2,m.b1,m.b2];

    ids.forEach(id=>{
      if(!st[id]) return;
      const s=st[id];
      const onA=[m.a1,m.a2].includes(id);
      const w=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      const gf=onA?m.score_a:m.score_b;
      const ga=onA?m.score_b:m.score_a;
      const pos=id===m.a1?m.a1_pos:id===m.a2?m.a2_pos:id===m.b1?m.b1_pos:m.b2_pos;
      const myExp=onA?(m.exp_a||0.5):(1-(m.exp_a||0.5));
      const day=new Date(m.created_at).toISOString().slice(0,10);

      // Werte VOR diesem Match sichern (für Schwellen-Checks)
      const pg=s.games, pAtkW=s.atkW, pDefW=s.defW, pAtkG=s.atkG, pDefG=s.defG;
      const prevAllrounder=pAtkW>=20&&pDefW>=20;

      // ── State updaten ──
      s.games++;
      if(w) s.wins++;
      if(pos==='atk'){s.atkG++;if(w)s.atkW++;}
      else            {s.defG++;if(w)s.defW++;}

      if(w){
        s.curStreak=s.curStreak>0?s.curStreak+1:1;
        s.curLoss=0;
        s.la5=false;
      } else {
        s.curLoss=s.curLoss>0?s.curLoss+1:1;
        s.curStreak=0;
        s.sa5=false; s.sa10=false; s.sa15=false; s.sa30=false;
      }

      if(!s.days[day]) s.days[day]={g:0,l:0};
      s.days[day].g++;
      if(!w) s.days[day].l++;

      // ── Helper ──
      const fire=(bid)=>{
        const b=BADGES.find(x=>x.id===bid);
        if(b) earned.push({playerId:id,badge:b});
      };

      // ── Einfache Schwellen-Badges ──
      if(pg===0)                                    fire('first_match');
      if(pg<25   && s.games>=25)                    fire('games25');
      if(pg<150  && s.games>=150)                   fire('games150');
      if(!prevAllrounder && s.atkW>=20 && s.defW>=20) fire('allrounder');
      if(pDefG<50 && s.defG>=50)                    fire('def50');
      if(pAtkG<50 && s.atkG>=50)                    fire('atk50');

      // ── Match-Ergebnis-Badges ──
      if(w  && gf===10 && ga===0)                   fire('perfect_win');
      if(!w && gf===0  && ga===10)                  fire('perfect_loss');
      if(w  && gf===10 && ga===9)                   fire('nail_biter');
      if(w  && pos==='def' && ga<=2)                fire('wall_badge');
      if(w  && myExp<0.35)                          fire('upset_king');

      // ── Streak-Badges (nur wenn Schwelle NEU in dieser Serie) ──
      if(w && s.curStreak>=5  && !s.sa5)  { s.sa5=true;  fire('streak5');  }
      if(w && s.curStreak>=10 && !s.sa10) { s.sa10=true; fire('streak10'); }
      if(w && s.curStreak>=15 && !s.sa15) { s.sa15=true; fire('streak15'); }
      if(w && s.curStreak>=30 && !s.sa30) { s.sa30=true; fire('streak30'); }

      // ── Loss-Streak-Badge ──
      if(!w && s.curLoss>=5 && !s.la5)   { s.la5=true;  fire('losing5');  }

      // ── Carry ──
      const snap=snapMap[m.id];
      if(w && snap){
        const allFour=[m.a1,m.a2,m.b1,m.b2];
        if(allFour.every(x=>snap[x]!==undefined)){
          const weakest=allFour.reduce((a,b)=>
            (snap[a]??cfg.start_elo)<=(snap[b]??cfg.start_elo)?a:b);
          const mate=onA?(id===m.a1?m.a2:m.a1):(id===m.b1?m.b2:m.b1);
          if(mate===weakest) fire('carry');
        }
      }

      // ── Unbeatable Day ──
      // Feuert genau wenn der 3. saubere Sieg an einem Tag erreicht wird
      const d=s.days[day];
      if(d.g===3 && d.l===0) fire('unbeatable');

      // potw / potd: erfordern Vergleich aller Spieler am Periodenende →
      // zu komplex für inkrementell, werden in computeBadges() lazy berechnet
    });

    map[m.id]=earned;
  });

  _cache._badgeEarnedKey=key;
  _cache._badgeEarnedMap=map;
  return map;
}

function badgesEarnedInMatch(matchId){
  return getBadgeEarnedCache()[matchId]||[];
}

// Ermittelt alle Awards, die ein Spieler aktuell hält (Platz 1–3)
function playerAwards(id){
  const R=awardRankings('all');
  const found=[];

  // Hilfsfunktion: Rang eines Spielers in einem Array berechnen
  // berücksichtigt geteilte Plätze
  const getRank=(arr,valFn,checkFn)=>{
    if(!arr||!arr.length) return -1;
    const topVal=valFn(arr[0]);
    let rank=1;
    for(let i=0;i<Math.min(arr.length,10);i++){
      const val=valFn(arr[i]);
      if(i>0 && val!==valFn(arr[i-1])) rank=i+1;
      if(rank>3) break;
      if(checkFn(arr[i])) return rank-1; // 0-basiert für Kompatibilität
    }
    return -1;
  };

  // Einzel-Awards
  const singleKeys={
    wins:R.winsList, streaks:R.streaks, scorer:R.scorer, wall:R.wall,
    perfect:R.perfect, grinder:R.grinder, worstWr:R.worstWr,
    worstAtk:R.worstAtk, worstDef:R.worstDef,
    clutch:R.clutchList, carryKing:R.carryList,
    onFire:R.onFire, coldStreak:R.coldStreak, lossStreaks:R.lossStreaks,
    solo:R.soloList, formtief:R.formtief, showmaster:R.showmasterList,
    ice:R.iceList
  };
  const singleValFns={
    wins:x=>x.v, streaks:x=>x.v, scorer:x=>Math.round(x.avg*10),
    wall:x=>-Math.round(x.v/x.g*10), // weniger = besser → negieren
    perfect:x=>Math.round(x.wr*100), grinder:x=>x.v,
    worstWr:x=>-Math.round(x.wr*100), // weniger = "besser" für Schandtafel → negieren
    worstAtk:x=>-Math.round(x.v/x.g*10),
    worstDef:x=>Math.round(x.v/x.g*10),
    clutch:x=>Math.round(x.wr*100),
    carryKing:x=>x.v, onFire:x=>x.v, coldStreak:x=>x.v,
    lossStreaks:x=>x.v, solo:x=>Math.round(x.wr*100),
    formtief:x=>Math.round(x.drop), showmaster:x=>x.v, ice:x=>x.v
  };

  Object.entries(singleKeys).forEach(([key,arr])=>{
    if(!arr||!arr.length) return;
    const valFn=singleValFns[key]||(x=>x.v);
    const rank=getRank(arr,valFn,x=>x.id===id);
    if(rank>=0 && rank<=2) found.push({key,rank});
  });

  // Team-Awards
  const teamKeys={
    mvt:R.mvt, bestDuo:R.bestDuo, worstTeam:R.worstTeam,
    endgegner:R.endgegner,
    zirkus:R.zirkusList, baustelle:R.baustelleList
  };
  const teamValFns={
    mvt:x=>Math.round(x.v), bestDuo:x=>x.g,
    worstTeam:x=>-Math.round(x.w/x.g*100),
    endgegner:x=>x.g,
    zirkus:x=>x.v, baustelle:x=>x.best
  };
  Object.entries(teamKeys).forEach(([key,arr])=>{
    if(!arr||!arr.length) return;
    const valFn=teamValFns[key]||(x=>x.v);
    const rank=getRank(arr,valFn,x=>x.ids&&x.ids.includes(id));
    if(rank>=0 && rank<=2){
      const entry=arr.find(x=>x.ids&&x.ids.includes(id));
      const partner=entry?entry.ids.find(x=>x!==id):null;
      found.push({key,rank,partner});
    }
  });

  // Match-Awards
  const matchKeys={upset:R.upsets, biggest:R.biggest};
  const matchValFns={upset:x=>Math.round(x.sp*100), biggest:x=>x.diff};
  Object.entries(matchKeys).forEach(([key,arr])=>{
    if(!arr||!arr.length) return;
    const valFn=matchValFns[key];
    const rank=getRank(arr,valFn,x=>[x.m.a1,x.m.a2,x.m.b1,x.m.b2].includes(id));
    if(rank>=0 && rank<=2) found.push({key,rank});
  });

  return found;
}

// ─── Spieler bearbeiten: Spitzname + Avatar wählen ───
function showEditPlayer(id){
  const p=pmap()[id]; if(!p) return;
  let selectedAvatar = p.avatar_id || null;

  const avPickerHtml = `
    <div class="av-picker" id="avPicker">
      <div class="av-opt initials ${!selectedAvatar?'selected':''}" data-av="">
        <span class="em">${initials(p.name)}</span>
      </div>
      ${AVATAR_OPTIONS.map(o=>`
        <div class="av-opt ${selectedAvatar===o.id?'selected':''}" data-av="${o.id}">
          <span class="em">${o.em}</span>
        </div>`).join('')}
    </div>`;

  openSheet(`
    <h3>Profil bearbeiten</h3>
    <div class="sheet-sub">${esc(p.name)}</div>

    <div class="field-label">Profilbild</div>
    ${avPickerHtml}

    <div class="btn-row" style="margin-top:20px">
      <button class="btn ghost" id="editCancel">Abbrechen</button>
      <button class="btn" id="editSave">Speichern</button>
    </div>
  `);

  const picker = document.getElementById('avPicker');
  if(picker){
    picker.querySelectorAll('.av-opt').forEach(el=>{
      el.onclick=()=>{
        picker.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('selected'));
        el.classList.add('selected');
        selectedAvatar = el.dataset.av || null;
      };
    });
  }

  document.getElementById('editCancel').onclick=()=>{
    closeSheet(); setTimeout(()=>showPlayer(id),350);
  };

  document.getElementById('editSave').onclick=async()=>{
    const updates = { avatar_id: selectedAvatar || null };
    // Lokales Update sofort
    p.avatar_id = updates.avatar_id;
    // DB-Update versuchen
    const {error} = await sb.from('players').update(updates).eq('id',id);
    if(error){
      // Spalte existiert evtl. nicht in DB – lokaler Fallback via localStorage
      console.warn('DB-Update fehlgeschlagen, localStorage-Fallback:', error.message);
      try{
        localStorage.setItem('playerEdit_'+id, JSON.stringify(updates));
        toast('Gespeichert (lokal)','ok');
      }catch(e){
        toast('Lokal gespeichert');
      }
    } else {
      toast('Gespeichert','ok');
    }
    closeSheet();
    setTimeout(()=>showPlayer(id),350);
  };
}

// ─── Saison-Verlauf berechnen (letzte N) ───
function computeSeasonHistory(playerId, limit){
  const allSeasonIds = [...allPastSeasons(), currentSeason().id];
  const last = allSeasonIds.slice(-limit);
  return last.map(sid=>{
    const sMatches = matchesInSeason(sid).filter(m=>[m.a1,m.a2,m.b1,m.b2].includes(playerId));
    if(!sMatches.length) return null;
    let w=0, l=0;
    sMatches.forEach(m=>{
      const onA=[m.a1,m.a2].includes(playerId);
      const won=(onA&&m.winner==='A')||(!onA&&m.winner==='B');
      if(won) w++; else l++;
    });
    const gSim = getGlobalSim();
    const snapshot = gSim.seasonEndElos[sid] || {};
    const seasonPlayedMap = gSim.seasonPlayed[sid] || {};
    const startElo = cfg.start_elo;
    const endElo = snapshot[playerId] ?? startElo;
    const eloDelta = Math.round(endElo - startElo);
    const playersInSeason = players.filter(pp=>!pp.hidden);
    const seasonRanking = playersInSeason.map(pp=>({
      id:pp.id, e: (snapshot[pp.id] ?? startElo), g: (seasonPlayedMap[pp.id]||0)
    })).filter(x=>x.g>0).sort((a,b)=>b.e-a.e);
    const place = seasonRanking.findIndex(x=>x.id===playerId)+1;
    return {
      id:sid, label:seasonLabel(sid),
      wins:w, losses:l, eloDelta,
      place: place>0?place:null,
    };
  }).filter(Boolean).reverse();
}

// Awards-Sheet für einen Spieler: listet alle gehaltenen Awards auf, jeweils anklickbar
function showRangSystem(){
  const avgs=getSeasonAvgElos();
  const ranked=players.filter(p=>!p.hidden&&avgs[p.id]!==null)
    .sort((a,b)=>avgs[b.id]-avgs[a.id]);
  const rows=RANKS.map((r,i)=>{
    const prev=RANKS[i-1];
    const fromPct=prev?Math.round(prev.pct*100):0;
    const toPct=Math.round(r.pct*100);
    const label=i===0?'Top '+toPct+'%':fromPct+'% – '+toPct+'%';
    const inRank=ranked.filter((_,idx)=>{
      const pct=(idx+1)/ranked.length;
      const prevR=RANKS[i-1];
      return pct<=(r.pct+0.001)&&(!prevR||pct>(prevR.pct+0.001));
    });

  document.querySelectorAll('[data-awperiod]').forEach(b=>b.onclick=()=>{awPeriod=b.dataset.awperiod;if(awPeriod!=='season')awSeasonId=null;render();});
  const awSP=document.getElementById('awSeasonPicker');
  if(awSP) awSP.onchange=()=>{awSeasonId=awSP.value;render();};

  // teams toggle (eigene State-Variable teamView)
  document.querySelectorAll('[data-teamtoggle]').forEach(b=>b.onclick=()=>{teamView=b.dataset.teamtoggle;render();});

  // detail
  document.querySelectorAll('[data-detail]').forEach(el=>el.onclick=()=>showPlayer(el.dataset.detail));
  // team detail
  document.querySelectorAll('[data-team]').forEach(el=>el.onclick=()=>{

  });
  const dc=document.getElementById('defenderCard');
  if(dc) dc.onclick=()=>{

    if(last&&last.player_id) showPlayer(last.player_id);
  };

  // history filter
  const hs=document.getElementById('histSel');if(hs)hs.onchange=()=>{histFilter=hs.value;render();};
  document.querySelectorAll('[data-match]').forEach(el=>el.onclick=e=>{

  document.querySelectorAll('[data-delmatch]').forEach(el=>el.onclick=e=>{
    e.stopPropagation(); showMatchDetail(el.dataset.delmatch);});

  // match builder
  if(document.getElementById('saveM')){
    // Positions-Dropdown — Partner-Position automatisch umdrehen
    document.querySelectorAll('[data-pos]').forEach(s=>s.onchange=()=>{
      readM();
      // Partner gleicher Team hat immer entgegengesetzte Position
      const k=s.dataset.pos;
      const partner = k==='A1'?'A2':k==='A2'?'A1':k==='B1'?'B2':'B1';
      M['p'+partner] = M['p'+k]==='atk' ? 'def' : 'atk';
      // Partner-Dropdown im DOM nachziehen
      const partnerSel=document.querySelector(`[data-pos="${partner}"]`);
      if(partnerSel) partnerSel.value=M['p'+partner];
      updatePreview();
    });

    // Text-Modus: Combobox mit Vorschlägen
    document.querySelectorAll('[data-combo]').forEach(inp=>bindCombo(inp));

    // Score: Stepper
    document.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>{
      const[k,d]=b.dataset.step.split(',');M[k]=Math.max(0,Math.min(10,M[k]+(+d)));
      const el=document.getElementById(k==='sa'?'svA':'svB');if(el&&el.tagName!=='INPUT')el.textContent=M[k];updatePreview();});
    // Score: Klick zum Eintippen
    document.querySelectorAll('[data-scoreedit]').forEach(sp=>sp.onclick=()=>makeScoreEditable(sp));

    document.getElementById('clearM').onclick=()=>{M={A1:'',A2:'',B1:'',B2:'',pA1:'atk',pA2:'def',pB1:'atk',pB2:'def',sa:0,sb:0};render();};
    // Durchwechseln: 4 gewählte Spieler random in neue Teams mischen
    const shuf=document.getElementById('shuffleBtn');
    if(shuf) shuf.onclick=()=>{
      const ids=[M.A1,M.A2,M.B1,M.B2].filter(Boolean);
      if(ids.length!==4){toast('Erst 4 Spieler auswählen',true);return;}
      // Fisher-Yates Shuffle
      for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
      M.A1=ids[0];M.A2=ids[1];M.B1=ids[2];M.B2=ids[3];
      // Positionen nach Stärke-Profil: höherer atkStrength = Sturm
      const assignPos=(p1,p2)=>{
        const a1=atkStrength(p1), a2=atkStrength(p2);
        // Wahrscheinlichkeit dass p1 stürmt: basierend auf relativem Stärke-Unterschied
        // Bei gleichem Profil (67% vs 70%) → fast 50/50
        // Bei klarem Unterschied (90% vs 30%) → fast sicher der Stärkere
        const diff=a1-a2; // positiv = p1 ist eher Stürmer
        // sigmoid-artige Mapping: diff=0 → 50%, diff=0.5 → ~88%, diff=-0.5 → ~12%
        const prob=1/(1+Math.exp(-diff*6));
        return Math.random()<prob?{s:p1,d:p2}:{s:p2,d:p1};
      };
      const tA=assignPos(M.A1,M.A2);
      M.pA1=M.A1===tA.s?'atk':'def'; M.pA2=M.A2===tA.s?'atk':'def';
      const tB=assignPos(M.B1,M.B2);
      M.pB1=M.B1===tB.s?'atk':'def'; M.pB2=M.B2===tB.s?'atk':'def';
      toast('Teams gemischt 🔀');render();
    };
    document.getElementById('saveM').onclick=doSaveMatch;
    readM();updatePreview();
  }

  // settings sliders
  bindSlider('cfgK','k_factor',v=>v,v=>Math.round(v));
  bindSlider('cfgRisk','risk_split',v=>v/100,v=>Math.round(v));
  bindSlider('cfgPos','pos_swing',v=>v/100,v=>Math.round(v));
  bindSlider('cfgWinBoost','win_boost',v=>v/100,v=>Math.round(v));
  bindSlider('cfgMovDamp','mov_loss_damp',v=>v/100,v=>Math.round(v));
  bindSlider('cfgBonus','match_bonus',v=>v/10,v=>Math.round(v));
  const recalcBtn=document.getElementById('recalcBtn');
  if(recalcBtn) recalcBtn.onclick=async()=>{
    toast('Berechne alle Matches neu…');
    await persistRecalc(matches);
    toast('Neuberechnung abgeschlossen ✓');
    await loadAll();
  };
    // lockBtn2 entfernt

  // Ausgeblendete Spieler wieder einblenden
  document.querySelectorAll('[data-unhide]').forEach(btn=>btn.onclick=async()=>{
    await sb.from('players').update({hidden:false}).eq('id',btn.dataset.unhide);
    toast('Eingeblendet ✓','ok');
    await loadAll();
  });
}

// Combobox: Tippen filtert Spieler, Auswahl setzt M[key]
function bindCombo(inp){
  const key=inp.dataset.combo;
  const list=document.querySelector(`[data-combolist="${key}"]`);
  const chosenIds=()=>[M.A1,M.A2,M.B1,M.B2].filter((v,i)=>['A1','A2','B1','B2'][i]!==key&&v);
  const renderList=(q)=>{
    const taken=chosenIds();
    const gSim=getGlobalSim();
    const rankElo=p=>gSim.careerElo[p.id]??p.elo; // Karriere-Elo für Sortierung
    const dispElo=p=>Math.round(gSim.elo[p.id]??cfg.start_elo); // Saison-Elo für Anzeige
    let arr=[...activePlayers()].sort((a,b)=>rankElo(b)-rankElo(a)).filter(p=>!taken.includes(p.id));
    if(q)arr=arr.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    if(!arr.length){list.innerHTML=`<div class="combo-opt empty">Kein Treffer</div>`;list.classList.add('show');return;}
    list.innerHTML=arr.slice(0,8).map(p=>`<div class="combo-opt" data-pick="${p.id}">${esc(p.name)}<span class="ce">${dispElo(p)}</span></div>`).join('');
    list.classList.add('show');
    list.querySelectorAll('[data-pick]').forEach(o=>o.onclick=()=>{
      M[key]=o.dataset.pick; const p=pmap()[M[key]];
      inp.value=p.name; inp.classList.add('filled'); list.classList.remove('show');
      readM(); updatePreview();
    });
  };
  inp.onfocus=()=>renderList(inp.value && pmap()[M[key]] && pmap()[M[key]].name===inp.value ? '' : inp.value);
  inp.oninput=()=>{ M[key]=''; inp.classList.remove('filled'); renderList(inp.value); updatePreview(); };
  inp.onblur=()=>setTimeout(()=>list.classList.remove('show'),180);
  // Enter wählt ersten Treffer
  inp.onkeydown=e=>{ if(e.key==='Enter'){const first=list.querySelector('[data-pick]');if(first)first.click();} };
}

// Score per Klick eintippbar machen, nur 0–10
function makeScoreEditable(span){
  const k=span.dataset.scoreedit;
  const inp=document.createElement('input');
  inp.type='number'; inp.min=0; inp.max=10; inp.value=M[k];
  inp.className='sval-input num'; inp.inputMode='numeric';
  span.replaceWith(inp); inp.focus(); inp.select();
  const commit=()=>{
    let v=parseInt(inp.value,10); if(isNaN(v))v=0; v=Math.max(0,Math.min(10,v));
    M[k]=v;
    const ns=document.createElement('span');
    ns.className='sval num'; ns.id=(k==='sa'?'svA':'svB'); ns.dataset.scoreedit=k; ns.textContent=v;
    inp.replaceWith(ns); ns.onclick=()=>makeScoreEditable(ns);
    updatePreview();
  };
  inp.onblur=commit;
  inp.oninput=()=>{ // hart auf 0–10 begrenzen während des Tippens
    if(inp.value!==''){let v=parseInt(inp.value,10);if(!isNaN(v)){if(v>10)inp.value=10;if(v<0)inp.value=0;}}
  };
  inp.onkeydown=e=>{ if(e.key==='Enter')inp.blur(); };
}
function bindSlider(id,key,toState,toLabel){
  const sl=document.getElementById(id);if(!sl)return;
  sl.oninput=()=>{document.getElementById(id+'v').textContent=toLabel(+sl.value);};
  sl.onchange=async()=>{const o={};o[key]=toState(+sl.value);await sb.from('config').update(o).eq('id',1);cfg[key]=o[key];invalidateCache();toast('Gespeichert','ok');};
}

// ════════ TEAM PROFIL SHEET ════════
function showTeam(p1Id,p2Id){
  const pm=pmap();
  const pA=pm[p1Id], pB=pm[p2Id];
  if(!pA||!pB) return;
  const d=teamDetail(p1Id,p2Id);
  if(!d.games){
    openSheet(`
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">Team</div>
        <h3 style="margin-top:8px">${esc(pA.name)} &amp; ${esc(pB.name)}</h3>
      </div>
      ${emptyState('handshake','Noch keine gemeinsamen Spiele')}
    `);
    return;
  }

  const wr=Math.round(d.wr*100);
  const gdStr=(d.gd>=0?'+':'')+d.gd;
  const eloStr=(d.eloDelta>=0?'+':'')+d.eloDelta;
  const eloColor=d.eloDelta>=0?'var(--acid)':'var(--red)';

  // Großes Avatar je Spieler (64px)
  const avBig=(p)=>{
    const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
    if(em) return `<div style="width:64px;height:64px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:32px;border:2px solid var(--line2)">${em}</div>`;
    return `<div style="width:64px;height:64px;border-radius:50%;background:${avColor(p.id)};display:grid;place-items:center;font-size:22px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;border:2px solid var(--line2)">${esc(initials(p.name))}</div>`;
  };
  // Kleines Avatar (für Gegner-Rows, 30px)
  const avSm=(p,marginLeft)=>{
    if(!p) return '';
    const em=p.avatar_id?avatarEmoji(p.avatar_id):null;
    const ml=marginLeft?'margin-left:-8px;':'';
    if(em) return `<div style="width:30px;height:30px;border-radius:50%;background:var(--surface3);display:grid;place-items:center;font-size:14px;border:2px solid var(--surface);${ml}">${em}</div>`;
    return `<div style="width:30px;height:30px;border-radius:50%;background:${avColor(p.id)};display:grid;place-items:center;font-size:11px;font-family:'Archivo Black',sans-serif;color:#0a0c0b;border:2px solid var(--surface);${ml}">${esc(initials(p.name))}</div>`;
  };

  // Gegnerspieler-Karte (einzelner Spieler)
  const oppRow=(opp,label,labelColor)=>{
    const op=pm[opp.oid]; if(!op) return '';
    return `<div style="margin-bottom:14px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">${label}</div>
      <div class="rrow" data-detail="${esc(op.id)}" style="padding:12px 14px">
        ${avSm(op,false)}
        <div class="rmid" style="margin-left:11px">
          <div class="rname" style="font-size:13px">${esc(op.name)}</div>
          <div class="rmeta"><span class="num">${opp.g} Begegnungen</span></div>
        </div>
        <div class="num" style="font-size:13px;font-weight:600;flex-shrink:0">
          <span style="color:var(--acid)">${opp.w}</span><span style="color:var(--faint)"> · </span><span style="color:var(--red)">${opp.g-opp.w}</span>
        </div>
      </div>
    </div>`;
  };

  // Highlight-Karte (höchster Sieg / Upset / schlimmste Pleite)
  const highlightRow=(entry,kind)=>{
    if(!entry) return '';
    const m=entry.m;
    const onA=(m.a1===d.ids[0]&&m.a2===d.ids[1])||(m.a1===d.ids[1]&&m.a2===d.ids[0]);
    const oppIds=onA?[m.b1,m.b2]:[m.a1,m.a2];
    const o1=pm[oppIds[0]], o2=pm[oppIds[1]];
    const won=kind!=='loss';
    const meta = kind==='upset'
      ? `Erwartung ${Math.round(entry.expected*100)}%`
      : dateStr(m.created_at);
    const labelMap={
      win:    {l:'Höchster Sieg',     ic:'explosion', col:'var(--acid)'},
      upset:  {l:'Größter Upset',     ic:'tornado',   col:'var(--purple)'},
      loss:   {l:'Schlimmste Pleite', ic:'skull',     col:'var(--red)'}
    };
    const cfg=labelMap[kind];
    return `<div class="rrow" data-match="${esc(m.id)}" style="padding:11px 13px;display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;border-radius:50%;background:var(--bg2);color:${cfg.col};display:grid;place-items:center;flex-shrink:0">
        <span class="ic svg-ic" style="font-size:16px">${svgI(cfg.ic)}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:${cfg.col};font-weight:700;text-transform:uppercase;letter-spacing:.08em;line-height:1">${cfg.l}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px" class="num">vs ${esc((o1?o1.name:'?')+' & '+(o2?o2.name:'?'))} · ${meta}</div>
      </div>
      <div class="num" style="font-size:14px;font-weight:700;color:${won?'var(--acid)':'var(--red)'};flex-shrink:0">${entry.score}</div>
    </div>`;
  };

  const highlights=[
    highlightRow(d.biggestWin,'win'),
    highlightRow(d.biggestUpset,'upset'),
    highlightRow(d.biggestLoss,'loss')
  ].filter(Boolean).join('');

  // Letzte 5 Matches
  const recentRows=d.recent.map(r=>{
    const m=r.m;
    const oppIds=r.onA?[m.b1,m.b2]:[m.a1,m.a2];
    const o1=pm[oppIds[0]], o2=pm[oppIds[1]];
    const won=r.won;
    return `<div class="rrow" data-match="${esc(m.id)}" style="padding:10px 13px;display:flex;align-items:center;gap:10px">
      <div style="width:24px;height:24px;border-radius:50%;background:${won?'rgba(200,255,77,.12)':'rgba(240,86,106,.12)'};color:${won?'var(--acid)':'var(--red)'};display:grid;place-items:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          ${won?'<polyline points="4,12 10,18 20,6"/>':'<path d="M6 6L18 18M6 18L18 6"/>'}
        </svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;line-height:1.2">vs <span style="color:var(--ink2)">${esc((o1?o1.name:'?')+' & '+(o2?o2.name:'?'))}</span></div>
        <div class="num" style="font-size:10px;color:var(--muted);margin-top:2px">${dateStr(m.created_at)}</div>
      </div>
      <div class="num" style="font-size:13px;font-weight:600;color:var(--ink);flex-shrink:0">${m.score_a} : ${m.score_b}</div>
    </div>`;
  }).join('');

  openSheet(`
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);font-weight:700;font-family:'Sometype Mono',monospace">Team</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px">
        <div data-detail="${esc(pA.id)}" style="cursor:pointer">${avBig(pA)}</div>
        <div style="font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--muted)">&amp;</div>
        <div data-detail="${esc(pB.id)}" style="cursor:pointer">${avBig(pB)}</div>
      </div>
      <div style="font-family:'Archivo Black',sans-serif;font-size:20px;letter-spacing:-.02em;line-height:1.1;margin-top:14px">${esc(pA.name)} &amp; ${esc(pB.name)}</div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:18px">
      <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
        <div style="font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--ink);line-height:1">${d.games}</div>
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Spiele</div>
      </div>
      <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
        <div style="font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--acid);line-height:1">${wr}%</div>
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Quote</div>
      </div>
      <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
        <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--ink);line-height:1">${gdStr}</div>
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Tordiff</div>
      </div>
      <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center">
        <div class="num" style="font-family:'Archivo Black',sans-serif;font-size:18px;color:${eloColor};line-height:1">${eloStr}</div>
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px">Elo</div>
      </div>
    </div>

    <div style="margin-bottom:18px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Bilanz</div>
      <div style="display:flex;height:8px;border-radius:99px;overflow:hidden;background:var(--line)">
        <div style="width:${d.games?(d.wins/d.games*100):0}%;background:var(--acid)"></div>
        <div style="width:${d.games?(d.losses/d.games*100):0}%;background:var(--red)"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px" class="num">
        <span style="color:var(--acid)">${d.wins} Siege</span>
        <span style="color:var(--red)">${d.losses} Pleiten</span>
      </div>
    </div>

    ${d.nemesis?oppRow(d.nemesis,'Erzgegner'):''}
    ${d.favorite?oppRow(d.favorite,'Lieblingsgegner'):''}

    ${highlights?`
    <div style="margin-bottom:18px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Highlights</div>
      <div style="display:flex;flex-direction:column;gap:6px">${highlights}</div>
    </div>`:''}

    ${recentRows?`
    <div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-bottom:8px;font-family:'Sometype Mono',monospace">Letzte Spiele</div>
      <div style="display:flex;flex-direction:column;gap:6px">${recentRows}</div>
    </div>`:''}
  `);

  // Innerhalb des Sheets klickbar machen
  const sheetEl=document.getElementById('sheet');
  if(sheetEl){
    sheetEl.querySelectorAll('[data-detail]').forEach(el=>{
      el.onclick=()=>{const pid=el.dataset.detail; closeSheet(); setTimeout(()=>showPlayer(pid),350);};
    });
    sheetEl.querySelectorAll('[data-match]').forEach(el=>{
      el.onclick=()=>{const mid=el.dataset.match; closeSheet(); setTimeout(()=>showMatchDetail(mid),350);};
    });
  }
}

function showMatchDetail(mid){
  const m=matches.find(x=>x.id===mid);if(!m)return;
  // Live aus globalSim lesen — m.deltas ist evtl. veraltet/leer bei alten Matches.
  const liveBd=matchBreakdown(mid);
  const line=(id,pos)=>{
    const b=liveBd[id];
    const d=b?b.finalDelta:((m.deltas||{})[id]||0);
    return `<div class="delta-row"><span class="dn">${esc(pname(id))} <span class="chip ${pos}">${pos==='atk'?'STU':'ABW'}</span></span><span class="delta-v ${d>=0?'pos':'neg'}">${d>=0?'+':''}${Math.round(d)}</span></div>`;
  };
  // Auszeichnungen durch dieses Match
  const earned=badgesEarnedInMatch(mid);
  const earnedHtml=earned.length?`
    <div class="mini-label" style="margin-top:14px">Auszeichnungen in diesem Match</div>
    <div style="display:flex;flex-direction:column;gap:5px">
      ${earned.map(e=>`<div class="rrow" style="padding:10px 13px;cursor:default">
        <span class="ic svg-ic" style="font-size:18px;width:32px;text-align:center;color:var(--ink2)">${badgeIc(e.badge,'18px')}</span>
        <div class="rmid"><div class="rname" style="font-size:13px">${esc(pname(e.playerId))}</div>
          <div class="rmeta"><span>${e.badge.name}</span></div></div>
      </div>`).join('')}
    </div>`:''
  ;
  openSheet(`<h3>${m.score_a} : ${m.score_b}</h3><div class="sheet-sub">${dateStr(m.created_at)} · Team ${m.winner} gewinnt</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <div data-team="${esc([m.a1,m.a2].sort().join('|'))}" style="flex:1;background:var(--surface);border:1px solid ${m.winner==='A'?'var(--acid2)':'var(--line)'};border-radius:10px;padding:8px 10px;cursor:pointer;text-align:center">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-family:'Sometype Mono',monospace">Team A</div>
        <div style="font-size:12px;margin-top:2px;line-height:1.2">${esc(pname(m.a1)+' & '+pname(m.a2))}</div>
      </div>
      <div data-team="${esc([m.b1,m.b2].sort().join('|'))}" style="flex:1;background:var(--surface);border:1px solid ${m.winner==='B'?'var(--acid2)':'var(--line)'};border-radius:10px;padding:8px 10px;cursor:pointer;text-align:center">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-family:'Sometype Mono',monospace">Team B</div>
        <div style="font-size:12px;margin-top:2px;line-height:1.2">${esc(pname(m.b1)+' & '+pname(m.b2))}</div>
      </div>
    </div>
    <div class="preview" style="margin-top:16px"><div class="delta-list">
      ${line(m.a1,m.a1_pos)}${line(m.a2,m.a2_pos)}<div class="delta-div"></div>${line(m.b1,m.b1_pos)}${line(m.b2,m.b2_pos)}
    </div></div>
    <button class="btn ghost sm" id="showBreakdownBtn" style="margin-top:10px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:6px">${svgI('chartBar')} Elo-Analyse anzeigen</button>
    <div id="breakdownSlot"></div>
    ${earnedHtml}
    <div class="btn-row" style="margin-top:14px">
      <button class="btn ghost sm" id="editThisMatch" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px">${svgI('edit')} Bearbeiten</button>
      <button class="btn ghost sm" id="delThisMatch" style="flex:0 0 38%;color:var(--red)">Löschen</button>
    </div>`);
  // Breakdown-Button
    document.getElementById('showBreakdownBtn').onclick=()=>{
    const bd=matchBreakdown(mid);
    const slot=document.getElementById('breakdownSlot');
    if(!bd||!Object.keys(bd).length){slot.innerHTML='<p style="font-size:12px;color:var(--muted);text-align:center">Keine Daten verfügbar</p>';return;}
    // bd kommt aus getGlobalSim().history — nach Saison-Reset sind startElo/endElo
    // bereits die korrekten Saison-Werte. Keine separate Sim mehr nötig.
    const ids=[m.a1,m.a2,m.b1,m.b2];
    const rows=ids.map(id=>{
      const b=bd[id]; if(!b)return '';
      const sign=v=>v>=0?'+'+v.toFixed(1):v.toFixed(1);
      const seasonBefore=Math.round(b.startElo);
      const seasonAfter=Math.round(b.endElo);
      const factors=[];
      factors.push({label:'Basis (Erwartung)',val:b.rawBase,desc:b.won?'Sieg'+(b.expected<0.5?' gegen stärkeres Team':''):'Niederlage'+(b.expected>0.5?' gegen schwächeres Team':'')});
      if(Math.abs(b.movEffect)>0.1) factors.push({label:'Tordifferenz',val:b.movEffect,desc:b.won?'Klarer Sieg':'Hohe Niederlage'+(b.movMult<1.2?' (gedämpft)':'')});
      if(Math.abs(b.winBoostEffect)>0.1) factors.push({label:'Sieg-Boost',val:b.winBoostEffect,desc:'+'+Math.round((b.winBoost-1)*100)+'% für Siege'});
      if(b.expProtect<1) factors.push({label:'Erfahrungs-Schutz',val:b.expProtectEffect,desc:Math.round((1-b.expProtect)*100)+'% Schutz'});
      if(Math.abs(b.underdogMult-1)>0.005){
        const pct=Math.round((b.underdogMult-1)*100);
        factors.push({label:pct>0?'Underdog-Boost':'Favoriten-Malus',val:b.afterMods-b.rawBase*b.movMult*b.winBoost*b.expProtect,
          desc:b.underdogEloDiff>0?Math.abs(b.underdogEloDiff)+' Elo schwächer als Gegner':'Stärker als Gegner'});
      }
      if(Math.abs(b.riskEffect)>0.1) factors.push({label:b.riskShare<1?'Risiko-Split (stark)':'Risiko-Split (schwach)',val:b.riskEffect,desc:'Mate-Stärke-Verteilung'});
      if(Math.abs(b.posEffect)>0.1) factors.push({label:'Positions-Bonus',val:b.posEffect,desc:(b.posMult>1?'Schwache':'Starke')+' Position'});
      factors.push({label:'Spielbonus',val:b.matchBonus,desc:'Flat +'+b.matchBonus.toFixed(1)+' pro Match'});
      const factorRows=factors.map(f=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px">
        <div><span style="color:var(--ink)">${f.label}</span> <span style="color:var(--muted);font-size:10px">${f.desc}</span></div>
        <span style="font-family:'Sometype Mono',monospace;font-weight:700;color:${f.val>=0?'var(--acid)':'var(--red)'}">${sign(f.val)}</span>
      </div>`).join('');
      return `<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;margin-top:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-weight:700;font-size:13px">${esc(pname(id))}</span>
          <span style="font-family:'Archivo Black',sans-serif;font-size:15px;color:${b.finalDelta>=0?'var(--acid)':'var(--red)'}">${sign(b.finalDelta)}</span>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--line)">
          <div style="display:flex;justify-content:space-between">
            <span>${seasonBefore} → ${seasonAfter}</span>
            <span>K=${Math.round(b.kFactor)} · Erw. ${Math.round(b.expected*100)}%</span>
          </div>
        </div>
        ${factorRows}
      </div>`;
    }).join('');
    slot.innerHTML=`<div class="mini-label" style="margin-top:14px">Elo-Analyse</div>${rows}`;
    document.getElementById('showBreakdownBtn').style.display='none';
  };

  document.getElementById('editThisMatch').onclick=()=>showEditMatch(mid);
  document.getElementById('delThisMatch').onclick=async()=>{
    if(!confirm('Match wirklich löschen? Die gesamte Rangliste wird danach automatisch neu berechnet.'))return;
    closeSheet(); toast('Lösche & berechne neu…');
    await sb.from('matches').delete().eq('id',mid);
    const rest=matches.filter(x=>x.id!==mid);
    await persistRecalc(rest);
    toast('Gelöscht & neu berechnet','ok'); await loadAll();
  };
  // Team-Chips → Team-Profil
  document.querySelectorAll('[data-team]').forEach(el=>{
    el.onclick=()=>{
      const [a,b]=el.dataset.team.split('|');
      if(!a||!b) return;
      closeSheet(); setTimeout(()=>showTeam(a,b),350);
    };
  });
}

// ════════ MATCH BEARBEITEN ════════
let E={};  // Edit-Zustand
function showEditMatch(mid){
  const m=matches.find(x=>x.id===mid);if(!m)return;
  E={id:m.id,A1:m.a1,A2:m.a2,B1:m.b1,B2:m.b2,pA1:m.a1_pos,pA2:m.a2_pos,pB1:m.b1_pos,pB2:m.b2_pos,sa:m.score_a,sb:m.score_b};
  const gSim=getGlobalSim();
  const sortElo=p=>gSim.careerElo[p.id]??p.elo;
  const showElo=p=>Math.round(gSim.elo[p.id]??cfg.start_elo);
  const opts=sel=>`<option value="">Spieler…</option>`+
    [...players].sort((a,b)=>sortElo(b)-sortElo(a)).map(p=>`<option value="${p.id}" ${E[sel]===p.id?'selected':''}>${esc(p.name)} · ${showElo(p)}</option>`).join('');
  const pos=k=>`<select data-epos="${k}"><option value="atk" ${E['p'+k]==='atk'?'selected':''}>↑ Sturm</option><option value="def" ${E['p'+k]==='def'?'selected':''}>↓ Abwehr</option></select>`;
  const slot=(t,n)=>`<div class="slot">
    <div class="psel"><select data-ep="${t}${n}">${opts(t+n)}</select></div>
    <div class="possel">${pos(t+n)}</div></div>`;
  openSheet(`<h3>Match bearbeiten</h3><div class="sheet-sub">Änderungen lösen eine Neuberechnung aus</div>
    <div class="builder" style="margin-top:16px">
      <div class="team-block A"><div class="team-label">Team A</div>${slot('A',1)}${slot('A',2)}</div>
      <div class="vs-mid"><span class="line"></span><span class="vs">VS</span><span class="line"></span></div>
      <div class="team-block B"><div class="team-label">Team B</div>${slot('B',1)}${slot('B',2)}</div>
    </div>
    <div class="score-board" style="margin-top:12px">
      <div class="score-col A"><div class="cl">Team A</div>
        <div class="stepper"><button data-estep="sa,-1">−</button><span class="sval num" id="esvA">${E.sa}</span><button data-estep="sa,1">+</button></div></div>
      <div class="score-sep">:</div>
      <div class="score-col B"><div class="cl">Team B</div>
        <div class="stepper"><button data-estep="sb,-1">−</button><span class="sval num" id="esvB">${E.sb}</span><button data-estep="sb,1">+</button></div></div>
    </div>
    <div id="editWarn" style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px"></div>
    <div class="btn-row">
      <button class="btn ghost sm" id="cancelEdit" style="flex:0 0 38%">Abbrechen</button>
      <button class="btn" id="saveEdit">Speichern</button>
    </div>`);
  const readE=()=>{document.querySelectorAll('[data-ep]').forEach(s=>E[s.dataset.ep]=s.value);
    document.querySelectorAll('[data-epos]').forEach(s=>E['p'+s.dataset.epos]=s.value);};
  const checkE=()=>{const ids=[E.A1,E.A2,E.B1,E.B2];const warn=document.getElementById('editWarn');
    const dup=new Set(ids).size!==ids.filter(Boolean).length;
    const tie=E.sa===E.sb; const incomplete=ids.some(x=>!x);
    const samePosA=E.pA1===E.pA2, samePosB=E.pB1===E.pB2;
    let ok=true,msg='';
    if(incomplete){ok=false;}
    else if(dup){ok=false;msg='⚠️ Ein Spieler steht doppelt.';}
    else if(tie){ok=false;msg='⚠️ Unentschieden ist nicht möglich.';}
    else if(samePosA||samePosB){ok=false;msg='⚠️ Jedes Team braucht Sturm + Abwehr.';}
    if(warn)warn.textContent=msg; document.getElementById('saveEdit').disabled=!ok;};
  document.querySelectorAll('[data-ep],[data-epos]').forEach(s=>s.onchange=()=>{readE();checkE();});
  document.querySelectorAll('[data-estep]').forEach(b=>b.onclick=()=>{const[k,d]=b.dataset.estep.split(',');
    E[k]=Math.max(0,E[k]+(+d));document.getElementById(k==='sa'?'esvA':'esvB').textContent=E[k];checkE();});
  document.getElementById('cancelEdit').onclick=()=>showMatchDetail(mid);
  document.getElementById('saveEdit').onclick=async()=>{
    readE(); const ids=[E.A1,E.A2,E.B1,E.B2];
    if(ids.some(x=>!x)||new Set(ids).size!==4||E.sa===E.sb){toast('Eingabe unvollständig',true);return;}
    closeSheet(); toast('Speichere & berechne neu…');
    const winner=E.sa>E.sb?'A':'B';
    // Match-Zeile aktualisieren (Deltas folgen aus der Neuberechnung)
    await sb.from('matches').update({
      a1:E.A1,a1_pos:E.pA1,a2:E.A2,a2_pos:E.pA2,b1:E.B1,b1_pos:E.pB1,b2:E.B2,b2_pos:E.pB2,
      score_a:E.sa,score_b:E.sb,winner
    }).eq('id',E.id);
    // lokale Kopie für die Neuberechnung anpassen
    const updated=matches.map(x=>x.id===E.id
      ?{...x,a1:E.A1,a1_pos:E.pA1,a2:E.A2,a2_pos:E.pA2,b1:E.B1,b1_pos:E.pB1,b2:E.B2,b2_pos:E.pB2,score_a:E.sa,score_b:E.sb,winner}
      :x);
    await persistRecalc(updated);
    toast('Gespeichert & neu berechnet','ok'); await loadAll();
  };
  checkE();
}

// ════════ LOCK ════════
const SETTINGS_HASH='03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';
let settingsUnlocked=false;

async function openSettingsLock(){
  if(settingsUnlocked){tab='settings';render();window.scrollTo(0,0);return;}
  // Create overlay
  const ov=document.createElement('div');
  ov.id='settingsLockOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px';
  ov.innerHTML=`
    <div style="background:var(--surface2);border:1px solid var(--line);border-radius:18px;padding:28px 24px;width:100%;max-width:320px;text-align:center">
      <div style="display:flex;justify-content:center;margin-bottom:16px">
        <span style="width:52px;height:52px;border-radius:14px;background:var(--surface3);display:grid;place-items:center;color:var(--ink2)">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS['lock']}</svg>
        </span>
      </div>
      <h3 style="margin:0 0 6px;font-size:17px">Feintuning</h3>
      <p style="font-size:13px;color:var(--muted);margin:0 0 20px;line-height:1.5">Passwort eingeben um fortzufahren.</p>
      <input id="settingsPwInput" type="password" placeholder="Passwort"
        style="width:100%;box-sizing:border-box;background:var(--surface3);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--ink);outline:none;margin-bottom:8px"/>
      <div id="settingsPwError" style="font-size:12px;color:var(--red);min-height:18px;margin-bottom:12px"></div>
      <div style="display:flex;gap:10px">
        <button onclick="document.getElementById('settingsLockOverlay').remove()"
          style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--surface3);color:var(--ink2);font-family:inherit;font-weight:600;font-size:14px;cursor:pointer">Abbrechen</button>
        <button id="settingsPwBtn"
          style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--acid);color:#000;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer">Entsperren</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const inp=document.getElementById('settingsPwInput');
  const err=document.getElementById('settingsPwError');
  const btn=document.getElementById('settingsPwBtn');
  inp.focus();
  async function tryUnlock(){
    const pw=inp.value;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===SETTINGS_HASH){
      settingsUnlocked=true;
      ov.remove();
      tab='settings';render();window.scrollTo(0,0);
    } else {
      err.textContent='Falsches Passwort';
      inp.value='';
      inp.focus();
      setTimeout(()=>{err.textContent='';},2000);
    }
  }
  btn.onclick=tryUnlock;
  inp.onkeydown=e=>{if(e.key==='Enter')tryUnlock();};
}

document.getElementById('settingsBtn').onclick=openSettingsLock;

// Recap-Button: nur sichtbar wenn es archivierte Saisons gibt
(function setupRecapBtn(){
  const btn=document.getElementById('recapBtn');
  if(!btn)return;
  // updateRecapBtn wird auch nach Saison-Archivierung aufgerufen
  window._updateRecapBtn=function(){
    const past=seasons.filter(s=>s.id!==currentSeason().id);
    btn.style.visibility=past.length?'visible':'hidden';
  };
  btn.onclick=()=>{
    const past=seasons.filter(s=>s.id!==currentSeason().id);
    if(!past.length)return;
    // Jüngste vergangene Saison zeigen
    showSeasonRecap(past[0]);
  };
})();
document.getElementById('logoHome').onclick=()=>{tab='ranking';period='season';rankSearch='';closeSheet();render();window.scrollTo(0,0);};
document.getElementById('fab').onclick=()=>{tab='match';render();window.scrollTo(0,0);};

// ════════ HELPERS ════════
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function dateStr(ts){return new Date(ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function mlabel(m){return pname(m.a1)+'&'+pname(m.a2)+' vs '+pname(m.b1)+'&'+pname(m.b2);}
function emptyState(e,t){
  // Wenn 'e' ein Icon-Name aus ICONS ist → SVG rendern; sonst als Text/Emoji belassen
  const inner = ICONS[e] ? `<div class="ee svg-ic">${svgI(e)}</div>` : `<div class="ee">${e}</div>`;
  return `<div class="empty">${inner}${t}</div>`;
}
let tt;
function toast(msg,kind){let t=document.querySelector('.toast');
  if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.className='toast '+(kind===true?'err':kind||'');void t.offsetWidth;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}

// ════════ BOOT ════════
loadAll();
setInterval(()=>{if(!document.getElementById('sheet').classList.contains('show')&&tab!=='match')loadAll();},30000);
})();
</script>
